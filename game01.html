// --- 11. ANIMATION LOOP ---
function updateLight(now) {
    // Spotlight rises at the WHITE side of the board (east, positive Z), arcs
    // overhead, and sets at the BLACK side (west, negative Z). 5-minute period.
    // The arc is a half-circle traced in the YZ plane; the X coordinate stays 0.
    const t = (now / LIGHT_ORBIT_PERIOD_MS) * Math.PI * 2;
    // For a half-circle above the horizon, we use sin(t) for height (peaks at t=π/2)
    // and cos(t) reversed for Z (positive at start = east).
    spotLight.position.set(
        0,
        LIGHT_ORBIT_HEIGHT * Math.abs(Math.sin(t)) + 4,  // arc above the board, never below
        Math.cos(t) * LIGHT_ORBIT_RADIUS                 // east-west motion
    );
}

// ===================== VISUALIZER =====================
// Music-player Phase 2: a backdrop "constellation" panel that sits behind the
// scene, always facing the camera. 100 historical-figure names are scattered
// across the field as nodes, connected by faint lines into a sparse graph.
// A fake "energy pulse" (sine wave with a heart-beat shape) drives subtle
// scale/opacity animation so the visual feels alive. Real audio reactivity
// arrives in Phase 3.
//
// Architecture:
//   - One big plane (60 units wide × 36 tall) parented to a billboard group.
//   - The plane carries a CanvasTexture that we repaint each frame using the
//     current energy value. Names are drawn as 2D text on the canvas.
//   - The billboard group is positioned diametrically opposite the camera
//     (camera at +Z, billboard at -Z relative to the orbit center) and
//     rotated to face the camera every frame.
//   - Toggleable on/off via a HUD button. Off = group removed from scene.

// Visualizer geometry — the panel rides the MARQUEE rail (which spans
// the board at x ∈ [-5, +5] and sits at y = MARQUEE_Y = -5.5). The plane
// is dimensioned to match the rail's length (10 wide) and stand a few
// units tall, anchored just above the rail.
const VIS_PLANE_W = 10;
const VIS_PLANE_H = 6;
const VIS_TEX_W = 1024;
const VIS_TEX_H = Math.round(VIS_TEX_W * VIS_PLANE_H / VIS_PLANE_W);
// Visualizer Y position: rail sits at MARQUEE_Y (-5.5). We center the
// strip BETWEEN the rail and the underside of the board (board sits at
// y=0). That puts the strip's center at roughly y = -3.
const VIS_Y_CENTER = -3;
const VIS_NODE_COUNT = 100;

let visualizerEnabled = false;
let visualizerActiveSet = [];          // 100 figures pulled from AppNames
let visualizerNodes = [];              // [{x, y, name, links, baseSize, phase}, ...]
                                       // x,y are normalized 0..1 within the canvas
let visualizerEdges = [];              // [[i, j], ...] indices into nodes
let visualizerCanvas = null;
let visualizerCtx = null;
let visualizerTexture = null;
let visualizerMesh = null;             // the plane
let visualizerBillboard = null;        // group that holds the plane

// Build the constellation graph: scatter nodes, then connect each node to its
// 2-3 nearest neighbors. Result is a sparse undirected graph that looks
// pleasingly organic — not a dense mesh, not isolated points.
function buildConstellationGraph() {
    visualizerNodes = [];
    visualizerEdges = [];

    // Pull 100 random figures from the CSV pool. If the pool is empty (no
    // CSV loaded), bail out — caller will retry later.
    visualizerActiveSet = window.AppNames.refreshActiveSet(VIS_NODE_COUNT);
    if (visualizerActiveSet.length === 0) return;

    // Scatter using a Poisson-ish approach: try random points and reject any
    // that are too close to already-placed ones. This avoids the clustering
    // that a pure uniform random would produce.
    const minDist = 0.06;  // in normalized 0..1 coords
    let attempts = 0;
    while (visualizerNodes.length < visualizerActiveSet.length && attempts < 5000) {
        attempts++;
        const x = 0.04 + Math.random() * 0.92;  // keep away from edges
        const y = 0.06 + Math.random() * 0.88;
        let tooClose = false;
        for (const n of visualizerNodes) {
            const dx = n.x - x, dy = n.y - y;
            if (dx * dx + dy * dy < minDist * minDist) { tooClose = true; break; }
        }
        if (tooClose) continue;
        const figure = visualizerActiveSet[visualizerNodes.length];
        visualizerNodes.push({
            x, y,
            figure,
            // Random pulse phase per node so they don't all twinkle in sync.
            phase: Math.random() * Math.PI * 2,
            // Slight size variance to give the field hierarchy.
            sizeJitter: 0.85 + Math.random() * 0.5
        });
    }

    // Edges: each node connects to its 2 nearest neighbors. Avoid duplicates.
    const edgeSet = new Set();
    for (let i = 0; i < visualizerNodes.length; i++) {
        const a = visualizerNodes[i];
        // Compute distances to all others; pick the closest 2.
        const dists = [];
        for (let j = 0; j < visualizerNodes.length; j++) {
            if (i === j) continue;
            const b = visualizerNodes[j];
            const dx = a.x - b.x, dy = a.y - b.y;
            dists.push({ j, d: dx * dx + dy * dy });
        }
        dists.sort((p, q) => p.d - q.d);
        for (let k = 0; k < 2 && k < dists.length; k++) {
            const j = dists[k].j;
            const key = i < j ? `${i}-${j}` : `${j}-${i}`;
            if (!edgeSet.has(key)) {
                edgeSet.add(key);
                visualizerEdges.push([i, j]);
            }
        }
    }
}

// Build the canvas + texture + plane once. Idempotent.
function ensureVisualizerObjects() {
    if (visualizerCanvas) return;
    visualizerCanvas = document.createElement('canvas');
    visualizerCanvas.width = VIS_TEX_W;
    visualizerCanvas.height = VIS_TEX_H;
    visualizerCtx = visualizerCanvas.getContext('2d');

    visualizerTexture = new THREE.CanvasTexture(visualizerCanvas);
    visualizerTexture.minFilter = THREE.LinearFilter;
    visualizerTexture.magFilter = THREE.LinearFilter;

    const geo = new THREE.PlaneGeometry(VIS_PLANE_W, VIS_PLANE_H);
    // Additive blending makes the visualizer GLOW over whatever's behind it —
    // good for dark backgrounds, mediocre on light. depthWrite off so it
    // doesn't occlude other transparent things (planets, sun glow).
    const mat = new THREE.MeshBasicMaterial({
        map: visualizerTexture,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide
    });
    visualizerMesh = new THREE.Mesh(geo, mat);

    // The billboard group holds the mesh. We position the group, then rotate
    // it each frame so its +Z faces the camera.
    visualizerBillboard = new THREE.Group();
    visualizerBillboard.add(visualizerMesh);
    // Render BEFORE other scene objects so they sit in front of it.
    visualizerMesh.renderOrder = -2;
}

// Paint one frame of the constellation onto the canvas, using the current
// "energy" value (0..1) to drive pulse strength. We repaint the whole canvas
// per frame, which at 1024-wide is cheap enough on any modern machine.
function paintVisualizerFrame(metrics) {
    if (!visualizerCtx) return;
    const ctx = visualizerCtx;
    const W = VIS_TEX_W, H = VIS_TEX_H;
    const { overall, bass, mid, treble, beat, spectrum } = metrics;

    // Clear to transparent. The strip "rides the rail" with no visible
    // panel/wash behind it — just the EQ bars and constellation nodes
    // drawn over transparency (additive blend makes them glow against
    // the scene).
    ctx.clearRect(0, 0, W, H);

    // On a beat, briefly tint the whole canvas with a soft warm wash —
    // even without a panel, this creates a subtle "the air shimmers"
    // moment on the kick. Keep low alpha so it's never a hard flash.
    if (beat) {
        ctx.fillStyle = 'rgba(255, 240, 220, 0.06)';
        ctx.fillRect(0, 0, W, H);
    }

    // Edges first, behind the nodes. Edge intensity reacts to TREBLE/MID
    // (sparkly, high-frequency feel) while node brightness reacts to OVERALL.
    ctx.lineWidth = 1;
    const edgeBoost = 0.6 + (mid + treble) * 0.5;
    for (const [i, j] of visualizerEdges) {
        const a = visualizerNodes[i];
        const b = visualizerNodes[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        const alpha = Math.max(0.05, 0.28 - d * 1.0) * edgeBoost;
        // Tint edges cyan-ward when treble dominates, warm when bass does.
        const edgeR = Math.round(140 + bass * 80);
        const edgeG = Math.round(180 + treble * 30);
        const edgeB = Math.round(230 + treble * 20);
        ctx.strokeStyle = `rgba(${edgeR}, ${edgeG}, ${edgeB}, ${alpha.toFixed(3)})`;
        ctx.beginPath();
        ctx.moveTo(a.x * W, a.y * H);
        ctx.lineTo(b.x * W, b.y * H);
        ctx.stroke();
    }

    // Nodes + names. Bass triggers a uniform pulse-size boost so the
    // whole constellation "throbs" with the kick drum; treble adds
    // shimmer to individual node twinkles.
    const baseDotR = 2.5;
    const baseFontPx = 13;
    ctx.font = `500 ${baseFontPx}px system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    const bassBoost = 1 + bass * 0.8;
    for (let i = 0; i < visualizerNodes.length; i++) {
        const n = visualizerNodes[i];
        const localPulse = (Math.sin((performance.now() * 0.002) + n.phase) + 1) / 2;
        const intensity = 0.45 + 0.35 * overall + 0.20 * localPulse + 0.15 * treble;
        const dotR = baseDotR * n.sizeJitter * (0.9 + intensity * 0.8) * bassBoost;
        const px = n.x * W, py = n.y * H;

        // Glow halo
        const halo = ctx.createRadialGradient(px, py, 0, px, py, dotR * 5);
        halo.addColorStop(0, `rgba(220, 220, 255, ${(intensity * 0.55).toFixed(3)})`);
        halo.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = halo;
        ctx.beginPath();
        ctx.arc(px, py, dotR * 5, 0, Math.PI * 2);
        ctx.fill();

        // Solid dot
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.min(1, intensity + 0.2).toFixed(3)})`;
        ctx.beginPath();
        ctx.arc(px, py, dotR, 0, Math.PI * 2);
        ctx.fill();

        // Name label
        ctx.fillStyle = `rgba(220, 230, 255, ${(0.55 + intensity * 0.4).toFixed(3)})`;
        ctx.fillText(n.figure.fullName, px, py + dotR + 4);
    }

    // ----- Frequency-bar EQ across the bottom of the canvas -----
    // Classic visualizer overlay: 32 bars showing the magnitude of
    // groups of frequency bins. Bass on the left, treble on the right.
    // Without a real audio source we synthesize believable bars from the
    // band metrics so the visualizer still has motion when "Off".
    const BAR_COUNT = 32;
    const barAreaH = H * 0.22;           // bottom 22% of the canvas
    const barAreaTop = H - barAreaH - 8; // a hair above the bottom edge
    const barGap = 2;
    const barW = (W - (BAR_COUNT + 1) * barGap) / BAR_COUNT;
    for (let b = 0; b < BAR_COUNT; b++) {
        let mag;
        if (spectrum) {
            // Average a slice of bins for this bar. Use a log-ish mapping
            // so low frequencies aren't crammed into a couple of bins.
            const startFrac = Math.pow(b / BAR_COUNT, 1.6);
            const endFrac   = Math.pow((b + 1) / BAR_COUNT, 1.6);
            const startIdx = Math.floor(startFrac * spectrum.length);
            const endIdx   = Math.max(startIdx + 1, Math.floor(endFrac * spectrum.length));
            let s = 0;
            for (let k = startIdx; k < endIdx; k++) s += spectrum[k];
            mag = (s / (endIdx - startIdx)) / 255;
        } else {
            // Synthesize a believable bar shape from the band metrics.
            // Bass on the left, mids in the middle, treble on the right.
            const t = b / (BAR_COUNT - 1);
            let band;
            if (t < 0.25)      band = bass   * (0.6 + 0.4 * Math.sin(b + performance.now() * 0.004));
            else if (t < 0.65) band = mid    * (0.6 + 0.4 * Math.sin(b + performance.now() * 0.005));
            else               band = treble * (0.6 + 0.4 * Math.sin(b + performance.now() * 0.006));
            mag = Math.max(0, band);
        }
        const barH = mag * barAreaH;
        const x = barGap + b * (barW + barGap);
        const y = barAreaTop + (barAreaH - barH);

        // Bar gradient: hue shifts left-to-right (warm bass → cool treble).
        const hue = 30 + (b / BAR_COUNT) * 200;   // 30°=warm, 230°=cool blue
        const grad = ctx.createLinearGradient(x, y, x, y + barH);
        grad.addColorStop(0, `hsla(${hue}, 90%, 70%, 0.95)`);
        grad.addColorStop(1, `hsla(${hue}, 90%, 45%, 0.4)`);
        ctx.fillStyle = grad;
        ctx.fillRect(x, y, barW, barH);
    }

    visualizerTexture.needsUpdate = true;
}

// Synthesize a fake energy pulse: combination of a slow breathing wave
// (4-second period) with a sharper "beat" (1.2 seconds) so it doesn't feel
// like a single sine. Used as a fallback when no real audio source is
// active; see getCurrentEnergy() in the AUDIO SOURCE block below.
function fakeEnergyPulse(now) {
    const slow = (Math.sin(now * 0.0012) + 1) / 2;     // breathing
    const beat = Math.pow((Math.sin(now * 0.005) + 1) / 2, 4);  // sharp beat
    return Math.min(1, 0.35 * slow + 0.65 * beat);
}

// ===================== AUDIO SOURCE =====================
// Phase 3 of the music player. Three possible sources:
//   off  — no audio input; visualizer falls back to a synthesized pulse
//   mic  — browser microphone via getUserMedia (reacts to room audio)
//   file — user-uploaded audio file played through an <audio> element
//
// Architecture:
//   - A single AudioContext + AnalyserNode is created lazily on first
//     real-source selection. Browsers block creating an AudioContext
//     without user interaction, so this is safe to defer.
//   - audioCurrentNode tracks whichever source node feeds the analyser
//     so we can disconnect it cleanly when switching sources.
//   - For file mode, MediaElementSource is connected to BOTH the analyser
//     AND the audioContext.destination so the user hears the file too.
//   - For mic mode, the stream is NOT routed to destination (to avoid
//     feedback loops).
//
// The visualizer's per-frame paint pulls a 0..1 energy value from
// getCurrentEnergy() instead of the old fakeEnergyPulse() directly.

let audioSource = 'off';            // 'off' | 'mic' | 'file'
let audioContext = null;
let audioAnalyser = null;
let audioBuffer = null;             // Uint8Array reused frame-to-frame
let audioCurrentNode = null;        // current source connected to analyser
let audioMicStream = null;          // raw MediaStream from getUserMedia
let audioFileEl = null;             // <audio> element used for file playback
let audioFileSourceNode = null;     // MediaElementAudioSourceNode (created once)

// Lazily create the AudioContext + Analyser the first time a real source
// is activated. analyserNode.fftSize=256 gives a 128-bin frequency array,
// enough for RMS energy without burning CPU.
function ensureAudioContext() {
    if (audioContext) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) {
        console.warn('[audio] Web Audio API not supported in this browser.');
        return;
    }
    audioContext = new AC();
    audioAnalyser = audioContext.createAnalyser();
    // Larger FFT gives finer frequency-bar resolution (512 bins instead
    // of 128). smoothingTimeConstant=0.55 lets fast transients (beats)
    // register without going jittery — 0.7 was hiding hits.
    audioAnalyser.fftSize = 1024;
    audioAnalyser.smoothingTimeConstant = 0.55;
    audioBuffer = new Uint8Array(audioAnalyser.frequencyBinCount);
}

// Disconnect whatever source is currently feeding the analyser. Stops the
// mic stream too if it was active.
function detachCurrentAudioSource() {
    if (audioCurrentNode) {
        try { audioCurrentNode.disconnect(); } catch (e) { /* already disconnected */ }
        audioCurrentNode = null;
    }
    // Mic stream: stop all tracks so the browser lights up the indicator
    // only while actually listening.
    if (audioMicStream) {
        audioMicStream.getTracks().forEach(t => t.stop());
        audioMicStream = null;
    }
    // File playback: pause but keep the element & source node around so we
    // can resume without recreating things.
    if (audioFileEl && !audioFileEl.paused) {
        audioFileEl.pause();
    }
}

// Switch to mic source. Returns a promise that resolves when ready, or
// rejects if the user denies permission / no mic is available.
async function setAudioSourceMic() {
    ensureAudioContext();
    if (!audioContext) return;
    detachCurrentAudioSource();
    try {
        audioMicStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        // Some browsers start audio contexts suspended until a user gesture.
        if (audioContext.state === 'suspended') await audioContext.resume();
        const source = audioContext.createMediaStreamSource(audioMicStream);
        source.connect(audioAnalyser);
        // INTENTIONALLY no analyser → destination connection — would cause
        // feedback (mic → speakers → mic). We just read frequencies.
        audioCurrentNode = source;
        audioSource = 'mic';
        updateAudioPickerUI();
    } catch (err) {
        console.warn('[audio] Mic access failed:', err.message);
        // Fall back to off; reflect in UI.
        audioSource = 'off';
        updateAudioPickerUI();
    }
}

// Hidden file input that the File button activates. Stored at module
// level so we can re-trigger it via .click() from anywhere.
let _audioFileInput = null;

// Switch to file source. If no file is loaded yet, this opens the file
// picker. If a file IS already loaded, this resumes it.
async function setAudioSourceFile() {
    ensureAudioContext();
    if (!audioContext) return;
    // If we already have a file element with a loaded src, just resume it.
    if (audioFileEl && audioFileEl.src) {
        detachCurrentAudioSource();
        if (audioContext.state === 'suspended') await audioContext.resume();
        audioFileSourceNode.connect(audioAnalyser);
        audioAnalyser.connect(audioContext.destination);
        audioCurrentNode = audioFileSourceNode;
        audioFileEl.play().catch(e => console.warn('[audio] play failed:', e));
        audioSource = 'file';
        updateAudioPickerUI();
        return;
    }
    // Otherwise prompt the user to pick a file.
    if (!_audioFileInput) {
        _audioFileInput = document.createElement('input');
        _audioFileInput.type = 'file';
        _audioFileInput.accept = 'audio/*';
        _audioFileInput.style.display = 'none';
        _audioFileInput.addEventListener('change', handleAudioFileSelected);
        document.body.appendChild(_audioFileInput);
    }
    _audioFileInput.click();
}

// Called when the user picks a file in the hidden input. Sets up the
// <audio> element + MediaElementSource if not already done, then starts
// playback.
async function handleAudioFileSelected(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    ensureAudioContext();
    if (!audioContext) return;
    detachCurrentAudioSource();
    if (audioContext.state === 'suspended') await audioContext.resume();

    // Build or reuse the <audio> element and its source node.
    if (!audioFileEl) {
        audioFileEl = document.createElement('audio');
        audioFileEl.crossOrigin = 'anonymous';
        // Hide it visually but keep it in the DOM so it plays.
        audioFileEl.style.display = 'none';
        document.body.appendChild(audioFileEl);
        // MediaElementSource can only be created ONCE per element —
        // browsers throw if you try again. So we build it lazily here
        // and reuse forever.
        audioFileSourceNode = audioContext.createMediaElementSource(audioFileEl);
    }
    // Swap the source. Releasing the previous object URL would be polite
    // but it's harmless to leak; the GC handles it on page unload.
    audioFileEl.src = URL.createObjectURL(file);

    audioFileSourceNode.connect(audioAnalyser);
    // For file mode we DO route analyser → destination so the user hears it.
    audioAnalyser.connect(audioContext.destination);
    audioCurrentNode = audioFileSourceNode;
    audioFileEl.play().catch(e => console.warn('[audio] play failed:', e));
    audioSource = 'file';
    updateAudioPickerUI();
}

function setAudioSourceOff() {
    detachCurrentAudioSource();
    // Also disconnect analyser from destination so future file mode can
    // reconnect cleanly without doubling up.
    if (audioAnalyser) {
        try { audioAnalyser.disconnect(); } catch (e) { /* fine */ }
    }
    audioSource = 'off';
    updateAudioPickerUI();
}

// ===== Audio metrics =====
// Compute a multi-channel set of audio metrics for the visualizer:
//   overall   — RMS of all bins, 0..1 (used for global brightness)
//   bass      — RMS of the lowest ~12% of bins, 0..1
//   mid       — RMS of bins 12%..40%, 0..1
//   treble    — RMS of bins 40%..100%, 0..1
//   beat      — boolean, true on frames where bass spiked above its
//               running average (classic onset detection)
//   spectrum  — the raw bin array (reused, do not mutate)
//
// If no real source is connected, returns a synthesized metric set so
// the visualizer still has something to animate against.

// Running average of bass energy. Updated every frame; a beat fires when
// the current bass is meaningfully louder than this baseline.
let _bassAverage = 0;
let _lastBeatMs = 0;
const _audioMetrics = {
    overall: 0, bass: 0, mid: 0, treble: 0, beat: false, spectrum: null
};

function getAudioMetrics(now) {
    // Fallback: synthesize believable metrics from the fake pulse so the
    // visualizer still animates when no real audio source is attached.
    if (audioSource === 'off' || !audioAnalyser) {
        const e = fakeEnergyPulse(now);
        // Synthetic per-band energies offset in phase for variety.
        _audioMetrics.overall = e;
        _audioMetrics.bass   = Math.min(1, Math.pow((Math.sin(now * 0.005)  + 1) / 2, 3) * 0.95);
        _audioMetrics.mid    = Math.min(1, ((Math.sin(now * 0.003 + 1) + 1) / 2) * 0.7);
        _audioMetrics.treble = Math.min(1, ((Math.sin(now * 0.008 + 2) + 1) / 2) * 0.6);
        // Synthetic beats every ~600ms when fake bass crosses 0.7
        _audioMetrics.beat = _audioMetrics.bass > 0.7 && (now - _lastBeatMs) > 250;
        if (_audioMetrics.beat) _lastBeatMs = now;
        _audioMetrics.spectrum = null;
        return _audioMetrics;
    }

    audioAnalyser.getByteFrequencyData(audioBuffer);
    const N = audioBuffer.length;
    // Band ranges: bass 0..12%, mid 12..40%, treble 40..100%.
    // (Roughly: bass ≲ 250 Hz, mid 250 Hz–2 kHz, treble 2 kHz–22 kHz.)
    const bassEnd   = Math.floor(N * 0.12);
    const midEnd    = Math.floor(N * 0.40);

    let bassSum = 0, midSum = 0, trebleSum = 0, allSum = 0;
    for (let i = 0; i < N; i++) {
        const v = audioBuffer[i];
        allSum += v;
        if      (i < bassEnd) bassSum   += v;
        else if (i < midEnd)  midSum    += v;
        else                  trebleSum += v;
    }
    const overall = (allSum / N) / 255;
    const bass    = (bassSum / bassEnd) / 255;
    const mid     = (midSum / (midEnd - bassEnd)) / 255;
    const treble  = (trebleSum / (N - midEnd)) / 255;

    // Beat detection: track a slow-moving average of bass energy. When
    // the current bass exceeds the average by a margin AND we haven't
    // fired a beat in the last 180ms (debounce), call it a beat.
    // alpha = 0.04 means the average follows over ~25 frames (~0.4s at 60fps).
    _bassAverage = _bassAverage * 0.96 + bass * 0.04;
    const beatThreshold = _bassAverage * 1.5 + 0.05;
    const isBeat = (bass > beatThreshold) && ((now - _lastBeatMs) > 180);
    if (isBeat) _lastBeatMs = now;

    // Light gamma curve so quiet music still has visible per-band motion.
    _audioMetrics.overall = Math.min(1, Math.pow(overall, 0.7));
    _audioMetrics.bass    = Math.min(1, Math.pow(bass,    0.7));
    _audioMetrics.mid     = Math.min(1, Math.pow(mid,     0.7));
    _audioMetrics.treble  = Math.min(1, Math.pow(treble,  0.7));
    _audioMetrics.beat    = isBeat;
    _audioMetrics.spectrum = audioBuffer;
    return _audioMetrics;
}

// Position + orient the billboard so it sits behind the scene from the
// Position + orient the visualizer billboard. It rides the MARQUEE rail —
// fixed at world (0, VIS_Y_CENTER, 0), parented to `world` so it rotates
// with the whole chessboard cluster (sharing the auto-rotation that
// affects the marquee, crypt, and pieces). Orientation tracks the camera
// so the strip's face stays readable from any angle.
function updateVisualizerPosition() {
    if (!visualizerBillboard) return;
    // Local position relative to `world` (auto-rotating parent).
    visualizerBillboard.position.set(0, VIS_Y_CENTER, 0);
    // Face the camera. lookAt is in WORLD space, so this works whether
    // the parent is `world` or `scene`.
    visualizerBillboard.lookAt(camera.position);
}

// Animation-loop hook. Called every frame; no-op if disabled or not built.
function updateVisualizer(now, dt) {
    // The big constellation visualizer was retired in favor of EQ-on-rail
    // (see updateMarquee). The animate loop still calls this hook, but
    // it's now a no-op. Left as a function so the animate loop signature
    // doesn't have to change.
    return;
}

// Toggle on/off. On first enable, build the graph and add to the world
// group (so it rides along with the rotating chessboard cluster).
function setVisualizerEnabled(on) {
    visualizerEnabled = on;
    // The visualizer now lives entirely on the MARQUEE RAIL as EQ bars
    // (see updateMarquee + paintMarqueeAsEq). We no longer add the big
    // constellation billboard to the scene; it would be a redundant
    // floating panel. We still toggle visualizerEnabled because that
    // flag controls which mode the marquee paints in (text vs EQ).
    if (on) {
        // Ensure the audio analyser machinery is wired up the first time
        // the user enables music. We don't need the constellation graph
        // anymore — the marquee EQ painter consumes audio metrics directly.
    } else {
        // Ensure the big billboard (if it was ever added by earlier code)
        // is removed defensively.
        if (visualizerBillboard && visualizerBillboard.parent) {
            visualizerBillboard.parent.remove(visualizerBillboard);
        }
    }
    if (visualizerBtn) {
        visualizerBtn.classList.toggle('active', visualizerEnabled);
        visualizerBtn.textContent = visualizerEnabled ? 'Music: ON' : 'Music: OFF';
    }
    // Show/hide the audio source picker alongside the music toggle.
    if (typeof updateAudioPickerUI === 'function') updateAudioPickerUI();
}

// HUD button — sits next to the chess/checkers toggle in the bottom-left.
const visualizerBtn = document.createElement('button');
visualizerBtn.className = 'hud-btn';
visualizerBtn.textContent = 'Music: OFF';
visualizerBtn.style.marginLeft = '0px';
visualizerBtn.addEventListener('click', () => {
    setVisualizerEnabled(!visualizerEnabled);
});
musicMenuBody.appendChild(visualizerBtn);

// ----- AUDIO SOURCE PICKER -----
// Three-segment toggle (Off / Mic / File) controlling what feeds the
// visualizer. Lives in the Music menu under the on/off toggle; shown
// only when the visualizer is enabled.
const audioPickerWrap = document.createElement('div');
audioPickerWrap.style.cssText = 'margin-top: 6px; display: none;'; // shown by updateAudioPickerUI
const audioPickerToggle = document.createElement('div');
audioPickerToggle.className = 'hud-toggle';
const audioOffBtn  = document.createElement('button');
const audioMicBtn  = document.createElement('button');
const audioFileBtn = document.createElement('button');
audioOffBtn.textContent  = 'Off';
audioMicBtn.textContent  = 'Mic';
audioFileBtn.textContent = 'File';
[audioOffBtn, audioMicBtn, audioFileBtn].forEach(b => b.className = 'hud-btn');
audioPickerToggle.appendChild(audioOffBtn);
audioPickerToggle.appendChild(audioMicBtn);
audioPickerToggle.appendChild(audioFileBtn);
audioPickerWrap.appendChild(audioPickerToggle);
musicMenuBody.appendChild(audioPickerWrap);

audioOffBtn.addEventListener('click',  () => setAudioSourceOff());
audioMicBtn.addEventListener('click',  () => setAudioSourceMic());
audioFileBtn.addEventListener('click', () => setAudioSourceFile());

function updateAudioPickerUI() {
    // Show the picker only when the visualizer is enabled — otherwise
    // it's clutter for a feature that does nothing.
    audioPickerWrap.style.display = visualizerEnabled ? 'block' : 'none';
    audioOffBtn.classList.toggle('active',  audioSource === 'off');
    audioMicBtn.classList.toggle('active',  audioSource === 'mic');
    audioFileBtn.classList.toggle('active', audioSource === 'file');
}
updateAudioPickerUI();

function animate() {
    requestAnimationFrame(animate);
    const now = performance.now();
    const dt = now - lastFrameTime;
    lastFrameTime = now;

    updateRotation(now, dt);
    updateLight(now);
    updateAnimations(now);
    updateBackgroundTransition(now);
    updateMarquee(now);
    updateCelestial(now);
    updatePlanets(now);
    updateRain(dt);
    updatePyramids(dt);
    updatePlanetSpin(dt);
    updateConcert(now, dt);
    updateVisualizer(now, dt);
    updateElevation(now);
    // Cinematic flyby runs once at startup; suppresses controls.update's
    // damping interpolation while active (the camera is fully scripted).
    const introStillRunning = updateIntro(now);
    if (!introStillRunning) controls.update();
    renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
