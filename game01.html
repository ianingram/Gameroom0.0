// ----- VIEW SYSTEM -----
// A "view" is a visual preset for the scene. Views 1 and 2 are real; 3-10 are
// placeholders for future themes (medieval crypt, marble columns, deep space, etc.).
//
// To add a real view later: fill in its bg color (and eventually piece materials,
// board colors, environment, fog, etc.) in the VIEWS table and set placeholder=false.
//
// Views can optionally include 3D "props" — meshes built lazily and added to the
// scene when that view becomes active, removed when leaving. The buildProps
// function returns an array of meshes (or groups). The viewPropsCache stores
// them after first build so we don't rebuild on every toggle.

// --- Prop builders (each returns an array of Object3D to add to the scene) ---

function buildPyramidProps() {
    // An imposing limestone pyramid in the distance on the white side of the
    // board. Wider base than before so it reads as a proper pyramid profile
    // (a tall narrow cone reads as a spike, not a monument). Gold capstone on
    // top — the gilded pyramidion seen on real ancient pyramids.
    const PYR_BASE_RADIUS = 22;  // half of the side length, base footprint
    const PYR_HEIGHT = 20;
    const CAP_BASE = 2.8;        // capstone base half-width
    const CAP_HEIGHT = 2.4;      // capstone height

    const g = new THREE.Group();

    // Main pyramid body (limestone)
    const stoneGeo = new THREE.ConeGeometry(PYR_BASE_RADIUS, PYR_HEIGHT, 4);
    const stoneMat = new THREE.MeshStandardMaterial({
        color: 0xc8a878,
        roughness: 0.95,
        metalness: 0.05
    });
    const stone = new THREE.Mesh(stoneGeo, stoneMat);
    stone.castShadow = true;
    stone.receiveShadow = true;
    stone.position.y = PYR_HEIGHT / 2;  // base sits at Y=0
    g.add(stone);

    // Gold capstone (small pyramid sharing the same apex as the main pyramid).
    // The capstone is buried INSIDE the upper portion of the main pyramid so
    // their tips coincide — only the gilded peak is visible, replacing the
    // limestone at the top.
    const capGeo = new THREE.ConeGeometry(CAP_BASE, CAP_HEIGHT, 4);
    const cap = new THREE.Mesh(capGeo, goldFrameMaterial);
    cap.castShadow = true;
    // Both pyramids have their apex at: position.y + height/2 (cone apex is up).
    // Main apex Y = (PYR_HEIGHT / 2) + (PYR_HEIGHT / 2) = PYR_HEIGHT
    // Capstone apex Y = cap.position.y + CAP_HEIGHT / 2
    // To make these equal: cap.position.y = PYR_HEIGHT - CAP_HEIGHT / 2
    cap.position.y = PYR_HEIGHT - CAP_HEIGHT / 2;
    g.add(cap);

    // White side of the board = positive Z (east). Push the pyramid back beyond
    // the celestial bodies' horizon. Rotate so a corner faces the camera (classic
    // Giza profile) — align the gold capstone's facets with the body below.
    g.position.set(0, 0, 50);
    g.rotation.y = Math.PI / 4;
    return [g];
}

function buildStarfieldProps() {
    // A spherical shell of small white points surrounding the scene, like a
    // distant starfield. Implemented as THREE.Points with random positions on a
    // large sphere so the camera always sees stars in every direction.
    const STAR_COUNT = 1200;
    const STAR_RADIUS = 120;
    const positions = new Float32Array(STAR_COUNT * 3);
    for (let i = 0; i < STAR_COUNT; i++) {
        // Random unit vector
        const phi = Math.acos(2 * Math.random() - 1);
        const theta = Math.random() * Math.PI * 2;
        positions[i * 3]     = STAR_RADIUS * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = STAR_RADIUS * Math.cos(phi);
        positions[i * 3 + 2] = STAR_RADIUS * Math.sin(phi) * Math.sin(theta);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.5,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.85
    });
    const stars = new THREE.Points(geo, mat);
    return [stars];
}

function buildCathedralProps() {
    // Two distant gothic spires PLUS a row of Roman columns connected by arches
    // (a peristyle/colonnade), PLUS animated rain. Cold stone-blue tint.
    const stoneMat = new THREE.MeshStandardMaterial({
        color: 0x6a7080,
        roughness: 0.85,
        metalness: 0.0
    });
    const weatheredStoneMat = new THREE.MeshStandardMaterial({
        color: 0x808890,
        roughness: 0.9,
        metalness: 0.0
    });

    function makeSpire(x, z) {
        const g = new THREE.Group();
        const shaftGeo = new THREE.CylinderGeometry(1.4, 1.8, 14, 12);
        const shaft = new THREE.Mesh(shaftGeo, stoneMat);
        shaft.position.y = 7;
        shaft.castShadow = true;
        g.add(shaft);
        const capGeo = new THREE.ConeGeometry(1.8, 5, 12);
        const cap = new THREE.Mesh(capGeo, stoneMat);
        cap.position.y = 14 + 2.5;
        cap.castShadow = true;
        g.add(cap);
        g.position.set(x, 0, z);
        return g;
    }

    // Roman column: stepped base + fluted-style shaft + square abacus capital
    function makeColumn(x, z, baseY = 0) {
        const g = new THREE.Group();
        const SHAFT_H = 8;
        const SHAFT_TOP_R = 0.4;
        const SHAFT_BOT_R = 0.5;
        // Stepped square base
        const baseGeo = new THREE.BoxGeometry(1.4, 0.4, 1.4);
        const base = new THREE.Mesh(baseGeo, weatheredStoneMat);
        base.position.y = 0.2;
        base.castShadow = true;
        base.receiveShadow = true;
        g.add(base);
        // Shaft (slightly tapered cylinder)
        const shaftGeo = new THREE.CylinderGeometry(SHAFT_TOP_R, SHAFT_BOT_R, SHAFT_H, 16);
        const shaft = new THREE.Mesh(shaftGeo, weatheredStoneMat);
        shaft.position.y = 0.4 + SHAFT_H / 2;
        shaft.castShadow = true;
        shaft.receiveShadow = true;
        g.add(shaft);
        // Square abacus (capital top)
        const capGeo = new THREE.BoxGeometry(1.2, 0.4, 1.2);
        const cap = new THREE.Mesh(capGeo, weatheredStoneMat);
        cap.position.y = 0.4 + SHAFT_H + 0.2;
        cap.castShadow = true;
        g.add(cap);
        g.position.set(x, baseY, z);
        return g;
    }

    // Arch connecting two columns: a flat rectangular block forming the entablature,
    // plus a torus segment forming the rounded arch underneath.
    function makeArch(x1, z, x2) {
        const g = new THREE.Group();
        const span = Math.abs(x2 - x1);
        const cx = (x1 + x2) / 2;
        const TOP_OF_COLUMN_Y = 0.4 + 8 + 0.4;  // base + shaft + cap = 8.8
        // Entablature (block across the top of both columns)
        const entGeo = new THREE.BoxGeometry(span + 1.0, 1.0, 1.2);
        const ent = new THREE.Mesh(entGeo, weatheredStoneMat);
        ent.position.set(cx, TOP_OF_COLUMN_Y + 0.5, z);
        ent.castShadow = true;
        g.add(ent);
        // Arch (semicircular curve under the entablature)
        const archRadius = span / 2;
        const archGeo = new THREE.TorusGeometry(archRadius, 0.18, 8, 24, Math.PI);
        const arch = new THREE.Mesh(archGeo, weatheredStoneMat);
        arch.position.set(cx, TOP_OF_COLUMN_Y - 0.1, z);
        arch.castShadow = true;
        g.add(arch);
        return g;
    }

    // Colonnade: 5 columns spanning the west side of the scene (negative X axis),
    // running parallel to the white-black axis (Z). Each pair joined by an arch.
    const cols = [];
    const arches = [];
    const COLONNADE_X = -22;
    const COLUMN_SPACING = 5;
    const COLUMN_COUNT = 5;
    const COLONNADE_START_Z = -((COLUMN_COUNT - 1) * COLUMN_SPACING) / 2;

    for (let i = 0; i < COLUMN_COUNT; i++) {
        const z = COLONNADE_START_Z + i * COLUMN_SPACING;
        cols.push(makeColumn(COLONNADE_X, z));
        if (i > 0) {
            const z0 = COLONNADE_START_Z + (i - 1) * COLUMN_SPACING;
            // Arch geometry — we'll position it spanning between this column and the previous
            // The arch's local x-axis should align with the spacing between columns.
            const arch = makeArch(-COLUMN_SPACING / 2, 0, COLUMN_SPACING / 2);
            arch.position.set(COLONNADE_X, 0, (z0 + z) / 2);
            // The arch was built assuming X is the span axis; rotate so that span axis becomes Z
            arch.rotation.y = Math.PI / 2;
            arches.push(arch);
        }
    }

    // --- Rain (THREE.Points, vertical streaks, recycle at top) ---
    const RAIN_COUNT = 1500;
    const RAIN_RADIUS = 30;     // horizontal spread around the board
    const RAIN_TOP_Y = 25;      // where drops start
    const RAIN_BOTTOM_Y = -3;   // where drops reset
    const positions = new Float32Array(RAIN_COUNT * 3);
    const velocities = new Float32Array(RAIN_COUNT);
    for (let i = 0; i < RAIN_COUNT; i++) {
        positions[i * 3]     = (Math.random() - 0.5) * RAIN_RADIUS * 2;
        positions[i * 3 + 1] = RAIN_BOTTOM_Y + Math.random() * (RAIN_TOP_Y - RAIN_BOTTOM_Y);
        positions[i * 3 + 2] = (Math.random() - 0.5) * RAIN_RADIUS * 2;
        velocities[i] = 0.25 + Math.random() * 0.15; // per-drop falling speed
    }
    const rainGeo = new THREE.BufferGeometry();
    rainGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const rainMat = new THREE.PointsMaterial({
        color: 0xaabbcc,
        size: 0.08,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.6,
        depthWrite: false
    });
    const rain = new THREE.Points(rainGeo, rainMat);
    // Stash data on the Points object so the per-frame updater can find it
    rain.userData.isRain = true;
    rain.userData.velocities = velocities;
    rain.userData.bottomY = RAIN_BOTTOM_Y;
    rain.userData.topY = RAIN_TOP_Y;

    return [
        makeSpire(0,  32),
        makeSpire(0, -32),
        ...cols,
        ...arches,
        rain
    ];
}

// Per-frame rain animation. Runs only when V5 is active (we filter the active
// props for any with isRain flag). Called from the main animation loop.
function updateRain(dt) {
    for (const obj of activeViewProps) {
        if (!obj.userData || !obj.userData.isRain) continue;
        const positions = obj.geometry.attributes.position.array;
        const velocities = obj.userData.velocities;
        const bottomY = obj.userData.bottomY;
        const topY = obj.userData.topY;
        const fall = dt * 0.06; // overall rain speed multiplier
        for (let i = 0; i < velocities.length; i++) {
            positions[i * 3 + 1] -= velocities[i] * fall;
            if (positions[i * 3 + 1] < bottomY) {
                positions[i * 3 + 1] = topY;
            }
        }
        obj.geometry.attributes.position.needsUpdate = true;
    }
}

const VIEWS = [
    { id: 1,  label: '1',  name: 'Dark',       bg: 0x1a1a1a, placeholder: false, buildProps: null },
    { id: 2,  label: '2',  name: 'Light',      bg: 0xeeeeee, placeholder: false, buildProps: null },
    { id: 3,  label: '3',  name: 'Pyramid',    bg: 0x2a2418, placeholder: false, buildProps: buildPyramidProps },
    { id: 4,  label: '4',  name: 'Deep Space', bg: 0x000005, placeholder: false, buildProps: buildStarfieldProps },
    { id: 5,  label: '5',  name: 'Cathedral',  bg: 0x1c2230, placeholder: false, buildProps: buildCathedralProps },
    { id: 6,  label: '6',  name: '(soon)',     bg: 0x1a1a1a, placeholder: true,  buildProps: null },
    { id: 7,  label: '7',  name: '(soon)',     bg: 0x1a1a1a, placeholder: true,  buildProps: null },
    { id: 8,  label: '8',  name: '(soon)',     bg: 0x1a1a1a, placeholder: true,  buildProps: null },
    { id: 9,  label: '9',  name: '(soon)',     bg: 0x1a1a1a, placeholder: true,  buildProps: null },
    { id: 10, label: '10', name: '(soon)',     bg: 0x1a1a1a, placeholder: true,  buildProps: null }
];

// Cache per-view prop arrays. Built lazily on first activation.
const viewPropsCache = {};
// Track currently-active props so we can remove them on view switch.
let activeViewProps = [];

let currentViewId = 1;

// Background transition state
const VIEW_TRANSITION_MS = 300;
let bgTransition = null; // { from: THREE.Color, to: THREE.Color, startTime: number }

function updateBackgroundTransition(now) {
    if (!bgTransition) return;
    const t = Math.min(1, (now - bgTransition.startTime) / VIEW_TRANSITION_MS);
    scene.background.r = bgTransition.from.r + (bgTransition.to.r - bgTransition.from.r) * t;
    scene.background.g = bgTransition.from.g + (bgTransition.to.g - bgTransition.from.g) * t;
    scene.background.b = bgTransition.from.b + (bgTransition.to.b - bgTransition.from.b) * t;
    if (t >= 1) bgTransition = null;
}

function setView(id) {
    const view = VIEWS.find(v => v.id === id);
    if (!view) return;
    if (view.placeholder) return; // ignore clicks on coming-soon tabs
    currentViewId = id;
    bgTransition = {
        from: scene.background.clone(),
        to: new THREE.Color(view.bg),
        startTime: performance.now()
    };
    // Toggle the body class so the HUD CSS knows which scheme to use.
    // View 2 = light scene = solid black HUD text.
    document.body.classList.toggle('view-light', id === 2);

    // Swap star pearls between default glow and V2 gold-orb-with-ring look
    applyStarLookForView(id);

    // Remove props from the previous view
    for (const p of activeViewProps) scene.remove(p);
    activeViewProps = [];

    // Add this view's props (build once, then cache)
    if (view.buildProps) {
        if (!viewPropsCache[id]) {
            viewPropsCache[id] = view.buildProps();
        }
        for (const p of viewPropsCache[id]) {
            scene.add(p);
            activeViewProps.push(p);
        }
    }

    updateViewTabs();
}

// View selector at bottom-center: a single 'V' button. Click to open the tab list
// (1-10). Click outside to close.
const viewContainer = document.createElement('div');
viewContainer.style.cssText = `
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    font-family: system-ui, sans-serif;
    user-select: none;
    z-index: 10;
`;
document.body.appendChild(viewContainer);

// Expandable tab list (hidden by default, sits ABOVE the V button when open)
const viewTabRow = document.createElement('div');
viewTabRow.style.cssText = `
    display: none;
    gap: 4px;
`;
viewContainer.appendChild(viewTabRow);

// The collapsed trigger — single 'V' button
const viewToggle = document.createElement('button');
viewToggle.textContent = 'V';
viewToggle.title = 'View';
viewToggle.className = 'hud-btn';
viewToggle.style.fontWeight = 'bold';
viewContainer.appendChild(viewToggle);

let viewMenuOpen = false;

function setViewMenu(open) {
    viewMenuOpen = open;
    viewTabRow.style.display = open ? 'flex' : 'none';
}

viewToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    setViewMenu(!viewMenuOpen);
});

// Close when clicking outside (anywhere not inside viewContainer)
document.addEventListener('click', (e) => {
    if (!viewMenuOpen) return;
    if (viewContainer.contains(e.target)) return;
    setViewMenu(false);
});

const viewTabs = [];
for (const view of VIEWS) {
    const tab = document.createElement('button');
    tab.textContent = view.label;
    tab.title = view.name;
    tab.className = 'hud-btn';
    if (view.placeholder) tab.classList.add('disabled');
    tab.addEventListener('click', (e) => {
        e.stopPropagation();
        if (view.placeholder) return;
        setView(view.id);
        setViewMenu(false);
    });
    viewTabRow.appendChild(tab);
    viewTabs.push(tab);
}

function updateViewTabs() {
    viewTabs.forEach((tab, i) => {
        const view = VIEWS[i];
        tab.classList.toggle('active', view.id === currentViewId);
    });
}
updateViewTabs();

function refreshHUD() {
    const mode = getGameMode();
    const turn = getCurrentTurn();
    const status = getGameStatus();

    turnLine.textContent =
        `${mode === 'chess' ? 'Chess' : 'Checkers'} — ${turn === 'w' ? 'White' : 'Black'} to move`;

    let statusText = '';
    if (aiThinking) {
        statusText = 'AI thinking...';
        statusLine.classList.remove('status-warn');
        statusLine.classList.add('status-info');
    } else {
        statusLine.classList.remove('status-info');
        statusLine.classList.add('status-warn');
        if (mode === 'chess') {
            if (status === 'check') statusText = 'Check!';
            else if (status === 'checkmate') {
                statusText = `Checkmate — ${turn === 'w' ? 'Black' : 'White'} wins`;
            } else if (status === 'stalemate') statusText = 'Stalemate — draw';
        } else {
            if (status === 'win-w') statusText = 'White wins';
            else if (status === 'win-b') statusText = 'Black wins';
        }
    }
    statusLine.textContent = statusText;
}

resetBtn.textContent = 'Reset';
resetBtn.addEventListener('click', () => {
    clearSelection();
    resetGame();
    clearCryptAndReset();
    // New game = new figures (only meaningful in chess mode, but harmless in checkers)
    if (getGameMode() === 'chess') {
        rollRosters();
        rebuildRosterPanels();
    }
    renderPieces();
    refreshHUD();
    markActivity();
});

updateSpeedButtons();
updateAIControls();
updateModeToggle();

// ----- AI MOVE TRIGGER -----
// Called after every move. If AI is on, it's black's turn, and the game is still
// active, the AI plays its move after a 1-second "thinking" pause.
function maybeTriggerAIMove() {
    if (!aiEnabled) return;
    if (aiThinking) return;
    if (getGameMode() !== 'chess') return; // checkers AI not implemented yet
    const status = getGameStatus();
    if (status === 'checkmate' || status === 'stalemate') return;
    if (getCurrentTurn() !== 'b') return;

    aiThinking = true;
    refreshHUD();

    // setTimeout + rAF so "thinking" text paints before the synchronous minimax
    // search hogs the main thread. 1-second pause for pacing.
    setTimeout(() => {
        requestAnimationFrame(() => {
            const depth = depthForSliderLevel(aiLevel);
            const move = findBestMove('b', depth);
            aiThinking = false;
            if (!move) {
                refreshHUD();
                return;
            }
            const moved = attemptMoveWithCaptures(move.from, move.to);
            if (moved) renderPieces();
            refreshHUD();
        });
    }, 1000);
}

// --- 6. RESPONSIVENESS ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- 7. INTERACTIVITY ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let selectedPiece = null;
let originalMaterial = null;
let highlightedTiles = [];

const HIGHLIGHT_COLOR = 0xffe066;
const SELECT_COLOR = 0xff4444;

function highlightMoveTargets(square) {
    const targets = getPossibleMoves(square);
    for (const t of targets) {
        const tile = tileMap[t];
        if (!tile) continue;
        tile.material = tile.material.clone();
        tile.material.color.setHex(HIGHLIGHT_COLOR);
        highlightedTiles.push(tile);
    }
}

function clearHighlights() {
    for (const tile of highlightedTiles) {
        tile.material = new THREE.MeshStandardMaterial({ color: tile.userData.baseColor });
    }
    highlightedTiles = [];
}

function clearSelection() {
    if (selectedPiece && originalMaterial) {
        selectedPiece.material = originalMaterial;
    }
    selectedPiece = null;
    originalMaterial = null;
    clearHighlights();
}

function selectPiece(mesh) {
    clearSelection();
    selectedPiece = mesh;
    originalMaterial = mesh.material;
    selectedPiece.material = mesh.material.clone();
    selectedPiece.material.color.setHex(SELECT_COLOR);
    highlightMoveTargets(mesh.userData.id);
}

// --- 8. AUTO-ROTATION + IDLE DETECTION ---
const IDLE_TIME_MS = 120000;     // 2 minutes of no activity before auto-rotate kicks in
const EASE_IN_MS = 1500;         // ease-in duration when rotation begins
const EASE_OUT_MS = 400;         // ease-out duration when activity resumes
let lastActivityTime = performance.now();
let currentSpinFactor = 0;       // 0..1, multiplier applied to target rotation speed
let lastFrameTime = performance.now();

function markActivity() {
    lastActivityTime = performance.now();
}

// Camera-drag and zoom count as activity. Wire OrbitControls events:
controls.addEventListener('start', markActivity);
controls.addEventListener('change', markActivity);

// Raycast (clicks) below counts as activity too — markActivity is called in handler.

// World rotates only when:
//   - no piece is selected (active gameplay)
//   - idle for IDLE_TIME_MS
//   - rotationLevel > 0
// Ease in/out via currentSpinFactor.
function updateRotation(now, dt) {
    const targetSpeed = ROTATION_SPEEDS[rotationLevel];

    // Determine whether rotation SHOULD be active
    const idle = (now - lastActivityTime) > IDLE_TIME_MS;
    const allowed = idle && selectedPiece === null && rotationLevel > 0;

    // Ease the spin factor toward 0 or 1
    if (allowed) {
        currentSpinFactor = Math.min(1, currentSpinFactor + dt / EASE_IN_MS);
    } else {
        currentSpinFactor = Math.max(0, currentSpinFactor - dt / EASE_OUT_MS);
    }

    world.rotation.y += targetSpeed * currentSpinFactor;
}

// --- 9. CLICK HANDLER ---
window.addEventListener('click', (event) => {
    if (event.target !== renderer.domElement) return;
    markActivity();

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    const objectsToTest = [...pieceGroup.children, ...boardGroup.children];
    const intersects = raycaster.intersectObjects(objectsToTest);

    if (intersects.length === 0) {
        clearSelection();
        return;
    }

    const clickedObject = intersects[0].object;
    const clickedId = clickedObject.userData.id;
    const isTile = clickedObject.userData.isTile;

    if (!isTile) {
        const pieceColor = clickedObject.userData.color;
        const turn = getCurrentTurn();

        if (selectedPiece && pieceColor !== turn) {
            const source = selectedPiece.userData.id;
            const target = clickedId;
            if (attemptMoveWithCaptures(source, target)) {
                clearSelection();
                renderPieces();
                refreshHUD();
                maybeTriggerAIMove();
                return;
            }
        }

        if (pieceColor === turn) {
            selectPiece(clickedObject);
        }
        return;
    }

    if (selectedPiece) {
        const source = selectedPiece.userData.id;
        const target = clickedId;
        if (attemptMoveWithCaptures(source, target)) {
            clearSelection();
            renderPieces();
            refreshHUD();
            maybeTriggerAIMove();
        }
    }
});

// --- 3D piece hover (figure card) ---
// When the mouse hovers over a piece in 3D, after 1 second show the hover card
// for the historical figure that piece represents. We look up the piece's
// STARTING square in pieceHomeMap to find which roster slot it belongs to,
// since the back-row figure for that file is consistent regardless of where
// the piece has moved.
//
// Only back-row pieces have figures assigned. Pawns don't have a card.

let lastHoveredPieceId = null;
window.addEventListener('mousemove', (event) => {
    // Skip if a roster name is currently being hovered (DOM hover wins)
    if (event.target && event.target.dataset && event.target.dataset.figureName) return;
    // Skip if the pointer is over the hover card itself
    if (hoverCard.contains(event.target)) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(pieceGroup.children, false);

    if (intersects.length > 0) {
        const piece = intersects[0].object;
        const currentSquare = piece.userData.id;
        const startSquare = pieceHomeMap[currentSquare];
        const figure = startSquare ? PIECE_FIGURE_MAP[startSquare] : null;

        if (!figure) {
            // Piece is a pawn or otherwise unmapped — no card
            if (lastHoveredPieceId) {
                cancelHoverCard();
                lastHoveredPieceId = null;
            }
            return;
        }

        if (lastHoveredPieceId !== currentSquare) {
            // New piece under cursor — restart timer
            lastHoveredPieceId = currentSquare;
            cancelHoverCard();
            // Build a virtual anchor rect at the mouse position
            const rect = {
                left: event.clientX,
                right: event.clientX + 4,
                top: event.clientY,
                bottom: event.clientY + 4,
                width: 4,
                height: 4
            };
            scheduleHoverCard(figure, null, rect);
        }
    } else {
        if (lastHoveredPieceId) {
            cancelHoverCard();
            lastHoveredPieceId = null;
        }
    }
});

// --- 10. INIT ---
renderPieces();
refreshHUD();

// --- 11. ANIMATION LOOP ---
function updateLight(now) {
    // Spotlight rises at the WHITE side of the board (east, positive Z), arcs
    // overhead, and sets at the BLACK side (west, negative Z). 5-minute period.
    // The arc is a half-circle traced in the YZ plane; the X coordinate stays 0.
    const t = (now / LIGHT_ORBIT_PERIOD_MS) * Math.PI * 2;
    // For a half-circle above the horizon, we use sin(t) for height (peaks at t=π/2)
    // and cos(t) reversed for Z (positive at start = east).
    spotLight.position.set(
        0,
        LIGHT_ORBIT_HEIGHT * Math.abs(Math.sin(t)) + 4,  // arc above the board, never below
        Math.cos(t) * LIGHT_ORBIT_RADIUS                 // east-west motion
    );
}

function animate() {
    requestAnimationFrame(animate);
    const now = performance.now();
    const dt = now - lastFrameTime;
    lastFrameTime = now;

    updateRotation(now, dt);
    updateLight(now);
    updateAnimations(now);
    updateBackgroundTransition(now);
    updateMarquee(now);
    updateCelestial(now);
    updatePlanets(now);
    updateRain(dt);
    controls.update();
    renderer.render(scene, camera);
}
animate();

</script>
