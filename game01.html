            delete _wireframeShipsBySquare[cap.square];
            // Reparent: same parent as _wireframePieceGroup (which is
            // _wireframeLayer), so it stays at the same world transform.
            const newParent = (_wireframePieceGroup && _wireframePieceGroup.parent)
                ? _wireframePieceGroup.parent
                : null;
            if (sinkingShip.parent) sinkingShip.parent.remove(sinkingShip);
            if (newParent) newParent.add(sinkingShip);
            // Queue the animation
            startWireframeShipSink(sinkingShip);
        }

        const homeSquare = pieceHomeMap[cap.square];
        const coffin = coffinForStartSquare[homeSquare];
        if (!coffin) continue; // shouldn't happen

        // Build a mesh that matches the captured piece, positioned at where it died
        const geom = getPieceGeometry(cap.piece);
        const mat = getPieceMaterial(cap.piece);
        const ghost = new THREE.Mesh(geom, mat);
        ghost.castShadow = true;
        ghost.receiveShadow = true;
        const coords = squareToWorldCoords(cap.square);
        ghost.position.set(coords.x, geom.parameters.height / 2 + 0.1, coords.z);
        // Tag the ghost so the temple-ritual drag system can identify it
        // and check eligibility (only back-row pieces R/N/B/Q can be moved
        // to the temple — pawns and kings are excluded).
        ghost.userData.capturedPiece = {
            type: cap.piece.type,
            color: cap.piece.color,
            homeSquare,
            placedInTemple: null,        // 'white' | 'black' | null
            templeSlotIndex: null,        // 0..7 once placed
            // Resting position relative to capturedGroup (NOT world). The
            // post-capture animation will land the ghost AT the coffin's
            // local position, so we store that as the "home" the drag will
            // snap back to on a missed drop.
            homePos: new THREE.Vector3(
                coffin.position.x,
                coffin.position.y - COFFIN_DEPTH / 2 + geom.parameters.height / 2,
                coffin.position.z
            )
        };
        capturedGroup.add(ghost);
        startCaptureAnimation(ghost, coffin);

        // Free up the home so future pieces don't collide. (Probably overkill — once
        // a piece is captured, its home square no longer hosts a piece either way.)
        delete pieceHomeMap[cap.square];
    }

    // Update the home map for all moves (handle castling: 2 moves happen at once)
    for (const m of moves) {
        if (pieceHomeMap[m.from]) {
            pieceHomeMap[m.to] = pieceHomeMap[m.from];
            delete pieceHomeMap[m.from];
        }
    }

    return true;
}

// Helper used by the capture animation
function squareToWorldCoords(square) {
    const col = files.indexOf(square[0]);
    const row = ranks.indexOf(square[1]);
    return { x: col - 3.5, z: row - 3.5 };
}

// On reset or mode switch, clear captured pieces and re-init homes
function clearCryptAndReset() {
    while (capturedGroup.children.length > 0) {
        capturedGroup.remove(capturedGroup.children[0]);
    }
    animations.length = 0;
    resetPieceHomes();
}

// Format a date value for display. The CSV may contain:
//   - Plain integers like -3000 (BCE) or 1412 (CE) — common from Excel exports
//   - Strings like "540 BC" or "1412" — already formatted
// We convert negative numbers to "<n> BC" and leave positive numbers / strings alone.
function formatDate(value) {
    if (value === null || value === undefined || value === '') return '';
    const s = String(value).trim();
    if (!s) return '';
    // Pure integer with optional minus sign — convert negatives to BC.
    if (/^-?\d+$/.test(s)) {
        const n = parseInt(s, 10);
        return n < 0 ? `${-n} BC` : String(n);
    }
    // Already a formatted string (e.g. "540 BC", "circa 1200") — leave alone.
    return s;
}

// Build the "Title — born–died" subtitle string from a figure.
function figureSubtitle(figure) {
    const dates = [];
    const b = formatDate(figure.birthDate);
    const d = formatDate(figure.deathDate);
    if (b) dates.push(b);
    if (d) dates.push(d);
    const dateStr = dates.length === 2 ? dates.join(' – ')
                  : dates.length === 1 ? dates[0]
                  : '';
    const parts = [];
    if (figure.title) parts.push(figure.title);
    if (dateStr) parts.push(dateStr);
    return parts.join(' — ');
}

function showHoverCard(figure, anchorEl, anchorRect) {
    if (!figure) return;
    cardName.textContent = figure.fullName;
    cardSubtitle.textContent = figureSubtitle(figure);
    cardBio.textContent = figure.biography || '';
    cardBio.style.display = figure.biography ? 'block' : 'none';

    // Show the link if the figure has one. Multi-URL: we display only the first.
    if (figure.links && figure.links.length > 0) {
        cardLink.href = figure.links[0];
        cardLink.textContent = 'More \u2192';
        cardLink.style.display = 'inline-block';
    } else {
        cardLink.style.display = 'none';
    }

    // Position the card next to the anchor element
    hoverCard.style.display = 'block';
    const rect = anchorRect || (anchorEl && anchorEl.getBoundingClientRect());
    if (rect) {
        const cardW = hoverCard.offsetWidth || 240;
        const cardH = hoverCard.offsetHeight || 80;
        let left = rect.right + 10;
        // If the anchor is on the right side of the screen, flip the card to the left
        if (rect.left > window.innerWidth / 2) {
            left = rect.left - cardW - 10;
        }
        let top = rect.top + rect.height / 2 - cardH / 2;
        // Clamp within viewport
        top = Math.max(8, Math.min(top, window.innerHeight - cardH - 8));
        left = Math.max(8, Math.min(left, window.innerWidth - cardW - 8));
        hoverCard.style.left = left + 'px';
        hoverCard.style.top = top + 'px';
    }

    // Glow the name in the roster if found
    if (anchorEl && anchorEl.dataset && anchorEl.dataset.figureName) {
        anchorEl.style.textShadow = '0 0 8px #fff, 0 0 4px #fff';
        currentlyGlowingNameEl = anchorEl;
    }

// ----- CAPSTONE GLOW INTENSITY SLIDER -----
// The bright atmospheric halo around each pyramid's gold capstone can wash
// out the pyramid silhouette when set too high. This slider scales every
// capstone-glow mesh's opacity by (lightLevel / 10), so:
//   slider value 1  → 10% (subtle gilded peak, no halo bloom)
//   slider value 5  → 50% (balanced glow)
//   slider value 10 → 100% (the original full atmospheric glow)
//
// The scaling walks every Object3D in the scene tagged userData.capstoneGlow
// with a stored baseOpacity. Walking the scene each input event is cheap
// (a few dozen meshes total). We do NOT touch the orbiting spotlight — that
// stays at its natural brightness so the rest of the scene lighting is
// unchanged.
// ----- CAPSTONE GLOW INTENSITY SLIDER -----
// The bright atmospheric halo around each pyramid's gold capstone can wash
// out the pyramid silhouette when set too high. This slider scales every
// capstone-glow mesh's opacity by (lightLevel / 10), so:
//   slider value 1  → 10% (subtle gilded peak, no halo bloom)
//   slider value 5  → 50% (balanced glow)
//   slider value 10 → 100% (the original full atmospheric glow)
//
// The slider ALSO drives the directional sky-dome contrast in View 3:
// see _skyRepaint below, which is wired up when buildPyramidProps builds
// the sky for the first time.
let lightLevel = 5;  // mid-default — cuts the original glare in half on first load.

// Module-level handle assigned by buildPyramidProps when the sky dome is
// built. applyLightLevel() reads it to repaint the directional gradient
// with new contrast. Declared up here (before applyLightLevel is first
// invoked) to avoid a temporal-dead-zone error when applyLightLevel runs
// at startup with no sky dome yet.
let _skyRepaint = null;

function applyLightLevel() {
    const scale = lightLevel / 10;
    scene.traverse(obj => {
        if (!obj.material) return;
        // Capstone glow — opacity scales with light level
        if (obj.userData && obj.userData.capstoneGlow) {
            obj.material.opacity = obj.userData.baseOpacity * scale;
        }
        // White pyramid body — becomes increasingly reflective/polished as
        // light dims. At slider 10 it's matte stone; at slider 1 it's a
        // mirror. The user wanted: light DOWN → surface MORE reflective.
        // We blend roughness toward 0 and metalness toward 1 as scale → 0.
        if (obj.material.userData && obj.material.userData.whitePyramidBody) {
            const m = obj.material;
            const baseRough = m.userData.baseRoughness;
            const baseMetal = m.userData.baseMetalness;
            // At scale=1 (full light): authored values (matte stone).
            // At scale=0 (no light):    roughness=0.05, metalness=1.0.
            m.roughness = baseRough * scale + 0.05 * (1 - scale);
            m.metalness = baseMetal * scale + 1.00 * (1 - scale);
            // Hint to the renderer that material changed (PMREM-based
            // standard material picks up changes on next frame).
            m.needsUpdate = true;
        }
    });
    // Also drive sky brightness: slider 1 → 10% (very dark sky), slider 10
    // → 100% (full authored colors). Acts like a master dimmer: turning the
    // light DOWN darkens the whole sky toward black, including the white-
    // pyramid side. (The previous "push from gray" mapping brightened dark
    // pixels when slider went down — wrong direction visually.)
    if (_skyRepaint) {
        const skyIntensity = lightLevel / 10;
        _skyRepaint(skyIntensity);
    }
}
// First-call note: the pyramid view's props build lazily on first activation
// of View 3. If the view isn't active yet, traverse finds nothing — harmless.
// applyLightLevel() is called again when View 3 activates (see setView).

// ----- CAMERA ELEVATION TOGGLE -----
// Three preset camera views. Each sets the camera to a starting position and
// constrains the orbit-controls polar angle so the user can still drag the
// camera around but can't cross the "terminal angle" appropriate to each mode.
// Three.js OrbitControls polar angle convention: 0 = straight up (looking
// down from directly overhead), π/2 = horizon, π = straight down (looking
// up from directly underneath).
//
//   Above   — top hemisphere only (polar 0..π/2). Looking down at the board
//             from above. Crypt/coffins/marquee hidden for a cleaner view.
//   Current — fully free. No polar limits, original spawn pose, everything
//             visible.
//   Below   — bottom hemisphere only (polar π/2..π). Looking up at the
//             board from below the crypt. Crypt visible.
const ELEVATION_PRESETS = {
    above: {
        // Pulled back significantly so the camera sits BEHIND the human
        // figure (figure at z=+7 in V10), high enough to look down across
        // the board and see the surrounding arena (columns, zodiac tiles
        // on the floor, etc.). In non-V10 views this just gives a slightly
        // wider, less crowded angle on the board.
        position: new THREE.Vector3(0, 6, 14),
        target:   new THREE.Vector3(0, 0, -3),
        minPolar: 0.05,
        maxPolar: Math.PI / 2 - 0.05,
        hideCrypt: true
    },
    current: {
        position: new THREE.Vector3(0, 10, 12),
        target:   new THREE.Vector3(0, 0, 0),
        // No clamp — restore Three.js defaults (0..π).
        minPolar: 0,
        maxPolar: Math.PI,
        hideCrypt: false
    },
    below: {
        // Just slightly above the coffin line (coffins sit at CRYPT_Y = -2.4),
        // pulled back enough to fully frame ALL the coffins from the white
        // side. Camera is HIGHER and FURTHER than before so peripheral
        // arena geometry in V10 doesn't crop the view.
        position: new THREE.Vector3(0, -1.4, 13),
        target:   new THREE.Vector3(0, -2.2, -3),
        minPolar: Math.PI / 2 - 0.15,
        maxPolar: Math.PI / 2 + 0.3,
        hideCrypt: false
    }
};

let cameraElevation = 'above';   // game loads with Above preset selected
let elevationAnimation = null;     // {fromPos, toPos, fromTgt, toTgt, start, duration}
const ELEVATION_EASE_MS = 700;

function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function setCameraElevation(name) {
    const preset = ELEVATION_PRESETS[name];
    if (!preset) return;
    cameraElevation = name;
    // Start animated transition from current camera pose to the preset.
    elevationAnimation = {
        fromPos: camera.position.clone(),
        toPos:   preset.position.clone(),
        fromTgt: controls.target.clone(),
        toTgt:   preset.target.clone(),
        start:   performance.now(),
        duration: ELEVATION_EASE_MS
    };
    // Apply visibility rules immediately. The crypt/captured-piece groups
    // sit "below ground" in world space, so for the above-board view we
    // hide them.
    cryptGroup.visible    = !preset.hideCrypt;
    capturedGroup.visible = !preset.hideCrypt;
    // The marquee rail sits even further below the crypt; hide it too in
    // the above view.
    marqueePanel.visible  = !preset.hideCrypt;

    // V10 (Colosseum) altar — when below mode is active, hide the altar
    // block so the camera can see the coffins inside the crypt. The altar
    // occupies the same space as the chess board's underground crypt, so
    // it would otherwise block the view from below. Other elevation
    // modes show the altar normally.
    if (typeof activeViewProps !== 'undefined') {
        const showAltar = (name !== 'below');
        for (const p of activeViewProps) {
            if (p.userData && p.userData.isV10Altar) p.visible = showAltar;
        }
    }

    // Apply polar-angle clamps. Rotation, pan, and zoom all stay enabled —
    // the user retains full camera freedom WITHIN the hemisphere appropriate
    // to the chosen elevation. Crossing the "terminal angle" is simply
    // blocked by the clamp, not by disabling controls.
    controls.minPolarAngle = preset.minPolar;
    controls.maxPolarAngle = preset.maxPolar;
    // V5 additionally caps the upper polar so the camera can never tilt
    // far enough to see above the tree canopy line — preserves the
    // "stage" composition. ABOVE mode also caps the lower polar so the
    // user can't dip below the water surface (that's a BELOW-only view).
    if (typeof currentViewId !== 'undefined' && currentViewId === 5) {
        controls.minPolarAngle = Math.max(controls.minPolarAngle, 50 * Math.PI / 180);
        if (name === 'above') {
            controls.maxPolarAngle = Math.min(controls.maxPolarAngle, Math.PI / 2 - 0.05);
        }
    }

    updateElevationToggle();
    markActivity();
}

// Per-frame easing of the elevation transition. Called from animate().
function updateElevation(now) {
    if (!elevationAnimation) return;
    const a = elevationAnimation;
    const t = Math.min(1, (now - a.start) / a.duration);
    const e = easeInOutCubic(t);
    camera.position.lerpVectors(a.fromPos, a.toPos, e);
    controls.target.lerpVectors(a.fromTgt, a.toTgt, e);
    if (t >= 1) elevationAnimation = null;
}

// Cinematic flyover: start camera high above the pool's far end, then
// glide along the pool axis to the target temple's altar. Reuses the
// existing temple-camera-fly system after the pool transit completes.
let _templeFlyoverState = null;
function startTempleFlyover(color) {
    // V5 pool is along Z axis between the two temples (z=±72). The pool
    // spans approximately z=-50 to z=+50, centered on x=0.
    // Start above the OPPOSITE end of the pool from the destination
    // temple so the camera flies the full length of the water.
    const destZ = (color === 'white') ? +72 : -72;
    const startZ = -destZ * 0.95;          // opposite end
    const startPos = new THREE.Vector3(0, 12, startZ);
    const startLook = new THREE.Vector3(0, 1, destZ * 0.4);
    const midPos = new THREE.Vector3(0, 8, destZ * 0.2);
    const midLook = new THREE.Vector3(0, 2, destZ * 0.7);
    const endPos = new THREE.Vector3(0, 6, destZ + (destZ > 0 ? -8 : 8));
    const endLook = new THREE.Vector3(0, 2, destZ);
    _templeFlyoverState = {
        startTime: performance.now(),
        duration: 4200,
        keyframes: [
            { t: 0.0, pos: startPos, look: startLook },
            { t: 0.55, pos: midPos, look: midLook },
            { t: 1.0, pos: endPos, look: endLook }
        ],
        color

}
function updateTempleFlyover(now) {
    if (!_templeFlyoverState) return;
    const s = _templeFlyoverState;
    const t = Math.min(1, (now - s.startTime) / s.duration);
    // easeInOutCubic
    const e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    // Interpolate across keyframes
    let k0 = s.keyframes[0], k1 = s.keyframes[1];
    if (e > k1.t) { k0 = s.keyframes[1]; k1 = s.keyframes[2]; }
    const localT = (e - k0.t) / (k1.t - k0.t);
    camera.position.lerpVectors(k0.pos, k1.pos, localT);
    const lookAt = new THREE.Vector3().lerpVectors(k0.look, k1.look, localT);
    controls.target.copy(lookAt);
    if (t >= 1) {
        // Hand off to V5's existing temple altar continuation system
        _templeFlyoverState = null;
        if (typeof moveMatchToTemple === 'function') {
            moveMatchToTemple(s.color);
        }
    }
}

// ----- VIEW SYSTEM -----
// A "view" is a visual preset for the scene. Views 1 and 2 are real; 3-10 are
// placeholders for future themes (medieval crypt, marble columns, deep space, etc.).
//
// To add a real view later: fill in its bg color (and eventually piece materials,
// board colors, environment, fog, etc.) in the VIEWS table and set placeholder=false.
//
// Views can optionally include 3D "props" — meshes built lazily and added to the
// scene when that view becomes active, removed when leaving. The buildProps
// function returns an array of meshes (or groups). The viewPropsCache stores
// them after first build so we don't rebuild on every toggle.

// --- Prop builders (each returns an array of Object3D to add to the scene) ---

// V1 (Dark view) — two large planetary spheres, one behind each player.
// Each planet is a real 3D MeshStandardMaterial sphere (not a sprite), so
// it has actual lit/shaded sides that rotate as its dedicated light
// orbits. A thin Saturn-style ring orbits each planet. The white planet
// sits behind White (+Z); the black planet sits behind Black (-Z). Each
// planet's DirectionalLight is parented to the planet group, so both
// planet + light rotate together with the world (idle auto-rotation
// preserves the planet-behind-player relationship) while the light's
// orbit around its planet changes the lit angle continuously during
// gameplay.
//
// Lifecycle: a module-level _v1Planets array collects per-frame update
// data; updateV1Planets(now) walks it. The array is cleared when V1
// builds new props (and refilled).
let _v1Planets = [];
function buildV1Props() {
    _v1Planets = [];
    const out = [];

    // Shared procedural textures for the planet surfaces. Each is a
    // 512×256 equirectangular canvas with subtle band/noise variation,
    // so the rotating lit side reveals a textured planet rather than a
    // featureless ball. Not photoreal — just enough surface character.
    function makePlanetSurfaceTexture(isWhite) {
        const W = 512, H = 256;
        const cv = document.createElement('canvas');
        cv.width = W;
        cv.height = H;
        const c = cv.getContext('2d');
        // Base fill. The "black" planet's base is lifted off pure-near-black
        // so it stays distinguishable from V1's dark background (#1a1a1a)
        // even on its unlit side.
        c.fillStyle = isWhite ? '#e8e4d8' : '#3a3340';
        c.fillRect(0, 0, W, H);
        // Latitude bands — subtle horizontal striping
        const bandColor = isWhite ? 'rgba(190, 184, 168, 0.35)'
                                  : 'rgba(95, 85, 110, 0.55)';
        c.fillStyle = bandColor;
        for (let i = 0; i < 8; i++) {
            const y = (i / 8) * H + ((i * 37) % 31);
            const h = 4 + (i * 13) % 22;
            c.fillRect(0, y, W, h);
        }
        // Scattered "crater" / "storm" specks for surface detail
        const speckColor = isWhite ? 'rgba(150, 145, 130, 0.55)'
                                   : 'rgba(125, 110, 140, 0.75)';
        c.fillStyle = speckColor;
        for (let i = 0; i < 220; i++) {
            const x = (i * 1597) % W;
            const y = (i * 947)  % H;
            const r = 1 + (i * 23) % 4;
            c.beginPath();
            c.arc(x, y, r, 0, Math.PI * 2);
            c.fill();
        }
        // Soft cloud-like wisps (lighter than base for both planets)
        const wispColor = isWhite ? 'rgba(245, 242, 230, 0.4)'
                                  : 'rgba(85, 80, 105, 0.45)';
        c.fillStyle = wispColor;
        for (let i = 0; i < 40; i++) {
            const x = (i * 1213) % W;
            const y = (i * 569)  % H;
            const w = 30 + (i * 11) % 60;
            const h = 6 + (i * 7) % 12;
            c.beginPath();
            c.ellipse(x, y, w, h, ((i * 0.7) % Math.PI), 0, Math.PI * 2);
            c.fill();
        }
        const tex = new THREE.CanvasTexture(cv);
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        tex.wrapS = THREE.RepeatWrapping;

    }

    // Thin Saturn-style ring texture — a horizontal-stripe pattern with
    // a narrow visible band of varying brightness. Applied to a flat
    // RingGeometry tilted out of horizontal.
    function makeRingTexture(isWhite) {
        const W = 512, H = 16;
        const cv = document.createElement('canvas');
        cv.width = W;
        cv.height = H;
        const c = cv.getContext('2d');
        c.clearRect(0, 0, W, H);
        // Build a horizontal gradient — fades in/out at the inner/outer
        // edges (top/bottom of canvas in radial UV space).
        const baseColor = isWhite ? [225, 220, 205] : [180, 175, 195];
        for (let y = 0; y < H; y++) {
            const t = y / (H - 1);            // 0 = inner edge, 1 = outer edge
            // Smooth falloff at both ends
            const fade = Math.sin(Math.PI * t);   // 0 at edges, 1 in middle
            const lift = 0.55 + 0.45 * fade;
            for (let x = 0; x < W; x++) {
                // Narrow bands of varying alpha across the ring's
                // tangential direction
                const stripe = 0.7 + 0.3 * Math.sin(x * 0.16 + y * 0.4);
                const a = lift * stripe * (isWhite ? 0.55 : 0.45);
                const [r, g, b] = baseColor;
                c.fillStyle = `rgba(${r}, ${g}, ${b}, ${a.toFixed(3)})`;
                c.fillRect(x, y, 1, 1);

        tex.magFilter = THREE.LinearFilter;

        const {

            radius,         // sphere radius
            isWhite,        // surface palette toggle
            tiltDeg,        // axial tilt for the ring + planet's own y-axis
            ringInnerMult,  // ring inner radius = ringInnerMult × radius
            ringOuterMult,  // ring outer radius = ringOuterMult × radius
            lightOrbitSec,  // seconds per full light revolution
            lightColor,     // light tint
            lightIntensity

        // behind its assigned player.

        // High-res sphere so the lit terminator is smooth, not faceted.
        const surfaceTex = makePlanetSurfaceTexture(isWhite);
        const sphereGeo = new THREE.SphereGeometry(radius, 96, 64);
        const sphereMat = new THREE.MeshStandardMaterial({
            map: surfaceTex,
            roughness: isWhite ? 0.92 : 0.55,
            metalness: isWhite ? 0.02 : 0.18,
            // Stronger emissive on the dark planet keeps its unlit side
            // from disappearing entirely against V1's dark background.
            emissive: isWhite ? 0x141312 : 0x1e1a28,
            emissiveIntensity: isWhite ? 0.35 : 0.55,
            fog: false

        const ringGeo = new THREE.RingGeometry(
            radius * ringInnerMult,
            radius * ringOuterMult,

        const ringPos = ringGeo.attributes.position;
        const ringUv = ringGeo.attributes.uv;

        const rOut = radius * ringOuterMult;

            const y = ringPos.getY(i);

            const r = Math.sqrt(x * x + y * y);
            const u = (ang + Math.PI) / (2 * Math.PI);   // 0..1 around

            metalness: 0.3,

            depthWrite: false,
            fog: false

        ring.rotation.x = -Math.PI / 2 + (tiltDeg * Math.PI / 180);

        // the "lit at various angles during game play" effect. Independent
        // of the chess-board spotlight.
        const light = new THREE.DirectionalLight(lightColor, lightIntensity);
        light.position.set(radius * 3, radius * 1.2, 0);  // initial pose
        light.target.position.set(0, 0, 0);

            group, sphere, light,
            radius,
            orbitMs: lightOrbitSec * 1000,

            phaseOffset: isWhite ? 0 : Math.PI * 0.6

    // ---- WHITE PLANET — behind White's side (+Z) ----
    const whitePlanetGroup = buildPlanet({
        position:        new THREE.Vector3(0, 35, 140),
        radius:          22,

        tiltDeg:         18,

        ringOuterMult:   1.95,
        lightOrbitSec:   75,        // 75-second orbit — slow but visible during play
        lightColor:      0xfff2d8,  // warm sunlight
        lightIntensity:  3.0

    // ---- BLACK PLANET — behind Black's side (-Z) ----
    const blackPlanetGroup = buildPlanet({
        position:        new THREE.Vector3(0, 35, -140),
        radius:          22,
        isWhite:         false,
        tiltDeg:         -22,
        ringInnerMult:   1.45,
        ringOuterMult:   1.85,
        lightOrbitSec:   105,       // 105 seconds — different rate so they don't sync

    // Two rows of the 8-piece constellation back rank — one behind White
    // (positive Z) and one behind Black (negative Z), same shared helper

    // constellations sit LOW (y=2, just above the mirror at y=-0.5) and

    // the planets are the dominant sky element and the constellations

    //
    // Tagged attachToWorld so the constellations stay locked to their
    // respective player's end through auto-rotation.
    //
    // SIZE TUNING:
    //   - Base width 140 (mild enlarge from the earlier 110 baseline)
    //   - King and queen get an additional 1.35× scale so they read as
    //     the dominant royal pieces in the back rank, the way the actual
    //     chess pieces do.
    //   - Scale is applied to the mesh AND its cached planeW so the
    //     shatter-on-capture physics keep using the correct per-piece
    //     dimensions (it divides planeW by 256 to convert pixels to
    //     world units when spawning the scattered-star sprites).
    const v1ConstellationMeshes = buildConstellationRowsAtZ([-260, +260], 2, 140);
    const ROYAL_SCALE = 1.35;
    for (const m of v1ConstellationMeshes) {
        m.userData.attachToWorld = true;
        const t = m.userData.pieceType;
        if (t === 'king' || t === 'queen') {
            m.scale.setScalar(ROYAL_SCALE);
            m.userData.planeW = m.userData.planeW * ROYAL_SCALE;
        }
    }
    for (const m of v1ConstellationMeshes) out.push(m);

    // ---- V1 MIRROR GROUND ----
    // A large reflective disc beneath the board. Uses the three.js
    // Reflector addon (same as V2's mirror) — a real render-to-texture
    // mirror pass each frame, so the planets, pieces, and board appear
    // reflected. Tinted slightly darker than V2's mirror so it sits
    // naturally in V1's dark scene without becoming a bright spot.
    //
    // Sits at y=-0.5 so it's below the playing surface but above the
    // crypt (which is at y=-2.4). Attached to world so it rotates with
    // auto-rotation, keeping its alignment with everything else.
    const MIRROR_RADIUS_V1 = 500;
    const mirrorGeoV1 = new THREE.CircleGeometry(MIRROR_RADIUS_V1, 128);
    const mirrorV1 = new Reflector(mirrorGeoV1, {
        textureWidth:  Math.min(window.innerWidth, 1600)  * window.devicePixelRatio,
        textureHeight: Math.min(window.innerHeight, 1200) * window.devicePixelRatio,
        // Mid-dark steel tint so the reflection reads as a moody dark
        // mirror rather than a bright pool against the dark V1 bg.
        color:         0x6a6e78,
        clipBias:      0.003
    });
    mirrorV1.rotation.x = -Math.PI / 2;
    mirrorV1.position.y = -0.5;
    mirrorV1.renderOrder = -3;
    mirrorV1.userData.attachToWorld = true;
    out.push(mirrorV1);

    return out;
}

// Per-frame: orbit each planet's dedicated DirectionalLight around its
// planet so the lit side continuously moves. Each planet has its own
// period (set at build time) so the two planets don't light in lockstep.
function updateV1Planets(now) {
    if (!_v1Planets || _v1Planets.length === 0) return;
    for (const p of _v1Planets) {
        const t = ((now / p.orbitMs) * Math.PI * 2 + p.phaseOffset) % (Math.PI * 2);
        // Orbit in a plane tilted slightly out of horizontal so the lit
        // angle moves in BOTH horizontal and vertical — feels more like a
        // sun moving across the sky than a turntable on a single axis.
        const r = p.radius * 3;
        p.light.position.set(
            Math.cos(t) * r,
            r * 0.35 * Math.sin(t * 0.5),    // gentle vertical sway
            Math.sin(t) * r
        );
    }
}

// V2 (Light view) — two large planets, one behind each player. Token-cheap
// implementation: a single Sprite per planet using a radial-gradient canvas
// texture. No geometry, no shaders, no animation — just two billboards.
// The radial gradient gives the smooth lit-edge → dark-side gradation of a
// softly illuminated planetary disc.
function buildV2Props() {
    // ---- DAY/NIGHT PALETTES ----
    // Each palette is the full set of colors the V2 scene needs in a
    // given mode. applyV2DayNight(mode) reads the matching palette and
    // repaints sky/horizon/mirror/planets — no rebuild required.
    const V2_PALETTES = {
        day: {
            // Sky dome vertical gradient stops [pos, rgb]
            skyStops: [
                [0.00, 'rgb(85, 90, 120)'],     // zenith
                [0.30, 'rgb(125, 130, 155)'],   // upper-mid
                [0.50, 'rgb(165, 168, 185)'],   // horizon
                [0.70, 'rgb(155, 158, 175)'],   // just below horizon
                [1.00, 'rgb(135, 138, 158)']    // south pole (under mirror)
            ],
            // Horizon-fade overlay rim color (alpha ramped in the canvas)
            horizonRim: [165, 168, 185],
            // Mirror reflection tint
            mirrorColor: 0xc8c4bc,
            // Planet texture stops [coreCol, edgeCol]
            whitePlanet: ['rgba(255, 248, 230, 0.95)', 'rgba(235, 190, 145, 0.55)'],
            blackPlanet: ['rgba(215, 230, 255, 0.95)', 'rgba(115, 130, 185, 0.55)']
        },
        night: {
            // Deep night sky: dark navy at the zenith, slightly warmer
            // closer to the horizon (where stray atmospheric glow lives).
            skyStops: [
                [0.00, 'rgb(8, 10, 28)'],       // zenith — near-black navy
                [0.30, 'rgb(18, 22, 45)'],      // upper-mid
                [0.50, 'rgb(38, 42, 70)'],      // horizon — slightly lifted
                [0.70, 'rgb(28, 32, 55)'],      // just below horizon
                [1.00, 'rgb(15, 18, 38)']       // south pole
            ],
            horizonRim: [38, 42, 70],
            // Mirror tint pulls deeper at night so the reflection reads
            // as moonlit-water rather than washed gray.
            mirrorColor: 0x2a2e3a,
            // Planets stay cool-toned at night (cooler/dimmer cores)
            whitePlanet: ['rgba(255, 240, 210, 0.95)', 'rgba(210, 170, 120, 0.50)'],
            blackPlanet: ['rgba(200, 215, 240, 0.95)', 'rgba(95, 110, 165, 0.50)']
        }
    };
    const initialPalette = V2_PALETTES[v2DayNight];

    // Paint a planet canvas using a palette's core/edge color pair.
    function paintPlanetCanvas(ctx, coreCol, edgeCol) {
        ctx.clearRect(0, 0, 512, 512);
        const g = ctx.createRadialGradient(256, 220, 0, 256, 256, 256);
        g.addColorStop(0,    coreCol);
        g.addColorStop(0.55, edgeCol);
        g.addColorStop(0.95, 'rgba(0, 0, 0, 0)');
        g.addColorStop(1,    'rgba(0, 0, 0, 0)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, 512, 512);
    }
    function makePlanetTexture(coreCol, edgeCol) {
        const cv = document.createElement('canvas');
        cv.width = 512;
        cv.height = 512;
        const c = cv.getContext('2d');
        paintPlanetCanvas(c, coreCol, edgeCol);
        const t = new THREE.CanvasTexture(cv);
        t.minFilter = THREE.LinearFilter;
        t.magFilter = THREE.LinearFilter;
        return { canvas: cv, ctx: c, tex: t };
    }
    const whitePlanet = makePlanetTexture(...initialPalette.whitePlanet);
    const blackPlanet = makePlanetTexture(...initialPalette.blackPlanet);

    function makeSprite(tex, x, y, z, size) {
        const m = new THREE.SpriteMaterial({
            map: tex,
            transparent: true,
            depthWrite: false,
            fog: false
        });
        const s = new THREE.Sprite(m);
        s.scale.set(size, size, 1);
        s.position.set(x, y, z);
        s.renderOrder = -2;        // draw behind everything else
        s.userData.attachToWorld = true;
        return s;
    }

    // ---- V2 CONSTELLATION CHESS BACK RANK ----
    // Two rows of the 8-piece constellation back rank — one behind White
    // (positive Z) and one behind Black (negative Z), same layout used by
    // V3 (Pyramid) and V5 (Cathedral). Constellations sit directly against
    // V2's light background (no dark backdrop panel) — the saved-with-
    // backdrops version lives at V11.
    const v2ConstellationMeshes = buildConstellationRowsAtZ([-260, +260], 70, 220);
    for (const m of v2ConstellationMeshes) {
        // Attach to world so the constellations rotate with the board and
        // always stay locked to White's / Black's end.
        m.userData.attachToWorld = true;
    }

    // ---- V2 MIRROR GROUND + HORIZON FADE ----
    // A large reflective disc beneath the board extending out to the
    // horizon. The Reflector (three.js addon) performs a real render-to-
    // texture mirror pass each frame — pieces, constellations, sky
    // planets, and HUD-free scenery all appear reflected.
    //
    // To keep things soft and matching V2's gentle pastel mood:
    //   • The mirror's color tint is a warm light-gray (~0xc8c4bc), which
    //     blends with the reflection to mute it — never a hard mirror.
    //   • A second plane sits a hair above the mirror with a RADIAL
    //     alpha gradient: fully transparent at center (showing the
    //     reflection clearly under the board) and fully opaque at the
    //     rim, painted in V2's exact sky color (0xeeeeee). This makes
    //     the mirror disc dissolve smoothly into the sky at the horizon
    //     instead of cutting off as a hard circle.
    //
    // RADIUS choice: 600 gives a generous "reaches the horizon" feel
    // without becoming so vast that the reflection-pass texture loses
    // useful resolution. With the alpha fade taking effect from radius
    // ~250 outward, the mirror visually merges with the sky well before
    // the geometric edge of the disc.
    const MIRROR_RADIUS = 600;
    const MIRROR_Y = -0.5;     // sits below the board surface (y=0)

    const mirrorGeo = new THREE.CircleGeometry(MIRROR_RADIUS, 128);
    const mirror = new Reflector(mirrorGeo, {
        textureWidth:  Math.min(window.innerWidth, 1600)  * window.devicePixelRatio,
        textureHeight: Math.min(window.innerHeight, 1200) * window.devicePixelRatio,
        color:         initialPalette.mirrorColor,
        clipBias:      0.003
    });
    mirror.rotation.x = -Math.PI / 2;
    mirror.position.y = MIRROR_Y;
    mirror.renderOrder = -3;
    mirror.userData.attachToWorld = true;

    // Build the horizon-fade overlay. A radial alpha gradient painted on
    // a canvas — fully transparent at center, fully opaque V2 sky-dome
    // horizon color at the rim — so the bright outer ring of the
    // overlay literally IS the V2 sky at the horizon line, swallowing
    // the mirror into the dome smoothly. Rim color tracks the active
    // palette's horizonRim so day/night switches stay seamless.
    function paintHorizonCanvas(ctx, rgb) {
        const [r, gg, bb] = rgb;
        ctx.clearRect(0, 0, 1024, 1024);
        const g = ctx.createRadialGradient(512, 512, 0, 512, 512, 512);
        g.addColorStop(0.00, `rgba(${r}, ${gg}, ${bb}, 0.00)`);
        g.addColorStop(0.18, `rgba(${r}, ${gg}, ${bb}, 0.00)`);
        g.addColorStop(0.42, `rgba(${r}, ${gg}, ${bb}, 0.55)`);
        g.addColorStop(0.70, `rgba(${r}, ${gg}, ${bb}, 0.92)`);
        g.addColorStop(1.00, `rgba(${r}, ${gg}, ${bb}, 1.00)`);
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, 1024, 1024);
    }
    const horizonCanvas = document.createElement('canvas');
    horizonCanvas.width = 1024;
    horizonCanvas.height = 1024;
    const horizonCtx = horizonCanvas.getContext('2d');
    paintHorizonCanvas(horizonCtx, initialPalette.horizonRim);
    const horizonTex = new THREE.CanvasTexture(horizonCanvas);
    horizonTex.minFilter = THREE.LinearFilter;
    horizonTex.magFilter = THREE.LinearFilter;
    const fadeGeo = new THREE.CircleGeometry(MIRROR_RADIUS, 128);
    const fadeMat = new THREE.MeshBasicMaterial({
        map: horizonTex,
        transparent: true,
        depthWrite: false,
        fog: false,
        side: THREE.DoubleSide
    });
    const horizonFade = new THREE.Mesh(fadeGeo, fadeMat);
    horizonFade.rotation.x = -Math.PI / 2;
    horizonFade.position.y = MIRROR_Y + 0.01;     // a hair above the mirror
    horizonFade.renderOrder = -2;                  // draw after mirror, before sky props
    horizonFade.userData.attachToWorld = true;

    // ---- V2 SKY DOME (vertical gradient) ----
    // A large sphere wrapping the scene, BackSide-rendered (visible from
    // inside), painted with a vertical gradient. The DAY palette gives a
    // deep-zenith / brighter-horizon look; the NIGHT palette is a dark
    // navy gradient. Stops live in V2_PALETTES so applyV2DayNight() can
    // repaint without rebuilding.
    function paintSkyCanvas(ctx, H, stops) {
        const g = ctx.createLinearGradient(0, 0, 0, H);
        for (const [pos, col] of stops) g.addColorStop(pos, col);
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, ctx.canvas.width, H);
    }
    const SKY_W = 64, SKY_H = 512;     // narrow + tall: only vertical variation
    const skyCanvas = document.createElement('canvas');
    skyCanvas.width = SKY_W;
    skyCanvas.height = SKY_H;
    const skyCtx = skyCanvas.getContext('2d');
    paintSkyCanvas(skyCtx, SKY_H, initialPalette.skyStops);
    const skyTex = new THREE.CanvasTexture(skyCanvas);
    skyTex.minFilter = THREE.LinearFilter;
    skyTex.magFilter = THREE.LinearFilter;
    const SKY_RADIUS = 700;        // larger than the constellation rows (z=±260) and the mirror (r=600)
    const skyGeo = new THREE.SphereGeometry(SKY_RADIUS, 32, 24);
    const skyMat = new THREE.MeshBasicMaterial({
        map: skyTex,
        side: THREE.BackSide,
        depthWrite: false,         // sky doesn't occlude anything
        fog: false
    });
    const skyDome = new THREE.Mesh(skyGeo, skyMat);
    skyDome.renderOrder = -4;      // draw before mirror (-3), fade (-2), constellations (-1)
    skyDome.userData.attachToWorld = true;

    const whitePlanetSprite = makeSprite(whitePlanet.tex, 0, 30,  70, 50);
    const blackPlanetSprite = makeSprite(blackPlanet.tex, 0, 30, -70, 50);

    // ---- Stash refs for applyV2DayNight ----
    // Everything the mode-toggle needs to mutate at runtime: the sky/
    // horizon canvases (repainted from palette stops), their textures
    // (flagged needsUpdate after repaint), the mirror's material
    // (color tint swaps directly), and the planet canvases (repainted
    // with the new core/edge color pair).
    _v2State = {
        palettes:      V2_PALETTES,
        // Sky dome
        skyCanvas, skyCtx, skyTex, skyH: SKY_H, paintSkyCanvas,
        // Horizon-fade overlay
        horizonCanvas, horizonCtx, horizonTex, paintHorizonCanvas,
        // Mirror (Reflector's material exposes a uniform-backed color)
        mirror,
        // Planets
        whitePlanet, blackPlanet, paintPlanetCanvas
    };

    return [
        // Sky dome FIRST (gradient backdrop wrapping the scene)
        skyDome,
        // Mirror ground + horizon-fade overlay (added next so they sit behind props)
        mirror,
        horizonFade,
        // Behind white (positive Z), high in the sky
        whitePlanetSprite,
        // Behind black (negative Z), high in the sky
        blackPlanetSprite,
        // Constellation rows (no backdrop panels in V2)
        ...v2ConstellationMeshes
    ];
}

// Switch the V2 scene between day and night. Repaints the sky dome,
// horizon-fade overlay, planet textures, and mirror tint from the
// palette stashed on _v2State. No meshes are rebuilt — only canvases
// are repainted and textures flagged dirty.
function applyV2DayNight(mode) {
    v2DayNight = mode;
    if (!_v2State) return;
    const s = _v2State;
    const palette = s.palettes[mode];
    if (!palette) return;
    // Sky dome
    s.paintSkyCanvas(s.skyCtx, s.skyH, palette.skyStops);
    s.skyTex.needsUpdate = true;
    // Horizon-fade overlay
    s.paintHorizonCanvas(s.horizonCtx, palette.horizonRim);
    s.horizonTex.needsUpdate = true;
    // Mirror tint — three.js Reflector exposes `color` via a uniform
    // that holds a THREE.Color we can mutate directly.
    if (s.mirror.material && s.mirror.material.uniforms && s.mirror.material.uniforms.color) {
        s.mirror.material.uniforms.color.value.set(palette.mirrorColor);
    }
    // Planets
    s.paintPlanetCanvas(s.whitePlanet.ctx, palette.whitePlanet[0], palette.whitePlanet[1]);
    s.whitePlanet.tex.needsUpdate = true;
    s.paintPlanetCanvas(s.blackPlanet.ctx, palette.blackPlanet[0], palette.blackPlanet[1]);
    s.blackPlanet.tex.needsUpdate = true;
    // Refresh wireframe line colors — V2 is a light-bg view in day mode.
    if (typeof refreshWireframeLineColors === 'function') {
        refreshWireframeLineColors();
    }
}

// V11 — independent clone of buildV2Props, saved as a checkpoint of V2's
// current "Light + sky constellations + backdrop panels" look. V2 and
// V11 share NO state at build time (each builds its own meshes), so V2
// can be evolved later without affecting V11, and vice-versa.
function buildV11Props() {
    // ---- DAY/NIGHT PALETTES ----
    // Mirror the V2 system: each palette is the full set of colors V11
    // needs in a given mode, plus stop info for the canvas textures.
    // applyV11DayNight(mode) reads the palette and repaints the planet
    // sprites, mirror tint, water-puddle tint, and scene background —
    // no rebuild required.
    const V11_PALETTES = {
        day: {
            bg: 0xeeeeee,                                // light sky
            // Planet color stops for the canvas-painted sprite [coreCol, edgeCol]
            whitePlanet: ['rgba(255, 240, 215, 0.95)', 'rgba(220, 175, 130, 0.55)'],
            blackPlanet: ['rgba(200, 215, 245, 0.95)', 'rgba(95, 110, 165, 0.55)'],
            // Mirror reflection tint — sea-glass blue-green (Reflector
            // multiplies this against the reflection, so it's both
            // tinted AND highly reflective, like clear shallow water).
            mirrorColor: 0x6ec0b4,
            // Per-ship water-puddle tint (calmer in daylight)
            waterColor: 0x0e1620
        },
        night: {
            bg: 0x0a1226,                                // deep navy night sky
            // Planets cool and dim at night
            whitePlanet: ['rgba(245, 230, 200, 0.95)', 'rgba(180, 140, 100, 0.50)'],
            blackPlanet: ['rgba(170, 185, 220, 0.95)', 'rgba(75, 90, 145, 0.50)'],
            // Mirror tint at night: deeper sea-teal — moonlit shallow
            // water, still reflective but with a green-blue cast.
            mirrorColor: 0x1f4a48,
            // Water puddles get an even deeper navy
            waterColor: 0x05080f
        }
    };
    const initialPalette = V11_PALETTES[v11DayNight];

    // Paint a planet canvas using a palette's core/edge color pair.
    function paintPlanetCanvas(ctx, coreCol, edgeCol) {
        ctx.clearRect(0, 0, 512, 512);
        const g = ctx.createRadialGradient(256, 220, 0, 256, 256, 256);
        g.addColorStop(0,    coreCol);
        g.addColorStop(0.55, edgeCol);
        g.addColorStop(0.95, 'rgba(0, 0, 0, 0)');
        g.addColorStop(1,    'rgba(0, 0, 0, 0)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, 512, 512);
    }
    function makePlanetTextureWithCanvas() {
        const cv = document.createElement('canvas');
        cv.width = 512;
        cv.height = 512;
        const c = cv.getContext('2d');
        const t = new THREE.CanvasTexture(cv);
        t.minFilter = THREE.LinearFilter;
        t.magFilter = THREE.LinearFilter;
        return { canvas: cv, ctx: c, tex: t };
    }
    // Build the planet sprite canvases up front so applyV11DayNight can
    // repaint them later.
    const whitePlanetCV = makePlanetTextureWithCanvas();
    const blackPlanetCV = makePlanetTextureWithCanvas();
    paintPlanetCanvas(whitePlanetCV.ctx, initialPalette.whitePlanet[0], initialPalette.whitePlanet[1]);
    paintPlanetCanvas(blackPlanetCV.ctx, initialPalette.blackPlanet[0], initialPalette.blackPlanet[1]);
    whitePlanetCV.tex.needsUpdate = true;
    blackPlanetCV.tex.needsUpdate = true;

    function makeSprite(tex, x, y, z, size) {
        const m = new THREE.SpriteMaterial({
            map: tex,
            transparent: true,
            depthWrite: false,
            fog: false
        });
        const s = new THREE.Sprite(m);
        s.scale.set(size, size, 1);
        s.position.set(x, y, z);
        s.renderOrder = -2;        // draw behind everything else
        s.userData.attachToWorld = true;
        return s;
    }
    const whitePlanetSprite = makeSprite(whitePlanetCV.tex, 0,  30,  70, 50);
    const blackPlanetSprite = makeSprite(blackPlanetCV.tex, 0,  30, -70, 50);
    // ---- V11 CONSTELLATION SAILS ON SHIPS ----
    // Each of the 16 back-rank constellations becomes the SAIL of a small
    // ship. Two fleets of 8: one behind White (+Z), one behind Black (-Z),
    // arranged in a gentle arc at sea level. Each ship has:
    //   - Hull         : a short dark-wood box, slightly tapered
    //   - Mast         : a vertical cylinder rising from hull center
    //   - Yard arm     : a horizontal cylinder near the top of the mast
    //   - Sail         : the constellation plane, hanging from the yard
    //   - (Optional)   : a faint dark-water disc under each fleet so the
    //                    ships read as floating rather than hanging in space.
    //
    // The constellation plane is built by the shared helper as usual,
    // then repositioned at the ship's mast and reparented into the ship
    // group. Shatter-on-capture still works (initialX/Y/Z are updated to
    // the new world position so scattered stars spawn in the right place).
    //
    // Total width is reduced to 60 (from V2/V3/V5's 220) so each sail is
    // a reasonable ~8 units wide — fits 8 ships per side in a 60-unit
    // spread without overlap.

    const v11ConstellationMeshes = buildConstellationRowsAtZ([-260, +260], 0, 60);
    for (const m of v11ConstellationMeshes) {
        // Will repositioning these — undo the auto-attachToWorld so we
        // can manage parenting via the ship group instead.
        m.userData.attachToWorld = true;
    }

    // Materials shared across all ships.
    const hullMat = new THREE.MeshStandardMaterial({
        color: 0x3a2a1e,         // dark wood
        roughness: 0.85,
        metalness: 0.05,
        fog: false
    });
    const hullDarkMat = new THREE.MeshStandardMaterial({
        color: 0x2a1d14,         // shadowed planks
        roughness: 0.90,
        metalness: 0.05,
        fog: false
    });
    const hullLightMat = new THREE.MeshStandardMaterial({
        color: 0x5a4030,         // sun-bleached upper planks
        roughness: 0.80,
        metalness: 0.05,
        fog: false
    });
    const mastMat = new THREE.MeshStandardMaterial({
        color: 0x4a3220,         // slightly lighter than hull
        roughness: 0.75,
        metalness: 0.05,
        fog: false
    });
    const goldTrimMat = new THREE.MeshStandardMaterial({
        color: 0xb8932c,         // brass / gold-leaf trim around the sterncastle
        roughness: 0.45,
        metalness: 0.65,
        fog: false
    });
    const ropeMat = new THREE.LineBasicMaterial({
        color: 0xa08260,         // tan rope, slightly transparent so rigging reads as fine
        transparent: true,
        opacity: 0.7,
        fog: false
    });
    const waterMat = new THREE.MeshBasicMaterial({
        color: initialPalette.waterColor,
        transparent: true,
        opacity: 0.55,
        depthWrite: false,
        fog: false,
        side: THREE.DoubleSide
    });

    // Build a galleon-style ship around the given constellation sail.
    // The ship has a wooden caravel hull, visible deck, lowered stateroom
    // (sterncastle) with arched windows + corner lanterns + gold trim,
    // carved baluster railing, gold plaque with the piece glyph on the
    // bow face, a bowsprit, and the existing mast + yard arm + sail.
    //
    // Sail is 50% longer than the original (clothH = 1.5 × sailH) — the
    // sail hangs from the unchanged yard arm and extends further down
    // toward the deck.
    //
    // Ship scale varies by piece type: king largest (flagship), queen
    // a step down, bishop/knight/rook/pawn smaller still.
    //
    // sailPlane is the constellation mesh built by the helper. Its
    // userData.pieceLetter tells us which piece type this ship represents.
    function buildShip(sailPlane, shipPos) {
        const ship = new THREE.Group();
        ship.position.copy(shipPos);
        ship.userData.attachToWorld = true;

        const sailW_base = sailPlane.userData.planeW;
        const sailH_base = sailW_base * (384 / 256);

        // ---- PIECE-DRIVEN SHIP SCALE ----
        // King flagship is 1.0×. Queen is 0.88×. Bishops/knights smaller.
        // Rooks are workhorse military hulls — medium. Pawns wouldn't
        // normally appear here (only back-rank pieces) but the scale is
        // defined for completeness.
        const pieceLetter = sailPlane.userData.pieceLetter || 'r';
        const SHIP_SCALES = { k: 1.00, q: 0.88, r: 0.62, b: 0.72, n: 0.68, p: 0.45 };
        const shipScale = SHIP_SCALES[pieceLetter] || 0.7;

        const sailW = sailW_base * shipScale;
        const sailH = sailH_base * shipScale;

        // Map the constellation row to a piece color. North row (z>0) =
        // White's side; south = Black's side.
        const isWhite = (sailPlane.userData.row === 'north');

        // ============ MATERIALS (in addition to the shared module-level ones) ============
        const stateroomMat = new THREE.MeshStandardMaterial({
            color: 0x4a3a2a,             // slightly lighter than hull
            roughness: 0.85,
            metalness: 0.04,
            fog: false
        });
        const deckMat = new THREE.MeshStandardMaterial({
            color: 0x5a4030,             // planked deck
            roughness: 0.82,
            metalness: 0.04,
            fog: false
        });
        const windowMat = new THREE.MeshStandardMaterial({
            color: 0x1a1208,             // dark recessed window
            roughness: 0.95,
            metalness: 0.0,
            fog: false
        });
        const lanternFrameMat = goldTrimMat;
        const lanternPaneMat = new THREE.MeshBasicMaterial({
            color: 0xfce8a0,             // lit lantern pane (warm yellow)
            transparent: true,
            opacity: 0.95,
            fog: false
        });

        // ============ HULL ============
        // Caravel hull: tapered toward the keel — beam at the deck line is
        // wider than at the bottom, so the hull cross-section is a soft
        // V-shape (a trapezoid in port-stbd cross-section). Built as a
        // custom BufferGeometry with 8 vertices forming a trapezoidal
        // prism: 4 corners of the top deck rectangle (wider in Z), 4
        // corners of the narrower keel rectangle (narrower in Z, and
        // slightly shorter in X for a subtle bow/stern entry).
        function makeTaperedHullGeo(length, beamTop, beamBot, height, lengthBot) {
            // length: X-axis length at the top (deck line)
            // beamTop: Z-axis width at the top
            // beamBot: Z-axis width at the bottom (narrower → V-hull)
            // height: Y-axis height
            // lengthBot: X-axis length at the bottom (slightly shorter →
            //            keel doesn't run the full hull length, evokes
            //            tapered bow/stern entry)
            const halfL  = length / 2;
            const halfLb = lengthBot / 2;
            const halfBt = beamTop / 2;
            const halfBb = beamBot / 2;
            // Vertices, indexed:
            //   top corners:    0:(-L,+H,-Bt) 1:(+L,+H,-Bt) 2:(+L,+H,+Bt) 3:(-L,+H,+Bt)
            //   bottom corners: 4:(-Lb,-H,-Bb) 5:(+Lb,-H,-Bb) 6:(+Lb,-H,+Bb) 7:(-Lb,-H,+Bb)
            // (Using +H = top so the hull base sits at -H; we'll offset
            // the mesh's Y so the deck line ends up at HULL_H in the
            // ship's local frame.)
            const verts = new Float32Array([
                // top deck (4)
                -halfL,   height,  -halfBt,    // 0
                 halfL,   height,  -halfBt,    // 1
                 halfL,   height,   halfBt,    // 2
                -halfL,   height,   halfBt,    // 3
                // bottom keel line (4) — narrower beam, shorter X
                -halfLb,  0,       -halfBb,    // 4
                 halfLb,  0,       -halfBb,    // 5
                 halfLb,  0,        halfBb,    // 6
                -halfLb,  0,        halfBb     // 7
            ]);
            // 12 triangles (2 per face × 6 faces). Wind CCW from outside.
            const indices = new Uint16Array([
                // top face (y=+H, normal +Y) — wind CCW seen from above
                0, 2, 1,   0, 3, 2,
                // bottom face (y=0, normal -Y) — wind CCW seen from below
                4, 5, 6,   4, 6, 7,
                // port side (z<0) — vertices 0,1,5,4
                0, 1, 5,   0, 5, 4,
                // starboard side (z>0) — vertices 3,7,6,2
                3, 7, 6,   3, 6, 2,
                // bow face (x<0) — vertices 0,4,7,3
                0, 4, 7,   0, 7, 3,
                // stern face (x>0) — vertices 1,2,6,5
                1, 2, 6,   1, 6, 5
            ]);
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
            geo.setIndex(new THREE.BufferAttribute(indices, 1));
            geo.computeVertexNormals();
            return geo;
        }

        const HULL_L  = sailW * 2.0;
        const HULL_W  = sailW * 0.8;
        const HULL_H  = sailH * 0.32;

        // Main hull body — top beam = HULL_W, bottom beam = 50% (V-hull)
        // and bottom length = 88% (subtle taper to bow/stern).
        const hullGeo = makeTaperedHullGeo(HULL_L, HULL_W, HULL_W * 0.50, HULL_H, HULL_L * 0.88);
        const hull = new THREE.Mesh(hullGeo, hullMat);
        // makeTaperedHullGeo places vertices from y=0 (bottom) to y=HULL_H
        // (top). The hull sits with its base at y=0 (waterline).
        ship.add(hull);

        // Bow taper: a smaller tapered prism ahead of the main hull.
        const bowL = HULL_L * 0.22;
        const bowH = HULL_H * 0.85;
        const bowGeo = makeTaperedHullGeo(bowL, HULL_W * 0.5, HULL_W * 0.20, bowH, bowL * 0.70);
        const bow = new THREE.Mesh(bowGeo, hullMat);
        bow.position.set(-(HULL_L / 2 + bowL / 2 - 0.6 * shipScale), 0, 0);
        ship.add(bow);

        // Bow tip: pointed forward (a small narrow tapered tip)
        const bowTipL = bowL * 0.4;
        const bowTipH = HULL_H * 0.55;
        const bowTipGeo = makeTaperedHullGeo(bowTipL, HULL_W * 0.18, HULL_W * 0.06, bowTipH, bowTipL * 0.55);
        const bowTip = new THREE.Mesh(bowTipGeo, hullDarkMat);
        bowTip.position.set(bow.position.x - bowL * 0.55, 0, 0);
        ship.add(bowTip);

        // Stern body — wider transom at top, narrower at the keel.
        const sternL = HULL_L * 0.20;
        const sternH = HULL_H * 1.0;
        const sternGeo = makeTaperedHullGeo(sternL, HULL_W * 0.92, HULL_W * 0.55, sternH, sternL * 0.85);
        const stern = new THREE.Mesh(sternGeo, hullMat);
        stern.position.set(HULL_L / 2 + sternL / 2 - 0.4 * shipScale, 0, 0);
        ship.add(stern);

        // ============ GOLD PIECE-PLAQUE on the bow face ============
        const plaqueGeo = new THREE.PlaneGeometry(sailW * 0.42, sailW * 0.22);
        // Use a canvas with the piece glyph painted on
        const plaqueCanvas = document.createElement('canvas');
        plaqueCanvas.width = 128; plaqueCanvas.height = 64;
        const pCtx = plaqueCanvas.getContext('2d');
        pCtx.fillStyle = '#b8932c';
        pCtx.fillRect(0, 0, 128, 64);
        pCtx.strokeStyle = '#7a5a18';
        pCtx.lineWidth = 3;
        pCtx.strokeRect(2, 2, 124, 60);
        pCtx.fillStyle = '#3a2a08';
        pCtx.font = '500 44px serif';
        pCtx.textAlign = 'center';
        pCtx.textBaseline = 'middle';
        const glyphMap = { k: '♚', q: '♛', r: '♜', b: '♝', n: '♞', p: '♟' };
        pCtx.fillText(glyphMap[pieceLetter] || '♛', 64, 36);
        const plaqueTex = new THREE.CanvasTexture(plaqueCanvas);
        plaqueTex.minFilter = THREE.LinearFilter;
        plaqueTex.magFilter = THREE.LinearFilter;
        const plaqueMat = new THREE.MeshStandardMaterial({
            map: plaqueTex,
            roughness: 0.5,
            metalness: 0.4,
            fog: false
        });
        const plaque = new THREE.Mesh(plaqueGeo, plaqueMat);
        // Mount on the bow's port-facing side? No — on the FRONT face of
        // the bow tip, facing -X (toward the bow direction). The viewer
        // sees the plaque head-on when looking at the ship's bow.
        plaque.rotation.y = -Math.PI / 2;
        plaque.position.set(bowTip.position.x - bowL * 0.21, HULL_H * 0.5, 0);
        ship.add(plaque);

        // ============ DECK ============
        // Flat plank surface sitting on top of the hull.
        const deckGeo = new THREE.BoxGeometry(HULL_L * 0.95, HULL_H * 0.10, HULL_W * 0.94);
        const deck = new THREE.Mesh(deckGeo, deckMat);
        deck.position.y = HULL_H + HULL_H * 0.05;
        ship.add(deck);

        // ============ RAILING ============
        // Top rail (thin box running port-to-starboard along the deck edges).
        const railH = HULL_H * 0.30;
        const railR = sailW * 0.012;
        // Port + starboard rails (run along the bow-stern X axis)
        for (const zSign of [-1, +1]) {
            const railGeo = new THREE.BoxGeometry(HULL_L * 0.92, railR * 0.6, railR * 1.2);
            const rail = new THREE.Mesh(railGeo, mastMat);
            rail.position.set(0, HULL_H + railH, zSign * HULL_W * 0.46);
            ship.add(rail);
            // Balusters: small vertical posts under the rail
            const N_POSTS = Math.max(5, Math.round(11 * shipScale));
            for (let i = 0; i < N_POSTS; i++) {
                const t = (i + 0.5) / N_POSTS;
                const px = (t - 0.5) * HULL_L * 0.92;
                const postGeo = new THREE.BoxGeometry(railR * 1.4, railH, railR * 1.4);
                const post = new THREE.Mesh(postGeo, mastMat);
                post.position.set(px, HULL_H + railH / 2, zSign * HULL_W * 0.46);
                ship.add(post);
            }
        }

        // ============ LOWERED STATEROOM (sterncastle) ============
        // A low cabin sitting at the back of the deck. Width along the
        // beam (Z), depth along the hull (X) — relatively short, only
        // about 26% of the hull's height.
        const stateroomDepth = HULL_L * 0.28;
        const stateroomH = HULL_H * 0.85;
        const stateroomW = HULL_W * 0.78;
        const stateroomGeo = new THREE.BoxGeometry(stateroomDepth, stateroomH, stateroomW);
        const stateroom = new THREE.Mesh(stateroomGeo, stateroomMat);
        const stateroomX = HULL_L / 2 - stateroomDepth / 2 + sailW * 0.02;
        const stateroomY = HULL_H + HULL_H * 0.10 + stateroomH / 2;
        stateroom.position.set(stateroomX, stateroomY, 0);
        ship.add(stateroom);

        // ---- Gold trim band along the top edge of the stateroom ----
        const trimGeo = new THREE.BoxGeometry(stateroomDepth * 1.03, stateroomH * 0.08, stateroomW * 1.04);
        const trim = new THREE.Mesh(trimGeo, goldTrimMat);
        trim.position.set(stateroomX, stateroomY + stateroomH * 0.41, 0);
        ship.add(trim);

        // ---- Arched windows on both sides of the stateroom (port + starboard) ----
        // Only show windows on king (k) and queen (q) — keeps smaller
        // pieces simpler. Bishop/knight/rook get just the gold-trim band.
        if (pieceLetter === 'k' || pieceLetter === 'q') {
            const N_WINDOWS = pieceLetter === 'k' ? 4 : 3;
            const winH = stateroomH * 0.42;
            const winW = stateroomDepth * 0.18;
            for (let i = 0; i < N_WINDOWS; i++) {
                for (const zSign of [-1, +1]) {
                    const t = (i + 0.5) / N_WINDOWS;
                    const wx = stateroomX + (t - 0.5) * stateroomDepth * 0.85;
                    const winGeo = new THREE.BoxGeometry(winW, winH, 0.04 * shipScale);
                    const win = new THREE.Mesh(winGeo, windowMat);
                    win.position.set(wx, stateroomY - stateroomH * 0.10, zSign * (stateroomW / 2 + 0.02));
                    ship.add(win);
                }
            }
        }

        // ---- Corner lanterns at the upper aft corners of the stateroom ----
        if (pieceLetter === 'k' || pieceLetter === 'q') {
            const lanternSize = sailW * 0.10;
            const lanternPaneSize = lanternSize * 0.60;
            for (const zSign of [-1, +1]) {
                // Lantern frame (gold brass)
                const lframeGeo = new THREE.BoxGeometry(lanternSize, lanternSize * 1.1, lanternSize);
                const lframe = new THREE.Mesh(lframeGeo, lanternFrameMat);
                const lx = stateroomX + stateroomDepth * 0.42;
                const ly = stateroomY + stateroomH * 0.52 + lanternSize * 0.55;
                const lz = zSign * (stateroomW * 0.5 + lanternSize * 0.55);
                lframe.position.set(lx, ly, lz);
                ship.add(lframe);
                // Lit pane (warm yellow plane on the outward face)
                const lpaneGeo = new THREE.PlaneGeometry(lanternPaneSize, lanternPaneSize * 0.75);
                const lpane = new THREE.Mesh(lpaneGeo, lanternPaneMat);
                lpane.position.set(lx, ly, lz + zSign * lanternSize * 0.51);
                lpane.rotation.y = zSign > 0 ? 0 : Math.PI;
                ship.add(lpane);
            }
        }

        // ============ BOWSPRIT ============
        const bowspritLen = HULL_L * 0.30;
        const bowspritR = sailW * 0.022;
        const bowspritGeo = new THREE.CylinderGeometry(bowspritR * 0.8, bowspritR, bowspritLen, 8);
        const bowsprit = new THREE.Mesh(bowspritGeo, mastMat);
        bowsprit.rotation.z = Math.PI / 2 + (12 * Math.PI / 180);
        bowsprit.position.set(
            bowTip.position.x - bowspritLen * 0.42 * Math.cos(12 * Math.PI / 180),
            HULL_H + bowspritLen * 0.42 * Math.sin(12 * Math.PI / 180),
            0
        );
        ship.add(bowsprit);

        // ============ MAST ============
        // Same total mast height as before (sailH * 1.6) — UNCHANGED.
        const mastH = sailH * 1.6;
        const mastR = sailW * 0.04;
        const mastGeo = new THREE.CylinderGeometry(mastR * 0.85, mastR, mastH, 12);
        const mast = new THREE.Mesh(mastGeo, mastMat);
        const mastX = sailW * 0.06;
        // Base of mast = top of deck (HULL_H + deck top), so center at
        // (HULL_H + dt + mastH/2). Use HULL_H * 1.10 = deck top.
        const deckTop = HULL_H * 1.10;
        mast.position.set(mastX, deckTop + mastH / 2, 0);
        ship.add(mast);

        // ---- Small masthead cap (replaces the removed pennant) ----
        const capGeo = new THREE.SphereGeometry(mastR * 1.4, 8, 6);
        const cap = new THREE.Mesh(capGeo, mastMat);
        cap.position.set(mastX, deckTop + mastH, 0);
        ship.add(cap);

        // ============ YARD ARM ============
        // UNCHANGED position relative to mast — sail hangs from here.
        const yardLen = sailW * 1.25;
        const yardR = mastR * 0.85;
        const yardGeo = new THREE.CylinderGeometry(yardR, yardR, yardLen, 8);
        const yard = new THREE.Mesh(yardGeo, mastMat);
        yard.rotation.x = Math.PI / 2;
        const yardY = deckTop + mastH - sailH * 0.10;
        const sailX = mastX - sailW * 0.06;
        yard.position.set(sailX, yardY, 0);
        ship.add(yard);

        // ============ SAIL CLOTH ============
        // Sail height = sailH * 1.125 (was sailH * 1.5; reduced 25%). Top
        // edge stays at the yard (yardY), bottom hangs proportionally less
        // far down. Cloth is slightly wider than the constellation device.
        // Subdivided (12×8 segments) so the vertices can be displaced in
        // a sine-wave ripple by updateV11Ships() each frame.
        const clothW = sailW * 1.15;
        const clothH = sailH * 1.125;
        const cloth = new THREE.Mesh(
            new THREE.PlaneGeometry(clothW, clothH, 12, 8),
            new THREE.MeshStandardMaterial({
                color: 0x14213a,
                roughness: 0.95,
                metalness: 0.02,
                side: THREE.DoubleSide,
                fog: false
            })
        );
        cloth.rotation.y = -Math.PI / 2;
        cloth.position.set(sailX, yardY - clothH / 2, 0);
        ship.add(cloth);

        // ============ CONSTELLATION PLANE ============
        // The constellation device — scale up to roughly fill the taller
        // sail. The original plane is sailH_base tall; scale it by the
        // same ship-scale plus a small boost to make it more prominent.
        //
        // Replace the constellation plane's geometry with a subdivided
        // version so it ripples in sync with the cloth (otherwise the
        // constellation would appear pasted flat on a billowing sail).
        if (sailPlane.parent) sailPlane.parent.remove(sailPlane);
        const oldGeo = sailPlane.geometry;
        const oldPlaneW = oldGeo.parameters.width;
        const oldPlaneH = oldGeo.parameters.height;
        sailPlane.geometry = new THREE.PlaneGeometry(oldPlaneW, oldPlaneH, 12, 8);
        oldGeo.dispose();
        sailPlane.rotation.y = -Math.PI / 2;
        sailPlane.scale.setScalar(shipScale * 1.15);
        // Center vertically on the elongated sail: sail spans yardY down
        // to yardY - clothH; midpoint = yardY - clothH/2.
        sailPlane.position.set(sailX - 0.05, yardY - clothH / 2, 0);
        ship.add(sailPlane);

        // Stash sail refs on the ship's userData so updateV11Ships can
        // ripple them every frame. We store the ORIGINAL flat positions
        // (cloned) so each frame's ripple can be applied as an offset
        // from the rest pose, not accumulated.
        ship.userData.sailMeshes = [
            { mesh: cloth,     restPos: cloth.geometry.attributes.position.array.slice() },
            { mesh: sailPlane, restPos: sailPlane.geometry.attributes.position.array.slice() }
        ];

        // ============ CHESS PIECE STANDING ON THE DECK ============
        // The actual chess piece geometry/material — same cylinder + logo
        // material as the central board. Stands UPRIGHT in front of the
        // stateroom so the figure reads as a passenger / monarch on the
        // ship's deck. Scaled to about 70% of the stateroom's height so
        // it's clearly visible without dwarfing the stateroom.
        const pieceGeo = (typeof chessGeometries !== 'undefined') ? chessGeometries[pieceLetter] : null;
        if (pieceGeo) {
            const pieceMat = (typeof getPieceMaterial === 'function')
                ? getPieceMaterial({ type: pieceLetter, color: isWhite ? 'w' : 'b' })
                : new THREE.MeshStandardMaterial({ color: isWhite ? 0xeeeeee : 0x222222 });
            const piece = new THREE.Mesh(pieceGeo, pieceMat);
            // Native piece height is the cylinder height; scale up so the
            // piece reads at roughly stateroom-height across all ship
            // sizes (the king ship gets a big king, the rook ship a
            // proportionally smaller rook). The piece's own type affects
            // its native height (king=1.2 vs rook=0.6), so different
            // pieces naturally tower differently on their decks — like a
            // real chess set.
            const pieceNativeH = pieceGeo.parameters.height || 1.0;
            // Target ON-deck height ≈ 1.3× stateroom height for the king
            // (so he looms slightly above the cabin), scaling down with
            // ship scale so the queen, bishop, etc. don't dwarf the king.
            const targetDeckPieceH = stateroomH * 1.4;
            const pieceShipScale = targetDeckPieceH / pieceNativeH;
            piece.scale.setScalar(pieceShipScale);
            // Position: in front of the stateroom (toward bow, -X), on top
            // of the deck. Deck top is at deckTop (= HULL_H * 1.10). The
            // piece's geometry is centered on its own y-axis (cylinder
            // origin at center), so we shift up by half the scaled height.
            const pieceHalfH = pieceNativeH * pieceShipScale / 2;
            const pieceX = stateroomX - stateroomDepth / 2 - sailW * 0.12;
            piece.position.set(pieceX, deckTop + pieceHalfH, 0);
            // Tag the standing piece so the altar-on-deck feature can hide
            // it when the chessboard is conjured onto the deck.
            piece.userData.isShipDeckStandingPiece = true;
            ship.add(piece);
        }

        // ============ DECK ALTAR BOARD (king ships only) ============
        // Build a hidden 8×8 chessboard on the deck. When the user clicks
        // "Move match to flagship," this board appears and acts as the
        // active altar (same system V5's temples and V10's colosseum
        // use). Hidden by default.
        if (pieceLetter === 'k') {
            const altarBoard = new THREE.Group();
            // tileSize: pick so the 8×8 board fits in front of the
            // stateroom on the deck. Deck length is ~HULL_L * 0.95, but
            // we leave room for the stateroom (back) and the standing
            // piece (front), so the playable area is ~HULL_L * 0.55.
            // 8 tiles need to fit that — so tileSize = HULL_L * 0.07.
            // (The center of the board sits between the standing piece
            // and the stateroom.)
            const tileSize = HULL_L * 0.075;
            altarBoard.userData.isAltarBoard = true;
            altarBoard.userData.isShipDeckBoard = true;
            altarBoard.userData.tileSize = tileSize;
            // Place the board on top of the deck, slightly forward of the
            // stateroom, centered on the hull axis.
            const boardCenterX = stateroomX - stateroomDepth / 2 - tileSize * 4.2;
            altarBoard.position.set(boardCenterX, deckTop + 0.04, 0);
            // Build 64 tiles (alternating light/dark like a real board).
            const tileH = 0.04;
            const tileGeo = new THREE.BoxGeometry(tileSize * 0.95, tileH, tileSize * 0.95);
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const isLight = ((row + col) % 2) === 0;
                    const tileMat = new THREE.MeshStandardMaterial({
                        color: isLight ? 0xe8d4a0 : 0x4a3520,
                        roughness: 0.6,
                        metalness: 0.0,
                        fog: false
                    });
                    const tile = new THREE.Mesh(tileGeo, tileMat);
                    tile.position.set(
                        (col - 3.5) * tileSize,
                        tileH / 2,
                        (row - 3.5) * tileSize
                    );
                    // The existing tagAltarPiecesForClick() walks the
                    // tiles and reads their local-X/Z to infer the
                    // square. As long as positions are at (col-3.5)*ts,
                    // (row-3.5)*ts, the tagging just works.
                    altarBoard.add(tile);
                }
            }
            // Gold trim frame around the board (a flat ring of 4 boxes)
            const trimT = tileSize * 0.06;
            const boardW = tileSize * 8;
            const frameY = tileH / 2;
            const frameMat = new THREE.MeshStandardMaterial({
                color: 0xb8932c, roughness: 0.45, metalness: 0.7, fog: false
            });
            for (const fSign of [-1, +1]) {
                // long frame strips along X (one at -Z, one at +Z)
                const stripX = new THREE.Mesh(
                    new THREE.BoxGeometry(boardW + trimT * 2, tileH * 0.95, trimT),
                    frameMat
                );
                stripX.position.set(0, frameY, fSign * (boardW / 2 + trimT / 2));
                altarBoard.add(stripX);
                // long frame strips along Z (one at -X, one at +X)
                const stripZ = new THREE.Mesh(
                    new THREE.BoxGeometry(trimT, tileH * 0.95, boardW),
                    frameMat
                );
                stripZ.position.set(fSign * (boardW / 2 + trimT / 2), frameY, 0);
                altarBoard.add(stripZ);
            }
            // Hidden until "Move match to flagship" is clicked.
            altarBoard.visible = false;
            ship.add(altarBoard);
            ship.userData.shipDeckBoard = altarBoard;
        }

        // Tag this ship for click-to-approach camera detection. The
        // click handler raycasts against ship children and walks up to
        // find the group with this flag.
        ship.userData.isV11Ship = true;
        ship.userData.shipScaleFactor = shipScale;
        ship.userData.pieceLetter = pieceLetter;
        ship.userData.shipColor = isWhite ? 'w' : 'b';

        // ---- Sway state ----
        // Each ship sways at its own rhythm so the fleet doesn't move
        // in unison. We stash the rest position/rotation and per-ship
        // phase offsets (deterministic from a hash of position so the
        // values are stable across rebuilds).
        const hashSeed = (shipPos.x * 137.21 + shipPos.z * 89.13) | 0;
        const phaseFor = (i) => ((Math.sin(hashSeed + i * 7.31) + 1) * Math.PI);
        ship.userData.swayRestY = ship.position.y;
        ship.userData.swayRestPitch = ship.rotation.x;
        ship.userData.swayRestRoll  = ship.rotation.z;
        ship.userData.swayPhases = {
            pitch: phaseFor(1),
            roll:  phaseFor(2),
            heave: phaseFor(3),
            sail:  phaseFor(4)
        };
        // Slightly different periods per ship so they drift apart over time.
        // Base periods in ms, with a small per-ship jitter from the hash.
        const periodJitter = ((hashSeed % 41) / 41) * 0.4 - 0.2;     // -0.2 .. +0.2
        ship.userData.swayPeriods = {
            pitch: 4200 + periodJitter * 800,
            roll:  3300 + periodJitter * 600,
            heave: 5100 + periodJitter * 700,
            sail:  1800 + periodJitter * 400
        };

        return ship;
    }

    // Lay out 8 ships per side in a gentle arc, sea-level (y≈0). Sails
    // face the camera/board (perpendicular to Z), which is already the
    // helper's default orientation.
    const out_ships = [];
    const out_waters = [];

    function buildFleet(rowName, baseZ, mirrorOrder) {
        // Filter constellation meshes for this row (south = -Z, north = +Z)
        const rowMeshes = v11ConstellationMeshes.filter(m => m.userData.row === rowName);
        // Sort by slot 0..7 so the fleet reads left→right as r,n,b,q,k,b,n,r
        rowMeshes.sort((a, b) => a.userData.slot - b.userData.slot);

        // Arc placement: 8 ships across an X span of ~80.
        const FLEET_X_SPAN = 80;
        const FLEET_Z_DEPTH = 30;     // how far in Z the arc extends

        // Ship YAW: each ship's bow (local -X) should point toward the
        // VIEWER of this fleet. Default-camera viewer of -Z fleet is at
        // +Z (looking toward -Z), so bow → +Z → yaw +90° (-X local
        // becomes +Z world). Viewer of +Z fleet (after the user has
        // orbited 180°) is at -Z direction, so bow → -Z → yaw -90°.
        const shipYaw = baseZ > 0 ? -Math.PI / 2 : Math.PI / 2;

        for (let i = 0; i < rowMeshes.length; i++) {
            const m = rowMeshes[i];
            const t = i / 7;                          // 0..1 across the row
            const xRaw = (t - 0.5) * FLEET_X_SPAN;
            const arcZ = (1 - 4 * (t - 0.5) * (t - 0.5)) * FLEET_Z_DEPTH;
            const x = mirrorOrder ? -xRaw : xRaw;
            const z = baseZ + (baseZ > 0 ? -arcZ : arcZ);
            const ship = buildShip(m, new THREE.Vector3(x, 0, z));
            ship.rotation.y = shipYaw;
            // Refresh shatter-origin cache to the ship's world position.
            // The sail is at ship-local (sailX, yardY-sailH/2, 0); after
            // yaw the local X becomes a world Z direction. For shatter
            // purposes the rough center of the sail is fine — use the
            // ship's world position.
            m.userData.initialX = x;
            m.userData.initialY = m.position.y;       // sail's local Y (ship at y=0)
            m.userData.initialZ = z;
            out_ships.push(ship);

            // ---- PER-SHIP WATER ----
            // Small dark-water ellipse under each ship so each ship reads
            // as floating independently. Sized to the ship's footprint —
            // longer along the bow-stern axis than across the beam.
            const sailW = m.userData.planeW;
            const sailH = sailW * (384 / 256);
            const hullL = sailW * 2.0;
            const hullW = sailW * 0.7;
            // Build a slightly oversized ellipse via a flattened circle
            const puddleR = Math.max(hullL, hullW) * 0.85;
            const puddleGeo = new THREE.CircleGeometry(puddleR, 32);
            const puddle = new THREE.Mesh(puddleGeo, waterMat);
            puddle.rotation.x = -Math.PI / 2;
            // Scale to ellipse: longer along the ship's hull axis (bow→stern)
            // After the ship's yaw, the hull axis aligns with world Z.
            // The puddle is a separate object (not parented to ship) so we
            // scale its X/Z axes to match.
            puddle.scale.set(hullW * 0.6 / puddleR, 1, hullL * 0.6 / puddleR);
            puddle.position.set(x, -0.05, z);
