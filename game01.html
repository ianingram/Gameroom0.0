            puddle.userData.attachToWorld = true;
            out_waters.push(puddle);
        }
    }

    buildFleet('south', -150, true);    // behind Black
    buildFleet('north', +150, false);   // behind White

    // ============ V11 MIRROR GROUND ============
    // A large reflective disc beneath the chessboard, extending out into
    // the ground plane the fleet floats on. Uses three.js Reflector — a
    // real per-frame mirror render — so the chessboard, pieces, and
    // ships all appear reflected. Tinted from the active palette so the
    // mirror reads as moonlit-water at night or soft-warm-gray in day.
    const MIRROR_RADIUS_V11 = 600;
    const mirrorGeoV11 = new THREE.CircleGeometry(MIRROR_RADIUS_V11, 128);
    const mirrorV11 = new Reflector(mirrorGeoV11, {
        textureWidth:  Math.min(window.innerWidth, 1600)  * window.devicePixelRatio,
        textureHeight: Math.min(window.innerHeight, 1200) * window.devicePixelRatio,
        color:         initialPalette.mirrorColor,
        clipBias:      0.003
    });
    mirrorV11.rotation.x = -Math.PI / 2;
    mirrorV11.position.y = -0.5;
    mirrorV11.renderOrder = -3;
    mirrorV11.userData.attachToWorld = true;

    // Stash refs so applyV11DayNight can mutate the palette at runtime.
    _v11State = {
        whitePlanetCV, blackPlanetCV,
        paintPlanetCanvas,
        mirror: mirrorV11,
        waterMat,
        palettes: V11_PALETTES
    };

    return [
        whitePlanetSprite,
        blackPlanetSprite,
        mirrorV11,
        ...out_waters,
        ...out_ships
    ];
}

// Apply a V11 day/night palette at runtime. Mutates the existing
// planet sprite canvases, mirror tint, water-puddle tint, and (if V11
// is the active view) the scene background. Mirrors applyV2DayNight's
// pattern.
function applyV11DayNight(mode) {
    v11DayNight = mode;
    if (!_v11State) return;
    const pal = _v11State.palettes[mode];
    if (!pal) return;
    // Repaint the planet sprites
    _v11State.paintPlanetCanvas(_v11State.whitePlanetCV.ctx, pal.whitePlanet[0], pal.whitePlanet[1]);
    _v11State.paintPlanetCanvas(_v11State.blackPlanetCV.ctx, pal.blackPlanet[0], pal.blackPlanet[1]);
    _v11State.whitePlanetCV.tex.needsUpdate = true;
    _v11State.blackPlanetCV.tex.needsUpdate = true;
    // Update mirror tint
    if (_v11State.mirror && _v11State.mirror.material && _v11State.mirror.material.uniforms) {
        _v11State.mirror.material.uniforms.color.value.set(pal.mirrorColor);
    }
    // Update shared water material — all per-ship puddles share this one
    // material, so a single color change updates them all.
    if (_v11State.waterMat) {
        _v11State.waterMat.color.set(pal.waterColor);
    }
    // If V11 is currently active, also swap the scene background and
    // flip the body class so HUD text contrast matches.
    if (typeof currentViewId !== 'undefined' && currentViewId === 11) {
        if (scene.background && scene.background.set) {
            scene.background.set(pal.bg);
        }
        document.body.classList.toggle('view-light', mode === 'day');
    }
    // Refresh wireframe line colors — V11 day = light bg → dark lines.
    if (typeof refreshWireframeLineColors === 'function') {
        refreshWireframeLineColors();
    }
}

function buildPyramidProps() {
    // Two imposing pyramids in the distance — one behind White's side of the
    // board (positive Z) and one behind Black's side (negative Z). The body
    // color matches the side it stands behind: white pyramid for White, black
    // pyramid for Black. Both share an identical gold capstone, like the
    // gilded pyramidion seen on real ancient pyramids.
    //
    // Plus a sky dome wrapping the whole scene with a DIRECTIONAL gradient:
    // looking toward the white pyramid (+Z) the horizon is dark and the
    // zenith is light; looking toward the black pyramid (-Z) the horizon is
    // light and the zenith is dark. Sides blend smoothly between the two.
    // The dome is a large inward-facing sphere; the sky is visible no matter
    // which direction the camera turns.
    const PYR_BASE_RADIUS = 22;  // half of the side length, base footprint
    const PYR_HEIGHT = 20;
    const CAP_BASE = 2.8;        // capstone base half-width
    const CAP_HEIGHT = 2.4;      // capstone height

    // --- Sky dome ---
    // We paint a gradient texture and wrap it onto the inside surface of a
    // large sphere. The sphere's BackSide rendering makes the texture visible
    // from inside (the camera's position).
    //
    // The texture has BOTH a vertical gradient AND a horizontal variation,
    // so the sky looks different depending on which way the camera faces:
    //
    //   Behind the WHITE pyramid (+Z direction):
    //     horizon = DARK, zenith = LIGHT
    //
    //   Behind the BLACK pyramid (-Z direction):
    //     horizon = LIGHT, zenith = DARK
    //
    //   Sides (±X directions): smoothly blend between the two.
    //
    // This gives the scene a sense of dawn-vs-dusk asymmetry — one horizon
    // glows, the other holds the deep night sky overhead, and rotating the
    // camera reveals the transition.
    // Sky-canvas state. We keep the canvas + texture references at this
    // scope so they can be repainted later (the lightLevel slider triggers
    // a repaint to intensify or wash out the directional gradient).
    let _skyCanvas = null;
    let _skyTexture = null;

    // Paint the sky canvas with the current directional gradient.
    // `intensity` scales the contrast: 0 = flat mid-gray, 1 = authored
    // colors, >1 pushes colors further from mid-gray (more dramatic).
    // Each pixel is lerped between gray (128,128,128) and its authored
    // color by `intensity`.
    function paintSkyCanvas(intensity) {
        const c = _skyCanvas;
        if (!c) return;
        const W = c.width, H = c.height;
        const ctx = c.getContext('2d');
        const imgData = ctx.createImageData(W, H);
        const data = imgData.data;

        function lerpColor(a, b, t) {
            const ar = (a >> 16) & 0xff, ag = (a >> 8) & 0xff, ab = a & 0xff;
            const br = (b >> 16) & 0xff, bg = (b >> 8) & 0xff, bb = b & 0xff;
            return [
                Math.round(ar + (br - ar) * t),
                Math.round(ag + (bg - ag) * t),
                Math.round(ab + (bb - ab) * t)
            ];
        }

        function gradientAt(stops, v) {
            for (let i = 0; i < stops.length - 1; i++) {
                const s0 = stops[i], s1 = stops[i + 1];
                if (v >= s0.pos && v <= s1.pos) {
                    const span = s1.pos - s0.pos;
                    const localT = span === 0 ? 0 : (v - s0.pos) / span;
                    return lerpColor(s0.color, s1.color, localT);
                }
            }
            if (v < stops[0].pos) {
                const cc = stops[0].color;
                return [(cc >> 16) & 0xff, (cc >> 8) & 0xff, cc & 0xff];
            }
            const cc = stops[stops.length - 1].color;
            return [(cc >> 16) & 0xff, (cc >> 8) & 0xff, cc & 0xff];
        }

        const whiteSideStops = [
            { pos: 0.00, color: 0xd0d8e0 },
            { pos: 0.30, color: 0x90a0b0 },
            { pos: 0.60, color: 0x3a4050 },
            { pos: 0.85, color: 0x101218 },
            { pos: 1.00, color: 0x050608 }
        ];
        const blackSideStops = [
            { pos: 0.00, color: 0x080608 },
            { pos: 0.35, color: 0x1a1418 },
            { pos: 0.65, color: 0x5a3a28 },
            { pos: 0.85, color: 0xd8b888 },
            { pos: 1.00, color: 0xf0d8a8 }
        ];

        // intensity is a straight brightness multiplier:
        //   final = authored * intensity
        // intensity = 1 → exact authored colors; <1 darkens toward BLACK;
        // >1 brightens (clamped to white at 255).
        // The previous "push from gray" model brightened the dark white-
        // pyramid sky when slider was low — the wrong direction. This
        // multiply model reads more naturally as a stage dimmer.
        function applyIntensity(rgb, k) {
            return [
                Math.max(0, Math.min(255, Math.round(rgb[0] * k))),
                Math.max(0, Math.min(255, Math.round(rgb[1] * k))),
                Math.max(0, Math.min(255, Math.round(rgb[2] * k)))
            ];
        }

        for (let x = 0; x < W; x++) {
            const u = x / (W - 1);
            const phi = u * 2 * Math.PI;
            const zComp = Math.sin(phi);
            const linT = (zComp + 1) / 2;
            const t = linT * linT * (3 - 2 * linT);

            for (let y = 0; y < H; y++) {
                const v = y / (H - 1);
                const whiteRGB = gradientAt(whiteSideStops, v);
                const blackRGB = gradientAt(blackSideStops, v);
                const r = Math.round(blackRGB[0] + (whiteRGB[0] - blackRGB[0]) * t);
                const g = Math.round(blackRGB[1] + (whiteRGB[1] - blackRGB[1]) * t);
                const b = Math.round(blackRGB[2] + (whiteRGB[2] - blackRGB[2]) * t);
                const adj = applyIntensity([r, g, b], intensity);
                const idx = (y * W + x) * 4;
                data[idx]     = adj[0];
                data[idx + 1] = adj[1];
                data[idx + 2] = adj[2];
                data[idx + 3] = 255;
            }
        }
        ctx.putImageData(imgData, 0, 0);
        if (_skyTexture) _skyTexture.needsUpdate = true;
    }

    // Initial sky texture build. Stores canvas + texture refs so the
    // lightLevel slider can call paintSkyCanvas() to repaint later.
    function makeSkyTexture() {
        _skyCanvas = document.createElement('canvas');
        _skyCanvas.width = 256;
        _skyCanvas.height = 512;
        _skyTexture = new THREE.CanvasTexture(_skyCanvas);
        _skyTexture.minFilter = THREE.LinearFilter;
        _skyTexture.magFilter = THREE.LinearFilter;
        // Paint with authored intensity (1.0) initially.
        paintSkyCanvas(1.0);
        return _skyTexture;
    }


    const skyRadius = 480;  // large enough to contain V3's constellation rows at z=±260
    const skyGeo = new THREE.SphereGeometry(skyRadius, 32, 24);
    const skyMat = new THREE.MeshBasicMaterial({
        map: makeSkyTexture(),
        side: THREE.BackSide,   // visible from inside the sphere
        depthWrite: false       // sky doesn't occlude things in front of it
    });
    const skyDome = new THREE.Mesh(skyGeo, skyMat);
    skyDome.renderOrder = -1;   // draw before everything else

    // Expose paintSkyCanvas to module scope so the lightLevel slider can
    // repaint the directional gradient when the user moves the slider.
    _skyRepaint = paintSkyCanvas;
    // Apply the current slider value to the freshly-built sky (handles
    // the case where the slider was moved before View 3 was first opened).
    if (typeof lightLevel === 'number') {
        paintSkyCanvas(lightLevel / 10);
    }

    // Build one pyramid as a self-contained group. Body color is parameterized
    // so the two monuments can be tinted differently while sharing geometry.
    // The capstone stays gold in both cases.
    function buildOne(bodyColor) {
        const g = new THREE.Group();

        // Main pyramid body
        const stoneGeo = new THREE.ConeGeometry(PYR_BASE_RADIUS, PYR_HEIGHT, 4);
        const stoneMat = new THREE.MeshStandardMaterial({
            color: bodyColor,
            roughness: 0.95,
            metalness: 0.05
        });
        const stone = new THREE.Mesh(stoneGeo, stoneMat);
        stone.castShadow = true;
        stone.receiveShadow = true;
        stone.position.y = PYR_HEIGHT / 2;  // base sits at Y=0
        // Tag the WHITE pyramid body so applyLightLevel() can polish it as
        // the light dims. Detected by color: bodyColor 0xf0f0f0 is the
        // pale-stone white pyramid (vs 0x1a1a1a for the black one).
        // At full light = matte rough stone. At dim light = polished mirror.
        if (bodyColor === 0xf0f0f0) {
            stoneMat.userData.whitePyramidBody = true;
            stoneMat.userData.baseRoughness = 0.95;
            stoneMat.userData.baseMetalness = 0.05;
        }
        g.add(stone);

        // --- Ridge edges ---
        // Four thin gold "rails" running from each base corner straight up to the
        // apex. Without them, the four faces blend into one another under raking
        // light because adjacent face normals are similar near the ridge — you
        // can see the silhouette but not the inner geometry. Solid gold rails
        // make the four-sided structure read unambiguously from any angle.
        //
        // Geometry: each edge is a thin cylinder. Its length equals the slant
        // height of the pyramid (from a base corner to the apex). We position
        // each cylinder's midpoint at the midpoint of the corresponding edge,
        // then rotate it to point from the base corner up to the apex.
        //
        // ConeGeometry(radius=PYR_BASE_RADIUS, height=PYR_HEIGHT, 4 segments)
        // places the four base vertices at angles 0, 90°, 180°, 270° on the
        // circumscribing circle. With the stone mesh shifted up by PYR_HEIGHT/2,
        // the base of the pyramid sits on y=0 and the apex is at y=PYR_HEIGHT.
        const slantHeight = Math.sqrt(
            PYR_BASE_RADIUS * PYR_BASE_RADIUS + PYR_HEIGHT * PYR_HEIGHT
        );
        // Edge rail thickness — kept slim so the rails read as a precise highlight
        // line rather than a structural beam. At this scale (~20-tall pyramid),
        // 0.12 is roughly a 1-2 pixel band from the default camera distance.
        const RAIL_RADIUS = 0.12;
        const railGeo = new THREE.CylinderGeometry(RAIL_RADIUS, RAIL_RADIUS, slantHeight, 8);

        // Platinum-gold material for the ridge rails. Cooler and paler than the
        // warm yellow used on the capstone — a champagne / white-gold tone that
        // reads as more refined trim and contrasts subtly with the warmer apex
        // it leads up to. Slightly less mirror-polished than the capstone (a
        // touch more roughness) so the rails diffuse the spotlight a little
        // wider and stay visible across more viewing angles, instead of only
        // glinting at the precise specular sweet spot.
        const platinumGoldMaterial = new THREE.MeshStandardMaterial({
            color: 0xf5ead0,           // pale champagne / platinum-gold
            metalness: 1.0,
            roughness: 0.12,
            envMapIntensity: 4.0
        });
        const apex = new THREE.Vector3(0, PYR_HEIGHT, 0);

        for (let i = 0; i < 4; i++) {
            const angle = (i * Math.PI) / 2;  // 0, 90, 180, 270
            const cornerX = Math.cos(angle) * PYR_BASE_RADIUS;
            const cornerZ = Math.sin(angle) * PYR_BASE_RADIUS;
            const corner = new THREE.Vector3(cornerX, 0, cornerZ);

            // Midpoint of the edge — where the cylinder's center should sit.
            const mid = new THREE.Vector3()
                .addVectors(corner, apex)
                .multiplyScalar(0.5);

            // Direction the cylinder should point (from corner to apex).
            // Three.js cylinders are aligned to the Y axis by default, so we
            // use Quaternion.setFromUnitVectors to rotate from +Y to our direction.
            const dir = new THREE.Vector3()
                .subVectors(apex, corner)
                .normalize();
            const quat = new THREE.Quaternion()
                .setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);

            const rail = new THREE.Mesh(railGeo, platinumGoldMaterial);
            rail.position.copy(mid);
            rail.quaternion.copy(quat);
            rail.castShadow = true;
            g.add(rail);
        }

        // --- Pyramid-face "A" letters ---
        // Two large gold "A" glyphs, one mounted on the east face and one on the
        // west face. Each A is 10% of the pyramid height tall (so 2 units high
        // on a 20-tall pyramid) and sits flat against its face, splaying its
        // legs to match the natural slope of the pyramid face's triangle.
        //
        // GEOMETRY of one face (in local pyramid coords, before the group's
        // 45° rotation):
        //   East face corners (after the +45° group rotation): the local face
        //     with base from (r, 0, 0) to (0, 0, r) maps to world +X.
        //   West face: local base from (-r, 0, 0) to (0, 0, -r) maps to world -X.
        //
        // The half-angle of the face triangle at its apex tells us how to splay
        // the A's legs so they parallel the pyramid's ridges:
        //   triangleHeightInFace = sqrt((r/sqrt(2))^2 + H^2)
        //   half-base = r/sqrt(2)
        //   splayAngle = atan(half-base / triangleHeightInFace)
        //
        // We build the A flat on the XY plane (z=0) in its own local frame —
        // apex at the top, two legs splaying down. Then we place it on the
        // pyramid face by translating to the face base midpoint and rotating
        // so the A's local +Y aligns with the up-the-face direction and the
        // A's local +Z aligns with the face's outward normal.
        const A_HEIGHT = PYR_HEIGHT * 0.10;      // 10% of pyramid height
        const A_THICKNESS = 0.06;                // depth so it reads from grazing angles
        const A_STROKE = A_HEIGHT * 0.13;        // line thickness of the letter

        // Compute the A's leg splay so the legs PARALLEL the pyramid's ridges.
        // The pyramid face is an isosceles triangle whose base goes from one
        // corner to the next (length = PYR_BASE_RADIUS * sqrt(2)) and whose
        // height (in the plane of the face) goes from the base midpoint up
        // to the shared apex.
        //   In-face triangle height = sqrt((r/sqrt(2))^2 + H^2)
        //   In-face half-base       = r/sqrt(2)
        //   Apex half-angle         = atan(half-base / triangleHeight)
        // The A's legs splay at this same angle, so A_HALF_BASE = tan(angle) * A_HEIGHT.
        const halfBaseFace = PYR_BASE_RADIUS / Math.sqrt(2);
        const faceTriangleHeight = Math.sqrt(
            halfBaseFace * halfBaseFace + PYR_HEIGHT * PYR_HEIGHT
        );
        const faceHalfAngleAtApex = Math.atan(halfBaseFace / faceTriangleHeight);
        const A_HALF_BASE_AT_BOTTOM = Math.tan(faceHalfAngleAtApex) * A_HEIGHT;

        // Build the A shape on the X/Y plane: apex centered at (0, A_HEIGHT),
        // legs splaying down to ±A_HALF_BASE_AT_BOTTOM at y=0. Crossbar at
        // y = 0.4 * A_HEIGHT.
        //
        // We build the A from three separate thin extruded boxes:
        // Material for the A glyphs. The user wants:
        //   - On the WHITE pyramid: a BLACK A (high contrast against pale stone)
        //   - On the BLACK pyramid: the existing platinum-gold A
        // Pick once here so buildAGroup just consumes the chosen material.
        const aLetterMaterial = (bodyColor === 0xf0f0f0)
            ? new THREE.MeshStandardMaterial({
                color: 0x0a0a0a,           // near-black, with the smallest dab of life
                roughness: 0.45,
                metalness: 0.05
            })
            : platinumGoldMaterial;

        //   - left leg  (slanted from apex down-left to base)
        //   - right leg (slanted from apex down-right to base)
        //   - crossbar  (horizontal bar joining the two legs partway up)
        // This avoids the headaches of building a single Shape with curved
        // outlines and inset holes, and the result reads cleanly as an "A".
        //
        // All three boxes are extruded along +Z so they extend OUT from the
        // pyramid face when we attach the assembled A.
        function buildAGroup() {
            const grp = new THREE.Group();
            const stroke = A_STROKE;
            const halfBase = A_HALF_BASE_AT_BOTTOM;
            const apexY = A_HEIGHT;

            // Length of one leg: distance from apex (0, apexY) to base (halfBase, 0).
            const legLength = Math.sqrt(halfBase * halfBase + apexY * apexY);
            // Angle of the leg from vertical:
            const legAngle = Math.atan(halfBase / apexY);

            // --- Right leg ---
            // A thin rectangle of width=stroke, height=legLength. We rotate it
            // around its center so the top end lands at (0, apexY) and the
            // bottom at (halfBase, 0). Positive Z rotation (counter-clockwise
            // when viewed from +Z) rotates the box top from (0, +legLength/2)
            // to (-halfBase/2, +apexY/2). Adding the center offset of
            // (halfBase/2, apexY/2) places the top exactly at (0, apexY).
            const legGeo = new THREE.BoxGeometry(stroke, legLength, A_THICKNESS);
            const rightLeg = new THREE.Mesh(legGeo, aLetterMaterial);
            rightLeg.position.set(halfBase / 2, apexY / 2, 0);
            rightLeg.rotation.z = legAngle;
            grp.add(rightLeg);

            // --- Left leg ---  (mirror of right)
            const leftLeg = new THREE.Mesh(legGeo, aLetterMaterial);
            leftLeg.position.set(-halfBase / 2, apexY / 2, 0);
            leftLeg.rotation.z = -legAngle;
            grp.add(leftLeg);

            // --- Crossbar ---
            // A horizontal bar placed at ~35% of the A's height. Its width
            // spans from inner-edge-of-left-leg to inner-edge-of-right-leg.
            const crossY = apexY * 0.35;
            // At crossY, the leg's outer edge is at x = halfBase * (1 - crossY/apexY).
            // The inner edge is offset toward center by stroke (approximately).
            const legOuterAtCrossY = halfBase * (1 - crossY / apexY);
            const crossbarSpan = 2 * (legOuterAtCrossY - stroke * 0.4);
            const crossGeo = new THREE.BoxGeometry(crossbarSpan, stroke * 0.7, A_THICKNESS);
            const crossbar = new THREE.Mesh(crossGeo, aLetterMaterial);
            crossbar.position.set(0, crossY, 0);
            grp.add(crossbar);

            return grp;
        }

        // Place an A on a specific face. cornerA and cornerB are the two base
        // corners (at ground level). The face's apex is at (0, PYR_HEIGHT, 0).
        function placeAOnFace(cornerA, cornerB) {
            const mid = new THREE.Vector3()
                .addVectors(cornerA, cornerB)
                .multiplyScalar(0.5);              // base midpoint of face (on ground)
            // "Up-the-face" direction: from base midpoint to the apex.
            const upFace = new THREE.Vector3()
                .subVectors(apex, mid)
                .normalize();
            // Face outward normal: perpendicular to both (cornerB - cornerA) and upFace.
            const baseEdge = new THREE.Vector3()
                .subVectors(cornerB, cornerA)
                .normalize();
            let normal = new THREE.Vector3()
                .crossVectors(baseEdge, upFace)
                .normalize();
            // Cross product direction depends on the order of cornerA/cornerB.
            // We want the normal to point AWAY from the pyramid's center (which
            // sits at x=0,z=0 at ground level). If the dot product with the
            // base midpoint (which always points outward from center along
            // the ground) is negative, the cross gave us the inward-facing
            // normal — flip it. Also re-orient baseEdge so it forms a right-
            // handed basis with the flipped normal, so the letter doesn't end
            // up mirrored.
            const outwardCheck = new THREE.Vector3(mid.x, 0, mid.z);
            if (normal.dot(outwardCheck) < 0) {
                normal.multiplyScalar(-1);
                baseEdge.multiplyScalar(-1);
            }
            // We want the A's local +Y to align with upFace, local +Z (extrusion
            // direction) to align with normal, and local +X to align with baseEdge.
            const m = new THREE.Matrix4();
            m.makeBasis(baseEdge, upFace, normal);

            const aGroup = buildAGroup();
            // Make all the A's child meshes cast shadows.
            aGroup.traverse(obj => { if (obj.isMesh) obj.castShadow = true; });
            // Apply the basis rotation, then translate to base midpoint.
            aGroup.applyMatrix4(m);
            aGroup.position.add(mid);
            // Nudge the A slightly forward along the normal so it doesn't
            // z-fight with the pyramid face.
            aGroup.position.addScaledVector(normal, 0.05);
            g.add(aGroup);
        }

        // East face (post-group-rotation): in local coords, base corners are
        // (PYR_BASE_RADIUS, 0, 0) and (0, 0, PYR_BASE_RADIUS).
        placeAOnFace(
            new THREE.Vector3(PYR_BASE_RADIUS, 0, 0),
            new THREE.Vector3(0, 0, PYR_BASE_RADIUS)
        );
        // West face: base corners (-PYR_BASE_RADIUS, 0, 0) and (0, 0, -PYR_BASE_RADIUS).
        placeAOnFace(
            new THREE.Vector3(-PYR_BASE_RADIUS, 0, 0),
            new THREE.Vector3(0, 0, -PYR_BASE_RADIUS)
        );

        // Gold capstone (small pyramid sharing the same apex as the main pyramid).
        // The capstone is buried INSIDE the upper portion of the main pyramid so
        // their tips coincide — only the gilded peak is visible, replacing the
        // body material at the top.
        const capGeo = new THREE.ConeGeometry(CAP_BASE, CAP_HEIGHT, 4);
        const cap = new THREE.Mesh(capGeo, goldFrameMaterial);
        cap.castShadow = true;
        // Both pyramids have their apex at: position.y + height/2 (cone apex is up).
        // Main apex Y = (PYR_HEIGHT / 2) + (PYR_HEIGHT / 2) = PYR_HEIGHT
        // Capstone apex Y = cap.position.y + CAP_HEIGHT / 2
        // To make these equal: cap.position.y = PYR_HEIGHT - CAP_HEIGHT / 2
        cap.position.y = PYR_HEIGHT - CAP_HEIGHT / 2;
        g.add(cap);

        // --- Capstone atmospheric glow ---
        // Three concentric sphere layers centered roughly at the capstone's
        // body (slightly below apex). Each layer uses additive blending and
        // depthWrite=false so they layer on top of one another without
        // occluding anything — pure additive light. Together they create a
        // warm halo of light radiating from the gilded peak.
        //
        // Layer sizes are tuned to read as a halo bigger than the capstone
        // but not so large that it dominates the silhouette of the pyramid:
        //   inner core   = roughly the capstone size, hot bright white-gold
        //   mid halo     = ~2x the capstone, warm gold
        //   outer aura   = ~4x, soft amber-orange, very faint
        const glowCenterY = PYR_HEIGHT - CAP_HEIGHT * 0.4;  // bit below apex

        // All three layers are tagged userData.capstoneGlow with their
        // baseOpacity stored. The lightLevel slider walks the scene at runtime
        // and scales each layer's opacity by (lightLevel / 10) * baseOpacity.
        // So slider=10 leaves them at their authored brightness, slider=1
        // reduces them to 10%, slider=0 (if we ever extend the range) would
        // make them invisible.
        const glowInnerGeo = new THREE.SphereGeometry(CAP_BASE * 1.1, 20, 14);
        const GLOW_INNER_OPACITY = 0.55;
        const glowInnerMat = new THREE.MeshBasicMaterial({
            color: 0xfff4cc,            // hot pale gold-white
            transparent: true,
            opacity: GLOW_INNER_OPACITY,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        const glowInner = new THREE.Mesh(glowInnerGeo, glowInnerMat);
        glowInner.position.y = glowCenterY;
        glowInner.userData.capstoneGlow = true;
        glowInner.userData.baseOpacity = GLOW_INNER_OPACITY;
        g.add(glowInner);

        const glowMidGeo = new THREE.SphereGeometry(CAP_BASE * 2.2, 20, 14);
        const GLOW_MID_OPACITY = 0.28;
        const glowMidMat = new THREE.MeshBasicMaterial({
            color: 0xffd070,            // warm gold
            transparent: true,
            opacity: GLOW_MID_OPACITY,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        const glowMid = new THREE.Mesh(glowMidGeo, glowMidMat);
        glowMid.position.y = glowCenterY;
        glowMid.userData.capstoneGlow = true;
        glowMid.userData.baseOpacity = GLOW_MID_OPACITY;
        g.add(glowMid);

        const glowOuterGeo = new THREE.SphereGeometry(CAP_BASE * 4.0, 24, 16);
        const GLOW_OUTER_OPACITY = 0.10;
        const glowOuterMat = new THREE.MeshBasicMaterial({
            color: 0xff9040,            // warm amber-orange
            transparent: true,
            opacity: GLOW_OUTER_OPACITY,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        const glowOuter = new THREE.Mesh(glowOuterGeo, glowOuterMat);
        glowOuter.position.y = glowCenterY;
        glowOuter.userData.capstoneGlow = true;
        glowOuter.userData.baseOpacity = GLOW_OUTER_OPACITY;
        glowOuter.userData.basePos = glowCenterY;
        g.add(glowOuter);

        // The pyramid is a 4-sided cone built on the X/Z axes. Three.js's
        // ConeGeometry with 4 radial segments places the four corners at
        // +X, +Z, -X, -Z and the four flat faces aligned with the diagonals.
        // To make each flat face squarely face the board (so the pyramid's
        // mid-sagittal plane — the vertical slice front-to-back through the
        // apex — lines up with the board's d-e file midline), we rotate by
        // 45° from the default. This puts the flat faces on the cardinal
        // axes: one face fronting the board, one back, one to each side.
        g.rotation.y = Math.PI / 4;
        return g;
    }

    // buildAFace(pyramidZ, facingZSign) — a golden A-shaped doorway at
    // the BASE of each pyramid, on the inward-facing pyramid face
    // (toward the gold centerline / board). The doorway is built as a
    // proper 2D A-silhouette Shape (two outer diagonals + crossbar +
    // inner hollow), filled with gold material. It is tilted to match
    // the pyramid's face slope so it lies flush against the slanting
    // stone.
    //
    // facingZSign: +1 for the WHITE pyramid (inward face points -Z)
    //              -1 for the BLACK pyramid (inward face points +Z)
    function buildAFace(pyramidZ, facingZSign) {
        // Doorway dimensions — sized like an entrance, not the full face
        const D_HEIGHT = 6.0;           // doorway height in world units
        const D_WIDTH  = 4.5;            // base width
        const D_STROKE = 0.7;            // thickness of the A's "legs" (gold border thickness)
        const D_CROSSBAR_Y = D_HEIGHT * 0.42;
        const D_CROSSBAR_H = 0.55;

        // Build the A silhouette as a Shape with an inner hole for the
        // triangular opening (so it reads as a doorway you can walk
        // through). The outer outline traces the A's outer edge; the
        // inner hole is the negative space inside the A.
        const hw = D_WIDTH / 2;
        const apexX = 0;
        const apexY = D_HEIGHT;

        // Outer outline (counter-clockwise)
        const outer = new THREE.Shape();
        outer.moveTo(-hw,       0);
        outer.lineTo(-hw + D_STROKE * 1.6, 0);
        // Inner-left bottom — start of the left inner edge
        const innerLeftBaseX = -hw + D_STROKE * 1.6 + D_STROKE * 0.4;
        outer.lineTo(innerLeftBaseX, 0);
        // Trace up the inner left edge (we'll loop back down via the right side)
        // For the SILHOUETTE we keep the outline simple and use HOLES for the
        // inner triangle openings. So go around the OUTSIDE only:
        outer.lineTo(apexX - D_STROKE * 0.5, apexY - D_STROKE * 0.4);    // up the outer-left diagonal
        outer.lineTo(apexX + D_STROKE * 0.5, apexY - D_STROKE * 0.4);    // across the apex top
        outer.lineTo(hw, 0);                                              // down the outer-right diagonal
        outer.lineTo(hw - D_STROKE * 1.6, 0);
        outer.lineTo(hw - D_STROKE * 1.6 - D_STROKE * 0.4, 0);
        outer.lineTo(apexX, apexY - D_STROKE * 1.3);                      // inner apex peak (just under outer apex)
        outer.lineTo(-hw + D_STROKE * 1.6 + D_STROKE * 0.4, 0);          // back down to inner left base
        outer.lineTo(-hw, 0);
        outer.closePath();

        // The outer path above is a single closed polygon that already
        // traces the A's full silhouette including the crossbar gap —
        // but we still need an actual TRIANGULAR OPENING above the
        // crossbar and below the apex (the upper hollow of the A) and
        // another below the crossbar (the lower hollow). Add as holes.

        // Helper: an interior triangle just below the apex and above the crossbar.
        // Compute the slopes of the inner left/right diagonals.
        // Inner-left edge runs from (-hw + D_STROKE*2, 0) up to (apexX - D_STROKE*0.5, apexY)
        // Inner-right edge from (hw - D_STROKE*2, 0) up to (apexX + D_STROKE*0.5, apexY)
        const innerBaseLeftX  = -hw + D_STROKE * 2;
        const innerBaseRightX =  hw - D_STROKE * 2;
        // Slope of inner-left:
        const slopeL = (apexY - 0) / ((apexX - D_STROKE * 0.5) - innerBaseLeftX);
        const slopeR = (apexY - 0) / ((apexX + D_STROKE * 0.5) - innerBaseRightX);
        // X positions at crossbar Y (lower bound of upper triangle, upper bound of lower trapezoid):
        const innerXAtCrossbarTop  = innerBaseLeftX + (D_CROSSBAR_Y + D_CROSSBAR_H) / slopeL;
        const innerXAtCrossbarBot  = innerBaseLeftX +  D_CROSSBAR_Y                  / slopeL;
        const innerXAtCrossbarTopR = innerBaseRightX + (D_CROSSBAR_Y + D_CROSSBAR_H) / slopeR;
        const innerXAtCrossbarBotR = innerBaseRightX +  D_CROSSBAR_Y                  / slopeR;

        // UPPER hole: small triangle above the crossbar, below the inner apex
        const upperHole = new THREE.Path();
        upperHole.moveTo(innerXAtCrossbarTop,  D_CROSSBAR_Y + D_CROSSBAR_H);
        upperHole.lineTo(innerXAtCrossbarTopR, D_CROSSBAR_Y + D_CROSSBAR_H);
        upperHole.lineTo(apexX, apexY - D_STROKE * 1.5);
        upperHole.closePath();
        outer.holes.push(upperHole);

        // LOWER hole: trapezoid below the crossbar (the doorway opening)
        const lowerHole = new THREE.Path();
        lowerHole.moveTo(innerBaseLeftX,         0);
        lowerHole.lineTo(innerBaseRightX,        0);
        lowerHole.lineTo(innerXAtCrossbarBotR,   D_CROSSBAR_Y);
        lowerHole.lineTo(innerXAtCrossbarBot,    D_CROSSBAR_Y);
        lowerHole.closePath();
        outer.holes.push(lowerHole);

        // Build the geometry from the shape (with holes for openings)
        const geo = new THREE.ShapeGeometry(outer);
        // Translate origin so the BASE of the A sits at y=0 (it already does
        // from the construction above — the base line is at local y=0).

        // Gold material — polished
        const mat = new THREE.MeshStandardMaterial({
            color: 0xf5d76e,
            roughness: 0.25,
            metalness: 0.85,
            emissive: 0x5a4218,           // subtle inner glow so it reads in low light
            emissiveIntensity: 0.25,
            side: THREE.DoubleSide
        });

        const mesh = new THREE.Mesh(geo, mat);

        // Tilt to match the pyramid's face slope. The pyramid is a
        // ConeGeometry(R, H, 4) — its triangular face leans inward by
        // slantTilt from vertical, where:
        //   tan(slantTilt) = (R / sqrt(2)) / H  for a 4-sided pyramid
        //     (because the face midpoint sits at distance R*cos(45°)=R/√2
        //      from the central axis when corners are at radius R).
        //
        // For our pyramid the face midpoint distance from axis is R/√2,
        // and the face top (apex) sits at the central axis. So the face
        // leans inward by atan((R/√2) / H).
        const slantTilt = Math.atan2(PYR_BASE_RADIUS / Math.SQRT2, PYR_HEIGHT);

        // Default mesh orientation: A is in the X-Y plane, normal = +Z.
        // We need the A to sit on the pyramid's inward face with:
        //   • base of the A at ground level (y=0)
        //   • A standing up against the slope (top of A leans inward
        //     toward the central axis at the same angle the face does)
        //
        // First, position the BASE of the A at the pyramid's face-base
        // line. Then rotate around X by -slantTilt so the top of the A
        // tilts backward (matching the inward lean of the face).
        // For the WHITE pyramid (facingZSign=+1), inward face points -Z;
        // for BLACK (facingZSign=-1), inward face points +Z (flip 180° around Y).

        if (facingZSign === -1) {
            mesh.rotation.y = Math.PI;
        }
        mesh.rotation.x = -slantTilt;

        // Position: at the pyramid's face base. The face base midpoint
        // is at (0, 0, pyramidZ - facingZSign * pyramidFaceMidpointDistance).
        // For a 45°-rotated 4-sided cone, the face midpoint distance
        // from center is R*cos(45°) = R/√2.
        const faceBaseDist = PYR_BASE_RADIUS / Math.SQRT2;
        // Small outward offset so the gold doesn't z-fight with the stone
        const offset = 0.06;
        mesh.position.set(
            0,
            0,                                          // base at ground level
            pyramidZ - facingZSign * (faceBaseDist + offset)
        );

        mesh.userData.attachToWorld = true;
        return mesh;
    }

    // White side of the board is positive Z; black side is negative Z. Push each
    // pyramid back far enough that it sits beyond the celestial bodies' arc and
    // reads as a distant horizon monument rather than a foreground object.
    //
    // Body colors match the existing piece palette so the pyramids feel of-a-piece
    // with the rest of the scene (same off-white and near-black used on the pieces
    // and coffins). True 0xffffff / 0x000000 would render with no shading on the
    // facets — the small offsets give each face a visible normal.
    //
    // Both pyramids also slowly rotate around their own Y axis (one full turn
    // every 2 minutes). Because each pyramid sits at x=0 along the chessboard's
    // d-e file midline, the rotation axis IS the pyramid's mid-sagittal plane
    // through the board center — so the spin highlights the alignment instead
    // of disturbing it. Marked with userData.spinningPyramid so the animation
    // loop can find them. The black pyramid spins in the opposite direction
    // for visual contrast — they look like mirrored sentinels.
    const PYR_DISTANCE = 150;       // 3x further than before (was 50)
    const PYR_SPIN_PERIOD_MS = 2 * 60 * 1000;

    const whitePyramid = buildOne(0xf0f0f0);
    whitePyramid.position.set(0, 0, PYR_DISTANCE);
    // Pyramids are stationary — their flat faces face the cardinal axes
    // (already rotated 45° in buildOne), so one face squarely faces the
    // gold centerline that runs through the board's middle.
    whitePyramid.userData.attachToWorld = true;

    const blackPyramid = buildOne(0x1a1a1a);
    blackPyramid.position.set(0, 0, -PYR_DISTANCE);
    blackPyramid.userData.attachToWorld = true;

    // --- Concert atmosphere ---
    // A grab-bag of dramatic-stage elements that turn View 3 from a quiet
    // monument scene into a music-show backdrop. All elements are tagged with
    // userData flags so the per-frame updater can find and animate them:
    //   .lightBeam       — a sweeping cone-shaped light shaft
    //   .hazeParticles   — atmospheric dust (drifts and recycles)
    //   .glintParticles  — bright sparkles rising from below
    //   .stageWash       — colored point light pulsing in time with the visualizer
    const concertProps = buildConcertAtmosphere();

    // ---- V3 GROUND PLANE ----
    // A large dark plane that gives the pyramids a base to sit on,
    // similar in spirit to V5's terrain but simpler (no orchard, no
    // pool — V3 stays a concert space, not a garden).
    const groundGeo = new THREE.PlaneGeometry(1200, 1200, 1, 1);
    const groundMat = new THREE.MeshStandardMaterial({
        color: 0x1a1612,
        roughness: 1.0,
        metalness: 0.0
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.5;
    ground.receiveShadow = true;
    ground.userData.attachToWorld = true;          // rotates with the board
    // A subtle inner darker zone where the chessboard sits, suggesting a
    // stage floor in front of the pyramids.
    const stageGeo = new THREE.CircleGeometry(40, 64);
    const stageMat = new THREE.MeshStandardMaterial({
        color: 0x0e0c0a,
        roughness: 0.95,
        metalness: 0.0
    });
    const stage = new THREE.Mesh(stageGeo, stageMat);
    stage.rotation.x = -Math.PI / 2;
    stage.position.y = -0.45;
    stage.userData.attachToWorld = true;

    // ---- V3 CONSTELLATION CHESS BACK RANK ----
    // Two rows of the 8-piece back rank, one behind each pyramid in the
    // sky, matching V5's setup. CONST_Y matches V5 (70). The rows sit
    // beyond the pyramids (which are now at z=±150).
    const v3ConstellationMeshes = buildConstellationRowsAtZ([-260, +260], 70, 220);
    // Tag them to attach to world so they stay locked to white/black ends
    // even as the board auto-rotates.
    for (const m of v3ConstellationMeshes) m.userData.attachToWorld = true;

    // ---- V3 DISTANT VOLCANIC MOUNTAINS ----
    // A ring of mountain silhouettes around the perimeter, beyond the
    // pyramids. Painted as 2D sprites (cheap, dramatic) on a single
    // canvas per mountain. Some peaks glow with active volcanism.
    function makeMountainTexture(seed, isVolcanic) {
        const cv = document.createElement('canvas');
        cv.width = 512;
        cv.height = 256;
        const c = cv.getContext('2d');
        // Mountain silhouette path — a jagged ridgeline
        const baseY = 256;
        const peakY0 = 60 + ((seed * 13) % 80);     // pseudo-random peak height
        const path = [];
        const points = 24;
        for (let i = 0; i <= points; i++) {
            const x = (i / points) * 512;
            // Ridgeline as a noisy curve with one dominant peak
            const dx = (i / points) - 0.5;
            const dome = Math.exp(-dx * dx * 8) * (256 - peakY0);
            const noise = Math.sin(i * 0.7 + seed) * 8 + Math.sin(i * 1.7 + seed * 2) * 4;
            const y = baseY - dome - noise;
            path.push([x, y]);
        }
        // Fill silhouette — dark base, slight gradient
        const grad = c.createLinearGradient(0, peakY0, 0, 256);
        grad.addColorStop(0,    '#3a2818');
        grad.addColorStop(0.4,  '#1a1208');
        grad.addColorStop(1,    '#0a0604');
        c.fillStyle = grad;
        c.beginPath();
        c.moveTo(0, 256);
        for (const [x, y] of path) c.lineTo(x, y);
        c.lineTo(512, 256);
        c.closePath();
        c.fill();
        // Volcanic peak: bright glowing crater + lava streaks down the side
        if (isVolcanic) {
            // Find the peak (highest point)
            let peakIdx = 0;
            for (let i = 1; i < path.length; i++) {
                if (path[i][1] < path[peakIdx][1]) peakIdx = i;
            }
            const [px, py] = path[peakIdx];
            // Crater glow
            const craterGrad = c.createRadialGradient(px, py + 4, 0, px, py + 4, 30);
            craterGrad.addColorStop(0,    'rgba(255, 200, 100, 1.0)');
            craterGrad.addColorStop(0.3,  'rgba(255, 120, 40, 0.9)');
            craterGrad.addColorStop(0.7,  'rgba(255, 60, 20, 0.4)');
            craterGrad.addColorStop(1,    'rgba(160, 30, 10, 0)');
            c.fillStyle = craterGrad;
            c.beginPath();
            c.arc(px, py + 4, 30, 0, Math.PI * 2);
            c.fill();
            // Lava streaks running down the mountainside
            c.strokeStyle = 'rgba(255, 100, 30, 0.7)';
            c.lineWidth = 2.5;
            c.lineCap = 'round';
            for (let s = 0; s < 3; s++) {
                const startX = px + (Math.random() - 0.5) * 12;
                const startY = py + 8;
                const endX = startX + (Math.random() - 0.5) * 60;
                const endY = baseY - 10;
                c.beginPath();
                c.moveTo(startX, startY);
                // Wavy lava trail
                const ctrlX = (startX + endX) / 2 + (Math.random() - 0.5) * 20;
                const ctrlY = (startY + endY) / 2;
                c.quadraticCurveTo(ctrlX, ctrlY, endX, endY);
                c.stroke();
            }
            // Smoke plume above the crater
            c.fillStyle = 'rgba(40, 30, 25, 0.55)';
            c.beginPath();
            c.arc(px, py - 20, 18, 0, Math.PI * 2);
            c.fill();
            c.fillStyle = 'rgba(60, 50, 45, 0.4)';
            c.beginPath();
            c.arc(px - 6, py - 38, 22, 0, Math.PI * 2);
            c.fill();
            c.fillStyle = 'rgba(50, 42, 38, 0.3)';
            c.beginPath();
            c.arc(px + 8, py - 55, 24, 0, Math.PI * 2);
            c.fill();
        }
        const tex = new THREE.CanvasTexture(cv);
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        return tex;
    }
    // ---- V3 DISTANT MOUNTAIN HORIZON ----
    // A SINGLE seamless panoramic mountain range painted as one long
    // canvas wrapped around the horizon as a tall cylinder. Reads as
    // continuous distant geography (not 10 cardboard cutouts), and
    // because it surrounds the camera at the sky-dome periphery, the
    // mountains feel like real far-off horizon — no matter where the
    // camera looks, mountains are AT the horizon line.
    //
    // The texture is 4096 × 512 — one tall horizon strip painted as a
    // single ridgeline of dozens of overlapping peaks. Atmospheric
    // perspective: ridges fade from darker foreground to paler distant
    // tones (matching the sky color at the horizon, so they blend in).
    function makeMountainPanoramaTexture() {
        const W = 4096, H = 512;
        const cv = document.createElement('canvas');
        cv.width = W;
        cv.height = H;
        const c = cv.getContext('2d');
        c.clearRect(0, 0, W, H);
        // Three ridgelines drawn back-to-front, each progressively darker
        // and lower (the closer ridges in front, the further ridges
        // higher and paler — atmospheric perspective).
        // Ridge palette: muted purple-blue (matches the twilight sky horizon)
        const ridges = [
            { yBase: H * 0.35, peakAmp: H * 0.22, color: '#4a4068', noise: 7 },    // FAR ridge — palest, highest in frame
            { yBase: H * 0.45, peakAmp: H * 0.18, color: '#332848', noise: 13 },   // MID ridge
            { yBase: H * 0.58, peakAmp: H * 0.16, color: '#1a1428', noise: 19 }    // NEAR ridge — darkest, lowest
        ];
        // 3 volcanic peaks placed at specific positions along the panorama
        // (in canvas X coords). They live on the MID ridge so they're
        // properly framed by closer/farther ridges.
        const volcanicXs = [W * 0.18, W * 0.55, W * 0.82];

        // Seeded pseudo-random for repeatable noise
        function rng(seed) {
            let s = seed;
            return () => {
                s = (s * 1103515245 + 12345) & 0x7fffffff;
                return s / 0x7fffffff;
            };
        }

        for (let r = 0; r < ridges.length; r++) {
            const ridge = ridges[r];
            const r1 = rng(r * 137 + 5);
            // Path: long sequence of peaks at varying heights
            const numPeaks = 60 + r * 20;       // more peaks in farther ridges
            const pts = [];
            for (let i = 0; i <= numPeaks; i++) {
                const x = (i / numPeaks) * W;
                // Multi-octave noise for natural ridgeline
                const n1 = Math.sin(i * 0.27 + r * 2.1) * 0.5;
                const n2 = Math.sin(i * 0.91 + r * 3.7) * 0.25;
                const n3 = Math.sin(i * 2.31 + r * 5.3) * 0.15;
                const noise = n1 + n2 + n3 + (r1() - 0.5) * 0.4;
                const peakH = ridge.peakAmp * (0.4 + Math.abs(noise) * 0.8);
                pts.push([x, ridge.yBase - peakH]);
            }
            // Fill the ridge silhouette
            c.fillStyle = ridge.color;
            c.beginPath();
            c.moveTo(0, H);
            for (const [x, y] of pts) c.lineTo(x, y);
            c.lineTo(W, H);
            c.closePath();
            c.fill();

            // Subtle highlight along the ridge tops (faint sun-side glow)
            c.strokeStyle = `rgba(255, 220, 180, ${0.10 - r * 0.03})`;
            c.lineWidth = 1.2;
            c.beginPath();
            for (let i = 0; i < pts.length; i++) {
                if (i === 0) c.moveTo(pts[i][0], pts[i][1]);
                else c.lineTo(pts[i][0], pts[i][1]);
            }
            c.stroke();

            // Add volcanoes on the MID ridge only
            if (r === 1) {
                for (const vx of volcanicXs) {
                    const idx = (vx / W) * numPeaks;
                    const i0 = Math.floor(idx);
                    const i1 = Math.min(pts.length - 1, i0 + 1);
                    const frac = idx - i0;
                    const vy = pts[i0][1] * (1 - frac) + pts[i1][1] * frac;

                    // ---- LAVA STREAKS down the mountainside ----
                    // Drawn FIRST so the glow paints on top of them. 2-3
                    // main branches per volcano with subtle forks. Color
                    // cools from bright orange near the peak to deep red
                    // at the base.
                    const branches = 2 + Math.floor(Math.random() * 2);
                    for (let b = 0; b < branches; b++) {
                        const direction = (b - (branches - 1) / 2) * 6 + (Math.random() - 0.5) * 8;
                        // Multi-segment path that meanders down
                        const segs = 8;
                        let px = vx + (Math.random() - 0.5) * 4;
                        let py = vy + 4;
                        let prevColor = null;
                        for (let s = 0; s < segs; s++) {
                            const t = s / segs;
                            const nextT = (s + 1) / segs;
                            const nx = vx + direction * nextT + (Math.random() - 0.5) * 3;
                            const ny = py + (ridges[1].yBase + 8 - vy) / segs + (Math.random() - 0.5) * 2;
                            // Color/opacity cools as the lava flows away
                            const coolT = nextT;
                            const rCol = Math.floor(255 - coolT * 80);
                            const gCol = Math.floor(120 - coolT * 60);
                            const bCol = Math.floor(40 - coolT * 20);
                            const alpha = (0.85 - coolT * 0.55).toFixed(2);
                            const width = (2.5 - coolT * 1.3).toFixed(2);
                            c.strokeStyle = `rgba(${rCol}, ${gCol}, ${bCol}, ${alpha})`;
                            c.lineWidth = +width;
                            c.lineCap = 'round';
                            c.beginPath();
                            c.moveTo(px, py);
                            c.lineTo(nx, ny);
                            c.stroke();
                            // Random fork on some segments
                            if (s > 2 && s < segs - 2 && Math.random() < 0.25) {
                                const forkLen = 8 + Math.random() * 12;
                                const forkAng = (Math.random() - 0.5) * 1.2;
                                const fx = nx + Math.sin(forkAng) * forkLen;
                                const fy = ny + Math.abs(Math.cos(forkAng)) * forkLen;
                                c.strokeStyle = `rgba(${rCol}, ${gCol}, ${bCol}, ${(+alpha * 0.65).toFixed(2)})`;
                                c.lineWidth = +width * 0.7;
                                c.beginPath();
                                c.moveTo(nx, ny);
                                c.lineTo(fx, fy);
                                c.stroke();
                            }
                            px = nx;
                            py = ny;
                        }
                    }

                    // ---- CRATER GLOW ----
                    // Subtler than before — a small intense core + soft
                    // halo that doesn't dominate the silhouette. The
                    // peak should still look like rock, not a sun.
                    const craterRad = 16;
                    // Outer ambient glow (warm orange aura)
                    const haloGrad = c.createRadialGradient(vx, vy + 3, 2, vx, vy + 3, craterRad * 1.6);
                    haloGrad.addColorStop(0,    'rgba(255, 160, 70, 0.55)');
                    haloGrad.addColorStop(0.4,  'rgba(220, 90, 30, 0.30)');
                    haloGrad.addColorStop(0.8,  'rgba(140, 40, 20, 0.10)');
                    haloGrad.addColorStop(1,    'rgba(80, 20, 10, 0)');
                    c.fillStyle = haloGrad;
                    c.beginPath();
                    c.arc(vx, vy + 3, craterRad * 1.6, 0, Math.PI * 2);
                    c.fill();
                    // Inner bright core
                    const coreGrad = c.createRadialGradient(vx + 1, vy + 1, 0, vx + 1, vy + 1, 7);
                    coreGrad.addColorStop(0,    'rgba(255, 240, 180, 0.95)');
                    coreGrad.addColorStop(0.4,  'rgba(255, 170, 70, 0.75)');
                    coreGrad.addColorStop(1,    'rgba(220, 80, 30, 0)');
                    c.fillStyle = coreGrad;
                    c.beginPath();
                    c.arc(vx + 1, vy + 1, 7, 0, Math.PI * 2);
                    c.fill();
                    // 3-5 small hot embers scattered around the rim
                    const embers = 3 + Math.floor(Math.random() * 3);
                    for (let e = 0; e < embers; e++) {
                        const ea = Math.random() * Math.PI;     // upper hemisphere
                        const ed = 4 + Math.random() * 5;
                        const ex = vx + Math.cos(ea) * ed;
                        const ey = vy + 2 - Math.sin(ea) * ed * 0.6;
                        const er = 1 + Math.random() * 1.5;
                        const eg = c.createRadialGradient(ex, ey, 0, ex, ey, er * 3);
                        eg.addColorStop(0, 'rgba(255, 200, 120, 0.9)');
                        eg.addColorStop(1, 'rgba(255, 120, 50, 0)');
                        c.fillStyle = eg;
                        c.beginPath();
                        c.arc(ex, ey, er * 3, 0, Math.PI * 2);
                        c.fill();
                    }

                    // ---- SMOKE PLUME ----
                    // Turbulent layered plume rising from the crater.
                    // Many small soft puffs at random positions with
                    // wind drift to the right and progressive fading.
                    // Lower puffs are darker (denser smoke); higher
                    // puffs are paler and bigger (dispersed).
                    const plumeHeight = 130 + Math.random() * 60;
                    const puffCount = 40;
                    const windDrift = 1.1;       // horizontal drift per vertical unit
                    for (let p = 0; p < puffCount; p++) {
                        const t = p / puffCount;
                        // Position: rise with wind drift; add turbulence
                        const ry = -plumeHeight * t;
                        const rx = windDrift * (-ry) + (Math.random() - 0.5) * (16 + t * 26);
                        const puffX = vx + rx;
                        const puffY = vy + 4 + ry;
                        const puffR = 6 + t * 16 + Math.random() * 5;
                        // Color: dense dark at base, paler ash at top
                        const darkness = 1 - t;
                        const baseR = Math.floor(35 + (1 - darkness) * 85);
                        const baseG = Math.floor(28 + (1 - darkness) * 75);
                        const baseB = Math.floor(26 + (1 - darkness) * 75);
                        const baseAlpha = (0.45 * darkness + 0.10).toFixed(2);
                        const pg = c.createRadialGradient(puffX, puffY, 0, puffX, puffY, puffR);
                        pg.addColorStop(0,   `rgba(${baseR}, ${baseG}, ${baseB}, ${baseAlpha})`);
                        pg.addColorStop(0.6, `rgba(${baseR}, ${baseG}, ${baseB}, ${(+baseAlpha * 0.5).toFixed(2)})`);
                        pg.addColorStop(1,   `rgba(${baseR}, ${baseG}, ${baseB}, 0)`);
                        c.fillStyle = pg;
                        c.beginPath();
                        c.arc(puffX, puffY, puffR, 0, Math.PI * 2);
                        c.fill();
                    }
                    // Subtle warm tint at the base of the plume (heat haze)
                    const heatGrad = c.createRadialGradient(vx, vy - 6, 0, vx, vy - 6, 18);
                    heatGrad.addColorStop(0, 'rgba(255, 140, 60, 0.18)');
                    heatGrad.addColorStop(1, 'rgba(255, 140, 60, 0)');
                    c.fillStyle = heatGrad;
                    c.beginPath();
                    c.arc(vx, vy - 6, 18, 0, Math.PI * 2);
                    c.fill();
                }
            }
        }

        // Bottom edge fade — the ground meets the mountains, so darken
        // the very bottom row a bit (suggests the mountains sit in a
        // shadowed valley) and add a slight haze gradient up the ridges.
        const hazeGrad = c.createLinearGradient(0, 0, 0, H);
        hazeGrad.addColorStop(0,   'rgba(180, 170, 200, 0.10)');   // pale haze top
        hazeGrad.addColorStop(0.4, 'rgba(180, 170, 200, 0.06)');
        hazeGrad.addColorStop(1,   'rgba(60, 50, 70, 0)');
        c.fillStyle = hazeGrad;
        c.globalCompositeOperation = 'source-atop';
        c.fillRect(0, 0, W, H);
        c.globalCompositeOperation = 'source-over';

        const tex = new THREE.CanvasTexture(cv);
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.ClampToEdgeWrapping;
        return tex;
    }
    const mountainTex = makeMountainPanoramaTexture();
    // Wrap as an open-ended cylinder around the horizon.
    //   radius: just inside the sky dome (sky=480; mountains=460)
    //   height: 80 world units — covers the lower ~30° of the sky band
    //   theta: full 360°
    // The cylinder is OPEN-ENDED, so we see the painted texture from
    // inside. side: BackSide because we're inside the cylinder.
    const MTN_RADIUS = 460;
    const MTN_HEIGHT = 90;
    const mountainGeo = new THREE.CylinderGeometry(
        MTN_RADIUS, MTN_RADIUS, MTN_HEIGHT, 96, 1, true
    );
    const mountainMat = new THREE.MeshBasicMaterial({
        map: mountainTex,
        side: THREE.BackSide,
        transparent: true,
        depthWrite: false,
        fog: false
    });
    const mountainCyl = new THREE.Mesh(mountainGeo, mountainMat);
    // Place the cylinder so its bottom sits at the ground line (y≈0) and
    // mountains rise into the sky — center is at MTN_HEIGHT/2.
    mountainCyl.position.set(0, MTN_HEIGHT / 2 - 5, 0);
    mountainCyl.renderOrder = -3;          // draw after sky, before everything else
    const mountainMeshes = [mountainCyl];

    // ---- V3 GOLD LAVA VEINS ----
    // Glowing molten-gold veins streaming from the base of each pyramid
    // outward across the ground plane. Built as long thin tapered ribbons
    // (planes) emitting from the pyramid base in a fan pattern. Animated
    // via a UV-scrolling effect (tagged with userData.isGoldVein so the
    // updater can shift their texture offsets each frame).
    function makeGoldVeinTexture() {
        const cv = document.createElement('canvas');
        cv.width = 512;
        cv.height = 32;
        const c = cv.getContext('2d');
        // Background: dark base (the cooling rock at vein edges)
        c.fillStyle = 'rgba(0, 0, 0, 0)';
        c.fillRect(0, 0, 512, 32);
        // Bright molten gold core down the centerline
        const coreGrad = c.createLinearGradient(0, 0, 0, 32);
        coreGrad.addColorStop(0,    'rgba(60, 30, 10, 0)');
        coreGrad.addColorStop(0.3,  'rgba(255, 160, 40, 0.6)');
        coreGrad.addColorStop(0.5,  'rgba(255, 240, 180, 1.0)');
        coreGrad.addColorStop(0.7,  'rgba(255, 160, 40, 0.6)');
        coreGrad.addColorStop(1,    'rgba(60, 30, 10, 0)');
        c.fillStyle = coreGrad;
        c.fillRect(0, 0, 512, 32);
        // Add bright ripples / hot spots along the vein for flow texture
        for (let i = 0; i < 14; i++) {
            const x = (i / 14) * 512 + (Math.random() - 0.5) * 20;
            const y = 16;
            const r = 6 + Math.random() * 6;
            const g = c.createRadialGradient(x, y, 0, x, y, r);
            g.addColorStop(0,    'rgba(255, 255, 220, 0.95)');
            g.addColorStop(0.5,  'rgba(255, 180, 60, 0.5)');
            g.addColorStop(1,    'rgba(255, 100, 30, 0)');
            c.fillStyle = g;
            c.beginPath();
            c.arc(x, y, r, 0, Math.PI * 2);
            c.fill();
        }
        // Soften the bright tips at the ends
        const fadeIn = c.createLinearGradient(0, 0, 60, 0);
        fadeIn.addColorStop(0, 'rgba(0, 0, 0, 1)');
        fadeIn.addColorStop(1, 'rgba(0, 0, 0, 0)');
        c.globalCompositeOperation = 'destination-out';
        c.fillStyle = fadeIn;
        c.fillRect(0, 0, 60, 32);
        const fadeOut = c.createLinearGradient(452, 0, 512, 0);
        fadeOut.addColorStop(0, 'rgba(0, 0, 0, 0)');
        fadeOut.addColorStop(1, 'rgba(0, 0, 0, 1)');
        c.fillStyle = fadeOut;
        c.fillRect(452, 0, 60, 32);
        c.globalCompositeOperation = 'source-over';
        const tex = new THREE.CanvasTexture(cv);
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.ClampToEdgeWrapping;
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        return tex;
    }
    function buildLavaVeinsForPyramid(originX, originZ) {
        const veins = [];
        const NUM_VEINS = 7;
        for (let i = 0; i < NUM_VEINS; i++) {
            // Each vein points outward from the pyramid in a fan
            const angleSpread = Math.PI * 1.2;       // ~220° fan
            const baseAngle = Math.atan2(-originZ, -originX);    // away from origin
            const a = baseAngle - angleSpread / 2 + (i / (NUM_VEINS - 1)) * angleSpread;
            const length = 60 + Math.random() * 50;   // varying vein lengths
            const width = 3 + Math.random() * 2;
            const tex = makeGoldVeinTexture();
            // Each vein has its OWN texture clone so we can scroll their
            // UVs independently for variety.
            const mat = new THREE.MeshBasicMaterial({
                map: tex,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                fog: false
            });
            const geo = new THREE.PlaneGeometry(length, width);
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = -Math.PI / 2;          // lay flat on ground
            mesh.rotation.z = a;                      // point outward
            // Position: vein STARTS at the pyramid base and EXTENDS outward
            // Offset center by length/2 in the outward direction
            mesh.position.set(
                originX + Math.cos(a) * (length / 2),
                -0.4,                                  // just above ground plane (-0.5)
                originZ + Math.sin(a) * (length / 2)
            );
            mesh.userData.isGoldVein = true;
            mesh.userData.scrollRate = 0.05 + Math.random() * 0.10;   // UV scroll speed per second
            mesh.userData.attachToWorld = true;
            mesh.renderOrder = 0;
            veins.push(mesh);
        }
        return veins;
    }
    const whiteVeins = buildLavaVeinsForPyramid(0, PYR_DISTANCE);
    const blackVeins = buildLavaVeinsForPyramid(0, -PYR_DISTANCE);

    // Build the gold "A" face on the inward-facing side of each pyramid,
    // pointing along the gold centerline of the board.
    //   White pyramid at z=+PYR_DISTANCE — its inward face points -Z
    //   Black pyramid at z=-PYR_DISTANCE — its inward face points +Z
    const whiteAFace = buildAFace(PYR_DISTANCE, +1);
    const blackAFace = buildAFace(-PYR_DISTANCE, -1);

    // ---- MOUNTAIN ALTAR (continued-play surface) ----
    // Built hidden. When 3+ pieces are captured and the user clicks the
    // "Continue at the mountains" button, this altar becomes visible and
    // the game continues with the altar acting as an alternate play
    // surface (clicks on its pieces and tiles route to the chess engine
    // via the same isAltarBoard / isAltarPiece tags used by V5's temples).
    function buildMountainAltar() {
        const g = new THREE.Group();
        // Position: in front of one of the volcanic mountains (at ~120°
        // around the perimeter, between the white and black pyramids and
        // off the gold centerline so it doesn't interfere with the
        // pyramids' axis). Far enough out to feel like a destination.
        const ALTAR_X = -120;
        const ALTAR_Z = 0;
        g.position.set(ALTAR_X, 0, ALTAR_Z);
        // Face the chessboard center
        g.rotation.y = Math.atan2(-ALTAR_X, -ALTAR_Z);

        // Volcanic stone pedestal — stepped (similar in spirit to V5's
        // stylobate but smaller and roughened).
        const stoneMat = new THREE.MeshStandardMaterial({
            color: 0x2a1f1c,
            roughness: 0.95,
            metalness: 0.08
        });
        const stoneMatDarker = new THREE.MeshStandardMaterial({
            color: 0x1a1310,
            roughness: 0.98,
            metalness: 0.05
        });
        const STEP_H = 0.35;
        const stepDims = [
            { w: 14, d: 14 },
            { w: 12, d: 12 },
            { w: 10, d: 10 }
        ];
        let curY = 0;
        for (let s = 0; s < stepDims.length; s++) {
            const sg = new THREE.BoxGeometry(stepDims[s].w, STEP_H, stepDims[s].d);
            const sm = new THREE.Mesh(sg, s === 0 ? stoneMatDarker : stoneMat);
            sm.position.y = curY + STEP_H / 2;
            sm.receiveShadow = true;
            g.add(sm);
            curY += STEP_H;
        }
        const stylobateTopY = curY;     // top of the third step

        // Altar slab — small flat platform on top of the stylobate
        const ALTAR_W = 8;
        const ALTAR_D = 8;
        const ALTAR_H = 0.6;
        const altarSlabGeo = new THREE.BoxGeometry(ALTAR_W, ALTAR_H, ALTAR_D);
        const altarSlab = new THREE.Mesh(altarSlabGeo, stoneMat);
        altarSlab.position.y = stylobateTopY + ALTAR_H / 2;
        altarSlab.receiveShadow = true;
        g.add(altarSlab);
        const altarTopY = stylobateTopY + ALTAR_H;

        // Four obsidian-style columns at the corners — short, stout
        const COL_H = 4.5;
        const COL_R_TOP = 0.32;
        const COL_R_BOT = 0.42;
        const colInset = 5.4;
        for (const [cx, cz] of [
            [-colInset, -colInset],
            [ colInset, -colInset],
            [-colInset,  colInset],
            [ colInset,  colInset]
        ]) {
            const colGeo = new THREE.CylinderGeometry(COL_R_TOP, COL_R_BOT, COL_H, 16);
            const col = new THREE.Mesh(colGeo, stoneMat);
            col.position.set(cx, stylobateTopY + COL_H / 2 + ALTAR_H, cz);
            col.castShadow = true;
            col.receiveShadow = true;
            g.add(col);
            // Small flame at the top of each column (volcanic torch)
            const flameGeo = new THREE.SphereGeometry(0.32, 12, 10);
            const flameMat = new THREE.MeshStandardMaterial({
                color: 0xffb060,
                emissive: 0xff7028,
                emissiveIntensity: 1.4,
                roughness: 0.4,
                metalness: 0.0
            });
            const flame = new THREE.Mesh(flameGeo, flameMat);
            flame.position.set(cx, stylobateTopY + COL_H + ALTAR_H + 0.35, cz);
            flame.userData.isMountainAltarFlame = true;       // for flicker animation
            g.add(flame);
            // Point light from each flame
            const light = new THREE.PointLight(0xff8040, 1.2, 14, 1.8);
            light.position.set(cx, stylobateTopY + COL_H + ALTAR_H + 0.35, cz);
            light.userData.isMountainAltarLight = true;
            g.add(light);
        }

        // Mini chess board on top of the altar (8×8), tagged as
        // isAltarBoard so the existing renderAltarPieces system finds it
        // and populates it with current game state.
        const MINI_BOARD_FRAC = 0.85;
        const MINI_TILE_SIZE = (ALTAR_W * MINI_BOARD_FRAC) / 8;
        const altarBoardGroup = new THREE.Group();
        altarBoardGroup.position.set(0, altarTopY + 0.005, 0);
        altarBoardGroup.userData.isAltarBoard = true;
        altarBoardGroup.userData.tileSize = MINI_TILE_SIZE;
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const isLight = (row + col) % 2 === 0;
                const tileColor = isLight ? 0xeeeed2 : 0x6a554a;
                const tileGeo = new THREE.BoxGeometry(MINI_TILE_SIZE, 0.02, MINI_TILE_SIZE);
                const tileMat = new THREE.MeshStandardMaterial({
                    color: tileColor,
                    roughness: 0.65,
                    metalness: 0.0
                });
                const tile = new THREE.Mesh(tileGeo, tileMat);
                tile.position.set(
                    (col - 3.5) * MINI_TILE_SIZE,
                    0.01,
                    (row - 3.5) * MINI_TILE_SIZE
                );
                tile.receiveShadow = true;
                altarBoardGroup.add(tile);
            }
        }
        g.add(altarBoardGroup);
        g.userData.altarBoardGroup = altarBoardGroup;
        g.userData.isMountainAltar = true;
        g.userData.attachToWorld = true;
        // Visible from V3 by default. Button click triggers a camera-fly
        // to focus on it, but the structure itself is always part of the
        // scene.
        return g;
    }
    const mountainAltar = buildMountainAltar();

    // ---- DISTANT MOUNTAIN TEMPLES ----
    // One temple on top of the highest hill behind each pyramid, in the
    // distant purple mountain band. The white-marble temple stands
    // behind the white pyramid (+Z); the black-obsidian temple stands
    // behind the black pyramid (-Z). Each has two glowing lamps flanking
    // the front like beacons in the mountain peaks.
    function buildMountainTemple(centerX, centerY, centerZ, isWhite, facingZSign, scaleMult) {
        const g = new THREE.Group();
        g.position.set(centerX, centerY, centerZ);
        // Face inward toward the chessboard (along the line from temple
        // back to origin). For the white temple at +Z, face -Z; for the
        // black temple at -Z, face +Z.
        g.rotation.y = facingZSign === -1 ? Math.PI : 0;
        // Apply uniform scale to the entire temple group (allows e.g. a
        // half-scale black temple while keeping the same internal proportions)
        if (typeof scaleMult === 'number' && scaleMult !== 1) {
            g.scale.setScalar(scaleMult);
        }

        // Material palette — white marble or black obsidian. Both fog:false
        // so they stay crisp against the mountain silhouette. The white
        // temple uses a strong warm emissive boost so it reads against
        // the cool purple-blue mountain backdrop (low-contrast otherwise).
        const bodyColor    = isWhite ? 0xfff8e8 : 0x1a1418;
        const darkerColor  = isWhite ? 0xeae3d2 : 0x0e090c;
        const emissiveCol  = isWhite ? 0x6a5a30 : 0x0a0608;
        const emissiveBoost = isWhite ? 0.55 : 0.10;
        const stoneMat = new THREE.MeshStandardMaterial({
            color: bodyColor,
            roughness: isWhite ? 0.5 : 0.22,
            metalness: isWhite ? 0.05 : 0.45,
            emissive: emissiveCol,
            emissiveIntensity: emissiveBoost,
            fog: false
        });
        const stoneMatDarker = new THREE.MeshStandardMaterial({
            color: darkerColor,
            roughness: isWhite ? 0.6 : 0.28,
            metalness: isWhite ? 0.05 : 0.45,
            emissive: emissiveCol,
            emissiveIntensity: emissiveBoost * 0.7,
            fog: false
        });

        // Sized to read at this distance (~460 units away). Scale up for
        // distance visibility — the temple is far so it needs to be
        // visually substantial.
        const TEMPLE_W = 36;
        const TEMPLE_D = 18;

        // ---- (PLINTH REMOVED) ----
        // The previous build added a dark purple-grey plinth + outcrops
        // descending below the temple to anchor it to the rock. In
        // practice that dark mass read as a "weird black shadow" hanging
        // beneath the temple against the sky, because the mountain
        // silhouettes are 2D sprites and the plinth ends up in open air.
        // Removed so the temple sits cleanly on the mountain peak and
        // blends into it.

        const STEP_H = 0.8;
        let curY = 0;
        for (let s = 0; s < 3; s++) {
            const inset = 2.2 - s * 0.9;
            const sg = new THREE.BoxGeometry(
                TEMPLE_W + 2 * inset,
                STEP_H,
                TEMPLE_D + 2 * inset
            );
            const sm = new THREE.Mesh(sg, s === 0 ? stoneMatDarker : stoneMat);
            sm.position.y = curY + STEP_H / 2;
            g.add(sm);
            curY += STEP_H;
        }
        const stylobateTopY = curY;

        // Columns
        const COL_R_TOP = 0.7;
        const COL_R_BOT = 0.85;
        const COL_H = 10.0;
        const ABACUS_H = 0.4;
        const NUM_LONG = 6;
        const NUM_SHORT = 3;
        const colInsetX = 2.0;
        const colInsetZ = 2.0;
        const longSpan  = TEMPLE_W - 2 * colInsetX;
        const shortSpan = TEMPLE_D - 2 * colInsetZ;
        function placeColumn(x, z) {
            const colGeo = new THREE.CylinderGeometry(COL_R_TOP, COL_R_BOT, COL_H, 16);
            const col = new THREE.Mesh(colGeo, stoneMat);
            col.position.set(x, stylobateTopY + COL_H / 2, z);
            g.add(col);
            const abGeo = new THREE.BoxGeometry(COL_R_TOP * 2.6, ABACUS_H, COL_R_TOP * 2.6);
            const ab = new THREE.Mesh(abGeo, stoneMat);
            ab.position.set(x, stylobateTopY + COL_H + ABACUS_H / 2, z);
            g.add(ab);
        }
        for (let i = 0; i < NUM_LONG; i++) {
            const fx = (i / (NUM_LONG - 1)) * longSpan - longSpan / 2;
            placeColumn(fx, -shortSpan / 2);
            placeColumn(fx,  shortSpan / 2);
        }
        for (let i = 1; i < NUM_SHORT - 1; i++) {
            const fz = (i / (NUM_SHORT - 1)) * shortSpan - shortSpan / 2;
            placeColumn(-longSpan / 2, fz);
            placeColumn( longSpan / 2, fz);
        }
        const columnTopY = stylobateTopY + COL_H + ABACUS_H;

        // Entablature
        const ENTAB_H = 1.6;
        const entabGeo = new THREE.BoxGeometry(TEMPLE_W, ENTAB_H, TEMPLE_D);
        const entab = new THREE.Mesh(entabGeo, stoneMatDarker);
        entab.position.y = columnTopY + ENTAB_H / 2;
        g.add(entab);
        const entabTopY = columnTopY + ENTAB_H;

        // Pediments + roof
        const PEDIMENT_H = 3.5;
        const pedShape = new THREE.Shape();
        pedShape.moveTo(-TEMPLE_W / 2, 0);
        pedShape.lineTo( TEMPLE_W / 2, 0);
        pedShape.lineTo(0, PEDIMENT_H);
        pedShape.closePath();
        const pedGeo = new THREE.ShapeGeometry(pedShape);
        for (const face of [+1, -1]) {
            const ped = new THREE.Mesh(pedGeo, stoneMat);
            ped.position.set(0, entabTopY, face * TEMPLE_D / 2);
            if (face === -1) ped.rotation.y = Math.PI;
            g.add(ped);
        }
        const roofSlope = Math.atan2(PEDIMENT_H, TEMPLE_W / 2);
        const roofPlateLen = (TEMPLE_W / 2) / Math.cos(roofSlope);
        const roofGeo = new THREE.BoxGeometry(roofPlateLen, 0.3, TEMPLE_D);
        for (const side of [+1, -1]) {
            const roof = new THREE.Mesh(roofGeo, stoneMatDarker);
            roof.position.set(side * TEMPLE_W / 4, entabTopY + PEDIMENT_H / 2, 0);
            roof.rotation.z = -side * roofSlope;
            g.add(roof);
        }

        // ---- TWO GLOWING LAMPS at each end ----
        const lampMat = new THREE.MeshStandardMaterial({
            color: 0xffe098,
            emissive: 0xff9028,
            emissiveIntensity: 2.0,
            roughness: 0.25,
            metalness: 0.0,
            fog: false
        });
        const lampGeo = new THREE.SphereGeometry(0.9, 16, 12);
        const LAMP_X = TEMPLE_W / 2 + 0.6;
        const LAMP_Y = stylobateTopY + COL_H * 0.7;
        // Front face Z (toward the board) — depends on orientation
        const LAMP_Z = TEMPLE_D / 2 - 0.8;
        function makeLamp(x, z) {
            const lamp = new THREE.Mesh(lampGeo, lampMat);
            lamp.position.set(x, LAMP_Y, z);
            lamp.userData.isMountainTempleLamp = true;
            g.add(lamp);
            const light = new THREE.PointLight(0xff9040, 1.8, 24, 2.0);
            light.position.set(x, LAMP_Y, z);
            g.add(light);
            // Visible halo at distance
            const haloCanvas = document.createElement('canvas');
            haloCanvas.width = 128;
            haloCanvas.height = 128;
            const hctx = haloCanvas.getContext('2d');
            const hg = hctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            hg.addColorStop(0,    'rgba(255, 230, 170, 1.0)');
            hg.addColorStop(0.3,  'rgba(255, 180, 90, 0.55)');
            hg.addColorStop(0.7,  'rgba(255, 120, 50, 0.2)');
            hg.addColorStop(1,    'rgba(180, 60, 20, 0.0)');
            hctx.fillStyle = hg;
            hctx.fillRect(0, 0, 128, 128);
            const haloTex = new THREE.CanvasTexture(haloCanvas);
            const haloMat = new THREE.SpriteMaterial({
                map: haloTex,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                fog: false
            });
            const halo = new THREE.Sprite(haloMat);
            halo.scale.set(6, 6, 1);
            halo.position.set(x, LAMP_Y, z);
            g.add(halo);
        }
        makeLamp(+LAMP_X, LAMP_Z);
        makeLamp(-LAMP_X, LAMP_Z);

        g.userData.isMountainTemple = true;
        return g;
    }
    // Mountains' top edge sits at y ≈ 47 (cylinder ranges y=-5 to y=85;
    // peak silhouette tops occupy roughly the bottom 50% of the texture).
    // Push the temples to z = ±420 (just inside the mountain ring at 460)
    // so they appear to sit ON the mountain peaks rather than floating
    // in the sky beyond them.
    const TEMPLE_DIST = 420;
    const TEMPLE_Y = 50;        // on top of the highest mountain peaks
    // White temple: half scale + shifted to the right (+X), aligning
    // visually with the white roster panel (which appears on the right
    // side of the screen via the HTML HUD).
    const whiteMountainTemple = buildMountainTemple(+110, TEMPLE_Y, +TEMPLE_DIST, true,  +1, 0.5);
