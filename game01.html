const queenStarGlowGeometry = new THREE.SphereGeometry(0.10, 24, 16);

// Separate group so we can clear/rebuild royal halos independently from turn halos.
const goldHaloGroup = new THREE.Group();
world.add(goldHaloGroup);

const starGroup = new THREE.Group();
world.add(starGroup);

function clearHalos() {
    while (haloGroup.children.length > 0) {
        const h = haloGroup.children[0];
        haloGroup.remove(h);
    }
}

function clearGoldHalos() {
    while (goldHaloGroup.children.length > 0) {
        const h = goldHaloGroup.children[0];
        goldHaloGroup.remove(h);
    }
}

function clearStars() {
    while (starGroup.children.length > 0) {
        const o = starGroup.children[0];
        starGroup.remove(o);
    }
}

function buildHalos() {
    clearHalos();
    const status = getGameStatus();
    if (status === 'checkmate' || status === 'stalemate'
        || status === 'win-w' || status === 'win-b') return;

    const turn = getCurrentTurn();
    const haloMat = turn === 'w' ? haloMaterialForWhiteTurn : haloMaterialForBlackTurn;

    pieceGroup.children.forEach(pieceMesh => {
        if (pieceMesh.userData.color !== turn) return;
        const ring = new THREE.Mesh(haloRingGeometry, haloMat);
        ring.rotation.x = -Math.PI / 2;
        const topY = pieceMesh.position.y + pieceMesh.geometry.parameters.height / 2 + 0.05;
        ring.position.set(pieceMesh.position.x, topY, pieceMesh.position.z);
        ring.userData.haloFor = pieceMesh.userData.id;
        haloGroup.add(ring);
    });
}

// Gold royal halos: always above kings and queens, regardless of whose turn it is.
function buildGoldHalos() {
    clearGoldHalos();
    if (getGameMode() !== 'chess') return; // checkers doesn't have royals

    pieceGroup.children.forEach(pieceMesh => {
        const t = pieceMesh.userData.type;
        if (t !== 'k' && t !== 'q') return;
        const ring = new THREE.Mesh(goldHaloRingGeometry, goldHaloMaterial);
        ring.rotation.x = -Math.PI / 2;
        // Sits ABOVE the turn halo (turn halo is at +0.05; gold sits at +0.20)
        const topY = pieceMesh.position.y + pieceMesh.geometry.parameters.height / 2 + 0.20;
        ring.position.set(pieceMesh.position.x, topY, pieceMesh.position.z);
        ring.userData.haloFor = pieceMesh.userData.id;
        goldHaloGroup.add(ring);
    });
}

// Star pearls: warm glowing spheres above kings and queens.
//
// Two visual modes:
//   - DEFAULT (most views): bright pale-yellow core + larger gold glow halo
//   - V2 (Light view): polished gold orb + bright horizontal ring (Saturn-style).
//     The additive glow tends to wash out against the bright background, so V2
//     gets a different look that reads cleanly on white.
//
// Both versions are built for every royal piece; visibility toggles based on view.

// V2 alternate materials: polished gold orb + thin bright ring
const starOrbV2Material = new THREE.MeshStandardMaterial({
    color: 0xffd700,
    metalness: 1.0,
    roughness: 0.15,
    envMapIntensity: 2.5
});
const starRingV2Material = new THREE.MeshBasicMaterial({
    color: 0xfff4cc,           // bright pale-yellow ring (catches the eye against white)
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.9
});
// Ring geometries: inner radius slightly larger than orb radius, outer wider
const kingStarRingV2Geo  = new THREE.RingGeometry(0.10, 0.16, 48);
const queenStarRingV2Geo = new THREE.RingGeometry(0.07, 0.12, 48);
const kingStarOrbV2Geo   = new THREE.SphereGeometry(0.07, 24, 16);
const queenStarOrbV2Geo  = new THREE.SphereGeometry(0.05, 24, 16);

function buildStars() {
    clearStars();
    if (getGameMode() !== 'chess') return;

    pieceGroup.children.forEach(pieceMesh => {
        const t = pieceMesh.userData.type;
        if (t !== 'k' && t !== 'q') return;

        const coreGeom = t === 'k' ? kingStarCoreGeometry : queenStarCoreGeometry;
        const glowGeom = t === 'k' ? kingStarGlowGeometry : queenStarGlowGeometry;
        const orbV2Geom = t === 'k' ? kingStarOrbV2Geo   : queenStarOrbV2Geo;
        const ringV2Geom = t === 'k' ? kingStarRingV2Geo : queenStarRingV2Geo;

        const offset = t === 'k' ? 0.45 : 0.38;
        const topY = pieceMesh.position.y + pieceMesh.geometry.parameters.height / 2 + offset;
        const x = pieceMesh.position.x;
        const z = pieceMesh.position.z;

        // --- DEFAULT look (most views) ---
        // Outer glow layer (additive-blend, semi-transparent)
        const glow = new THREE.Mesh(glowGeom, starGlowMaterial);
        glow.position.set(x, topY, z);
        glow.userData.starLook = 'default';
        starGroup.add(glow);

        // Bright core layer (solid, opaque)
        const core = new THREE.Mesh(coreGeom, starCoreMaterial);
        core.position.set(x, topY, z);
        core.userData.starLook = 'default';
        starGroup.add(core);

        // --- V2 ALTERNATE look (Light view) ---
        // Polished gold orb
        const orbV2 = new THREE.Mesh(orbV2Geom, starOrbV2Material);
        orbV2.position.set(x, topY, z);
        orbV2.userData.starLook = 'v2';
        starGroup.add(orbV2);
        // Horizontal ring around the orb (slightly tilted so it reads as 3D, not a flat disc edge-on)
        const ringV2 = new THREE.Mesh(ringV2Geom, starRingV2Material);
        ringV2.rotation.x = Math.PI / 2 - 0.18; // tilt ~10° off horizontal
        ringV2.position.set(x, topY, z);
        ringV2.userData.starLook = 'v2';
        starGroup.add(ringV2);
    });

    // Apply current view's visibility on first build
    applyStarLookForView(currentViewId);
}

// Show only the correct set of star-pearl meshes for the active view.
function applyStarLookForView(viewId) {
    const wantV2 = (viewId === 2);
    starGroup.children.forEach(mesh => {
        if (mesh.userData.starLook === 'v2') mesh.visible = wantV2;
        else if (mesh.userData.starLook === 'default') mesh.visible = !wantV2;
    });
}

function renderPieces() {
    while (pieceGroup.children.length > 0) {
        pieceGroup.remove(pieceGroup.children[0]);
    }

    const boardState = getBoardState();
    for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
            const square = boardState[row][col];
            if (!square) continue;

            const geometry = getPieceGeometry(square);
            const material = getPieceMaterial(square);
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;

            const squareName = files[col] + ranks[row];
            mesh.userData = { id: squareName, type: square.type, color: square.color, isTile: false };

            mesh.position.set(
                col - 3.5,
                mesh.geometry.parameters.height / 2 + 0.1,
                row - 3.5
            );
            pieceGroup.add(mesh);
        }
    }
    buildHalos();
    buildGoldHalos();
    buildStars();
    renderAltarPieces();
}

// ----- ALTAR BOARD MIRRORING -----
// Each temple has a mini chessboard on its altar. Both altars mirror the
// main match: every move on the central board reflects on the altars
// instantly because renderAltarPieces is called by renderPieces.
//
// Each altar board is identified by the `userData.altarBoardGroup` flag
// set when the temple was built. We walk all active view props, look for
// any group that has a child marked with that flag, and (re)populate it
// with scaled-down piece meshes mirroring the current board state.
//
// The mini pieces reuse the same geometry/material as the full pieces but
// are scaled down to fit the altar's smaller tile size. We DO NOT tag
// them with userData.id (so they don't register as clickable in the
// raycaster's piece selection — the altars are display-only for now).
function renderAltarPieces() {
    if (typeof activeViewProps === 'undefined' || activeViewProps.length === 0) return;
    const boardState = getBoardState();
    // Walk every active view prop. Each temple group has child groups;
    // we look for the altar board group via its userData flag.
    for (const prop of activeViewProps) {
        prop.traverse(obj => {
            if (!obj.userData || !obj.userData.isAltarBoard) return;
            // Clear existing children that aren't tiles (tiles are the
            // 64 board squares; pieces are everything else).
            const toRemove = [];
            for (const child of obj.children) {
                if (!child.userData || !child.userData.isAltarTile) {
                    // Tiles weren't tagged — distinguish by mesh height.
                    // Tile geometry is 0.02 tall, pieces are >= 0.5 tall.
                    if (child.geometry && child.geometry.parameters
                        && child.geometry.parameters.height
                        && child.geometry.parameters.height > 0.05) {
                        toRemove.push(child);
                    }
                }
            }
            for (const c of toRemove) obj.remove(c);

            // Repopulate from board state. Mini tiles are MINI_TILE_SIZE
            // wide (stored in userData.tileSize). The full piece geometry
            // is 1 unit wide; we scale to make pieces fit nicely on the
            // smaller tiles.
            const tileSize = obj.userData.tileSize;
            const pieceScale = tileSize * 0.85;   // a bit smaller than tile
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const sq = boardState[row][col];
                    if (!sq) continue;
                    const geometry = getPieceGeometry(sq);
                    const material = getPieceMaterial(sq);
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.scale.set(pieceScale, pieceScale, pieceScale);
                    mesh.castShadow = true;
                    mesh.position.set(
                        (col - 3.5) * tileSize,
                        (mesh.geometry.parameters.height * pieceScale) / 2 + 0.02,
                        (row - 3.5) * tileSize
                    );
                    obj.add(mesh);
                }
            }
        });
    }
}

// ----- PIECE IDENTITY TRACKING (for coffin assignment) -----
// Each piece has a stable "home" — the square it started on. We track this so that
// when piece-on-d4 captures piece-on-d5, we know whose coffin to send d5's piece to,
// regardless of where d5's piece originated.
//
// Map: currentSquare -> startingSquare. Updated after every move.
let pieceHomeMap = {};

function resetPieceHomes() {
    pieceHomeMap = {};
    const state = getBoardState();
    for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
            if (state[row][col]) {
                const sq = files[col] + ranks[row];
                pieceHomeMap[sq] = sq;
            }
        }
    }
}
resetPieceHomes();

// Snapshot the board state into a {square: {type, color}} map for diffing.
function snapshotBoard() {
    const state = getBoardState();
    const snap = {};
    for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
            if (state[row][col]) {
                snap[files[col] + ranks[row]] = state[row][col];
            }
        }
    }
    return snap;
}

// Given before/after board snapshots, return:
//   - movedFrom, movedTo: the primary move (one piece changed squares)
//   - captures: array of {square, piece} for any captured pieces
// Handles normal moves, captures, en passant, and castling (which moves two pieces).
function diffBoards(before, after) {
    const disappeared = [];    // squares occupied before but not after
    const appeared = [];       // squares occupied after but not before
    for (const sq in before) {
        if (!after[sq]) disappeared.push(sq);
        else if (after[sq].color !== before[sq].color || after[sq].type !== before[sq].type) {
            // Piece on this square changed color OR type (capture replacement, or promotion).
            // Treat it as: original piece on this square disappeared AND a new one appeared.
            disappeared.push(sq);
            appeared.push(sq);
        }
    }
    for (const sq in after) {
        if (!before[sq]) appeared.push(sq);
    }

    // Pair disappeared->appeared squares of the same color as moves.
    // The leftover disappeared (of opposing color, or unmatched) are captures.
    const captures = [];
    const moves = [];
    const usedAppeared = new Set();

    for (const fromSq of disappeared) {
        const movingPiece = before[fromSq];
        // Try to find an appeared square with the same color (the moving piece's destination)
        const candidate = appeared.find(toSq =>
            !usedAppeared.has(toSq) &&
            after[toSq] &&
            after[toSq].color === movingPiece.color
        );
        if (candidate) {
            moves.push({ from: fromSq, to: candidate });
            usedAppeared.add(candidate);
        } else {
            // No same-color destination: this piece was captured (and removed).
            captures.push({ square: fromSq, piece: movingPiece });
        }
    }

    return { moves, captures };
}

// ----- CAPTURE ANIMATION -----
// When a piece is captured, we keep its mesh around and animate it sinking from its
// last-known board position straight down into its dedicated coffin.
const capturedGroup = new THREE.Group();
world.add(capturedGroup);

const animations = []; // [{mesh, startY, endY, startTime, duration, endX, endZ, startX, startZ}, ...]
const CAPTURE_ANIM_MS = 1200;

// Smooth easing: easeInOutCubic
function ease(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function startCaptureAnimation(capturedMesh, targetCoffin) {
    // Coffin position is its world position; we want to animate the captured piece's
    // local position (it's in capturedGroup which is in `world`, same as coffin).
    // So we use the coffin's local position directly.
    const startX = capturedMesh.position.x;
    const startY = capturedMesh.position.y;
    const startZ = capturedMesh.position.z;
    const endX = targetCoffin.position.x;
    const endY = targetCoffin.position.y - COFFIN_DEPTH / 2 + capturedMesh.geometry.parameters.height / 2;
    const endZ = targetCoffin.position.z;

    animations.push({
        mesh: capturedMesh,
        startX, startY, startZ,
        endX, endY, endZ,
        startTime: performance.now(),
        duration: CAPTURE_ANIM_MS
    });
}

function updateAnimations(now) {
    for (let i = animations.length - 1; i >= 0; i--) {
        const a = animations[i];
        const t = Math.min(1, (now - a.startTime) / a.duration);
        const e = ease(t);
        a.mesh.position.x = a.startX + (a.endX - a.startX) * e;
        a.mesh.position.y = a.startY + (a.endY - a.startY) * e;
        a.mesh.position.z = a.startZ + (a.endZ - a.startZ) * e;
        if (t >= 1) animations.splice(i, 1);
    }
}

// Wrapper around attemptMove that handles capture detection and animation.
// Returns true if the move was legal (same contract as attemptMove).
function attemptMoveWithCaptures(source, target) {
    const before = snapshotBoard();
    const moved = attemptMove(source, target);
    if (!moved) return false;
    const after = snapshotBoard();

    const { moves, captures } = diffBoards(before, after);

    // For each captured piece, spawn a sinking animation
    for (const cap of captures) {
        const homeSquare = pieceHomeMap[cap.square];
        const coffin = coffinForStartSquare[homeSquare];
        if (!coffin) continue; // shouldn't happen

        // Build a mesh that matches the captured piece, positioned at where it died
        const geom = getPieceGeometry(cap.piece);
        const mat = getPieceMaterial(cap.piece);
        const ghost = new THREE.Mesh(geom, mat);
        ghost.castShadow = true;
        ghost.receiveShadow = true;
        const coords = squareToWorldCoords(cap.square);
        ghost.position.set(coords.x, geom.parameters.height / 2 + 0.1, coords.z);
        // Tag the ghost so the temple-ritual drag system can identify it
        // and check eligibility (only back-row pieces R/N/B/Q can be moved
        // to the temple — pawns and kings are excluded).
        ghost.userData.capturedPiece = {
            type: cap.piece.type,
            color: cap.piece.color,
            homeSquare,
            placedInTemple: null,        // 'white' | 'black' | null
            templeSlotIndex: null,        // 0..7 once placed
            // Resting position relative to capturedGroup (NOT world). The
            // post-capture animation will land the ghost AT the coffin's
            // local position, so we store that as the "home" the drag will
            // snap back to on a missed drop.
            homePos: new THREE.Vector3(
                coffin.position.x,
                coffin.position.y - COFFIN_DEPTH / 2 + geom.parameters.height / 2,
                coffin.position.z
            )
        };
        capturedGroup.add(ghost);
        startCaptureAnimation(ghost, coffin);

        // Free up the home so future pieces don't collide. (Probably overkill — once
        // a piece is captured, its home square no longer hosts a piece either way.)
        delete pieceHomeMap[cap.square];
    }

    // Update the home map for all moves (handle castling: 2 moves happen at once)
    for (const m of moves) {
        if (pieceHomeMap[m.from]) {
            pieceHomeMap[m.to] = pieceHomeMap[m.from];
            delete pieceHomeMap[m.from];
        }
    }

    return true;
}

// Helper used by the capture animation
function squareToWorldCoords(square) {
    const col = files.indexOf(square[0]);
    const row = ranks.indexOf(square[1]);
    return { x: col - 3.5, z: row - 3.5 };
}

// On reset or mode switch, clear captured pieces and re-init homes
function clearCryptAndReset() {
    while (capturedGroup.children.length > 0) {
        capturedGroup.remove(capturedGroup.children[0]);
    }
    animations.length = 0;
    resetPieceHomes();
}

let BLACK_ROSTER = [];

// Format a date value for display. The CSV may contain:
//   - Plain integers like -3000 (BCE) or 1412 (CE) — common from Excel exports
//   - Strings like "540 BC" or "1412" — already formatted
// We convert negative numbers to "<n> BC" and leave positive numbers / strings alone.
function formatDate(value) {
    if (value === null || value === undefined || value === '') return '';
    const s = String(value).trim();
    if (!s) return '';
    // Pure integer with optional minus sign — convert negatives to BC.
    if (/^-?\d+$/.test(s)) {
        const n = parseInt(s, 10);
        return n < 0 ? `${-n} BC` : String(n);
    }
    // Already a formatted string (e.g. "540 BC", "circa 1200") — leave alone.
    return s;
}

// Build the "Title — born–died" subtitle string from a figure.
function figureSubtitle(figure) {
    const dates = [];
    const b = formatDate(figure.birthDate);
    const d = formatDate(figure.deathDate);
    if (b) dates.push(b);
    if (d) dates.push(d);
    const dateStr = dates.length === 2 ? dates.join(' – ')
                  : dates.length === 1 ? dates[0]
                  : '';
    const parts = [];
    if (figure.title) parts.push(figure.title);
    if (dateStr) parts.push(dateStr);
    return parts.join(' — ');
}

function showHoverCard(figure, anchorEl, anchorRect) {
    if (!figure) return;
    cardName.textContent = figure.fullName;
    cardSubtitle.textContent = figureSubtitle(figure);
    cardBio.textContent = figure.biography || '';
    cardBio.style.display = figure.biography ? 'block' : 'none';

    // Show the link if the figure has one. Multi-URL: we display only the first.
    if (figure.links && figure.links.length > 0) {
        cardLink.href = figure.links[0];
        cardLink.textContent = 'More \u2192';
        cardLink.style.display = 'inline-block';
    } else {
        cardLink.style.display = 'none';
    }

    // Position the card next to the anchor element
    hoverCard.style.display = 'block';
    const rect = anchorRect || (anchorEl && anchorEl.getBoundingClientRect());
    if (rect) {
        const cardW = hoverCard.offsetWidth || 240;
        const cardH = hoverCard.offsetHeight || 80;
        let left = rect.right + 10;
        // If the anchor is on the right side of the screen, flip the card to the left
        if (rect.left > window.innerWidth / 2) {
            left = rect.left - cardW - 10;
        }
        let top = rect.top + rect.height / 2 - cardH / 2;
        // Clamp within viewport
        top = Math.max(8, Math.min(top, window.innerHeight - cardH - 8));
        left = Math.max(8, Math.min(left, window.innerWidth - cardW - 8));
        hoverCard.style.left = left + 'px';
        hoverCard.style.top = top + 'px';
    }

    // Glow the name in the roster if found
    if (anchorEl && anchorEl.dataset && anchorEl.dataset.figureName) {
        anchorEl.style.textShadow = '0 0 8px #fff, 0 0 4px #fff';
        currentlyGlowingNameEl = anchorEl;
    }
}
function hideHoverCard() {
    if (hoveringCard) return; // don't hide while pointer is on the card
    hoverCard.style.display = 'none';
    if (currentlyGlowingNameEl) {
        currentlyGlowingNameEl.style.textShadow = '';
        currentlyGlowingNameEl = null;
    }
}
function scheduleHoverCard(figure, anchorEl, anchorRect) {
    cancelHoverCard();
    hoverTimerId = setTimeout(() => {
        showHoverCard(figure, anchorEl, anchorRect);
        hoverTimerId = null;
    }, HOVER_DELAY_MS);
}
function cancelHoverCard() {
    if (hoverTimerId) {
        clearTimeout(hoverTimerId);
        hoverTimerId = null;
    }
    hideHoverCard();
}

function buildRosterPanel(side, anchor, glyphs, figures) {
    const panel = document.createElement('div');
    panel.className = 'hud-corner';
    panel.style.cssText = panelPos(anchor) + 'display: flex; flex-direction: column; gap: 6px; font-size: 13px;';

    header.textContent = side === 'w' ? 'White' : 'Black';
    header.style.cssText = 'font-weight: bold; margin-bottom: 4px; font-size: 14px;';
    panel.appendChild(header);

    const rightAnchored = anchor === 'rosterRight';
    for (let i = 0; i < 8; i++) {
        const figure = figures[i];
        const row = document.createElement('div');
        row.style.cssText = 'display: flex; align-items: center; gap: 8px;'
            + (rightAnchored ? 'justify-content: flex-end;' : 'justify-content: flex-start;');

        const glyphEl = document.createElement('span');
        glyphEl.textContent = glyphs[i];
        glyphEl.style.cssText = 'font-size: 18px; min-width: 22px; text-align: center;';

        const nameEl = document.createElement('span');
        nameEl.textContent = figure.fullName;
        nameEl.dataset.figureName = figure.fullName;
        nameEl.style.cssText = 'cursor: default; transition: text-shadow 0.2s;';
        // Hover handlers: 1-second delay before showing card
        nameEl.addEventListener('mouseenter', () => scheduleHoverCard(figure, nameEl));

        if (rightAnchored) {
            row.appendChild(nameEl);
            row.appendChild(glyphEl);

            row.appendChild(nameEl);

    document.body.appendChild(panel);
    return panel;
}

// ----- CAPSTONE GLOW INTENSITY SLIDER -----
// The bright atmospheric halo around each pyramid's gold capstone can wash
// out the pyramid silhouette when set too high. This slider scales every
// capstone-glow mesh's opacity by (lightLevel / 10), so:
//   slider value 1  → 10% (subtle gilded peak, no halo bloom)
//   slider value 5  → 50% (balanced glow)
//   slider value 10 → 100% (the original full atmospheric glow)
//
// The scaling walks every Object3D in the scene tagged userData.capstoneGlow
// with a stored baseOpacity. Walking the scene each input event is cheap
// (a few dozen meshes total). We do NOT touch the orbiting spotlight — that
// stays at its natural brightness so the rest of the scene lighting is
// unchanged.
// ----- CAPSTONE GLOW INTENSITY SLIDER -----
// The bright atmospheric halo around each pyramid's gold capstone can wash
// out the pyramid silhouette when set too high. This slider scales every
// capstone-glow mesh's opacity by (lightLevel / 10), so:
//   slider value 1  → 10% (subtle gilded peak, no halo bloom)
//   slider value 5  → 50% (balanced glow)
//   slider value 10 → 100% (the original full atmospheric glow)
//
// The slider ALSO drives the directional sky-dome contrast in View 3:
// see _skyRepaint below, which is wired up when buildPyramidProps builds
// the sky for the first time.
let lightLevel = 5;  // mid-default — cuts the original glare in half on first load.

// Module-level handle assigned by buildPyramidProps when the sky dome is
// built. applyLightLevel() reads it to repaint the directional gradient
// with new contrast. Declared up here (before applyLightLevel is first
// invoked) to avoid a temporal-dead-zone error when applyLightLevel runs
// at startup with no sky dome yet.
let _skyRepaint = null;

function applyLightLevel() {
    const scale = lightLevel / 10;
    scene.traverse(obj => {
        if (!obj.material) return;
        // Capstone glow — opacity scales with light level
        if (obj.userData && obj.userData.capstoneGlow) {
            obj.material.opacity = obj.userData.baseOpacity * scale;
        }
        // White pyramid body — becomes increasingly reflective/polished as
        // light dims. At slider 10 it's matte stone; at slider 1 it's a
        // mirror. The user wanted: light DOWN → surface MORE reflective.
        // We blend roughness toward 0 and metalness toward 1 as scale → 0.
        if (obj.material.userData && obj.material.userData.whitePyramidBody) {
            const m = obj.material;
            const baseRough = m.userData.baseRoughness;
            const baseMetal = m.userData.baseMetalness;
            // At scale=1 (full light): authored values (matte stone).
            // At scale=0 (no light):    roughness=0.05, metalness=1.0.
            m.roughness = baseRough * scale + 0.05 * (1 - scale);
            m.metalness = baseMetal * scale + 1.00 * (1 - scale);
            // Hint to the renderer that material changed (PMREM-based
            // standard material picks up changes on next frame).
            m.needsUpdate = true;
        }
    });
    // Also drive sky brightness: slider 1 → 10% (very dark sky), slider 10
    // → 100% (full authored colors). Acts like a master dimmer: turning the
    // light DOWN darkens the whole sky toward black, including the white-
    // pyramid side. (The previous "push from gray" mapping brightened dark
    // pixels when slider went down — wrong direction visually.)
    if (_skyRepaint) {
        const skyIntensity = lightLevel / 10;
        _skyRepaint(skyIntensity);
    }
}
// First-call note: the pyramid view's props build lazily on first activation
// of View 3. If the view isn't active yet, traverse finds nothing — harmless.
// applyLightLevel() is called again when View 3 activates (see setView).
applyLightLevel();

// ----- CAMERA ELEVATION TOGGLE -----
// Three preset camera views. Each sets the camera to a starting position and
// constrains the orbit-controls polar angle so the user can still drag the
// camera around but can't cross the "terminal angle" appropriate to each mode.
// Three.js OrbitControls polar angle convention: 0 = straight up (looking
// down from directly overhead), π/2 = horizon, π = straight down (looking
// up from directly underneath).
//
//   Above   — top hemisphere only (polar 0..π/2). Looking down at the board
//             from above. Crypt/coffins/marquee hidden for a cleaner view.
//   Current — fully free. No polar limits, original spawn pose, everything
//             visible.
//   Below   — bottom hemisphere only (polar π/2..π). Looking up at the
//             board from below the crypt. Crypt visible.
const ELEVATION_PRESETS = {
    above: {
        // Behind the white pieces (white back rank at z = +3.5), slightly
        // above ground level. Camera sits just over the height of the
        // tallest piece (the king is ~1.2 tall) so the view is "looking
        // out across the army" toward the black side. Target is past the
        // board center toward black so the line-of-sight runs straight
        // down the board.
        position: new THREE.Vector3(0, 1.5, 7),
        target:   new THREE.Vector3(0, 0.5, -3),
        // Allow viewing from anywhere in the top hemisphere down to (just
        // above) horizon. Stopping a hair before π/2 prevents the camera
        // from going perfectly flat where it would otherwise reveal the
        // hidden crypt below.
        minPolar: 0.05,
        maxPolar: Math.PI / 2 - 0.05,
        hideCrypt: true
    },
    current: {
        position: new THREE.Vector3(0, 10, 12),
        target:   new THREE.Vector3(0, 0, 0),
        // No clamp — restore Three.js defaults (0..π).
        minPolar: 0,
        maxPolar: Math.PI,
        hideCrypt: false
    },
    below: {
        // Just slightly above the coffin line (coffins sit at CRYPT_Y = -2.4),
        // looking across the burial chamber toward the far side. Reads as
        // "kneeling at the foot of the coffins" — eye-level with the
        // chamber rather than peeking up from beneath. The camera sits
        // BEHIND the white side's coffins (positive Z) so the row of
        // captured pieces is laid out in front of the viewer.
        position: new THREE.Vector3(0, -1.8, 8),
        target:   new THREE.Vector3(0, -2.2, -3),
        // Confine the orbit to a band around the crypt's horizontal plane
        // (≈ π/2). Stopping a touch short of perfectly horizontal keeps
        // the camera from going perfectly flat or below the floor.
        minPolar: Math.PI / 2 - 0.15,
        maxPolar: Math.PI / 2 + 0.3,
        hideCrypt: false
    }
};

let cameraElevation = 'current';   // tracks which preset is active
let elevationAnimation = null;     // {fromPos, toPos, fromTgt, toTgt, start, duration}
const ELEVATION_EASE_MS = 700;

function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function setCameraElevation(name) {
    const preset = ELEVATION_PRESETS[name];
    if (!preset) return;
    cameraElevation = name;
    // Start animated transition from current camera pose to the preset.
    elevationAnimation = {
        fromPos: camera.position.clone(),
        toPos:   preset.position.clone(),
        fromTgt: controls.target.clone(),
        toTgt:   preset.target.clone(),
        start:   performance.now(),
        duration: ELEVATION_EASE_MS
    };
    // Apply visibility rules immediately. The crypt/captured-piece groups
    // sit "below ground" in world space, so for the above-board view we
    // hide them.
    cryptGroup.visible    = !preset.hideCrypt;
    capturedGroup.visible = !preset.hideCrypt;
    // The marquee rail sits even further below the crypt; hide it too in
    // the above view.
    marqueePanel.visible  = !preset.hideCrypt;

    // Apply polar-angle clamps. Rotation, pan, and zoom all stay enabled —
    // the user retains full camera freedom WITHIN the hemisphere appropriate
    // to the chosen elevation. Crossing the "terminal angle" is simply
    // blocked by the clamp, not by disabling controls.
    controls.minPolarAngle = preset.minPolar;
    controls.maxPolarAngle = preset.maxPolar;

    updateElevationToggle();
    markActivity();
}

// Per-frame easing of the elevation transition. Called from animate().
function updateElevation(now) {
    if (!elevationAnimation) return;
    const a = elevationAnimation;
    const t = Math.min(1, (now - a.start) / a.duration);
    const e = easeInOutCubic(t);
    camera.position.lerpVectors(a.fromPos, a.toPos, e);
    controls.target.lerpVectors(a.fromTgt, a.toTgt, e);
    if (t >= 1) elevationAnimation = null;
}

// orientation flips the triangle so "Above" reads as ▲ and "Below" as ▼.
function makePyramidIconButton(fillColor, tooltip, ariaLabel, orientation) {
    const btn = document.createElement('button');
    btn.className = 'pyramid-icon-btn';
    btn.title = tooltip;
    btn.setAttribute('aria-label', ariaLabel);
    // viewBox 0..24. Apex-up (▲) has the lone point at top; apex-down (▼)

    const points = (orientation === 'down')
        ? '2,3 22,3 12,21'      // ▼ base at top, apex at bottom
        : '12,3 22,21 2,21';    // ▲ apex at top, base at bottom
    btn.innerHTML = `
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <polygon points="${points}"
                     fill="${fillColor}"
                     stroke="rgba(255,255,255,0.6)"
                     stroke-width="1.2"
                     stroke-linejoin="round"/>
        </svg>
    `;
    return btn;
}

// board colors, environment, fog, etc.) in the VIEWS table and set placeholder=false.
//
// Views can optionally include 3D "props" — meshes built lazily and added to the
// scene when that view becomes active, removed when leaving. The buildProps
// function returns an array of meshes (or groups). The viewPropsCache stores
// them after first build so we don't rebuild on every toggle.

// --- Prop builders (each returns an array of Object3D to add to the scene) ---

function buildPyramidProps() {
    // Two imposing pyramids in the distance — one behind White's side of the
    // board (positive Z) and one behind Black's side (negative Z). The body
    // color matches the side it stands behind: white pyramid for White, black
    // pyramid for Black. Both share an identical gold capstone, like the
    // gilded pyramidion seen on real ancient pyramids.
    //
    // Plus a sky dome wrapping the whole scene with a DIRECTIONAL gradient:
    // looking toward the white pyramid (+Z) the horizon is dark and the
    // zenith is light; looking toward the black pyramid (-Z) the horizon is
    // light and the zenith is dark. Sides blend smoothly between the two.
    // The dome is a large inward-facing sphere; the sky is visible no matter
    // which direction the camera turns.
    const PYR_BASE_RADIUS = 22;  // half of the side length, base footprint
    const PYR_HEIGHT = 20;
    const CAP_BASE = 2.8;        // capstone base half-width
    const CAP_HEIGHT = 2.4;      // capstone height

    // --- Sky dome ---
    // We paint a gradient texture and wrap it onto the inside surface of a
    // large sphere. The sphere's BackSide rendering makes the texture visible
    // from inside (the camera's position).
    //
    // The texture has BOTH a vertical gradient AND a horizontal variation,
    // so the sky looks different depending on which way the camera faces:
    //
    //   Behind the WHITE pyramid (+Z direction):
    //     horizon = DARK, zenith = LIGHT
    //
    //   Behind the BLACK pyramid (-Z direction):
    //     horizon = LIGHT, zenith = DARK
    //
    //   Sides (±X directions): smoothly blend between the two.
    //
    // This gives the scene a sense of dawn-vs-dusk asymmetry — one horizon
    // glows, the other holds the deep night sky overhead, and rotating the
    // camera reveals the transition.
    // Sky-canvas state. We keep the canvas + texture references at this
    // scope so they can be repainted later (the lightLevel slider triggers
    // a repaint to intensify or wash out the directional gradient).
    let _skyCanvas = null;
    let _skyTexture = null;

    // Paint the sky canvas with the current directional gradient.
    // `intensity` scales the contrast: 0 = flat mid-gray, 1 = authored
    // colors, >1 pushes colors further from mid-gray (more dramatic).
    // Each pixel is lerped between gray (128,128,128) and its authored
    // color by `intensity`.
    function paintSkyCanvas(intensity) {
        const c = _skyCanvas;
        if (!c) return;
        const W = c.width, H = c.height;
        const ctx = c.getContext('2d');
        const imgData = ctx.createImageData(W, H);
        const data = imgData.data;

        function lerpColor(a, b, t) {
            const ar = (a >> 16) & 0xff, ag = (a >> 8) & 0xff, ab = a & 0xff;
            const br = (b >> 16) & 0xff, bg = (b >> 8) & 0xff, bb = b & 0xff;
            return [
                Math.round(ar + (br - ar) * t),
                Math.round(ag + (bg - ag) * t),
                Math.round(ab + (bb - ab) * t)
            ];
        }

        function gradientAt(stops, v) {
            for (let i = 0; i < stops.length - 1; i++) {
                const s0 = stops[i], s1 = stops[i + 1];
                if (v >= s0.pos && v <= s1.pos) {
                    const span = s1.pos - s0.pos;
                    const localT = span === 0 ? 0 : (v - s0.pos) / span;
                    return lerpColor(s0.color, s1.color, localT);
                }
            }
            if (v < stops[0].pos) {
                const cc = stops[0].color;
                return [(cc >> 16) & 0xff, (cc >> 8) & 0xff, cc & 0xff];
            }
            const cc = stops[stops.length - 1].color;
            return [(cc >> 16) & 0xff, (cc >> 8) & 0xff, cc & 0xff];
        }

        const whiteSideStops = [
            { pos: 0.00, color: 0xd0d8e0 },
            { pos: 0.30, color: 0x90a0b0 },
            { pos: 0.60, color: 0x3a4050 },
            { pos: 0.85, color: 0x101218 },
            { pos: 1.00, color: 0x050608 }
        ];
        const blackSideStops = [
            { pos: 0.00, color: 0x080608 },
            { pos: 0.35, color: 0x1a1418 },
            { pos: 0.65, color: 0x5a3a28 },
            { pos: 0.85, color: 0xd8b888 },
            { pos: 1.00, color: 0xf0d8a8 }
        ];

        // intensity is a straight brightness multiplier:
        //   final = authored * intensity
        // intensity = 1 → exact authored colors; <1 darkens toward BLACK;
        // >1 brightens (clamped to white at 255).
        // The previous "push from gray" model brightened the dark white-
        // pyramid sky when slider was low — the wrong direction. This
        // multiply model reads more naturally as a stage dimmer.
        function applyIntensity(rgb, k) {
            return [
                Math.max(0, Math.min(255, Math.round(rgb[0] * k))),
                Math.max(0, Math.min(255, Math.round(rgb[1] * k))),
                Math.max(0, Math.min(255, Math.round(rgb[2] * k)))
            ];
        }

        for (let x = 0; x < W; x++) {
            const u = x / (W - 1);
            const phi = u * 2 * Math.PI;
            const zComp = Math.sin(phi);
            const linT = (zComp + 1) / 2;
            const t = linT * linT * (3 - 2 * linT);

            for (let y = 0; y < H; y++) {
                const v = y / (H - 1);
                const whiteRGB = gradientAt(whiteSideStops, v);
                const blackRGB = gradientAt(blackSideStops, v);
                const r = Math.round(blackRGB[0] + (whiteRGB[0] - blackRGB[0]) * t);
                const g = Math.round(blackRGB[1] + (whiteRGB[1] - blackRGB[1]) * t);
                const b = Math.round(blackRGB[2] + (whiteRGB[2] - blackRGB[2]) * t);
                const adj = applyIntensity([r, g, b], intensity);
                const idx = (y * W + x) * 4;
                data[idx]     = adj[0];
                data[idx + 1] = adj[1];
                data[idx + 2] = adj[2];
                data[idx + 3] = 255;
            }
        }
        ctx.putImageData(imgData, 0, 0);
        if (_skyTexture) _skyTexture.needsUpdate = true;
    }

    // Initial sky texture build. Stores canvas + texture refs so the
    // lightLevel slider can call paintSkyCanvas() to repaint later.
    function makeSkyTexture() {
        _skyCanvas = document.createElement('canvas');
        _skyCanvas.width = 256;
        _skyCanvas.height = 512;
        _skyTexture = new THREE.CanvasTexture(_skyCanvas);
        _skyTexture.minFilter = THREE.LinearFilter;
        _skyTexture.magFilter = THREE.LinearFilter;
        // Paint with authored intensity (1.0) initially.
        paintSkyCanvas(1.0);
        return _skyTexture;
    }


    const skyRadius = 200;  // well outside the planets (max radius ~80) and starfield (120)
    const skyGeo = new THREE.SphereGeometry(skyRadius, 32, 24);
    const skyMat = new THREE.MeshBasicMaterial({
        map: makeSkyTexture(),
        side: THREE.BackSide,   // visible from inside the sphere
        depthWrite: false       // sky doesn't occlude things in front of it
    });
    const skyDome = new THREE.Mesh(skyGeo, skyMat);
    skyDome.renderOrder = -1;   // draw before everything else

    // Expose paintSkyCanvas to module scope so the lightLevel slider can
    // repaint the directional gradient when the user moves the slider.
    _skyRepaint = paintSkyCanvas;
    // Apply the current slider value to the freshly-built sky (handles
    // the case where the slider was moved before View 3 was first opened).
    if (typeof lightLevel === 'number') {
        paintSkyCanvas(lightLevel / 10);
    }

    // Build one pyramid as a self-contained group. Body color is parameterized
    // so the two monuments can be tinted differently while sharing geometry.
    // The capstone stays gold in both cases.
    function buildOne(bodyColor) {
        const g = new THREE.Group();

        // Main pyramid body
        const stoneGeo = new THREE.ConeGeometry(PYR_BASE_RADIUS, PYR_HEIGHT, 4);
        const stoneMat = new THREE.MeshStandardMaterial({
            color: bodyColor,
            roughness: 0.95,
            metalness: 0.05
        });
        const stone = new THREE.Mesh(stoneGeo, stoneMat);
        stone.castShadow = true;
        stone.receiveShadow = true;
        stone.position.y = PYR_HEIGHT / 2;  // base sits at Y=0
        // Tag the WHITE pyramid body so applyLightLevel() can polish it as
        // the light dims. Detected by color: bodyColor 0xf0f0f0 is the
        // pale-stone white pyramid (vs 0x1a1a1a for the black one).
        // At full light = matte rough stone. At dim light = polished mirror.
        if (bodyColor === 0xf0f0f0) {
            stoneMat.userData.whitePyramidBody = true;
            stoneMat.userData.baseRoughness = 0.95;
            stoneMat.userData.baseMetalness = 0.05;
        }
        g.add(stone);

        // --- Ridge edges ---
        // Four thin gold "rails" running from each base corner straight up to the
        // apex. Without them, the four faces blend into one another under raking
        // light because adjacent face normals are similar near the ridge — you
        // can see the silhouette but not the inner geometry. Solid gold rails
        // make the four-sided structure read unambiguously from any angle.
        //
        // Geometry: each edge is a thin cylinder. Its length equals the slant
        // height of the pyramid (from a base corner to the apex). We position
        // each cylinder's midpoint at the midpoint of the corresponding edge,
        // then rotate it to point from the base corner up to the apex.
        //
        // ConeGeometry(radius=PYR_BASE_RADIUS, height=PYR_HEIGHT, 4 segments)
        // places the four base vertices at angles 0, 90°, 180°, 270° on the
        // circumscribing circle. With the stone mesh shifted up by PYR_HEIGHT/2,
        // the base of the pyramid sits on y=0 and the apex is at y=PYR_HEIGHT.
        const slantHeight = Math.sqrt(
            PYR_BASE_RADIUS * PYR_BASE_RADIUS + PYR_HEIGHT * PYR_HEIGHT
        );
        // Edge rail thickness — kept slim so the rails read as a precise highlight
        // line rather than a structural beam. At this scale (~20-tall pyramid),
        // 0.12 is roughly a 1-2 pixel band from the default camera distance.
        const RAIL_RADIUS = 0.12;
        const railGeo = new THREE.CylinderGeometry(RAIL_RADIUS, RAIL_RADIUS, slantHeight, 8);

        // Platinum-gold material for the ridge rails. Cooler and paler than the
        // warm yellow used on the capstone — a champagne / white-gold tone that
        // reads as more refined trim and contrasts subtly with the warmer apex
        // it leads up to. Slightly less mirror-polished than the capstone (a
        // touch more roughness) so the rails diffuse the spotlight a little
        // wider and stay visible across more viewing angles, instead of only
        // glinting at the precise specular sweet spot.
        const platinumGoldMaterial = new THREE.MeshStandardMaterial({
            color: 0xf5ead0,           // pale champagne / platinum-gold
            metalness: 1.0,
            roughness: 0.12,
            envMapIntensity: 4.0
        });
        const apex = new THREE.Vector3(0, PYR_HEIGHT, 0);

        for (let i = 0; i < 4; i++) {
            const angle = (i * Math.PI) / 2;  // 0, 90, 180, 270
            const cornerX = Math.cos(angle) * PYR_BASE_RADIUS;
            const cornerZ = Math.sin(angle) * PYR_BASE_RADIUS;
            const corner = new THREE.Vector3(cornerX, 0, cornerZ);

            // Midpoint of the edge — where the cylinder's center should sit.
            const mid = new THREE.Vector3()
                .addVectors(corner, apex)
                .multiplyScalar(0.5);

            // Direction the cylinder should point (from corner to apex).
            // Three.js cylinders are aligned to the Y axis by default, so we
            // use Quaternion.setFromUnitVectors to rotate from +Y to our direction.
            const dir = new THREE.Vector3()
                .subVectors(apex, corner)
                .normalize();
            const quat = new THREE.Quaternion()
                .setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);

            const rail = new THREE.Mesh(railGeo, platinumGoldMaterial);
            rail.position.copy(mid);
            rail.quaternion.copy(quat);
            rail.castShadow = true;
            g.add(rail);
        }

        // --- Pyramid-face "A" letters ---
        // Two large gold "A" glyphs, one mounted on the east face and one on the
        // west face. Each A is 10% of the pyramid height tall (so 2 units high
        // on a 20-tall pyramid) and sits flat against its face, splaying its
        // legs to match the natural slope of the pyramid face's triangle.
        //
        // GEOMETRY of one face (in local pyramid coords, before the group's
        // 45° rotation):
        //   East face corners (after the +45° group rotation): the local face
        //     with base from (r, 0, 0) to (0, 0, r) maps to world +X.
        //   West face: local base from (-r, 0, 0) to (0, 0, -r) maps to world -X.
        //
        // The half-angle of the face triangle at its apex tells us how to splay
        // the A's legs so they parallel the pyramid's ridges:
        //   triangleHeightInFace = sqrt((r/sqrt(2))^2 + H^2)
        //   half-base = r/sqrt(2)
        //   splayAngle = atan(half-base / triangleHeightInFace)
        //
        // We build the A flat on the XY plane (z=0) in its own local frame —
        // apex at the top, two legs splaying down. Then we place it on the
        // pyramid face by translating to the face base midpoint and rotating
        // so the A's local +Y aligns with the up-the-face direction and the
        // A's local +Z aligns with the face's outward normal.
        const A_HEIGHT = PYR_HEIGHT * 0.10;      // 10% of pyramid height
        const A_THICKNESS = 0.06;                // depth so it reads from grazing angles
        const A_STROKE = A_HEIGHT * 0.13;        // line thickness of the letter

        // Compute the A's leg splay so the legs PARALLEL the pyramid's ridges.
        // The pyramid face is an isosceles triangle whose base goes from one
        // corner to the next (length = PYR_BASE_RADIUS * sqrt(2)) and whose
        // height (in the plane of the face) goes from the base midpoint up
        // to the shared apex.
        //   In-face triangle height = sqrt((r/sqrt(2))^2 + H^2)
        //   In-face half-base       = r/sqrt(2)
        //   Apex half-angle         = atan(half-base / triangleHeight)
        // The A's legs splay at this same angle, so A_HALF_BASE = tan(angle) * A_HEIGHT.
        const halfBaseFace = PYR_BASE_RADIUS / Math.sqrt(2);
        const faceTriangleHeight = Math.sqrt(
            halfBaseFace * halfBaseFace + PYR_HEIGHT * PYR_HEIGHT
        );
        const faceHalfAngleAtApex = Math.atan(halfBaseFace / faceTriangleHeight);
        const A_HALF_BASE_AT_BOTTOM = Math.tan(faceHalfAngleAtApex) * A_HEIGHT;

        // Build the A shape on the X/Y plane: apex centered at (0, A_HEIGHT),
        // legs splaying down to ±A_HALF_BASE_AT_BOTTOM at y=0. Crossbar at
        // y = 0.4 * A_HEIGHT.
        //
        // We build the A from three separate thin extruded boxes:
        // Material for the A glyphs. The user wants:
        //   - On the WHITE pyramid: a BLACK A (high contrast against pale stone)
        //   - On the BLACK pyramid: the existing platinum-gold A
        // Pick once here so buildAGroup just consumes the chosen material.
        const aLetterMaterial = (bodyColor === 0xf0f0f0)
            ? new THREE.MeshStandardMaterial({
                color: 0x0a0a0a,           // near-black, with the smallest dab of life
                roughness: 0.45,
                metalness: 0.05
            })
            : platinumGoldMaterial;

        //   - left leg  (slanted from apex down-left to base)
        //   - right leg (slanted from apex down-right to base)
        //   - crossbar  (horizontal bar joining the two legs partway up)
        // This avoids the headaches of building a single Shape with curved
        // outlines and inset holes, and the result reads cleanly as an "A".
        //
        // All three boxes are extruded along +Z so they extend OUT from the
        // pyramid face when we attach the assembled A.
        function buildAGroup() {
            const grp = new THREE.Group();
            const stroke = A_STROKE;
            const halfBase = A_HALF_BASE_AT_BOTTOM;
            const apexY = A_HEIGHT;

            // Length of one leg: distance from apex (0, apexY) to base (halfBase, 0).
            const legLength = Math.sqrt(halfBase * halfBase + apexY * apexY);
            // Angle of the leg from vertical:
            const legAngle = Math.atan(halfBase / apexY);

            // --- Right leg ---
            // A thin rectangle of width=stroke, height=legLength. We rotate it
            // around its center so the top end lands at (0, apexY) and the
            // bottom at (halfBase, 0). Positive Z rotation (counter-clockwise
            // when viewed from +Z) rotates the box top from (0, +legLength/2)
            // to (-halfBase/2, +apexY/2). Adding the center offset of
            // (halfBase/2, apexY/2) places the top exactly at (0, apexY).
            const legGeo = new THREE.BoxGeometry(stroke, legLength, A_THICKNESS);
            const rightLeg = new THREE.Mesh(legGeo, aLetterMaterial);
            rightLeg.position.set(halfBase / 2, apexY / 2, 0);
            rightLeg.rotation.z = legAngle;
            grp.add(rightLeg);

            // --- Left leg ---  (mirror of right)
            const leftLeg = new THREE.Mesh(legGeo, aLetterMaterial);
            leftLeg.position.set(-halfBase / 2, apexY / 2, 0);
            leftLeg.rotation.z = -legAngle;
            grp.add(leftLeg);

            // --- Crossbar ---
            // A horizontal bar placed at ~35% of the A's height. Its width
            // spans from inner-edge-of-left-leg to inner-edge-of-right-leg.
            const crossY = apexY * 0.35;
            // At crossY, the leg's outer edge is at x = halfBase * (1 - crossY/apexY).
            // The inner edge is offset toward center by stroke (approximately).
            const legOuterAtCrossY = halfBase * (1 - crossY / apexY);
            const crossbarSpan = 2 * (legOuterAtCrossY - stroke * 0.4);
            const crossGeo = new THREE.BoxGeometry(crossbarSpan, stroke * 0.7, A_THICKNESS);
            const crossbar = new THREE.Mesh(crossGeo, aLetterMaterial);
            crossbar.position.set(0, crossY, 0);
            grp.add(crossbar);

            return grp;
        }

        // Place an A on a specific face. cornerA and cornerB are the two base
        // corners (at ground level). The face's apex is at (0, PYR_HEIGHT, 0).
        function placeAOnFace(cornerA, cornerB) {
            const mid = new THREE.Vector3()
                .addVectors(cornerA, cornerB)
                .multiplyScalar(0.5);              // base midpoint of face (on ground)
            // "Up-the-face" direction: from base midpoint to the apex.
            const upFace = new THREE.Vector3()
                .subVectors(apex, mid)
                .normalize();
            // Face outward normal: perpendicular to both (cornerB - cornerA) and upFace.
            const baseEdge = new THREE.Vector3()
                .subVectors(cornerB, cornerA)
                .normalize();
            let normal = new THREE.Vector3()
                .crossVectors(baseEdge, upFace)
                .normalize();
            // Cross product direction depends on the order of cornerA/cornerB.
            // We want the normal to point AWAY from the pyramid's center (which
            // sits at x=0,z=0 at ground level). If the dot product with the
            // base midpoint (which always points outward from center along
            // the ground) is negative, the cross gave us the inward-facing
            // normal — flip it. Also re-orient baseEdge so it forms a right-
            // handed basis with the flipped normal, so the letter doesn't end
            // up mirrored.
            const outwardCheck = new THREE.Vector3(mid.x, 0, mid.z);
            if (normal.dot(outwardCheck) < 0) {
                normal.multiplyScalar(-1);
                baseEdge.multiplyScalar(-1);
            }
            // We want the A's local +Y to align with upFace, local +Z (extrusion
            // direction) to align with normal, and local +X to align with baseEdge.
            const m = new THREE.Matrix4();
            m.makeBasis(baseEdge, upFace, normal);

            const aGroup = buildAGroup();
            // Make all the A's child meshes cast shadows.
            aGroup.traverse(obj => { if (obj.isMesh) obj.castShadow = true; });
            // Apply the basis rotation, then translate to base midpoint.
            aGroup.applyMatrix4(m);
            aGroup.position.add(mid);
            // Nudge the A slightly forward along the normal so it doesn't
            // z-fight with the pyramid face.
            aGroup.position.addScaledVector(normal, 0.05);
            g.add(aGroup);
        }

        // East face (post-group-rotation): in local coords, base corners are
        // (PYR_BASE_RADIUS, 0, 0) and (0, 0, PYR_BASE_RADIUS).
        placeAOnFace(
            new THREE.Vector3(PYR_BASE_RADIUS, 0, 0),
            new THREE.Vector3(0, 0, PYR_BASE_RADIUS)
        );
        // West face: base corners (-PYR_BASE_RADIUS, 0, 0) and (0, 0, -PYR_BASE_RADIUS).
        placeAOnFace(
            new THREE.Vector3(-PYR_BASE_RADIUS, 0, 0),
            new THREE.Vector3(0, 0, -PYR_BASE_RADIUS)
        );

        // Gold capstone (small pyramid sharing the same apex as the main pyramid).
        // The capstone is buried INSIDE the upper portion of the main pyramid so
        // their tips coincide — only the gilded peak is visible, replacing the
        // body material at the top.
        const capGeo = new THREE.ConeGeometry(CAP_BASE, CAP_HEIGHT, 4);
        const cap = new THREE.Mesh(capGeo, goldFrameMaterial);
        cap.castShadow = true;
        // Both pyramids have their apex at: position.y + height/2 (cone apex is up).
        // Main apex Y = (PYR_HEIGHT / 2) + (PYR_HEIGHT / 2) = PYR_HEIGHT
        // Capstone apex Y = cap.position.y + CAP_HEIGHT / 2
        // To make these equal: cap.position.y = PYR_HEIGHT - CAP_HEIGHT / 2
        cap.position.y = PYR_HEIGHT - CAP_HEIGHT / 2;
        g.add(cap);

        // --- Capstone atmospheric glow ---
        // Three concentric sphere layers centered roughly at the capstone's
        // body (slightly below apex). Each layer uses additive blending and
        // depthWrite=false so they layer on top of one another without
        // occluding anything — pure additive light. Together they create a
        // warm halo of light radiating from the gilded peak.
        //
        // Layer sizes are tuned to read as a halo bigger than the capstone
        // but not so large that it dominates the silhouette of the pyramid:
        //   inner core   = roughly the capstone size, hot bright white-gold
        //   mid halo     = ~2x the capstone, warm gold
        //   outer aura   = ~4x, soft amber-orange, very faint
        const glowCenterY = PYR_HEIGHT - CAP_HEIGHT * 0.4;  // bit below apex

        // All three layers are tagged userData.capstoneGlow with their
        // baseOpacity stored. The lightLevel slider walks the scene at runtime
        // and scales each layer's opacity by (lightLevel / 10) * baseOpacity.
        // So slider=10 leaves them at their authored brightness, slider=1
        // reduces them to 10%, slider=0 (if we ever extend the range) would
        // make them invisible.
        const glowInnerGeo = new THREE.SphereGeometry(CAP_BASE * 1.1, 20, 14);
        const GLOW_INNER_OPACITY = 0.55;
        const glowInnerMat = new THREE.MeshBasicMaterial({
            color: 0xfff4cc,            // hot pale gold-white
            transparent: true,
            opacity: GLOW_INNER_OPACITY,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        const glowInner = new THREE.Mesh(glowInnerGeo, glowInnerMat);
        glowInner.position.y = glowCenterY;
        glowInner.userData.capstoneGlow = true;
        glowInner.userData.baseOpacity = GLOW_INNER_OPACITY;
        g.add(glowInner);

        const glowMidGeo = new THREE.SphereGeometry(CAP_BASE * 2.2, 20, 14);
        const GLOW_MID_OPACITY = 0.28;
        const glowMidMat = new THREE.MeshBasicMaterial({
            color: 0xffd070,            // warm gold
            transparent: true,
            opacity: GLOW_MID_OPACITY,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        const glowMid = new THREE.Mesh(glowMidGeo, glowMidMat);
        glowMid.position.y = glowCenterY;
        glowMid.userData.capstoneGlow = true;
        glowMid.userData.baseOpacity = GLOW_MID_OPACITY;
        g.add(glowMid);

        const glowOuterGeo = new THREE.SphereGeometry(CAP_BASE * 4.0, 24, 16);
        const GLOW_OUTER_OPACITY = 0.10;
        const glowOuterMat = new THREE.MeshBasicMaterial({
            color: 0xff9040,            // warm amber-orange
            transparent: true,
            opacity: GLOW_OUTER_OPACITY,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        const glowOuter = new THREE.Mesh(glowOuterGeo, glowOuterMat);
        glowOuter.position.y = glowCenterY;
        glowOuter.userData.capstoneGlow = true;
        glowOuter.userData.baseOpacity = GLOW_OUTER_OPACITY;
        glowOuter.userData.basePos = glowCenterY;
        g.add(glowOuter);

        // The pyramid is a 4-sided cone built on the X/Z axes. Three.js's
        // ConeGeometry with 4 radial segments places the four corners at
        // +X, +Z, -X, -Z and the four flat faces aligned with the diagonals.
        // To make each flat face squarely face the board (so the pyramid's
        // mid-sagittal plane — the vertical slice front-to-back through the
        // apex — lines up with the board's d-e file midline), we rotate by
        // 45° from the default. This puts the flat faces on the cardinal
        // axes: one face fronting the board, one back, one to each side.
        g.rotation.y = Math.PI / 4;
        return g;
    }

    // White side of the board is positive Z; black side is negative Z. Push each
    // pyramid back far enough that it sits beyond the celestial bodies' arc and
    // reads as a distant horizon monument rather than a foreground object.
    //
    // Body colors match the existing piece palette so the pyramids feel of-a-piece
    // with the rest of the scene (same off-white and near-black used on the pieces
    // and coffins). True 0xffffff / 0x000000 would render with no shading on the
    // facets — the small offsets give each face a visible normal.
    //
    // Both pyramids also slowly rotate around their own Y axis (one full turn
    // every 2 minutes). Because each pyramid sits at x=0 along the chessboard's
    // d-e file midline, the rotation axis IS the pyramid's mid-sagittal plane
    // through the board center — so the spin highlights the alignment instead
    // of disturbing it. Marked with userData.spinningPyramid so the animation
    // loop can find them. The black pyramid spins in the opposite direction
    // for visual contrast — they look like mirrored sentinels.
    const PYR_DISTANCE = 50;
    const PYR_SPIN_PERIOD_MS = 2 * 60 * 1000;  // 2 minutes per full rotation

    const whitePyramid = buildOne(0xf0f0f0);
    whitePyramid.position.set(0, 0, PYR_DISTANCE);
    whitePyramid.userData.spinningPyramid = true;
    whitePyramid.userData.spinDirection = 1;
    whitePyramid.userData.spinPeriod = PYR_SPIN_PERIOD_MS;

    const blackPyramid = buildOne(0x1a1a1a);
    blackPyramid.position.set(0, 0, -PYR_DISTANCE);
    blackPyramid.userData.spinningPyramid = true;
    blackPyramid.userData.spinDirection = -1;
    blackPyramid.userData.spinPeriod = PYR_SPIN_PERIOD_MS;

    // --- Concert atmosphere ---
    // A grab-bag of dramatic-stage elements that turn View 3 from a quiet
    // monument scene into a music-show backdrop. All elements are tagged with
    // userData flags so the per-frame updater can find and animate them:
    //   .lightBeam       — a sweeping cone-shaped light shaft
    //   .hazeParticles   — atmospheric dust (drifts and recycles)
    //   .glintParticles  — bright sparkles rising from below
    //   .stageWash       — colored point light pulsing in time with the visualizer
    const concertProps = buildConcertAtmosphere();

    return [skyDome, whitePyramid, blackPyramid, ...concertProps];
}

// Sample a quadratic Bezier curve at parameter t in [0, 1].
// Used by the flying-name flight paths (and could be reused for other
// smooth curves in the scene). Writes into the provided out Vector3 to
// avoid allocations every frame.
function quadraticBezier(p0, p1, p2, t, out) {
    const u = 1 - t;
    out.x = u * u * p0.x + 2 * u * t * p1.x + t * t * p2.x;
    out.y = u * u * p0.y + 2 * u * t * p1.y + t * t * p2.y;
    out.z = u * u * p0.z + 2 * u * t * p1.z + t * t * p2.z;
    return out;
}

// Build the "concert" stage atmosphere: sweeping light beams from each
// capstone, volumetric haze, drifting sparkles, and stage color washes.
// Returns an array of Object3Ds to add to the scene.
function buildConcertAtmosphere() {
    const out = [];
    const PYR_DISTANCE = 50;
    const PYR_HEIGHT = 20;

    // --- 1. Light beams emanating from each capstone ---
    // Six beams per pyramid, fanning out at different angles. Each beam is a
    // long thin cone (cylinder) with a soft additive glow material — the
    // result is a "godrays from the apex" look.
    function makeBeams(originX, originZ, baseColor) {
        const beams = [];
        const BEAM_COUNT = 6;
        const BEAM_LENGTH = 60;
        const BEAM_TOP_R = 0.05;
        const BEAM_BOT_R = 2.5;
        // Two-tone material for variety: alternate between warm and cool
        const matWarm = new THREE.MeshBasicMaterial({
            color: 0xffd070,
            transparent: true,
            opacity: 0.18,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
            side: THREE.DoubleSide
        });
        const matCool = new THREE.MeshBasicMaterial({
            color: 0x88c0ff,
            transparent: true,
            opacity: 0.14,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
            side: THREE.DoubleSide
        });
        for (let i = 0; i < BEAM_COUNT; i++) {
            // Cone has its apex at top by default (height/2 +Y), base at -height/2 +Y.
            // We want apex AT the capstone position and base UP-AND-OUT.
            // Use a cylinder so we can control top vs bottom radii independently.
            const geo = new THREE.CylinderGeometry(BEAM_TOP_R, BEAM_BOT_R, BEAM_LENGTH, 12, 1, true);
            const mat = i % 2 === 0 ? matWarm : matCool;
            const beam = new THREE.Mesh(geo, mat);
            // Move geometry so the narrow top sits at the LOCAL origin.
            beam.geometry.translate(0, BEAM_LENGTH / 2, 0);
            // Position apex at the pyramid capstone
            beam.position.set(originX, PYR_HEIGHT, originZ);
            // Initial random orientation; will be animated each frame
            beam.userData.lightBeam = true;
            beam.userData.beamIndex = i;
            beam.userData.beamPhase = Math.random() * Math.PI * 2;
            beam.userData.originY = PYR_HEIGHT;
            beam.userData.totalBeams = BEAM_COUNT;
            beams.push(beam);
        }
        return beams;
    }
    out.push(...makeBeams(0, PYR_DISTANCE, 0xffd070));   // white pyramid
    out.push(...makeBeams(0, -PYR_DISTANCE, 0xffd070));  // black pyramid

    // --- 2. Volumetric haze ---
    // A large field of tiny particles in the air between the camera and the
    // pyramids. With additive blending and a soft color, they catch light and
    // give the scene that "smoky club" depth. Particles drift slowly to add
    // motion. 2000 is enough to read as a fog without tanking framerate.
    const HAZE_COUNT = 2000;
    const HAZE_BOX = 80;        // half-extent in X and Z (scene-wide spread)
    const HAZE_HEIGHT = 40;     // vertical extent
    const hazePositions = new Float32Array(HAZE_COUNT * 3);
    const hazeVelocities = new Float32Array(HAZE_COUNT * 3);
    for (let i = 0; i < HAZE_COUNT; i++) {
        hazePositions[i * 3]     = (Math.random() - 0.5) * HAZE_BOX * 2;
        hazePositions[i * 3 + 1] = Math.random() * HAZE_HEIGHT - 2;
        hazePositions[i * 3 + 2] = (Math.random() - 0.5) * HAZE_BOX * 2;
        // Gentle wandering velocities
        hazeVelocities[i * 3]     = (Math.random() - 0.5) * 0.003;
        hazeVelocities[i * 3 + 1] = (Math.random() - 0.5) * 0.002;
        hazeVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.003;
    }
    const hazeGeo = new THREE.BufferGeometry();
    hazeGeo.setAttribute('position', new THREE.BufferAttribute(hazePositions, 3));
    const hazeMat = new THREE.PointsMaterial({
        color: 0xc0a880,
        size: 0.35,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.20,
        depthWrite: false,
        blending: THREE.AdditiveBlending
    });
    const haze = new THREE.Points(hazeGeo, hazeMat);
    haze.userData.hazeParticles = true;
    haze.userData.velocities = hazeVelocities;
    haze.userData.boundsBox = HAZE_BOX;
    haze.userData.boundsY = HAZE_HEIGHT;
    out.push(haze);

    // --- 3. Flying names ---
    // 10 historical names flying through the scene along smooth curved
    // paths. Each name lives for 30 seconds — a slow, calm traversal
    // (originally 10s; user found it too fast and distracting). The fleet
    // is split into two flight-direction groups so the motion has variety:
    //
    //   7 sprites   leftToRight  — drift gently from off-screen left to
    //                              off-screen right. The dominant motion.
    //   3 sprites   rightToLeft  — drift COUNTER to the rest, right to
    //                              left. A minority counter-current.
    //
    // Each sprite KEEPS its direction for the life of the page; recycling
    // pulls a new path of the same type so the ratio stays exact.
    //
    // The paths are constrained to a "comfort zone" that keeps every name
    // a comfortable distance from the camera — never closer than
    // NAME_SAFE_Z (well behind the board, away from the default camera
    // position at z=12).
    //
    // Birth offsets are randomized so all 10 don't enter/exit in sync.
    // Opacity fades in over the first ~1.5s and out over the last ~1.5s
    // so names enter and exit smoothly instead of popping.
    const NAME_COUNT = 10;
    const NAME_COUNTER_COUNT = 3;      // of the 10, this many go right-to-left
    const NAME_LIFE_MS = 30000;        // 30 seconds per name (slower than before)
    const NAME_FADE_IN_MS = 1500;
    const NAME_FADE_OUT_MS = 1500;
    // Comfort zone: names live in Z values FROM NAME_SAFE_Z (closest allowed
    // to the camera) GOING NEGATIVE. So all path points have z ≤ NAME_SAFE_Z.
    // Camera default sits at z=12 looking at origin, so NAME_SAFE_Z = -2 keeps
    // names at least 14 units away from the camera at their closest approach.
    const NAME_SAFE_Z = -2;
    const NAME_FAR_Z  = -45;
    const NAME_X_RANGE = 40;
    const NAME_Y_RANGE = [2, 24];

    // Build texture for one name. Returns a SpriteMaterial.
    function makeNameSpriteMaterial(text) {
        const c = document.createElement('canvas');
        c.width = 1024;
        c.height = 128;
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.font = 'bold 72px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // Subtle shadow so the name reads against bright haze backgrounds.
        ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
        ctx.shadowBlur = 6;
        ctx.fillStyle = '#fff0c0';
        ctx.fillText(text, c.width / 2, c.height / 2);
        const tex = new THREE.CanvasTexture(c);
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        const mat = new THREE.SpriteMaterial({
            map: tex,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
            opacity: 0
        });
        // Attach the canvas so we can repaint with a fresh name when
        // this sprite recycles into its next life.
        mat.userData.canvas = c;
        mat.userData.ctx = ctx;
        return mat;
    }

    // Repaint an existing sprite's texture with a new name. Avoids the
    // cost of creating fresh canvases / textures on every recycle.
    function paintNameOntoSprite(sprite, text) {
        const ctx = sprite.material.userData.ctx;
        const canvas = sprite.material.userData.canvas;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.font = 'bold 72px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
        ctx.shadowBlur = 6;
        ctx.fillStyle = '#fff0c0';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        sprite.material.map.needsUpdate = true;
    }

    // Pull names from the CSV pool. If empty (CSV failed to load), use the
    // placeholder fallback which AppNames always has on hand.
    const namePool = window.AppNames.getAllFigures();
    function pickRandomName() {
        if (namePool.length === 0) return 'Anonymous';
        return namePool[Math.floor(Math.random() * namePool.length)].fullName;
    }

    // Build a left-to-right flight path. Entry off-screen left, exit
    // off-screen right, with a gentle Y-arc and slight depth variation.
    function makeLeftToRightPath() {
        const halfX = NAME_X_RANGE / 2;
        const [yLo, yHi] = NAME_Y_RANGE;
        const p0x = -halfX - 4;                       // start a bit further left so fade-in is offscreen
        const p2x =  halfX + 4;                       // exit slightly further right too
        const p0y = yLo + Math.random() * (yHi - yLo);
        const p2y = yLo + Math.random() * (yHi - yLo);
        // Mid point gives the path a soft arc — Y offset of up to ±3 from
        // the midpoint between p0 and p2 means the curve gently dips or
        // rises in the middle, not a perfect straight line.
        const midX = 0 + (Math.random() - 0.5) * 6;
        const midY = (p0y + p2y) / 2 + (Math.random() - 0.5) * 6;
        const midZ = NAME_FAR_Z + Math.random() * (NAME_SAFE_Z - NAME_FAR_Z) * 0.5;
        return {
            p0: new THREE.Vector3(p0x, p0y, NAME_SAFE_Z),
            p1: new THREE.Vector3(midX, midY, midZ),
            p2: new THREE.Vector3(p2x, p2y, NAME_SAFE_Z)
        };
    }

    // Build a right-to-left flight path. Mirror of leftToRight — entry
    // off-screen right, exit off-screen left. Used by the small minority
    // of sprites that move COUNTER to the dominant left-to-right flow.
    function makeRightToLeftPath() {
        const halfX = NAME_X_RANGE / 2;
        const [yLo, yHi] = NAME_Y_RANGE;
        const p0x =  halfX + 4;
        const p2x = -halfX - 4;
        const p0y = yLo + Math.random() * (yHi - yLo);
        const p2y = yLo + Math.random() * (yHi - yLo);
        const midX = 0 + (Math.random() - 0.5) * 6;
        const midY = (p0y + p2y) / 2 + (Math.random() - 0.5) * 6;
        const midZ = NAME_FAR_Z + Math.random() * (NAME_SAFE_Z - NAME_FAR_Z) * 0.5;
        return {
            p0: new THREE.Vector3(p0x, p0y, NAME_SAFE_Z),
            p1: new THREE.Vector3(midX, midY, midZ),
            p2: new THREE.Vector3(p2x, p2y, NAME_SAFE_Z)
        };
    }

    // Sprite "world width" = how wide the rendered name is in scene units.
    // Three.js sprites scale on-screen automatically with distance from the
    // camera (perspective projection), so closer ones appear larger and
    // farther ones smaller — and since our paths stay in the comfort zone,
    // the size variance is gentle rather than face-filling.
    const NAME_BASE_WIDTH = 6;
    const NAME_BASE_HEIGHT = 0.75;

    // Determine which indices get the counter-current type. Simple split: first
    // N indices are rightToLeft, remaining are leftToRight.
    for (let i = 0; i < NAME_COUNT; i++) {
        const pathType = i < NAME_COUNTER_COUNT ? 'rightToLeft' : 'leftToRight';
        const pathFactory = pathType === 'rightToLeft' ? makeRightToLeftPath : makeLeftToRightPath;

        const mat = makeNameSpriteMaterial(pickRandomName());
        const sprite = new THREE.Sprite(mat);
        sprite.scale.set(NAME_BASE_WIDTH, NAME_BASE_HEIGHT, 1);

        // Random birth offset so all 10 names don't enter / exit in sync.
        const birthOffset = Math.random() * NAME_LIFE_MS;
        sprite.userData.fallingName = true;
        sprite.userData.pathType = pathType;
        sprite.userData.path = pathFactory();
        sprite.userData.birthMs = performance.now() - birthOffset;

        // Set initial position at the right point along its path.
        const tmp = new THREE.Vector3();
        quadraticBezier(sprite.userData.path.p0, sprite.userData.path.p1, sprite.userData.path.p2,
            birthOffset / NAME_LIFE_MS, tmp);
        sprite.position.copy(tmp);

        // Closures stored on the sprite so the updater can call recycle
        // functions even though they're defined in this builder's scope.
        sprite.userData.recyclePath = pathFactory;
        sprite.userData.recycleName = pickRandomName;
        sprite.userData.repaint = paintNameOntoSprite;
        out.push(sprite);
    }

    // --- 4. Stage color washes ---
    // Three colored point lights positioned around the scene at moderate
    // distance, each pulsing on its own rhythm. These provide subtle
    // chromatic accents that wash across the pyramids and board as they
    // pulse — the "RGB wash" you see at live shows.
    //
    // Light 1: warm magenta on the east side
    // Light 2: cool cyan on the west side
    // Light 3: amber from above behind the board
    const washes = [
        { color: 0xff3088, x:  30, y:  8, z: 0,   pulsePeriod: 2400, pulsePhase: 0 },
        { color: 0x30c0ff, x: -30, y:  8, z: 0,   pulsePeriod: 2800, pulsePhase: Math.PI },
        { color: 0xffa040, x:   0, y: 25, z: 30,  pulsePeriod: 3600, pulsePhase: Math.PI * 0.5 }
    ];
    for (const w of washes) {
        const light = new THREE.PointLight(w.color, 0, 80, 1.5);
        light.position.set(w.x, w.y, w.z);
        light.userData.stageWash = true;
        light.userData.pulsePeriod = w.pulsePeriod;
        light.userData.pulsePhase = w.pulsePhase;
        light.userData.baseIntensity = 1.2;
        out.push(light);
    }

    return out;
}

function buildStarfieldProps() {
    // V4: original starfield + the FLAT sprite-disc planet (Sprite-based,
    // doesn't read as 3D mass). Kept around for A/B comparison with the
    // new sphere-based variants in V6-V9.
    const out = [makeStarfieldGroup()];

    // Original flat sprite planet
    const PLANET_TEX_SIZE = 1024;
    const pc = document.createElement('canvas');
    pc.width = PLANET_TEX_SIZE;
    pc.height = PLANET_TEX_SIZE;
    const pctx = pc.getContext('2d');
    const cx = PLANET_TEX_SIZE / 2;
    const cy = PLANET_TEX_SIZE / 2;
    const DISK_RADIUS = PLANET_TEX_SIZE * 0.46;
    pctx.fillStyle = 'rgba(8, 8, 16, 1.0)';
    pctx.beginPath();
    pctx.arc(cx, cy, DISK_RADIUS, 0, Math.PI * 2);
    pctx.fill();
    const RIM_INNER = DISK_RADIUS * 0.93;
    const RIM_OUTER = DISK_RADIUS * 1.07;
    const rimGrad = pctx.createRadialGradient(cx, cy, RIM_INNER, cx, cy, RIM_OUTER);
    rimGrad.addColorStop(0.0, 'rgba(8, 8, 16, 0)');
    rimGrad.addColorStop(0.45, 'rgba(120, 140, 200, 0.55)');
    rimGrad.addColorStop(1.0, 'rgba(20, 30, 60, 0)');
    pctx.fillStyle = rimGrad;
    pctx.fillRect(0, 0, PLANET_TEX_SIZE, PLANET_TEX_SIZE);
    const planetTex = new THREE.CanvasTexture(pc);
    planetTex.minFilter = THREE.LinearFilter;
    planetTex.magFilter = THREE.LinearFilter;
    const planetMat = new THREE.SpriteMaterial({
        map: planetTex,
        transparent: true,
        depthWrite: false
    });
    const planet = new THREE.Sprite(planetMat);
    planet.scale.set(90, 90, 1);
    planet.position.set(0, 8, -90);
    planet.renderOrder = -1;
    out.push(planet);
    return out;
}

// ===== PLANET VIEW VARIANTS (V6 — V9) =====
// Four different believable-planet treatments, each presented as a
// distinct view so you can A/B them. All share the same starfield
// backdrop (built via buildStarfieldProps) so the planet is the only
// variable. Common parameters:
//   - Planet radius:       28 world units (big enough to dominate the sky)
//   - Planet center:       (0, 4, -90)  (off behind the scene)
//   - Camera-facing logic: real spheres rotate slowly so any surface
//                          texture or terminator drifts naturally
//
// The lighting story across all four: imagine a star OFF TO ONE SIDE
// of the camera (let's say upper-left), so the planet's left limb is
// faintly lit and the rest is in shadow. This is achieved with a single
// DirectionalLight in the planet group; the sphere uses MeshStandard
// so it shades correctly.

const PLANET_RADIUS = 28;
const PLANET_CENTER = new THREE.Vector3(0, 4, -90);

// Build the starfield as a separate helper since all four variants need it.
function makeStarfieldGroup() {
    const STAR_COUNT = 1200;
    const STAR_RADIUS = 120;
    const positions = new Float32Array(STAR_COUNT * 3);
    for (let i = 0; i < STAR_COUNT; i++) {
        const phi = Math.acos(2 * Math.random() - 1);
        const theta = Math.random() * Math.PI * 2;
        positions[i * 3]     = STAR_RADIUS * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = STAR_RADIUS * Math.cos(phi);
        positions[i * 3 + 2] = STAR_RADIUS * Math.sin(phi) * Math.sin(theta);
    }
    const geo = new THREE.BufferGeometry();
