    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.5,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.85
    });
    return new THREE.Points(geo, mat);
}

// Build the directional light that simulates the sun lighting the planet
// from off-camera. Same direction across all variants for consistency.
function makePlanetSun() {
    const sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
    // Light coming from upper-left of the camera's view of the planet.
    // Position relative to PLANET_CENTER.
    sun.position.copy(PLANET_CENTER).add(new THREE.Vector3(-80, 40, 60));
    sun.target.position.copy(PLANET_CENTER);
    return sun;
}

// ---- V6: Dark silhouette sphere with a thin lit limb (Option 1) ----
// A real 3D dark sphere lit by a single directional light. The "lit limb"
// is automatically the dark side away from the sun (the part nearest the
// terminator). Reads as a real planetary body silhouetted by being on
// its night side, with just a sliver of light catching the rim.
function buildPlanetV6Props() {
    const out = [];
    out.push(makeStarfieldGroup());
    const sun = makePlanetSun();
    out.push(sun);
    out.push(sun.target);

    // Helper: build a Saturn-like ring system around a planet center.
    // Returns a Mesh of a flat ring (RingGeometry) angled slightly off
    // axis so it reads as a 3D ring rather than a flat line edge-on.
    //
    // ringMaterialOpts is passed to MeshStandardMaterial — caller chooses
    // color/roughness/metalness/etc. We tilt the ring by ~22° around X
    // (an Earth-ish axial tilt) so it presents an elliptical profile
    // from typical viewing angles.
    function makePlanetRing(centerVec3, innerR, outerR, ringMaterialOpts, tiltRad) {
        const segs = 96;
        const ringGeo = new THREE.RingGeometry(innerR, outerR, segs, 1);
        const ringMat = new THREE.MeshStandardMaterial({
            side: THREE.DoubleSide,
            transparent: true,
            ...ringMaterialOpts
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.copy(centerVec3);
        // RingGeometry lies in the XY plane (normal is +Z). Rotate so the
        // ring's normal points roughly toward world +Y (i.e. the ring is
        // horizontal), then add the tilt.
        ring.rotation.x = -Math.PI / 2 + tiltRad;
        return ring;
    }

    // ---------- Dark planet (behind the scene at -Z) ----------
    // Pushed further back (z = -200) so the two planets in V6 read as
    // genuinely distant from each other. PLANET_CENTER is shared across
    // V7-V9 (which use a single planet), so we override it locally here.
    const DARK_CENTER = new THREE.Vector3(0, 4, -200);
    const darkGeo = new THREE.SphereGeometry(PLANET_RADIUS, 64, 48);
    const darkMat = new THREE.MeshStandardMaterial({
        color: 0x1a1a26,
        roughness: 1.0,
        metalness: 0.0
    });
    const darkPlanet = new THREE.Mesh(darkGeo, darkMat);
    darkPlanet.position.copy(DARK_CENTER);
    darkPlanet.userData.slowSpin = true;
    out.push(darkPlanet);

    // Light rings around the dark planet (high contrast against the dim body).
    // Pale dust/ice color. Matte so they read as particulate, not metal.
    // Thin bands (50% of previous width) and steeper tilt (30% more) so
    // the rings present a more pronounced elliptical profile.
    out.push(makePlanetRing(
        DARK_CENTER,
        PLANET_RADIUS * 1.30,    // inner edge of inner ring
        PLANET_RADIUS * 1.425,   // outer edge — band width halved
        { color: 0xe8e4d0, roughness: 0.85, metalness: 0.0, opacity: 0.85 },
        0.494                      // ~28° tilt (was 22°)
    ));
    out.push(makePlanetRing(
        DARK_CENTER,
        PLANET_RADIUS * 1.70,
        PLANET_RADIUS * 1.90,    // band width halved
        { color: 0xf5f0dc, roughness: 0.9, metalness: 0.0, opacity: 0.75 },
        0.494
    ));

    // ---------- White rising planet (opposite side, +Z, low) ----------
    // Mirror of the dark planet, pushed equally far in the opposite
    // direction. The two planets now bracket the scene at z = ±200 ish,
    // so they read as distinctly distant from one another.
    const RISING_CENTER = new THREE.Vector3(0, -8, 200);
    const whiteGeo = new THREE.SphereGeometry(PLANET_RADIUS, 64, 48);
    const whiteMat = new THREE.MeshStandardMaterial({
        color: 0xeaeaef,
        roughness: 0.95,
        metalness: 0.0
    });
    const whitePlanet = new THREE.Mesh(whiteGeo, whiteMat);
    whitePlanet.position.copy(RISING_CENTER);
    whitePlanet.userData.slowSpin = true;
    out.push(whitePlanet);

    // Dark reflective rings around the white planet.
    // Low roughness + high metalness gives a polished obsidian look —
    // the rings reflect the environment subtly and catch the sun glint.
    // Thinned 50% and tilted 30% more for a more dramatic ellipse.
    out.push(makePlanetRing(
        RISING_CENTER,
        PLANET_RADIUS * 1.30,
        PLANET_RADIUS * 1.425,
        { color: 0x0a0a12, roughness: 0.15, metalness: 0.95, opacity: 0.95 },
        -0.416                     // ~24° tilt (was 18°), mirrored
    ));
    out.push(makePlanetRing(
        RISING_CENTER,
        PLANET_RADIUS * 1.70,
        PLANET_RADIUS * 1.90,
        { color: 0x14141c, roughness: 0.18, metalness: 0.90, opacity: 0.85 },
        -0.416
    ));

    return out;
}

// ---- V7: Sphere with subtle surface texture (Option 2) ----
// Canvas-painted swirling bands so the planet looks like a "place"
// rather than a featureless disc. Same lighting setup as V6 — the bands
// only catch light on the lit limb, the rest stays in shadow.
function buildPlanetV7Props() {
    const out = [];
    out.push(makeStarfieldGroup());
    const sun = makePlanetSun();
    out.push(sun);
    out.push(sun.target);

    // Generate a banded gas-giant-ish surface map.
    const TEX_W = 1024;
    const TEX_H = 512;
    const c = document.createElement('canvas');
    c.width = TEX_W;
    c.height = TEX_H;
    const ctx = c.getContext('2d');
    // Base color
    ctx.fillStyle = '#3a2a20';
    ctx.fillRect(0, 0, TEX_W, TEX_H);
    // Horizontal bands of varying width and hue
    const BANDS = 18;
    for (let b = 0; b < BANDS; b++) {
        const y0 = Math.floor((b / BANDS) * TEX_H);
        const y1 = Math.floor(((b + 1) / BANDS) * TEX_H);
        const hueShift = Math.sin(b * 0.7) * 12;
        const lightShift = (Math.sin(b * 1.3) + 1) * 0.5;
        const r = Math.round(60 + lightShift * 60 + hueShift);
        const g = Math.round(45 + lightShift * 40);
        const b2 = Math.round(35 + lightShift * 25);
        ctx.fillStyle = `rgb(${r}, ${g}, ${b2})`;
        ctx.fillRect(0, y0, TEX_W, y1 - y0);
    }
    // Subtle horizontal streaks for a gassy/turbulent feel
    for (let i = 0; i < 200; i++) {
        const y = Math.random() * TEX_H;
        const w = 200 + Math.random() * 500;
        const x = Math.random() * (TEX_W - w);
        const alpha = 0.06 + Math.random() * 0.08;
        ctx.fillStyle = `rgba(20, 12, 8, ${alpha})`;
        ctx.fillRect(x, y, w, 2 + Math.random() * 5);
    }
    const tex = new THREE.CanvasTexture(c);
    tex.minFilter = THREE.LinearMipMapLinearFilter;
    tex.magFilter = THREE.LinearFilter;

    const geo = new THREE.SphereGeometry(PLANET_RADIUS, 64, 48);
    const mat = new THREE.MeshStandardMaterial({
        map: tex,
        roughness: 0.95,
        metalness: 0.0
    });
    const planet = new THREE.Mesh(geo, mat);
    planet.position.copy(PLANET_CENTER);
    planet.userData.slowSpin = true;
    out.push(planet);

    return out;
}

// ---- V8: Sphere with atmospheric halo (Option 3 + 4 combined) ----
// A dark sphere plus a slightly larger transparent back-side shell that
// renders only on the OUTER limb facing away from the camera, producing
// a soft atmospheric ring of light. This is the classic "Earth from
// space" thin blue line.
function buildPlanetV8Props() {
    const out = [];
    out.push(makeStarfieldGroup());
    const sun = makePlanetSun();
    out.push(sun);
    out.push(sun.target);

    // Inner solid sphere — slightly tinted so the lit limb has color.
    const innerGeo = new THREE.SphereGeometry(PLANET_RADIUS, 64, 48);
    const innerMat = new THREE.MeshStandardMaterial({
        color: 0x18202c,
        roughness: 0.95,
        metalness: 0.0
    });
    const inner = new THREE.Mesh(innerGeo, innerMat);
    inner.position.copy(PLANET_CENTER);
    inner.userData.slowSpin = true;
    out.push(inner);

    // Atmosphere shell — a slightly larger sphere rendered with BackSide
    // and additive blending. Because we render only the BACK faces, the
    // rim of the sphere (where back faces face the camera at a grazing
    // angle) lights up while the center stays mostly transparent — a
    // cheap and convincing fresnel/atmosphere effect.
    const HALO_SCALE = 1.08;
    const haloGeo = new THREE.SphereGeometry(PLANET_RADIUS * HALO_SCALE, 64, 48);
    const haloMat = new THREE.MeshBasicMaterial({
        color: 0x5c8cdc,        // pale cool atmosphere blue
        side: THREE.BackSide,
        transparent: true,
        opacity: 0.35,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });
    const halo = new THREE.Mesh(haloGeo, haloMat);
    halo.position.copy(PLANET_CENTER);
    out.push(halo);

    return out;
}

// ---- V9: Full layered cinematic (Option 5) ----
// Surface texture + cloud layer + atmospheric halo + faint lit limb.
// Built from three concentric spheres at slightly different radii so
// each layer reads as a distinct optical element.
function buildPlanetV9Props() {
    const out = [];
    out.push(makeStarfieldGroup());
    const sun = makePlanetSun();
    out.push(sun);
    out.push(sun.target);

    // --- 1. Surface ---
    // Reuse the band-painter from V7 but with cooler hues for variety.
    const TEX_W = 1024;
    const TEX_H = 512;
    const c = document.createElement('canvas');
    c.width = TEX_W;
    c.height = TEX_H;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#0a1828';
    ctx.fillRect(0, 0, TEX_W, TEX_H);
    // Continent-like blobs
    for (let i = 0; i < 8; i++) {
        const cx = Math.random() * TEX_W;
        const cy = Math.random() * TEX_H;
        const r = 60 + Math.random() * 140;
        const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        const hue = 30 + Math.random() * 40;       // warm continents
        grd.addColorStop(0, `hsla(${hue}, 35%, 28%, 0.9)`);
        grd.addColorStop(1, 'hsla(0, 0%, 0%, 0)');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
    }
    // Tight cool horizontal bands (sea/cloud streaks)
    for (let b = 0; b < 30; b++) {
        const y = Math.random() * TEX_H;
        const w = 250 + Math.random() * 700;
        const x = Math.random() * (TEX_W - w);
        ctx.fillStyle = `rgba(60, 80, 140, ${0.05 + Math.random() * 0.06})`;
        ctx.fillRect(x, y, w, 3 + Math.random() * 6);
    }
    const surfaceTex = new THREE.CanvasTexture(c);
    surfaceTex.minFilter = THREE.LinearMipMapLinearFilter;
    surfaceTex.magFilter = THREE.LinearFilter;

    const surfaceGeo = new THREE.SphereGeometry(PLANET_RADIUS, 64, 48);
    const surfaceMat = new THREE.MeshStandardMaterial({
        map: surfaceTex,
        roughness: 0.92,
        metalness: 0.0
    });
    const surface = new THREE.Mesh(surfaceGeo, surfaceMat);
    surface.position.copy(PLANET_CENTER);
    surface.userData.slowSpin = true;
    out.push(surface);

    // --- 2. Cloud layer ---
    // Wispy white streaks on a transparent canvas, drawn slightly above
    // the surface and rotating at a different speed.
    const cc = document.createElement('canvas');
    cc.width = TEX_W;
    cc.height = TEX_H;
    const cctx = cc.getContext('2d');
    cctx.clearRect(0, 0, TEX_W, TEX_H);
    for (let i = 0; i < 80; i++) {
        const y = Math.random() * TEX_H;
        const w = 80 + Math.random() * 220;
        const x = Math.random() * TEX_W;
        const h = 4 + Math.random() * 8;
        cctx.fillStyle = `rgba(255, 255, 255, ${0.08 + Math.random() * 0.18})`;
        cctx.fillRect(x, y, w, h);
    }
    const cloudTex = new THREE.CanvasTexture(cc);
    cloudTex.minFilter = THREE.LinearMipMapLinearFilter;
    cloudTex.magFilter = THREE.LinearFilter;
    const cloudGeo = new THREE.SphereGeometry(PLANET_RADIUS * 1.01, 64, 48);
    const cloudMat = new THREE.MeshStandardMaterial({
        map: cloudTex,
        transparent: true,
        opacity: 0.85,
        roughness: 1.0,
        metalness: 0.0,
        depthWrite: false
    });
    const clouds = new THREE.Mesh(cloudGeo, cloudMat);
    clouds.position.copy(PLANET_CENTER);
    clouds.userData.slowSpin = true;
    clouds.userData.slowSpinRate = 0.00007;  // clouds drift faster than surface
    out.push(clouds);

    // --- 3. Atmospheric halo (same trick as V8) ---
    const HALO_SCALE = 1.07;
    const haloGeo = new THREE.SphereGeometry(PLANET_RADIUS * HALO_SCALE, 64, 48);
    const haloMat = new THREE.MeshBasicMaterial({
        color: 0x6ba8e0,
        side: THREE.BackSide,
        transparent: true,
        opacity: 0.4,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });
    const halo = new THREE.Mesh(haloGeo, haloMat);
    halo.position.copy(PLANET_CENTER);
    out.push(halo);

    return out;
}

// Per-frame: rotate any object tagged with userData.slowSpin slowly
// around the Y axis. Used by the planet variants V6-V9 so the surface
// drifts naturally.
function updatePlanetSpin(dt) {
    if (typeof activeViewProps === 'undefined') return;
    for (const p of activeViewProps) {
        if (!p.userData || !p.userData.slowSpin) continue;
        const rate = p.userData.slowSpinRate || 0.00003;
        p.rotation.y += rate * dt;
    }
}

function buildCathedralProps() {
    // Two Parthenon-style temples (peristyle colonnades on a stepped
    // stylobate, topped with a continuous entablature) PLUS animated rain.
    // The temples replace the previous gothic spires and arched colonnade.
    // Modeled loosely on the Temple of Athena Parthenos in Athens:
    //   - Doric order columns (fluted look, no base, square abacus capital)
    //   - 3-tier stepped stylobate base
    //   - Post-and-lintel construction — no arches
    //   - Peristyle (columns around the full rectangular perimeter)
    //
    // One temple sits north of the board (z=+32), one south (z=-32),
    // both with long axis along X (east-west), framing the play area.
    // Two material palettes — one per temple. White temple (north,
    // z=+32, on white's side) is rendered in white marble; black temple
    // (south, z=-32, on black's side) is rendered in black obsidian.
    // Obsidian is volcanic glass — very smooth and reflective — so we
    // use very low roughness + some metalness to give it a polished look
    // that catches the lamp glow and sun glints. Marble has a softer
    // subsurface sheen that we approximate with mid-low roughness.
    const marbleMats = {
        stone: new THREE.MeshStandardMaterial({
            color: 0xeeeae0,
            roughness: 0.55,
            metalness: 0.05
        }),
        darker: new THREE.MeshStandardMaterial({
            color: 0xd5cfc2,
            roughness: 0.65,
            metalness: 0.05
        }),
        altar: new THREE.MeshStandardMaterial({
            color: 0xf2eee5,
            roughness: 0.45,
            metalness: 0.05
        })
    };
    const obsidianMats = {
        stone: new THREE.MeshStandardMaterial({
            color: 0x1a1418,
            roughness: 0.18,
            metalness: 0.5
        }),
        darker: new THREE.MeshStandardMaterial({
            color: 0x0e090c,
            roughness: 0.22,
            metalness: 0.5
        }),
        altar: new THREE.MeshStandardMaterial({
            color: 0x05030a,
            roughness: 0.15,
            metalness: 0.6
        })
    };

    // Doric column. No base in true Doric; shaft taper is gentle. Capital
    // is an echinus (rounded cushion) + abacus (square plate). The
    // material is whichever palette the calling temple uses.
    function makeDoricColumn(x, z, baseY, mats) {
        const g = new THREE.Group();
        const SHAFT_H = 7;
        const SHAFT_TOP_R = 0.42;
        const SHAFT_BOT_R = 0.52;
        // Shaft (slight taper)
        const shaftGeo = new THREE.CylinderGeometry(SHAFT_TOP_R, SHAFT_BOT_R, SHAFT_H, 20);
        const shaft = new THREE.Mesh(shaftGeo, mats.stone);
        shaft.position.y = SHAFT_H / 2;
        shaft.castShadow = true;
        shaft.receiveShadow = true;
        g.add(shaft);
        // Echinus (rounded cushion under the abacus)
        const echinusGeo = new THREE.CylinderGeometry(0.55, SHAFT_TOP_R, 0.28, 20);
        const echinus = new THREE.Mesh(echinusGeo, mats.stone);
        echinus.position.y = SHAFT_H + 0.14;
        echinus.castShadow = true;
        g.add(echinus);
        // Abacus (square plate on top)
        const abacusGeo = new THREE.BoxGeometry(1.25, 0.22, 1.25);
        const abacus = new THREE.Mesh(abacusGeo, mats.stone);
        abacus.position.y = SHAFT_H + 0.28 + 0.11;
        abacus.castShadow = true;
        g.add(abacus);
        g.position.set(x, baseY, z);
        return g;
    }

    // One Parthenon-style temple. mats = the material palette to use
    // (marbleMats for the white temple, obsidianMats for the black one).
    function makeTemple(centerX, centerZ, mats) {
        const g = new THREE.Group();
        // Dimensions
        const COLS_LONG  = 10;   // columns along the long axis (X)
        const COLS_SHORT = 6;    // columns along the short axis (Z)
        const COL_SPACING = 2.4; // distance between adjacent columns
        const longSpan  = (COLS_LONG  - 1) * COL_SPACING;  // = 21.6
        const shortSpan = (COLS_SHORT - 1) * COL_SPACING;  // = 12.0
        // Ground plinth: a wide low slab beneath the stylobate steps. Gives
        // the temple a sense of being rooted to a foundation instead of
        // floating on bare ground. Slightly inset SHORTER than the widest
        // stylobate step would predict, so the visual hierarchy goes
        // plinth (widest) → step 1 → step 2 → step 3 (narrowest).
        const PLINTH_HEIGHT = 0.5;
        const PLINTH_INSET_PAST_STEPS = 1.2;     // extends this much past the bottom step on each side
        const widestStepW = longSpan  + 2 * 1.6;   // step 1 inset (1.6)
        const widestStepD = shortSpan + 2 * 1.6;
        const plinthW = widestStepW + 2 * PLINTH_INSET_PAST_STEPS;
        const plinthD = widestStepD + 2 * PLINTH_INSET_PAST_STEPS;
        const plinthGeo = new THREE.BoxGeometry(plinthW, PLINTH_HEIGHT, plinthD);
        const plinth = new THREE.Mesh(plinthGeo, mats.darker);
        plinth.position.y = -PLINTH_HEIGHT / 2;   // top sits at y=0 (ground)
        plinth.receiveShadow = true;
        g.add(plinth);
        // Stylobate (the 3-step platform). Each step inset slightly.
        const STEP_HEIGHTS = [0.35, 0.35, 0.35];
        const STEP_INSETS = [1.6, 1.0, 0.4];   // x/z extra per side from peristyle bounding box
        let curY = 0;
        for (let s = 0; s < STEP_HEIGHTS.length; s++) {
            const inset = STEP_INSETS[s];
            const w = longSpan  + 2 * inset;
            const d = shortSpan + 2 * inset;
            const stepGeo = new THREE.BoxGeometry(w, STEP_HEIGHTS[s], d);
            const step = new THREE.Mesh(stepGeo, mats.darker);
            step.position.y = curY + STEP_HEIGHTS[s] / 2;
            step.receiveShadow = true;
            g.add(step);
            curY += STEP_HEIGHTS[s];
        }
        const stylobateTopY = curY;   // columns sit on this height

        // Peristyle: columns around the full rectangular perimeter.
        // Don't double-place corners — long-side rows omit endpoints,
        // short-side rows include them.
        const xStart = -longSpan / 2;
        const zStart = -shortSpan / 2;
        for (let i = 0; i < COLS_LONG; i++) {
            const x = xStart + i * COL_SPACING;
            // Short edges (z = ±shortSpan/2) include corners.
            g.add(makeDoricColumn(x, -shortSpan / 2, stylobateTopY, mats));
            g.add(makeDoricColumn(x,  shortSpan / 2, stylobateTopY, mats));
        }
        for (let j = 1; j < COLS_SHORT - 1; j++) {     // skip corners — they're handled above
            const z = zStart + j * COL_SPACING;
            g.add(makeDoricColumn(-longSpan / 2, z, stylobateTopY, mats));
            g.add(makeDoricColumn( longSpan / 2, z, stylobateTopY, mats));
        }

        // Entablature: rectangular beam frame above the columns. Sits on
        // top of the abacus plates, framing the peristyle.
        const COLUMN_TOTAL_H = 7 + 0.28 + 0.22;   // shaft + echinus + abacus = 7.5
        const ENT_HEIGHT = 1.4;
        const ENT_THICKNESS = 0.9;     // depth of each beam (perpendicular to its length)
        const entY = stylobateTopY + COLUMN_TOTAL_H + ENT_HEIGHT / 2;
        // Two long beams (along X)
        const longBeamGeo = new THREE.BoxGeometry(longSpan + 1.5, ENT_HEIGHT, ENT_THICKNESS);
        for (const z of [-shortSpan / 2, shortSpan / 2]) {
            const beam = new THREE.Mesh(longBeamGeo, mats.darker);
            beam.position.set(0, entY, z);
            beam.castShadow = true;
            beam.receiveShadow = true;
            g.add(beam);
        }
        // Two short beams (along Z) — slightly shorter so they sit
        // INSIDE the long beams at the corners (Parthenon-style overlap).
        const shortBeamGeo = new THREE.BoxGeometry(ENT_THICKNESS, ENT_HEIGHT, shortSpan + 0.4);
        for (const x of [-longSpan / 2, longSpan / 2]) {
            const beam = new THREE.Mesh(shortBeamGeo, mats.darker);
            beam.position.set(x, entY, 0);
            beam.castShadow = true;
            beam.receiveShadow = true;
            g.add(beam);
        }

        g.position.set(centerX, 0, centerZ);

        // ----- ALTAR + LAMPS + MINI CHESS BOARD -----
        // A rectangular stone altar at the center of the temple. Two lamps
        // flank it at the 1/3 marks of the temple's long axis. On top of
        // the altar sits a small 8x8 chess board that mirrors the main
        // match move-for-move (the mirror pieces are populated by
        // renderPieces -> renderAltarPieces).
        //
        // Altar dimensions:
        const ALTAR_W = 4.0;        // along X (long axis of temple)
        const ALTAR_D = 4.0;        // along Z (short axis)
        const ALTAR_H = 1.2;
        // Y position of altar BASE — sits on the stylobate top.
        const altarBaseY = stylobateTopY;
        // Altar block — uses the temple's own altar material (marble or obsidian)
        const altarGeo = new THREE.BoxGeometry(ALTAR_W, ALTAR_H, ALTAR_D);
        const altar = new THREE.Mesh(altarGeo, mats.altar);
        altar.position.set(0, altarBaseY + ALTAR_H / 2, 0);
        altar.castShadow = true;
        altar.receiveShadow = true;
        g.add(altar);

        // Mini chess board on top of the altar — a small 8x8 grid of tiles.
        // We tag each tile + the parent group so the piece renderer can
        // find and populate this altar. The tile-size is chosen so 8
        // tiles fit on top of the altar with a small margin.
        const MINI_BOARD_FRAC = 0.85;       // fraction of altar surface covered by board
        const MINI_TILE_SIZE = (ALTAR_W * MINI_BOARD_FRAC) / 8;
        const altarTopY = altarBaseY + ALTAR_H;
        const altarBoardGroup = new THREE.Group();
        altarBoardGroup.position.set(0, altarTopY + 0.005, 0);
        // Tag the altar group with the player color so the piece renderer
        // can orient pieces correctly (white temple at +Z, black at -Z).
        altarBoardGroup.userData.isAltarBoard = true;
        altarBoardGroup.userData.tileSize = MINI_TILE_SIZE;
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const isLightSquare = (row + col) % 2 === 0;
                const tileColor = isLightSquare ? 0xeeeed2 : 0x6a554a;
                const tileGeo = new THREE.BoxGeometry(MINI_TILE_SIZE, 0.02, MINI_TILE_SIZE);
                const tileMat = new THREE.MeshStandardMaterial({
                    color: tileColor,
                    roughness: 0.65,
                    metalness: 0.0
                });
                const tile = new THREE.Mesh(tileGeo, tileMat);
                tile.position.set(
                    (col - 3.5) * MINI_TILE_SIZE,
                    0.01,
                    (row - 3.5) * MINI_TILE_SIZE
                );
                tile.receiveShadow = true;
                altarBoardGroup.add(tile);
            }
        }
        g.add(altarBoardGroup);
        // Stash the altar board on the temple group so renderAltarPieces
        // can find it. The temple group itself is added later to the
        // world; the altar board is a child so it inherits the temple's
        // world position automatically.
        g.userData.altarBoardGroup = altarBoardGroup;

        // Two lamps at the 1/3 marks of the temple's long axis. Each
        // lamp = a stone post + a glowing emissive bowl at the top with
        // a small point light inside it so the altar is actually lit.
        function makeLamp(x) {
            const lg = new THREE.Group();
            const POST_H = 2.4;
            const postGeo = new THREE.CylinderGeometry(0.12, 0.18, POST_H, 12);
            const post = new THREE.Mesh(postGeo, mats.darker);
            post.position.y = stylobateTopY + POST_H / 2;
            post.castShadow = true;
            lg.add(post);
            // Glowing bowl at the top
            const bowlGeo = new THREE.SphereGeometry(0.32, 16, 12, 0, Math.PI * 2, 0, Math.PI / 2);
            const bowlMat = new THREE.MeshStandardMaterial({
                color: 0xffd070,
                emissive: 0xffaa40,
                emissiveIntensity: 1.4,
                roughness: 0.4,
                metalness: 0.2
            });
            const bowl = new THREE.Mesh(bowlGeo, bowlMat);
            bowl.position.y = stylobateTopY + POST_H + 0.05;
            lg.add(bowl);
            // Actual point light to illuminate the altar.
            const lamp = new THREE.PointLight(0xffb060, 1.8, 12, 1.6);
            lamp.position.y = stylobateTopY + POST_H + 0.15;
            lg.add(lamp);
            lg.position.set(x, 0, 0);
            return lg;
        }
        // 1/3 marks along the long axis
        g.add(makeLamp(-longSpan / 3));
        g.add(makeLamp( longSpan / 3));

        return g;
    }

    // --- Rain (THREE.Points, vertical streaks, recycle at top) ---
    const RAIN_COUNT = 1500;
    const RAIN_RADIUS = 30;     // horizontal spread around the board
    const RAIN_TOP_Y = 25;      // where drops start
    const RAIN_BOTTOM_Y = -3;   // where drops reset
    const positions = new Float32Array(RAIN_COUNT * 3);
    const velocities = new Float32Array(RAIN_COUNT);
    for (let i = 0; i < RAIN_COUNT; i++) {
        positions[i * 3]     = (Math.random() - 0.5) * RAIN_RADIUS * 2;
        positions[i * 3 + 1] = RAIN_BOTTOM_Y + Math.random() * (RAIN_TOP_Y - RAIN_BOTTOM_Y);
        positions[i * 3 + 2] = (Math.random() - 0.5) * RAIN_RADIUS * 2;
        velocities[i] = 0.25 + Math.random() * 0.15; // per-drop falling speed
    }
    const rainGeo = new THREE.BufferGeometry();
    rainGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const rainMat = new THREE.PointsMaterial({
        color: 0xaabbcc,
        size: 0.08,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.6,
        depthWrite: false
    });
    const rain = new THREE.Points(rainGeo, rainMat);
    rain.userData.isRain = true;
    rain.userData.velocities = velocities;
    rain.userData.bottomY = RAIN_BOTTOM_Y;
    rain.userData.topY = RAIN_TOP_Y;

    return [
        makeTemple(0,  32, marbleMats),    // north temple — white side, marble
        makeTemple(0, -32, obsidianMats),  // south temple — black side, obsidian
        rain
    ];
}

// Per-frame rain animation. Runs only when V5 is active (we filter the active
// props for any with isRain flag). Called from the main animation loop.
function updateRain(dt) {
    for (const obj of activeViewProps) {
        if (!obj.userData || !obj.userData.isRain) continue;
        const positions = obj.geometry.attributes.position.array;
        const velocities = obj.userData.velocities;
        const bottomY = obj.userData.bottomY;
        const topY = obj.userData.topY;
        const fall = dt * 0.06; // overall rain speed multiplier
        for (let i = 0; i < velocities.length; i++) {
            positions[i * 3 + 1] -= velocities[i] * fall;
            if (positions[i * 3 + 1] < bottomY) {
                positions[i * 3 + 1] = topY;
            }
        }
        obj.geometry.attributes.position.needsUpdate = true;
    }
}

// Per-frame pyramid spin. Each tagged pyramid rotates around its own Y axis at
// its configured period (one full turn per spinPeriod ms). Because each pyramid
// sits at x=0 — the chessboard's d-e file midline — its rotation axis coincides
// with that midline plane, so the spin doesn't disturb the alignment. The two
// pyramids spin in opposite directions for visual contrast.
function updatePyramids(dt) {
    for (const obj of activeViewProps) {
        if (!obj.userData || !obj.userData.spinningPyramid) continue;
        const period = obj.userData.spinPeriod;
        const dir = obj.userData.spinDirection;
        // Angular increment for this frame = (full turn / period) * dt * direction
        obj.rotation.y += (2 * Math.PI / period) * dt * dir;
    }
}

// Per-frame concert atmosphere. Handles all four element types in one pass.
// Each is gated by a userData flag set in buildConcertAtmosphere() so we can
// just walk activeViewProps once and dispatch.
function updateConcert(now, dt) {
    // Slow global pulse — fed into beam sweep + wash intensities so they share
    // a rhythm without being literally in sync.
    const globalSlow = (Math.sin(now * 0.0008) + 1) / 2;

    for (const obj of activeViewProps) {
        const u = obj.userData;
        if (!u) continue;

        // --- Light beams: sweep and pulse ---
        if (u.lightBeam) {
            // Each beam's axis is set by:
            //   yaw   = base angle for this beam (evenly spaced) + slow sweep
            //   pitch = leans outward from vertical, modulated by beam phase
            const base = (u.beamIndex / u.totalBeams) * Math.PI * 2;
            const sweep = Math.sin(now * 0.00015 + u.beamPhase) * 0.5;  // ±0.5 rad sweep
            const yaw = base + sweep;
            const pitch = -0.3 + Math.sin(now * 0.00012 + u.beamPhase) * 0.3;
            // Reset rotation then build it: yaw around Y, then tilt outward.
            // Cones default to apex-up after our geometry.translate; we want the
            // apex to remain at the pyramid origin while the cone "leans".
            obj.rotation.set(0, yaw, 0);
            obj.rotateOnAxis(new THREE.Vector3(1, 0, 0), pitch);
            // Opacity pulse — beams brighten on globalSlow
            const baseOpacity = u.beamIndex % 2 === 0 ? 0.18 : 0.14;
            obj.material.opacity = baseOpacity * (0.5 + globalSlow * 1.0);
        }

        // --- Haze particles: gentle drift, wrap at bounds ---
        else if (u.hazeParticles) {
            const positions = obj.geometry.attributes.position.array;
            const velocities = u.velocities;
            const box = u.boundsBox;
            const ySpan = u.boundsY;
            const speed = dt;  // drift uses real dt for frame-rate independence
            for (let i = 0; i < positions.length; i += 3) {
                positions[i]     += velocities[i] * speed;
                positions[i + 1] += velocities[i + 1] * speed;
                positions[i + 2] += velocities[i + 2] * speed;
                // Wrap X/Z, clamp Y with bounce
                if (positions[i] >  box) positions[i] = -box;
                if (positions[i] < -box) positions[i] =  box;
                if (positions[i + 2] >  box) positions[i + 2] = -box;
                if (positions[i + 2] < -box) positions[i + 2] =  box;
                if (positions[i + 1] >  ySpan - 2) velocities[i + 1] *= -1;
                if (positions[i + 1] < -2)         velocities[i + 1] *= -1;
            }
            obj.geometry.attributes.position.needsUpdate = true;
        }

        // --- Flying name sprites: traverse Bezier path, fade in/out, recycle ---
        else if (u.fallingName) {
            // Compute age (ms) since this sprite's CURRENT life started.
            const age = now - u.birthMs;
            const LIFE = 30000;     // matches NAME_LIFE_MS from builder
            const FADE_IN = 1500;
            const FADE_OUT = 1500;

            if (age >= LIFE) {
                // Life over — recycle: new path (same TYPE), new name, reset birth time.
                u.path = u.recyclePath();
                u.repaint(obj, u.recycleName());
                u.birthMs = now;
                // Position will be set below by the path sampler at t=0.
                obj.material.opacity = 0;
            }

            // Sample position along the Bezier curve at t = age / LIFE.
            const t = Math.max(0, Math.min(1, age / LIFE));
            quadraticBezier(u.path.p0, u.path.p1, u.path.p2, t, obj.position);

            // Opacity envelope: ease-in at start, full middle, ease-out at end.
            let alpha;
            if (age < FADE_IN) {
                alpha = age / FADE_IN;
            } else if (age > LIFE - FADE_OUT) {
                alpha = (LIFE - age) / FADE_OUT;
            } else {
                alpha = 1;
            }
            // Smoothstep for a softer fade than linear.
            alpha = alpha * alpha * (3 - 2 * alpha);
            obj.material.opacity = alpha;
        }

        // --- Stage washes: pulse intensity ---
        else if (u.stageWash) {
            const phase = (now / u.pulsePeriod) * Math.PI * 2 + u.pulsePhase;
            // Sharp peaks: pow of (sin+1)/2 with a high exponent
            const pulse = Math.pow((Math.sin(phase) + 1) / 2, 2.5);
            obj.intensity = u.baseIntensity * pulse;
        }
    }
}

// Cache per-view prop arrays. Built lazily on first activation.
const viewPropsCache = {};
// Track currently-active props so we can remove them on view switch.
let activeViewProps = [];

let currentViewId = 1;

// Background transition state
const VIEW_TRANSITION_MS = 300;
let bgTransition = null; // { from: THREE.Color, to: THREE.Color, startTime: number }

function updateBackgroundTransition(now) {
    if (!bgTransition) return;
    const t = Math.min(1, (now - bgTransition.startTime) / VIEW_TRANSITION_MS);
    scene.background.r = bgTransition.from.r + (bgTransition.to.r - bgTransition.from.r) * t;
    scene.background.g = bgTransition.from.g + (bgTransition.to.g - bgTransition.from.g) * t;
    scene.background.b = bgTransition.from.b + (bgTransition.to.b - bgTransition.from.b) * t;
    if (t >= 1) bgTransition = null;
}

function setView(id) {
    const view = VIEWS.find(v => v.id === id);
    if (!view) return;
    if (view.placeholder) return; // ignore clicks on coming-soon tabs
    currentViewId = id;
    bgTransition = {
        from: scene.background.clone(),
        to: new THREE.Color(view.bg),
        startTime: performance.now()
    };
    // Toggle the body class so the HUD CSS knows which scheme to use.
    // View 2 = light scene = solid black HUD text.
    document.body.classList.toggle('view-light', id === 2);

    // Swap star pearls between default glow and V2 gold-orb-with-ring look
    applyStarLookForView(id);

    // Remove props from the previous view
    for (const p of activeViewProps) scene.remove(p);
    activeViewProps = [];

    // Add this view's props (build once, then cache)
    if (view.buildProps) {
        if (!viewPropsCache[id]) {
            viewPropsCache[id] = view.buildProps();
        }
        for (const p of viewPropsCache[id]) {
            scene.add(p);
            activeViewProps.push(p);
        }
    }

    // Reapply the lightLevel slider to any newly-added capstone-glow meshes
    // so the user's prior brightness setting carries over view switches.
    applyLightLevel();

    // If the new view has altar boards (temple view), populate them with
    // the current match state right away rather than waiting for the
    // next move.
    if (typeof renderAltarPieces === 'function') renderAltarPieces();

    updateViewTabs();
}

function refreshHUD() {
    const mode = getGameMode();
    const turn = getCurrentTurn();
    const status = getGameStatus();

    turnLine.textContent = `${turn === 'w' ? 'White' : 'Black'} Move`;

    let statusText = '';
    if (aiThinking) {
        statusText = 'AI thinking...';
        statusLine.classList.remove('status-warn');
        statusLine.classList.add('status-info');
    } else {
        statusLine.classList.remove('status-info');
        statusLine.classList.add('status-warn');
        if (mode === 'chess') {
            if (status === 'check') statusText = 'Check!';
            else if (status === 'checkmate') {
                statusText = `Checkmate — ${turn === 'w' ? 'Black' : 'White'} wins`;
            } else if (status === 'stalemate') statusText = 'Stalemate — draw';
        } else {
            if (status === 'win-w') statusText = 'White wins';
            else if (status === 'win-b') statusText = 'Black wins';
        }
    }
    statusLine.textContent = statusText;
}

// ----- AI MOVE TRIGGER -----
// Called after every move. If AI is on, it's black's turn, and the game is still
// active, the AI plays its move after a 1-second "thinking" pause.
function maybeTriggerAIMove() {
    if (!aiEnabled) return;
    if (aiThinking) return;
    if (getGameMode() !== 'chess') return; // checkers AI not implemented yet
    const status = getGameStatus();
    if (status === 'checkmate' || status === 'stalemate') return;
    if (getCurrentTurn() !== 'b') return;

    aiThinking = true;
    refreshHUD();

    // setTimeout + rAF so "thinking" text paints before the synchronous minimax
    // search hogs the main thread. 1-second pause for pacing.
    setTimeout(() => {
        requestAnimationFrame(() => {
            const depth = depthForSliderLevel(aiLevel);
            const move = findBestMove('b', depth);
            aiThinking = false;
            if (!move) {
                refreshHUD();
                return;
            }
            const moved = attemptMoveWithCaptures(move.from, move.to);
            if (moved) renderPieces();
            refreshHUD();
        });
    }, 1000);
}

// ===================== TEMPLE RITUAL (PHASE B) =====================
// Drag-and-drop captured back-row pieces (R N B Q) from the burial
// chamber into the matching temple. Captured WHITE pieces (in black's
// capture pile) go to the BLACK obsidian temple at z=-32. Captured
// BLACK pieces (in white's pile) go to the WHITE marble temple at z=+32.
//
// Mechanic:
//   pointerdown on an eligible coffin ghost  → start drag
//   pointermove                              → ghost follows cursor
//   pointerup over correct temple interior   → snap to audience slot
//   pointerup anywhere else                  → animate ghost back home
//
// Audience slots: 8 positions arranged in a ring around each temple's
// altar, between the altar and the inner column ring. Filled in order
// as coffins are placed.
//
// The temple ritual is purely visual — the central chess match continues
// unaffected. Mirror altar boards keep showing the live game state.

// --- Temple positions / audience-slot geometry ---
// These mirror the values used in buildCathedralProps. We hardcode them
// here so the drag system can compute audience slot world positions
// without needing a reference to the temple groups (which only exist
// when View 5 is active).
const TEMPLE_AUDIENCE = {
    white: { tx: 0, tz: 32, occupied: [/* one slot per filled position, 0..7 */] },
    black: { tx: 0, tz: -32, occupied: [] }
};
const TEMPLE_STYLOBATE_TOP_Y = 3 * 0.35;       // 3 step heights × 0.35
const TEMPLE_AUDIENCE_RADIUS = 4.0;             // distance from altar center
const TEMPLE_AUDIENCE_COUNT = 8;

// Coffins ghost-meshes that are currently sitting INSIDE a temple (not
// in the chamber). Tracked here for redraw / state lookups; the meshes
// themselves are reparented to `world` once placed.
function audienceSlotWorldPos(player, slotIndex) {
    const t = TEMPLE_AUDIENCE[player];
    const angle = (slotIndex / TEMPLE_AUDIENCE_COUNT) * Math.PI * 2;
    return new THREE.Vector3(
        t.tx + Math.cos(angle) * TEMPLE_AUDIENCE_RADIUS,
        TEMPLE_STYLOBATE_TOP_Y,
        t.tz + Math.sin(angle) * TEMPLE_AUDIENCE_RADIUS
    );
}

// Returns true if a captured ghost is eligible to be moved to the temple.
// Pawns and kings are not eligible; rooks, knights, bishops, and queens are.
function isCoffinEligibleForTemple(ghost) {
    const cap = ghost.userData && ghost.userData.capturedPiece;
    if (!cap) return false;
    if (cap.placedInTemple) return false;        // already in a temple, not eligible again
    return ['r', 'n', 'b', 'q'].includes(cap.type);
}

// Which temple does this captured piece belong to?
//   captured WHITE piece → BLACK's temple (south, z=-32)
//   captured BLACK piece → WHITE's temple (north, z=+32)
function temploKeyForCapture(cap) {
    return cap.color === 'w' ? 'black' : 'white';
}

// --- Drag state ---
let templeDragState = null;  // { ghost, plane, origLocalPos, origParent, lifted, targetPlayer }
const DRAG_LIFT_HEIGHT = 1.2;   // how far above ground plane the ghost floats while held

const templeRaycaster = new THREE.Raycaster();
const templeMouse = new THREE.Vector2();
// A horizontal plane at y=0 used to project the cursor while dragging.
const dragGroundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const dragIntersectPt = new THREE.Vector3();

function screenToWorldOnGround(clientX, clientY, out) {
    templeMouse.x = (clientX / window.innerWidth) * 2 - 1;
    templeMouse.y = -(clientY / window.innerHeight) * 2 + 1;
    templeRaycaster.setFromCamera(templeMouse, camera);
    templeRaycaster.ray.intersectPlane(dragGroundPlane, out);
    return out;
}

// pointerdown on the canvas — check if we hit a draggable coffin ghost.
// Capture phase so we get the event before the board click handler.
window.addEventListener('pointerdown', (event) => {
    // Only left-button starts
    if (event.button !== 0) return;
    templeMouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    templeMouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    templeRaycaster.setFromCamera(templeMouse, camera);
    // Test against the captured ghosts only.
    const hits = templeRaycaster.intersectObjects(capturedGroup.children, false);
    if (hits.length === 0) return;
    const ghost = hits[0].object;
    if (!isCoffinEligibleForTemple(ghost)) return;

    // Start drag: stash original parent + local position, reparent to
    // `world` (so we can move it freely in world space without inheriting
    // capturedGroup's transform — actually capturedGroup IS in world, so
    // we can stay parented but we'll move via world coords directly).
    const origLocalPos = ghost.position.clone();
    const cap = ghost.userData.capturedPiece;
    templeDragState = {
        ghost,
        origLocalPos,
        origParent: ghost.parent,
        targetPlayer: temploKeyForCapture(cap),
        startScreenX: event.clientX,
        startScreenY: event.clientY,
        moved: false
    };
    // Lift the ghost so it visibly "picks up" out of the coffin.
    ghost.position.y = Math.max(ghost.position.y, DRAG_LIFT_HEIGHT);
    // Soft glow on the eligible temple (visual cue).
    highlightTempleForDrag(templeDragState.targetPlayer, true);
    // Suppress the board's click handler from running on this gesture.
    event.stopPropagation();
}, true);

window.addEventListener('pointermove', (event) => {
    if (!templeDragState) return;
    const target = screenToWorldOnGround(event.clientX, event.clientY, dragIntersectPt);
    if (!target) return;
    // Place ghost following cursor; clamp Y to LIFT_HEIGHT so it floats.
    const ghost = templeDragState.ghost;
    // Convert world coords → ghost.parent local coords.
    const localTarget = ghost.parent.worldToLocal(target.clone());
    ghost.position.x = localTarget.x;
    ghost.position.z = localTarget.z;
    ghost.position.y = DRAG_LIFT_HEIGHT;
    // Track if any actual movement happened (so a quick click without
    // motion can be distinguished from a drag).
    if (Math.abs(event.clientX - templeDragState.startScreenX) +
        Math.abs(event.clientY - templeDragState.startScreenY) > 3) {
        templeDragState.moved = true;
    }
});

window.addEventListener('pointerup', (event) => {
    if (!templeDragState) return;
    const { ghost, origLocalPos, targetPlayer } = templeDragState;
    highlightTempleForDrag(targetPlayer, false);

    // Where did the drop land in world XZ?
    const drop = screenToWorldOnGround(event.clientX, event.clientY, new THREE.Vector3());

    // Is the drop inside the eligible temple's footprint?
    // Use a generous rectangle: temple extends ~21.6 along X and ~12 along Z
    // from its center. We accept any point inside that bounding box plus
    // a small margin so users don't have to be pixel-perfect.
    const t = TEMPLE_AUDIENCE[targetPlayer];
    const dx = drop.x - t.tx;
    const dz = drop.z - t.tz;
    const TEMPLE_HALF_X = 13;
    const TEMPLE_HALF_Z = 9;
    const dropInsideTemple = Math.abs(dx) < TEMPLE_HALF_X && Math.abs(dz) < TEMPLE_HALF_Z;

    if (dropInsideTemple) {
        // Snap to the next available audience slot.
        const slotIndex = t.occupied.length;
        if (slotIndex < TEMPLE_AUDIENCE_COUNT) {
            const cap = ghost.userData.capturedPiece;
            cap.placedInTemple = targetPlayer;
            cap.templeSlotIndex = slotIndex;
            t.occupied.push(ghost);
            // Move ghost into scene space (same parent as the temples).
            // Reparenting away from capturedGroup means it no longer rides
            // along with the chessboard cluster's auto-rotation.
            const slotWorld = audienceSlotWorldPos(targetPlayer, slotIndex);
            ghost.parent.remove(ghost);
            scene.add(ghost);
            // Animate to the slot
            ghost.position.copy(slotWorld);
            // Slight elevation bump so the piece sits on the stylobate, not in it.
            ghost.position.y = TEMPLE_STYLOBATE_TOP_Y + ghost.geometry.parameters.height / 2 + 0.01;
            // Orient the piece to face the altar
            const altarWorld = new THREE.Vector3(t.tx, ghost.position.y, t.tz);
            ghost.lookAt(altarWorld);
        } else {
            // Temple is full — return to chamber.
            ghost.position.copy(origLocalPos);
        }
    } else {
        // Missed drop — return to original chamber position.
        ghost.position.copy(origLocalPos);
    }

    templeDragState = null;
    event.stopPropagation();
}, true);

// Visual hint: when dragging, soft-glow the eligible temple's stylobate.
// We walk activeViewProps to find the temple groups (only present when
// View 5 is active) and toggle an emissive boost on their darker stone
// material. Returns gracefully if View 5 isn't active.
let _templeHighlightOriginalEmissive = null;
function highlightTempleForDrag(player, on) {
    if (typeof activeViewProps === 'undefined') return;
    const targetZ = TEMPLE_AUDIENCE[player].tz;
    for (const p of activeViewProps) {
        if (!p.isGroup || !p.children || p.children.length === 0) continue;
        // Temples are positioned at (0, 0, ±32) in world space.
        if (Math.abs(p.position.z - targetZ) > 1) continue;
        // Walk the group, find Mesh children with MeshStandardMaterial,
        // adjust their emissive while highlight is on.
        p.traverse(child => {
            if (!child.isMesh || !child.material || !child.material.isMeshStandardMaterial) return;
            if (on) {
                if (!child.material.userData._origEmissive) {
                    child.material.userData._origEmissive = child.material.emissive.clone();
                }
                child.material.emissive.setHex(0x40331c);
            } else {
                if (child.material.userData._origEmissive) {
                    child.material.emissive.copy(child.material.userData._origEmissive);
                }
            }
        });
    }
}

// --- 8. AUTO-ROTATION + IDLE DETECTION ---
const IDLE_TIME_MS = 120000;     // 2 minutes of no activity before auto-rotate kicks in
const EASE_IN_MS = 1500;         // ease-in duration when rotation begins
const EASE_OUT_MS = 400;         // ease-out duration when activity resumes
let lastActivityTime = performance.now();
let currentSpinFactor = 0;       // 0..1, multiplier applied to target rotation speed
let lastFrameTime = performance.now();

function markActivity() {
    lastActivityTime = performance.now();
}

// Camera-drag and zoom count as activity. Wire OrbitControls events:
controls.addEventListener('start', markActivity);
controls.addEventListener('change', markActivity);

// Raycast (clicks) below counts as activity too — markActivity is called in handler.

// World rotates only when:
//   - no piece is selected (active gameplay)
//   - idle for IDLE_TIME_MS
// Ease in/out via currentSpinFactor. Spin speed is always > 0 since the
// selector only offers 1x/2x/3x.
function updateRotation(now, dt) {
    const targetSpeed = ROTATION_SPEEDS[rotationLevel];

    // Determine whether rotation SHOULD be active
    const idle = (now - lastActivityTime) > IDLE_TIME_MS;
    const allowed = idle && selectedPiece === null;

    // Ease the spin factor toward 0 or 1
    if (allowed) {
        currentSpinFactor = Math.min(1, currentSpinFactor + dt / EASE_IN_MS);
    } else {
        currentSpinFactor = Math.max(0, currentSpinFactor - dt / EASE_OUT_MS);
    }

    world.rotation.y += targetSpeed * currentSpinFactor;
}

// --- 9. CLICK HANDLER ---
window.addEventListener('click', (event) => {
    if (event.target !== renderer.domElement) return;
    markActivity();

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    const objectsToTest = [...pieceGroup.children, ...boardGroup.children];
    const intersects = raycaster.intersectObjects(objectsToTest);

    if (intersects.length === 0) {
        clearSelection();
        return;
    }

    const clickedObject = intersects[0].object;
    const clickedId = clickedObject.userData.id;
    const isTile = clickedObject.userData.isTile;

    if (!isTile) {
        const pieceColor = clickedObject.userData.color;
        const turn = getCurrentTurn();

        if (selectedPiece && pieceColor !== turn) {
            const source = selectedPiece.userData.id;
            const target = clickedId;
            if (attemptMoveWithCaptures(source, target)) {
                clearSelection();
                renderPieces();
                refreshHUD();
                maybeTriggerAIMove();
                return;
            }
        }

        if (pieceColor === turn) {
            selectPiece(clickedObject);
        }
        return;
    }

    if (selectedPiece) {
        const source = selectedPiece.userData.id;
        const target = clickedId;
        if (attemptMoveWithCaptures(source, target)) {
            clearSelection();
            renderPieces();
            refreshHUD();
            maybeTriggerAIMove();
        }
    }
});

// --- 3D piece hover (figure card) ---
// When the mouse hovers over a piece in 3D, after 1 second show the hover card
// for the historical figure that piece represents. We look up the piece's
// STARTING square in pieceHomeMap to find which roster slot it belongs to,
// since the back-row figure for that file is consistent regardless of where
// the piece has moved.
//
// Only back-row pieces have figures assigned. Pawns don't have a card.

let lastHoveredPieceId = null;
window.addEventListener('mousemove', (event) => {
    // Skip if a roster name is currently being hovered (DOM hover wins)
    if (event.target && event.target.dataset && event.target.dataset.figureName) return;
    // Skip if the pointer is over the hover card itself
    if (hoverCard.contains(event.target)) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(pieceGroup.children, false);

    if (intersects.length > 0) {
        const piece = intersects[0].object;
        const currentSquare = piece.userData.id;
        const startSquare = pieceHomeMap[currentSquare];
        const figure = startSquare ? PIECE_FIGURE_MAP[startSquare] : null;

        if (!figure) {
            // Piece is a pawn or otherwise unmapped — no card
            if (lastHoveredPieceId) {
                cancelHoverCard();
                lastHoveredPieceId = null;
            }
            return;
        }

        if (lastHoveredPieceId !== currentSquare) {
            // New piece under cursor — restart timer
            lastHoveredPieceId = currentSquare;
            cancelHoverCard();
            // Build a virtual anchor rect at the mouse position
            const rect = {
                left: event.clientX,
                right: event.clientX + 4,
                top: event.clientY,
                bottom: event.clientY + 4,
                width: 4,
                height: 4
            };
            scheduleHoverCard(figure, null, rect);
        }
    } else {
        if (lastHoveredPieceId) {
            cancelHoverCard();
            lastHoveredPieceId = null;
        }
    }
});

// ===================== INTRO SCENES =====================
// Five different cinematic opening "scenes" the user can replay via a
// button deck in the bottom-right corner. Scene 1 also plays automatically
// on first page load.
//
// Each scene returns:
//   - durationMs   how long the scene takes to complete
//   - camPath      array of THREE.Vector3 waypoints for the camera position
//   - tgtPath      array of THREE.Vector3 waypoints for the look-at target
//   - easing       optional easing function on the global t (default: easeInOutSine)
//
// Scenes interpolate using Catmull-Rom across their waypoints. A single
// waypoint = static pose; two = straight line; 3+ = smooth curve.
//
// Skippable: any pointer/key/wheel input cuts to the end.

// --- Shared landing pose ---
// All scenes end at the same final pose so the user lands in a consistent
// place no matter which opening they preview: behind the white pieces,
// looking down the board toward the black pieces.
const INTRO_FINAL_CAM = new THREE.Vector3(0, 4,  10);
const INTRO_FINAL_TGT = new THREE.Vector3(0, 0.5, -3);

// --- Easing functions ---
// (easeInOutCubic already defined earlier alongside the elevation toggle.)
function easeOutCubic(t)  { return 1 - Math.pow(1 - t, 3); }
function easeInOutSine(t) { return -(Math.cos(Math.PI * t) - 1) / 2; }
function easeInCubic(t)   { return t * t * t; }

// --- Catmull-Rom path sampler ---
// Smoothly interpolates across an array of Vector3. t ∈ [0, 1] spans the
// entire path. Phantom endpoints clamped at the ends.
function catmullRomPath(points, t, out) {
    const n = points.length;
    if (n === 0) { out.set(0, 0, 0); return out; }
    if (n === 1) { out.copy(points[0]); return out; }
    if (n === 2) { out.lerpVectors(points[0], points[1], t); return out; }
    const segCount = n - 1;
    const segT = t * segCount;
    const seg = Math.min(Math.floor(segT), segCount - 1);
    const localT = segT - seg;
    const p0 = points[Math.max(seg - 1, 0)];
    const p1 = points[seg];
    const p2 = points[seg + 1];
    const p3 = points[Math.min(seg + 2, n - 1)];
    const t2 = localT * localT;
    const t3 = t2 * localT;
    out.x = 0.5 * ((2*p1.x) + (-p0.x + p2.x)*localT + (2*p0.x - 5*p1.x + 4*p2.x - p3.x)*t2 + (-p0.x + 3*p1.x - 3*p2.x + p3.x)*t3);
    out.y = 0.5 * ((2*p1.y) + (-p0.y + p2.y)*localT + (2*p0.y - 5*p1.y + 4*p2.y - p3.y)*t2 + (-p0.y + 3*p1.y - 3*p2.y + p3.y)*t3);
    out.z = 0.5 * ((2*p1.z) + (-p0.z + p2.z)*localT + (2*p0.z - 5*p1.z + 4*p2.z - p3.z)*t2 + (-p0.z + 3*p1.z - 3*p2.z + p3.z)*t3);
    return out;
}

// ===== Scene 1: Three-act reveal =====
// Planet flyby → pyramid pass → settle behind white. Long, ~15s.
// Big sweeping motion that shows the scale of the scene.
function makeScene1() {
    return {
        durationMs: 15000,
        easing: easeInOutSine,
        camPath: [
            // Far out near the planet field
            new THREE.Vector3( 70, 35,  80),
            // Drift through the planets
            new THREE.Vector3( 30, 22,  70),
            // Past the planets, approaching the pyramid (white side, +Z)
            new THREE.Vector3( 10, 18,  60),
            // Skim past the white pyramid
            new THREE.Vector3( 25, 14,  45),
            // Swing around the front of the scene
            new THREE.Vector3( 18,  8,  20),
            // Final landing
            INTRO_FINAL_CAM.clone()
        ],
        tgtPath: [
            new THREE.Vector3( 35,  10, 25),  // looking at the planets initially
            new THREE.Vector3( 15,   8, 20),
            new THREE.Vector3(  0,  10, 50),  // toward the white pyramid
            new THREE.Vector3(  0,  10, 50),
            new THREE.Vector3(  0,   2,  0),
            INTRO_FINAL_TGT.clone()
        ]
    };
}

// ===== Scene 2 billboards =====
// Three lightweight "AMENTI.AI" billboards that float in deep space and
// the camera passes during Scene 2's approach. Built lazily on first
// Scene 2 trigger, kept around afterward (cheap) but hidden when no
// Scene 2 is playing.
//
// Each billboard is a Sprite (always faces camera) with a canvas texture.
// Spacing is chosen to spread them across the camera's inbound path:
//   billboard 1 ≈ 220 units out  (closest to far start)
//   billboard 2 ≈ 130 units out
//   billboard 3 ≈ 55 units out   (closest to final landing)
// X offsets alternate left/right so the camera "weaves" slightly past
// each as it approaches.
let _amentiBillboards = null;   // array of 3 Sprites once built
function buildAmentiBillboardTexture() {
    const W = 1024;
    const H = 256;
    const c = document.createElement('canvas');
    c.width = W;
    c.height = H;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, W, H);
    // Centered "AMENTI.AI" — "AMENTI" big and white, ".AI" smaller and
    // emerald-green to match the existing marquee's colour palette.
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    const AMENTI_FONT = 130;
    const AI_FONT = 70;
    ctx.font = `bold ${AMENTI_FONT}px system-ui, sans-serif`;
    // Soft glow behind the letters so it reads against any backdrop.
    ctx.shadowColor = 'rgba(0,0,0,0.85)';
    ctx.shadowBlur = 18;
    // Measure to center the AMENTI.AI composite block
    const amentiText = 'AMENTI';
    const aiText = '.AI';
    const amentiWidth = ctx.measureText(amentiText).width;
    ctx.font = `bold ${AI_FONT}px system-ui, sans-serif`;
    const aiWidth = ctx.measureText(aiText).width;
    const totalWidth = amentiWidth + 8 + aiWidth;
    const startX = (W - totalWidth) / 2;
    // Draw AMENTI
    ctx.font = `bold ${AMENTI_FONT}px system-ui, sans-serif`;
    ctx.fillStyle = '#ffffff';
    ctx.fillText(amentiText, startX, H / 2);
    // Draw .AI (smaller, baseline aligned with AMENTI's bottom)
    ctx.font = `bold ${AI_FONT}px system-ui, sans-serif`;
    ctx.fillStyle = '#50c878';
    const aiY = H / 2 + (AMENTI_FONT - AI_FONT) / 2 - 6;
    ctx.fillText(aiText, startX + amentiWidth + 8, aiY);
    const tex = new THREE.CanvasTexture(c);
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    return tex;
}

function ensureAmentiBillboards() {
    if (_amentiBillboards) return _amentiBillboards;
    const tex = buildAmentiBillboardTexture();
    _amentiBillboards = [];
    // Positions (Z, X offset, Y offset). Z values fit between the camera's
    // start (z ≈ 290) and final landing (z = 10).
    const positions = [
        { x: -28, y: 6,  z: 220 },
        { x:  22, y: 10, z: 135 },
        { x: -16, y: 5,  z:  55 }
    ];
    for (const p of positions) {
        const mat = new THREE.SpriteMaterial({
            map: tex,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
            opacity: 0
        });
        const sprite = new THREE.Sprite(mat);
        // Sprite scale = world dimensions. Wide aspect so the text is readable.
        // Larger size makes them feel like roadside billboards.
        sprite.scale.set(34, 8.5, 1);
        sprite.position.set(p.x, p.y, p.z);
        sprite.visible = false;     // hidden until Scene 2 fades them in
        sprite.userData.amentiBillboard = true;
        scene.add(sprite);
        _amentiBillboards.push(sprite);
    }
    return _amentiBillboards;
}

function showAmentiBillboards() {
    const bb = ensureAmentiBillboards();
    for (const b of bb) {
        b.visible = true;
        b.material.opacity = 1;
    }
}

function hideAmentiBillboards() {
    if (!_amentiBillboards) return;
    for (const b of _amentiBillboards) {
        b.visible = false;
    }
}

// ===== Scene 2: Mysterious slow push past AMENTI.AI billboards =====
// Camera starts far back along the same line as the final landing pose
// (so the approach is level, not a dive). Path weaves slightly left/
// right to pass three floating "AMENTI.AI" billboards en route. ~12s.
function makeScene2() {
    // Far-back start. We deliberately set Y by hand (10) rather than
    // extrapolating along the target→camera direction; the previous
    // formula produced y ≈ 85 (camera way overhead), which made the
    // first leg a steep nosedive. A level start at y=10 matches the
    // billboard altitudes (5..10) so the camera glides through them
    // instead of diving past.
    const FAR_Z = 280;
    const veryFar = new THREE.Vector3(0, 10, FAR_Z);
    // Waypoints that weave slightly left/right to pass each billboard.
    // Billboard X positions: -28, +22, -16 (see ensureAmentiBillboards).
    // The camera offsets toward the OPPOSITE side of each billboard
    // so it visibly passes the sign rather than colliding with it.
    return {
        durationMs: 12000,
        easing: easeInCubic,    // slow start, fast end — building approach
        camPath: [
            veryFar,
            // Near billboard 1 (at x=-28, z=220): camera slightly to its right
            new THREE.Vector3(  6, 9, 230),
            // Near billboard 2 (at x=+22, z=135): camera slightly to its left
            new THREE.Vector3( -8, 8, 145),
            // Near billboard 3 (at x=-16, z=55): camera slightly to its right
            new THREE.Vector3(  4, 6,  65),
            INTRO_FINAL_CAM.clone()
        ],
        tgtPath: [
            // Always looking toward the board
            INTRO_FINAL_TGT.clone(),
            INTRO_FINAL_TGT.clone(),
            INTRO_FINAL_TGT.clone(),
            INTRO_FINAL_TGT.clone(),
            INTRO_FINAL_TGT.clone()
        ],
        // Scene-specific lifecycle hooks: show billboards while Scene 2 is
        // running, hide them when it ends or is skipped.
        onStart: showAmentiBillboards,
        onEnd:   hideAmentiBillboards
    };
}

// ===== Scene 3: Establishing wide =====
// Slow full orbit around the whole scene showing all elements, then settle. ~12s.
function makeScene3() {
    // 360° orbit around the board center, then settle behind white.
    // Camera height ~12, radius ~30, target = board center throughout
    // (which keeps the board centered in frame the whole time).
    const radius = 32;
    const height = 14;
    const points = [];
    // Trace the orbit in 8 steps starting BEHIND the camera's eventual
    // landing direction (+Z), going clockwise (around to -X, -Z, +X, back to +Z).
    for (let i = 0; i <= 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        points.push(new THREE.Vector3(
            Math.sin(angle) * radius,
            height,
            Math.cos(angle) * radius
        ));
    }
    // Final landing inserted as the last waypoint, blending out of the orbit.
    points.push(INTRO_FINAL_CAM.clone());
    // Look-at: hold on board center for the whole orbit, then drop to
    // the final target as we settle.
    const tgts = [];
    for (let i = 0; i <= 8; i++) tgts.push(new THREE.Vector3(0, 1, 0));
    tgts.push(INTRO_FINAL_TGT.clone());
    return {
        durationMs: 12000,
        easing: easeInOutSine,
        camPath: points,
        tgtPath: tgts
    };
}

// ===== Scene 4: Heroic descent =====
// Start above the pyramid apex, descend along its face, sweep across to the board. ~10s.
// Uses the WHITE pyramid (at +Z = 50) since the landing pose is on white's side.
function makeScene4() {
    return {
        durationMs: 10000,
        easing: easeInOutCubic,
        camPath: [
            // Hovering directly above the white pyramid apex (apex at y=20)
            new THREE.Vector3(  0, 45, 50),
            // Descending in front of the pyramid face
            new THREE.Vector3(  0, 25, 38),
            // Continuing down and pulling toward the board
            new THREE.Vector3(  0, 14, 25),
            // Landing approach
            new THREE.Vector3(  0,  8, 16),
            INTRO_FINAL_CAM.clone()
        ],
        tgtPath: [
            new THREE.Vector3(  0, 20, 50),  // looking at the pyramid apex
            new THREE.Vector3(  0, 10, 50),  // mid-pyramid
            new THREE.Vector3(  0,  2,  5),  // looking ahead to the board
            new THREE.Vector3(  0,  1, -1),
            INTRO_FINAL_TGT.clone()
        ]
    };
}

// ===== Scene 5: Dolly past a planet =====
// Begin with a planet filling the foreground, camera moves past it to
// reveal the board behind. ~9s.
// We pick a position close to one of the planet orbits (Saturn at radius
// 55) and dolly past it toward the board center.
function makeScene5() {
    // Saturn sits at orbit-radius 55 in the YZ plane (due to the orbit
    // tilt). It's animated so its precise spot moves; we just position
    // the camera near a "plausible planet spot" close to the orbit
    // sphere and dolly inward toward the board.
    return {
        durationMs: 9000,
        easing: easeOutCubic,
        camPath: [
            // Right next to a planet, planet should fill the frame's edge.
            new THREE.Vector3( 18,  8,  55),
            // Dolly inward, past the planet
            new THREE.Vector3( 14,  6,  35),
            // Continue toward the board
            new THREE.Vector3(  8,  5,  20),
            INTRO_FINAL_CAM.clone()
        ],
        tgtPath: [
            // Initially looking past the planet at the board
            new THREE.Vector3(  0,  2,   0),
            new THREE.Vector3(  0,  2,   0),
            new THREE.Vector3(  0,  1,  -2),
            INTRO_FINAL_TGT.clone()
        ]
    };
}

const INTRO_SCENES = {
    1: makeScene1,
    2: makeScene2,
    3: makeScene3,
    4: makeScene4,
    5: makeScene5
};

// --- Intro state ---
let introActive = false;
let introStartMs = 0;
let introSkipped = false;
let activeScene = null;

// Jump the camera to a "neutral" start pose immediately so the user
// doesn't see the old (0, 10, 12) default before the intro fires. We
// pick the start of scene 2 since that's the auto-play scene.
const _autoplayScene = makeScene2();
camera.position.copy(_autoplayScene.camPath[0]);
controls.target.copy(_autoplayScene.tgtPath[0]);

function startIntroScene(sceneNumber) {
    const factory = INTRO_SCENES[sceneNumber];
    if (!factory) return;
    // End any currently-running scene cleanly (firing its onEnd hook)
    // before starting the new one. This avoids leaking visual state
    // when the user clicks deck buttons mid-scene.
    if (introActive) endIntro();
    activeScene = factory();
    introActive = true;
    introStartMs = 0;
    introSkipped = false;
    controls.enableRotate = false;
    controls.enablePan = false;
    controls.enableZoom = false;
    // Snap to scene's starting pose
    camera.position.copy(activeScene.camPath[0]);
    controls.target.copy(activeScene.tgtPath[0]);
    // Scene-specific setup (e.g. show billboards).
    if (activeScene.onStart) activeScene.onStart();
}

function endIntro() {
    if (!introActive) return;
    // Scene-specific teardown (e.g. hide billboards).
    if (activeScene && activeScene.onEnd) activeScene.onEnd();
    introActive = false;
    camera.position.copy(INTRO_FINAL_CAM);
    controls.target.copy(INTRO_FINAL_TGT);
    controls.enableRotate = true;
    controls.enablePan = true;
    controls.enableZoom = true;
    if (typeof ELEVATION_PRESETS !== 'undefined') {
        ELEVATION_PRESETS.current.position.copy(INTRO_FINAL_CAM);
        ELEVATION_PRESETS.current.target.copy(INTRO_FINAL_TGT);
    }
    markActivity();
}

function updateIntro(now) {
    if (!introActive || !activeScene) return false;
    if (introStartMs === 0) introStartMs = now;
    const rawT = (now - introStartMs) / activeScene.durationMs;
    if (rawT >= 1 || introSkipped) {
        endIntro();
        return false;
    }
    const easeFn = activeScene.easing || easeInOutSine;
    const eased = easeFn(rawT);
    catmullRomPath(activeScene.camPath, eased, camera.position);
    catmullRomPath(activeScene.tgtPath, eased, controls.target);
    return true;
}

function skipIntroOnce() {
    if (!introActive) return;
    introSkipped = true;
}
// Skip on first user interaction. We re-add these listeners every time a
// new scene starts so replays from the deck remain skippable.
function attachIntroSkipListeners() {
    window.addEventListener('pointerdown', skipIntroOnce, { once: true, capture: true });
    window.addEventListener('keydown',     skipIntroOnce, { once: true, capture: true });
    window.addEventListener('wheel',       skipIntroOnce, { once: true, capture: true, passive: true });
}
attachIntroSkipListeners();

// --- Intro deck UI ---

introDeck.style.cssText = 'display: flex; gap: 4px; align-items: center; margin-top: 6px;';
const introLabel = document.createElement('span');
introLabel.textContent = 'Intro:';
introLabel.style.cssText = 'font-size: 12px; margin-right: 4px;';
introDeck.appendChild(introLabel);
for (let i = 1; i <= 3; i++) {
    const btn = document.createElement('button');
