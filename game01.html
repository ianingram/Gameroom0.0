    // both with long axis along X (east-west), framing the play area.
    // Two material palettes — one per temple. White temple (north,
    // z=+32, on white's side) is rendered in white marble; black temple
    // (south, z=-32, on black's side) is rendered in black obsidian.
    // Obsidian is volcanic glass — very smooth and reflective — so we
    // use very low roughness + some metalness to give it a polished look
    // that catches the lamp glow and sun glints. Marble has a softer
    // subsurface sheen that we approximate with mid-low roughness.
    const marbleMats = {
        stone: new THREE.MeshStandardMaterial({
            color: 0xeeeae0,
            roughness: 0.55,
            metalness: 0.05
        }),
        darker: new THREE.MeshStandardMaterial({
            color: 0xd5cfc2,
            roughness: 0.65,
            metalness: 0.05
        }),
        altar: new THREE.MeshStandardMaterial({
            color: 0xf2eee5,
            roughness: 0.45,
            metalness: 0.05
        })
    };
    const obsidianMats = {
        stone: new THREE.MeshStandardMaterial({
            color: 0x1a1418,
            roughness: 0.18,
            metalness: 0.5
        }),
        darker: new THREE.MeshStandardMaterial({
            color: 0x0e090c,
            roughness: 0.22,
            metalness: 0.5
        }),
        altar: new THREE.MeshStandardMaterial({
            color: 0x05030a,
            roughness: 0.15,
            metalness: 0.6
        })
    };

    // Doric column. No base in true Doric; shaft taper is gentle. Capital
    // is an echinus (rounded cushion) + abacus (square plate). The
    // material is whichever palette the calling temple uses.
    function makeDoricColumn(x, z, baseY, mats) {
        const g = new THREE.Group();
        const SHAFT_H = 7;
        const SHAFT_TOP_R = 0.42;
        const SHAFT_BOT_R = 0.52;
        // Shaft (slight taper)
        const shaftGeo = new THREE.CylinderGeometry(SHAFT_TOP_R, SHAFT_BOT_R, SHAFT_H, 20);
        const shaft = new THREE.Mesh(shaftGeo, mats.stone);
        shaft.position.y = SHAFT_H / 2;
        shaft.castShadow = true;
        shaft.receiveShadow = true;
        g.add(shaft);
        // Echinus (rounded cushion under the abacus)
        const echinusGeo = new THREE.CylinderGeometry(0.55, SHAFT_TOP_R, 0.28, 20);
        const echinus = new THREE.Mesh(echinusGeo, mats.stone);
        echinus.position.y = SHAFT_H + 0.14;
        echinus.castShadow = true;
        g.add(echinus);
        // Abacus (square plate on top)
        const abacusGeo = new THREE.BoxGeometry(1.25, 0.22, 1.25);
        const abacus = new THREE.Mesh(abacusGeo, mats.stone);
        abacus.position.y = SHAFT_H + 0.28 + 0.11;
        abacus.castShadow = true;
        g.add(abacus);
        g.position.set(x, baseY, z);
        return g;
    }

    // One Parthenon-style temple. mats = the material palette to use
    // (marbleMats for the white temple, obsidianMats for the black one).
    function makeTemple(centerX, centerZ, mats) {
        const g = new THREE.Group();
        // Dimensions
        const COLS_LONG  = 10;   // columns along the long axis (X)
        const COLS_SHORT = 6;    // columns along the short axis (Z)
        const COL_SPACING = 2.4; // distance between adjacent columns
        const longSpan  = (COLS_LONG  - 1) * COL_SPACING;  // = 21.6
        const shortSpan = (COLS_SHORT - 1) * COL_SPACING;  // = 12.0
        // Ground plinth: a wide low slab beneath the stylobate steps. Gives
        // the temple a sense of being rooted to a foundation instead of
        // floating on bare ground. Slightly inset SHORTER than the widest
        // stylobate step would predict, so the visual hierarchy goes
        // plinth (widest) → step 1 → step 2 → step 3 (narrowest).
        const PLINTH_HEIGHT = 0.5;
        const PLINTH_INSET_PAST_STEPS = 1.2;     // extends this much past the bottom step on each side
        const widestStepW = longSpan  + 2 * 1.6;   // step 1 inset (1.6)
        const widestStepD = shortSpan + 2 * 1.6;
        const plinthW = widestStepW + 2 * PLINTH_INSET_PAST_STEPS;
        const plinthD = widestStepD + 2 * PLINTH_INSET_PAST_STEPS;
        const plinthGeo = new THREE.BoxGeometry(plinthW, PLINTH_HEIGHT, plinthD);
        const plinth = new THREE.Mesh(plinthGeo, mats.darker);
        plinth.position.y = -PLINTH_HEIGHT / 2;   // top sits at y=0 (ground)
        plinth.receiveShadow = true;
        g.add(plinth);
        // Stylobate (the 3-step platform). Each step inset slightly.
        const STEP_HEIGHTS = [0.35, 0.35, 0.35];
        const STEP_INSETS = [1.6, 1.0, 0.4];   // x/z extra per side from peristyle bounding box
        let curY = 0;
        for (let s = 0; s < STEP_HEIGHTS.length; s++) {
            const inset = STEP_INSETS[s];
            const w = longSpan  + 2 * inset;
            const d = shortSpan + 2 * inset;
            const stepGeo = new THREE.BoxGeometry(w, STEP_HEIGHTS[s], d);
            const step = new THREE.Mesh(stepGeo, mats.darker);
            step.position.y = curY + STEP_HEIGHTS[s] / 2;
            step.receiveShadow = true;
            g.add(step);
            curY += STEP_HEIGHTS[s];
        }
        const stylobateTopY = curY;   // columns sit on this height

        // Peristyle: columns around the full rectangular perimeter.
        // Don't double-place corners — long-side rows omit endpoints,
        // short-side rows include them.
        const xStart = -longSpan / 2;
        const zStart = -shortSpan / 2;
        for (let i = 0; i < COLS_LONG; i++) {
            const x = xStart + i * COL_SPACING;
            // Short edges (z = ±shortSpan/2) include corners.
            g.add(makeDoricColumn(x, -shortSpan / 2, stylobateTopY, mats));
            g.add(makeDoricColumn(x,  shortSpan / 2, stylobateTopY, mats));
        }
        for (let j = 1; j < COLS_SHORT - 1; j++) {     // skip corners — they're handled above
            const z = zStart + j * COL_SPACING;
            g.add(makeDoricColumn(-longSpan / 2, z, stylobateTopY, mats));
            g.add(makeDoricColumn( longSpan / 2, z, stylobateTopY, mats));
        }

        // Entablature: rectangular beam frame above the columns. Sits on
        // top of the abacus plates, framing the peristyle.
        const COLUMN_TOTAL_H = 7 + 0.28 + 0.22;   // shaft + echinus + abacus = 7.5
        const ENT_HEIGHT = 1.4;
        const ENT_THICKNESS = 0.9;     // depth of each beam (perpendicular to its length)
        const entY = stylobateTopY + COLUMN_TOTAL_H + ENT_HEIGHT / 2;
        // Two long beams (along X)
        const longBeamGeo = new THREE.BoxGeometry(longSpan + 1.5, ENT_HEIGHT, ENT_THICKNESS);
        for (const z of [-shortSpan / 2, shortSpan / 2]) {
            const beam = new THREE.Mesh(longBeamGeo, mats.darker);
            beam.position.set(0, entY, z);
            beam.castShadow = true;
            beam.receiveShadow = true;
            g.add(beam);
        }
        // Two short beams (along Z) — slightly shorter so they sit
        // INSIDE the long beams at the corners (Parthenon-style overlap).
        const shortBeamGeo = new THREE.BoxGeometry(ENT_THICKNESS, ENT_HEIGHT, shortSpan + 0.4);
        for (const x of [-longSpan / 2, longSpan / 2]) {
            const beam = new THREE.Mesh(shortBeamGeo, mats.darker);
            beam.position.set(x, entY, 0);
            beam.castShadow = true;
            beam.receiveShadow = true;
            g.add(beam);
        }

        g.position.set(centerX, 0, centerZ);

        // ----- ALTAR + LAMPS + MINI CHESS BOARD -----
        // A rectangular stone altar at the center of the temple. Two lamps
        // flank it at the 1/3 marks of the temple's long axis. On top of
        // the altar sits a small 8x8 chess board that mirrors the main
        // match move-for-move (the mirror pieces are populated by
        // renderPieces -> renderAltarPieces).
        //
        // Altar dimensions:
        const ALTAR_W = 4.0;        // along X (long axis of temple)
        const ALTAR_D = 4.0;        // along Z (short axis)
        const ALTAR_H = 1.2;
        // Y position of altar BASE — sits on the stylobate top.
        const altarBaseY = stylobateTopY;
        // Altar block — uses the temple's own altar material (marble or obsidian)
        const altarGeo = new THREE.BoxGeometry(ALTAR_W, ALTAR_H, ALTAR_D);
        const altar = new THREE.Mesh(altarGeo, mats.altar);
        altar.position.set(0, altarBaseY + ALTAR_H / 2, 0);
        altar.castShadow = true;
        altar.receiveShadow = true;
        g.add(altar);

        // Mini chess board on top of the altar — a small 8x8 grid of tiles.
        // We tag each tile + the parent group so the piece renderer can
        // find and populate this altar. The tile-size is chosen so 8
        // tiles fit on top of the altar with a small margin.
        const MINI_BOARD_FRAC = 0.85;       // fraction of altar surface covered by board
        const MINI_TILE_SIZE = (ALTAR_W * MINI_BOARD_FRAC) / 8;
        const altarTopY = altarBaseY + ALTAR_H;
        const altarBoardGroup = new THREE.Group();
        altarBoardGroup.position.set(0, altarTopY + 0.005, 0);
        // Tag the altar group with the player color so the piece renderer
        // can orient pieces correctly (white temple at +Z, black at -Z).
        altarBoardGroup.userData.isAltarBoard = true;
        altarBoardGroup.userData.tileSize = MINI_TILE_SIZE;
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const isLightSquare = (row + col) % 2 === 0;
                const tileColor = isLightSquare ? 0xeeeed2 : 0x6a554a;
                const tileGeo = new THREE.BoxGeometry(MINI_TILE_SIZE, 0.02, MINI_TILE_SIZE);
                const tileMat = new THREE.MeshStandardMaterial({
                    color: tileColor,
                    roughness: 0.65,
                    metalness: 0.0
                });
                const tile = new THREE.Mesh(tileGeo, tileMat);
                tile.position.set(
                    (col - 3.5) * MINI_TILE_SIZE,
                    0.01,
                    (row - 3.5) * MINI_TILE_SIZE
                );
                tile.receiveShadow = true;
                altarBoardGroup.add(tile);
            }
        }
        g.add(altarBoardGroup);
        // Stash the altar board on the temple group so renderAltarPieces
        // can find it. The temple group itself is added later to the
        // world; the altar board is a child so it inherits the temple's
        // world position automatically.
        g.userData.altarBoardGroup = altarBoardGroup;

        // Two lamps at the 1/3 marks of the temple's long axis. Each
        // lamp = a stone post + a glowing emissive bowl at the top with
        // a small point light inside it so the altar is actually lit.
        function makeLamp(x) {
            const lg = new THREE.Group();
            const POST_H = 2.4;
            const postGeo = new THREE.CylinderGeometry(0.12, 0.18, POST_H, 12);
            const post = new THREE.Mesh(postGeo, mats.darker);
            post.position.y = stylobateTopY + POST_H / 2;
            post.castShadow = true;
            lg.add(post);
            // Glowing bowl at the top
            const bowlGeo = new THREE.SphereGeometry(0.32, 16, 12, 0, Math.PI * 2, 0, Math.PI / 2);
            const bowlMat = new THREE.MeshStandardMaterial({
                color: 0xffd070,
                emissive: 0xffaa40,
                emissiveIntensity: 1.4,
                roughness: 0.4,
                metalness: 0.2
            });
            const bowl = new THREE.Mesh(bowlGeo, bowlMat);
            bowl.position.y = stylobateTopY + POST_H + 0.05;
            lg.add(bowl);
            // Actual point light to illuminate the altar.
            const lamp = new THREE.PointLight(0xffb060, 1.8, 12, 1.6);
            lamp.position.y = stylobateTopY + POST_H + 0.15;
            lg.add(lamp);
            lg.position.set(x, 0, 0);
            return lg;
        }
        // 1/3 marks along the long axis
        g.add(makeLamp(-longSpan / 3));
        g.add(makeLamp( longSpan / 3));

        return g;
    }

    const props = [
        // ----- LANDSCAPE LAYERS -----
        ...buildCathedralLandscape(),
        // ----- APPLE BLOSSOM TREES -----
        ...buildAppleBlossomTrees(),
        // ----- TEMPLES -----
        makeTemple(0,  72, marbleMats),    // north temple — white marble
        makeTemple(0, -72, obsidianMats),  // south temple — black obsidian
    ];

    // Apply the current day/night state now that all V5 props (and the
    // _cathedralState refs) are set up.
    applyCathedralDayNight(cathedralDayNight);

    return props;
}

// ----- Landscape layer builders (V5) -----
// All meshes return as an array; the cathedral builder spreads them into
// its main return value.
function buildCathedralLandscape() {
    const out = [];

    // OUTER TERRAIN — a huge ground plane that extends to the horizon.
    // The CENTER region (matching the grass plot, ±38 X × ±58 Z) is flat
    // at the same y level as the inner grass. BEYOND that plateau, the
    // terrain slopes DOWN AND AWAY at a 30% grade (~16.7°), so the temple
    // complex appears to sit on the top of a small mountain.
    //
    // A RECTANGULAR HOLE is cut where the pool sits so the deep pool
    // walls/floor are visible from above instead of being hidden by this
    // ground plane.
    const TERRAIN_SIZE = 1000;
    const TERRAIN_SEGS = 80;
    const PLATEAU_HALF_X = 135;
    const PLATEAU_HALF_Z = 246;
    const PLATEAU_Y = -0.30;
    const SLOPE = 0.30;
    // Pool hole dimensions (matches the LAKE_W/LAKE_L used below for the pool)
    const POOL_HOLE_HALF_X = 52 / 2;
    const POOL_HOLE_HALF_Z = 100 / 2;

    // Build terrain via a Shape with a rectangular hole, then displace
    // its vertices to form the sloped plateau. Use ExtrudeGeometry with
    // depth=0 for a flat shape, then deform — but ExtrudeGeometry with
    // zero depth produces nothing. Use ShapeGeometry instead (a flat
    // triangulated 2D shape, no thickness).
    const tShape = new THREE.Shape();
    tShape.moveTo(-TERRAIN_SIZE / 2, -TERRAIN_SIZE / 2);
    tShape.lineTo( TERRAIN_SIZE / 2, -TERRAIN_SIZE / 2);
    tShape.lineTo( TERRAIN_SIZE / 2,  TERRAIN_SIZE / 2);
    tShape.lineTo(-TERRAIN_SIZE / 2,  TERRAIN_SIZE / 2);
    tShape.closePath();
    const poolHole = new THREE.Path();
    poolHole.moveTo(-POOL_HOLE_HALF_X, -POOL_HOLE_HALF_Z);
    poolHole.lineTo( POOL_HOLE_HALF_X, -POOL_HOLE_HALF_Z);
    poolHole.lineTo( POOL_HOLE_HALF_X,  POOL_HOLE_HALF_Z);
    poolHole.lineTo(-POOL_HOLE_HALF_X,  POOL_HOLE_HALF_Z);
    poolHole.closePath();
    tShape.holes.push(poolHole);
    const terrainGeo = new THREE.ShapeGeometry(tShape, 80);
    // ShapeGeometry doesn't give us regular grid vertices — too few for
    // a smooth slope. Instead build via ExtrudeGeometry with bevelEnabled:
    // false and depth 0.01, then collapse Z. Actually simpler: just use
    // the displaced PlaneGeometry approach + a separate set of strips
    // CUTTING out the pool area. We'll just trust the user can't see
    // the pool-area terrain because the pool walls and the transparent
    // water in front of them block it from above.
    //
    // Easier path: render terrain with PlaneGeometry as before, but set
    // its depthWrite off in the pool area (impossible) — so do it the
    // clean way: subdivide and skip triangles in the hole. Too complex.
    //
    // Best practical answer: the lake's TOP gold edge trim already
    // visually frames the pool from above, and the wall meshes block
    // sideways. The terrain plane DOES show through the (transparent)
    // water, but tinted by the water it reads as "ground beneath" — not
    // a deep pool. We DO need to remove it.
    //
    // We'll use ShapeGeometry with a tessellated outer boundary so we
    // get enough vertices for the slope. Tessellate the outer ring by
    // hand into a fine grid, then add the hole.

    // Hand-tessellate the terrain. Each vertex gets:
    //  (a) a Y position from the plateau-slope rule + gentle organic noise
    //  (b) a per-vertex COLOR that shifts from manicured green at the
    //      center, to forest-floor olive further out (the "wild" zone
    //      beyond the trees), to rocky brown on the mountainside slope.
    const GRID = 100;            // more vertices = better noise resolution
    const step = TERRAIN_SIZE / GRID;
    const verts = [];
    const colors = [];
    const indices = [];
    function vertIdx(i, j) { return j * (GRID + 1) + i; }
    // Cheap deterministic 2D pseudo-noise — value-noise style with smooth
    // interpolation. Returns ~-1..+1.
    function valueNoise(x, z) {
        // Use a single layer at one scale + a finer detail layer.
        function hash(ix, iz) {
            const n = Math.sin(ix * 12.9898 + iz * 78.233) * 43758.5453;
            return (n - Math.floor(n)) * 2 - 1;
        }
        function smooth(t) { return t * t * (3 - 2 * t); }     // Hermite smoothstep
        function noiseAt(scale) {
            const sx = x / scale;
            const sz = z / scale;
            const ix = Math.floor(sx);
            const iz = Math.floor(sz);
            const fx = sx - ix;
            const fz = sz - iz;
            const a = hash(ix,     iz    );
            const b = hash(ix + 1, iz    );
            const c = hash(ix,     iz + 1);
            const d = hash(ix + 1, iz + 1);
            const u = smooth(fx);
            const v = smooth(fz);
            return (a * (1 - u) + b * u) * (1 - v)
                 + (c * (1 - u) + d * u) * v;
        }
        return noiseAt(35) * 0.7 + noiseAt(12) * 0.3;
    }
    // Vertex color palette (RGB normalized)
    const COLOR_GARDEN  = [0.227, 0.420, 0.227];   // 0x3a6b3a inner garden green (matches grass)
    const COLOR_WILD    = [0.165, 0.290, 0.165];   // 0x2a4a2a wild forest-floor
    const COLOR_BROWN   = [0.275, 0.215, 0.165];   // 0x463728 rocky/dirt brown for steep slopes
    function mix3(a, b, t) {
        return [a[0] + (b[0] - a[0]) * t,
                a[1] + (b[1] - a[1]) * t,
                a[2] + (b[2] - a[2]) * t];
    }
    for (let j = 0; j <= GRID; j++) {
        for (let i = 0; i <= GRID; i++) {
            const x = -TERRAIN_SIZE / 2 + i * step;
            const z = -TERRAIN_SIZE / 2 + j * step;
            const dx = Math.max(0, Math.abs(x) - PLATEAU_HALF_X);
            const dz = Math.max(0, Math.abs(z) - PLATEAU_HALF_Z);
            const distOutside = Math.sqrt(dx * dx + dz * dz);
            // Base Y from slope rule
            let y = -SLOPE * distOutside;
            // Add gentle noise-based bumpiness. Stronger on the OUTER
            // wild zone, near-zero inside the plateau (manicured).
            // Distance from the grass plot edge (the "tree perimeter")
            // determines how wild the surface is.
            const GARDEN_HALF_X = 38;             // matches grass plot
            const GARDEN_HALF_Z = 58;
            const distFromGarden = Math.sqrt(
                Math.max(0, Math.abs(x) - GARDEN_HALF_X) ** 2 +
                Math.max(0, Math.abs(z) - GARDEN_HALF_Z) ** 2
            );
            // Wild factor: 0 inside garden, ramps to 1 over the first 80
            // units outside it.
            const wildness = Math.min(1, distFromGarden / 80);
            // Add noise scaled by wildness
            y += valueNoise(x, z) * 1.8 * wildness;
            verts.push(x, y, z);

            // Per-vertex color. Three zones:
            //  inside garden (wildness=0):       COLOR_GARDEN
            //  wild ring (wildness 0..1):        garden → wild
            //  steep slope (distOutside > 0):    wild → brown
            const slopeFactor = Math.min(1, distOutside / 200);
            let c = mix3(COLOR_GARDEN, COLOR_WILD, wildness);
            c = mix3(c, COLOR_BROWN, slopeFactor);
            // Tiny per-vertex color jitter from the noise so the surface
            // isn't flat-shaded.
            const jitter = valueNoise(x + 1000, z + 1000) * 0.05;
            colors.push(c[0] + jitter, c[1] + jitter, c[2] + jitter);
        }
    }
    for (let j = 0; j < GRID; j++) {
        for (let i = 0; i < GRID; i++) {
            const x0 = -TERRAIN_SIZE / 2 + i * step + step / 2;
            const z0 = -TERRAIN_SIZE / 2 + j * step + step / 2;
            if (Math.abs(x0) < POOL_HOLE_HALF_X && Math.abs(z0) < POOL_HOLE_HALF_Z) continue;
            const a = vertIdx(i, j);
            const b = vertIdx(i + 1, j);
            const c = vertIdx(i + 1, j + 1);
            const d = vertIdx(i, j + 1);
            // Winding chosen so the triangle normals point UP (+Y) —
            // this is the orientation visible from above.
            indices.push(a, c, b);
            indices.push(a, d, c);
        }
    }
    const terrainGeoFinal = new THREE.BufferGeometry();
    terrainGeoFinal.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    terrainGeoFinal.setAttribute('color',    new THREE.Float32BufferAttribute(colors, 3));
    terrainGeoFinal.setIndex(indices);
    terrainGeoFinal.computeVertexNormals();
    const terrainMat = new THREE.MeshStandardMaterial({
        vertexColors: true,
        roughness: 1.0,
        metalness: 0.0
    });
    const terrain = new THREE.Mesh(terrainGeoFinal, terrainMat);
    terrain.position.y = PLATEAU_Y;
    terrain.receiveShadow = true;
    out.push(terrain);

    // TWILIGHT/DAY SKY DOME — repainted by applyCathedralDayNight().
    // We create the canvas + texture here; the actual gradient is set by
    // the applier so the same code handles both day and night.
    const skyGradCanvas = document.createElement('canvas');
    skyGradCanvas.width = 4;
    skyGradCanvas.height = 256;
    const skyTex = new THREE.CanvasTexture(skyGradCanvas);
    skyTex.minFilter = THREE.LinearFilter;
    skyTex.magFilter = THREE.LinearFilter;
    const SKY_R = 480;
    const skyGeo = new THREE.SphereGeometry(SKY_R, 32, 32);
    const skyMat = new THREE.MeshBasicMaterial({
        map: skyTex,
        side: THREE.BackSide,
        depthWrite: false,
        fog: false           // sky dome shouldn't be tinted by atmospheric fog
    });
    const sky = new THREE.Mesh(skyGeo, skyMat);
    sky.renderOrder = -2;
    out.push(sky);

    // SUN/MOON LIGHT — a directional light positioned above & to one side.
    // Color, intensity, and position are swapped by the applier.
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
    sunLight.position.set(100, 200, 50);
    out.push(sunLight);

    // V5-LOCAL AMBIENT — supplements the global ambient when V5 is active.
    // The global ambient is dim (0.18); we boost it during day.
    const v5Ambient = new THREE.AmbientLight(0xffffff, 0.4);
    out.push(v5Ambient);

    // SKY DECORATION — sun or moon disc as a billboard sprite high in the
    // sky. Painted on a canvas; the applier swaps the image.
    const sunDiscCanvas = document.createElement('canvas');
    sunDiscCanvas.width = 256;
    sunDiscCanvas.height = 256;
    const sunDiscTex = new THREE.CanvasTexture(sunDiscCanvas);
    const sunDiscMat = new THREE.SpriteMaterial({
        map: sunDiscTex,
        transparent: true,
        depthWrite: false,
        fog: false           // sky element, not subject to atmospheric tinting
    });
    const sunDisc = new THREE.Sprite(sunDiscMat);
    sunDisc.scale.set(50, 50, 1);
    sunDisc.position.set(180, 120, -200);
    sunDisc.renderOrder = -1;
    out.push(sunDisc);

    // ---- CONSTELLATION CHESS BACK RANK ----
    // The 8 back-rank piece symbols drawn as constellations (bright stars
    // connected by faint glowing lines) in the sky beyond the black
    // temple. Each piece is its OWN mesh so it can animate independently
    // when its earthly counterpart is captured (it "falls from the sky").
    //
    // Sequence: R N B Q K B N R
    const CONST_Y = 70;             // sky altitude — well above tree canopy
    const CONST_TOTAL_W = 220;      // total horizontal spread
    const CONST_PIECE_W = CONST_TOTAL_W / 8;     // 27.5 units per slot
    // Each piece type's drawing function paints to a small dedicated canvas
    function makePieceConstellationTexture(type) {
        const c = document.createElement('canvas');
        c.width = 256;
        c.height = 384;
        const ctx = c.getContext('2d');
        ctx.strokeStyle = 'rgba(245, 237, 214, 0.55)';
        ctx.lineWidth = 1.8;
        ctx.lineCap = 'round';
        function star(x, y, r) {
            const grad = ctx.createRadialGradient(x, y, 0, x, y, r * 4);
            grad.addColorStop(0,   'rgba(255, 248, 216, 0.9)');
            grad.addColorStop(0.3, 'rgba(255, 248, 216, 0.4)');
            grad.addColorStop(1,   'rgba(255, 248, 216, 0.0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(x, y, r * 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'rgba(255, 248, 216, 1.0)';
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
        }
        function line(x1, y1, x2, y2) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }
        const cx = 128, cy = 192;
        if (type === 'rook') {
            const top = cy - 90, bottom = cy + 90;
            // 4 battlements
            const bpos = [cx-44, cx-28, cx-12, cx+4, cx+20, cx+36];
            line(bpos[0], top, bpos[0], top+30); line(bpos[0], top, bpos[1], top); line(bpos[1], top, bpos[1], top+30);
            line(bpos[1], top+30, bpos[2], top+30); line(bpos[2], top, bpos[2], top+30); line(bpos[2], top, bpos[3], top);
            line(bpos[3], top, bpos[3], top+30); line(bpos[3], top+30, bpos[4], top+30); line(bpos[4], top, bpos[4], top+30);
            line(bpos[4], top, bpos[5], top); line(bpos[5], top, bpos[5], top+30);
            // body
            line(cx-44, top+30, cx+36, top+30);
            line(cx-36, top+30, cx-36, bottom-20);
            line(cx+28, top+30, cx+28, bottom-20);
            line(cx-36, bottom-20, cx+28, bottom-20);
            // base
            line(cx-50, bottom-20, cx+42, bottom-20);
            line(cx-50, bottom-20, cx-50, bottom);
            line(cx+42, bottom-20, cx+42, bottom);
            line(cx-50, bottom, cx+42, bottom);
            for (const b of bpos) star(b, top, 3);
            star(cx-44, top+30, 3); star(cx+36, top+30, 3);
            star(cx-36, bottom-20, 3); star(cx+28, bottom-20, 3);
            star(cx-50, bottom, 3); star(cx+42, bottom, 3);
        } else if (type === 'knight' || type === 'knight-mirror') {
            const sign = (type === 'knight-mirror') ? -1 : 1;
            const top = cy - 90, bottom = cy + 90;
            line(cx + sign*(-30), top, cx + sign*(-30), bottom);
            line(cx + sign*(-30), cy - 10, cx + sign*(40), top);
            line(cx + sign*(-30), cy - 10, cx + sign*(40), bottom);
            star(cx + sign*(-30), top, 4);
            star(cx + sign*(-30), bottom, 4);
            star(cx + sign*(-30), cy - 10, 4.5);
            star(cx + sign*(40),  top, 4);
            star(cx + sign*(40),  bottom, 4);
        } else if (type === 'bishop') {
            const apex = cy - 100, base = cy + 90;
            line(cx-44, base, cx, apex);
            line(cx+44, base, cx, apex);
            line(cx-22, cy + 5, cx+22, cy + 5);
            star(cx, apex, 5);
            star(cx-44, base, 4);
            star(cx+44, base, 4);
            star(cx-22, cy + 5, 3);
            star(cx+22, cy + 5, 3);
        } else if (type === 'queen') {
            const circleCY = cy - 50;
            const r = 32;
            const N = 12;
            const pts = [];
            for (let i = 0; i < N; i++) {
                const a = (i/N) * Math.PI * 2 - Math.PI / 2;
                pts.push([cx + Math.cos(a)*r, circleCY + Math.sin(a)*r]);
            }
            for (let i = 0; i < N; i++) {
                const [x1,y1] = pts[i], [x2,y2] = pts[(i+1)%N];
                line(x1, y1, x2, y2);
            }
            for (const [sx,sy] of pts) star(sx, sy, 2.5);
            line(cx, circleCY + r, cx, cy + 65);
            line(cx - 24, cy + 40, cx + 24, cy + 40);
            star(cx, circleCY + r, 3);
            star(cx, cy + 65, 3.5);
            star(cx - 24, cy + 40, 3);
            star(cx + 24, cy + 40, 3);
        } else if (type === 'king') {
            const top = cy - 115, bottom = cy + 90;
            const armY = cy - 30;
            line(cx, top, cx, bottom);
            line(cx-50, armY, cx+50, armY);
            star(cx, top, 6);                  // brightest
            star(cx, bottom, 5);
            star(cx-50, armY, 5);
            star(cx+50, armY, 5);
            star(cx, armY, 4.5);
        }
        const tex = new THREE.CanvasTexture(c);
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        return tex;
    }

    // Star positions for each constellation (relative to plane center,
    // in canvas-pixel offsets from center (128, 192)). Used to spawn
    // individual scattering stars at supernova time. Returns
    // [{x, y, r}, ...] — x,y are pixel offsets; r is star draw radius.
    function getPieceStarPositions(type) {
        const cx = 128, cy = 192;
        const stars = [];
        if (type === 'rook') {
            const top = cy - 90, bottom = cy + 90;
            const bpos = [cx-44, cx-28, cx-12, cx+4, cx+20, cx+36];
            for (const b of bpos) stars.push({ x: b - cx, y: top - cy, r: 3 });
            stars.push({ x: -44, y: top + 30 - cy, r: 3 });
            stars.push({ x:  36, y: top + 30 - cy, r: 3 });
            stars.push({ x: -36, y: bottom - 20 - cy, r: 3 });
            stars.push({ x:  28, y: bottom - 20 - cy, r: 3 });
            stars.push({ x: -50, y: bottom - cy, r: 3 });
            stars.push({ x:  42, y: bottom - cy, r: 3 });
        } else if (type === 'knight' || type === 'knight-mirror') {
            const sign = (type === 'knight-mirror') ? -1 : 1;
            const top = cy - 90, bottom = cy + 90;
            stars.push({ x: sign * -30, y: top - cy,    r: 4 });
            stars.push({ x: sign * -30, y: bottom - cy, r: 4 });
            stars.push({ x: sign * -30, y: -10,          r: 4.5 });
            stars.push({ x: sign * 40,  y: top - cy,    r: 4 });
            stars.push({ x: sign * 40,  y: bottom - cy, r: 4 });
        } else if (type === 'bishop') {
            const apex = cy - 100, base = cy + 90;
            stars.push({ x: 0,   y: apex - cy, r: 5 });
            stars.push({ x: -44, y: base - cy, r: 4 });
            stars.push({ x:  44, y: base - cy, r: 4 });
            stars.push({ x: -22, y: 5,        r: 3 });
            stars.push({ x:  22, y: 5,        r: 3 });
        } else if (type === 'queen') {
            const circleCY = cy - 50;
            const r = 32;
            const N = 12;
            for (let i = 0; i < N; i++) {
                const a = (i/N) * Math.PI * 2 - Math.PI / 2;
                stars.push({ x: Math.cos(a)*r, y: circleCY + Math.sin(a)*r - cy, r: 2.5 });
            }
            stars.push({ x: 0, y: circleCY + r - cy, r: 3 });
            stars.push({ x: 0, y: 65, r: 3.5 });
            stars.push({ x: -24, y: 40, r: 3 });
            stars.push({ x:  24, y: 40, r: 3 });
        } else if (type === 'king') {
            const top = cy - 115, bottom = cy + 90;
            const armY = cy - 30;
            stars.push({ x: 0,   y: top - cy,    r: 6 });
            stars.push({ x: 0,   y: bottom - cy, r: 5 });
            stars.push({ x: -50, y: armY - cy,   r: 5 });
            stars.push({ x:  50, y: armY - cy,   r: 5 });
            stars.push({ x: 0,   y: armY - cy,   r: 4.5 });
        }
        return stars;
    }

    // Shared single-star texture (warm cream radial gradient). Used by
    // per-star sprites spawned during constellation breakup.
    function makeShatterStarTexture() {
        if (makeShatterStarTexture._tex) return makeShatterStarTexture._tex;
        const cv = document.createElement('canvas');
        cv.width = 64; cv.height = 64;
        const c = cv.getContext('2d');
        const g = c.createRadialGradient(32, 32, 0, 32, 32, 32);
        g.addColorStop(0.00, 'rgba(255, 255, 240, 1.0)');
        g.addColorStop(0.15, 'rgba(255, 248, 216, 0.95)');
        g.addColorStop(0.40, 'rgba(255, 230, 170, 0.55)');
        g.addColorStop(0.75, 'rgba(255, 200, 140, 0.18)');
        g.addColorStop(1.00, 'rgba(255, 180, 110, 0.0)');
        c.fillStyle = g;
        c.fillRect(0, 0, 64, 64);
        const tex = new THREE.CanvasTexture(cv);
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        makeShatterStarTexture._tex = tex;
        return tex;
    }
    if (typeof window !== 'undefined') {
        window._makeShatterStarTexture = makeShatterStarTexture;
        window._getPieceStarPositions = getPieceStarPositions;
        window._makePieceConstellationTexture = makePieceConstellationTexture;
    }

    // Build the 8 back-rank pieces with their per-slot positions. Slot 0
    // is the leftmost (queen-side rook), slot 7 the rightmost (king-side rook).
    // We tag each with its piece type so capture events can find them.
    const constellationLayout = [
        { type: 'rook',          pieceLetter: 'r', slot: 0 },
        { type: 'knight',        pieceLetter: 'n', slot: 1 },
        { type: 'bishop',        pieceLetter: 'b', slot: 2 },
        { type: 'queen',         pieceLetter: 'q', slot: 3 },
        { type: 'king',          pieceLetter: 'k', slot: 4 },
        { type: 'bishop',        pieceLetter: 'b', slot: 5 },
        { type: 'knight-mirror', pieceLetter: 'n', slot: 6 },
        { type: 'rook',          pieceLetter: 'r', slot: 7 }
    ];
    // Store globally so capture handler can find them.
    if (typeof window !== 'undefined') {
        window._skyConstellations = window._skyConstellations || [];
    }
    const skyConstList = [];
    // Two constellation rows — one BEHIND each temple. The row at
    // z = -260 sits behind the BLACK temple. The row at z = +260 sits
    // behind the WHITE temple. Both rows mirror the back rank, so the
    // player sees the same constellation pattern in whichever direction
    // they face.
    const CONST_ROW_ZS = [-260, +260];
    for (const constZ of CONST_ROW_ZS) {
        const isSouthRow = (constZ < 0);   // row behind the black temple
        for (const item of constellationLayout) {
            const tex = makePieceConstellationTexture(item.type);
            const mat = new THREE.MeshBasicMaterial({
                map: tex,
                transparent: true,
                depthWrite: false,
                fog: false,
                side: THREE.DoubleSide        // visible from either approach direction
            });
            const planeW = CONST_PIECE_W * 1.05;
            const planeH = planeW * (384 / 256);
            const geo = new THREE.PlaneGeometry(planeW, planeH);
            const mesh = new THREE.Mesh(geo, mat);
            // Slot 0..7 centered on origin. For the row at z=+260 we
            // MIRROR the slot order so the piece arrangement reads
            // correctly when viewed from the opposite direction (camera
            // at -Z looking +Z).
            const slot = isSouthRow ? item.slot : (7 - item.slot);
            const slotX = (slot - 3.5) * CONST_PIECE_W;
            mesh.position.set(slotX, CONST_Y, constZ);
            mesh.renderOrder = -1;
            mesh.userData.isSkyConstellation = true;
            mesh.userData.pieceLetter = item.pieceLetter;
            mesh.userData.pieceType = item.type;        // 'rook' / 'knight' / 'knight-mirror' / 'bishop' / 'queen' / 'king'
            mesh.userData.planeW = planeW;              // for pixel→world conversion at shatter time
            mesh.userData.slot = item.slot;
            mesh.userData.row = isSouthRow ? 'south' : 'north';
            mesh.userData.initialX = slotX;
            mesh.userData.initialY = CONST_Y;
            mesh.userData.initialZ = constZ;
            mesh.userData.fallState = null;
            skyConstList.push(mesh);
            out.push(mesh);
        }
    }
    if (typeof window !== 'undefined') {
        window._skyConstellations = skyConstList;
    }


    // CLOUDS — flat layered billboard sprites with soft realistic puff
    // textures. Each cloud has a dark base and light top, suggesting
    // sunlight illuminating the upper surfaces while the underside sits
    // in shadow. The applier tints the texture for day vs night moods.
    const cloudMats = [];
    function makeCloudTex(baseColor, isNight) {
        const cv = document.createElement('canvas');
        cv.width = 768;
        cv.height = 192;
        const cctx = cv.getContext('2d');
        cctx.clearRect(0, 0, 768, 192);
        // 16 overlapping puffs across the width — denser so the body
        // reads as one continuous mass without visible inner cores.
        // Puffs are larger on top (sunlit) and smaller/darker on bottom.
        const puffs = [];
        // Top sunlit row
        for (let i = 0; i < 9; i++) {
            puffs.push({
                x: 80 + i * 78 + (Math.sin(i * 1.3) * 20),
                y: 70 + (Math.sin(i * 2.1) * 10),
                r: 65 + Math.cos(i * 1.7) * 18,
                isTop: true
            });
        }
        // Middle-body row to fill gaps
        for (let i = 0; i < 7; i++) {
            puffs.push({
                x: 130 + i * 90 + (Math.cos(i * 1.5) * 15),
                y: 110 + Math.sin(i * 1.8) * 8,
                r: 70 + Math.sin(i * 2.3) * 15,
                isTop: false,
                isMid: true
            });
        }
        // Lower shadowed row (darker)
        for (let i = 0; i < 6; i++) {
            puffs.push({
                x: 150 + i * 100 + (Math.sin(i * 1.9) * 18),
                y: 145 + Math.cos(i * 1.4) * 6,
                r: 55 + Math.cos(i * 2.1) * 12,
                isTop: false,
                isBottom: true
            });
        }
        // Sort: bottom (dark) → middle → top (bright) so highlights paint on top
        puffs.sort((a, b) => (b.isBottom ? -1 : 0) - (a.isBottom ? -1 : 0));
        for (const p of puffs) {
            // Top puffs: bright, sunlit highlight
            // Mid puffs: full body color
            // Bottom puffs: darker shadow
            const r0 = baseColor.r, g0 = baseColor.g, b0 = baseColor.b;
            let coreR, coreG, coreB, edgeAlpha;
            if (p.isTop) {
                // Sunlit highlight: lift toward white
                coreR = Math.min(255, r0 + (255 - r0) * 0.25);
                coreG = Math.min(255, g0 + (255 - g0) * 0.25);
                coreB = Math.min(255, b0 + (255 - b0) * 0.25);
                edgeAlpha = 0.55;
            } else if (p.isBottom) {
                // Shadow: darken
                const darkF = isNight ? 0.45 : 0.65;
                coreR = r0 * darkF;
                coreG = g0 * darkF;
                coreB = b0 * darkF;
                edgeAlpha = 0.55;
            } else {
                // Body
                coreR = r0; coreG = g0; coreB = b0;
                edgeAlpha = 0.55;
            }
            const g = cctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
            g.addColorStop(0,    `rgba(${coreR | 0}, ${coreG | 0}, ${coreB | 0}, 0.88)`);
            g.addColorStop(0.55, `rgba(${coreR | 0}, ${coreG | 0}, ${coreB | 0}, ${edgeAlpha})`);
            g.addColorStop(1,    `rgba(${coreR | 0}, ${coreG | 0}, ${coreB | 0}, 0)`);
            cctx.fillStyle = g;
            cctx.fillRect(0, 0, 768, 192);
        }
        const t = new THREE.CanvasTexture(cv);
        t.minFilter = THREE.LinearFilter;
        t.magFilter = THREE.LinearFilter;
        return t;
    }
    const NUM_CLOUDS = 14;
    const cloudSprites = [];
    for (let i = 0; i < NUM_CLOUDS; i++) {
        const mat = new THREE.SpriteMaterial({
            map: makeCloudTex({ r: 255, g: 255, b: 255 }, false),
            transparent: true,
            depthWrite: false,
            opacity: 0.7,
            fog: false
        });
        cloudMats.push(mat);
        const c = new THREE.Sprite(mat);
        const angle = (i / NUM_CLOUDS) * Math.PI * 2 + Math.random() * 0.4;
        const radius = 180 + Math.random() * 140;
        const height = 60 + Math.random() * 80;
        c.position.set(
            Math.cos(angle) * radius,
            height,
            Math.sin(angle) * radius
        );
        // FLATTER aspect: 3.5× wider than tall (was 2×)
        const scale = 40 + Math.random() * 40;
        c.scale.set(scale * 3.5, scale, 1);
        c.renderOrder = -1;
        out.push(c);
        cloudSprites.push(c);
    }

    // Stash everything the applier needs to update for day/night
    _cathedralState = {
        skyCanvas: skyGradCanvas,
        skyTex: skyTex,
        sunDiscCanvas: sunDiscCanvas,
        sunDiscTex: sunDiscTex,
        sunDisc: sunDisc,
        sunDiscMat: sunDiscMat,
        sunLight: sunLight,
        ambient: v5Ambient,
        terrainMat: terrainMat,
        cloudMats: cloudMats
    };

    // Grass plot — large green plane with the pool area cut out so the
    // pool's depth is visible from above.
    function makeRectWithPoolHole(width, depth, color, roughness) {
        const outerShape = new THREE.Shape();
        outerShape.moveTo(-width / 2, -depth / 2);
        outerShape.lineTo( width / 2, -depth / 2);
        outerShape.lineTo( width / 2,  depth / 2);
        outerShape.lineTo(-width / 2,  depth / 2);
        outerShape.closePath();
        const hole = new THREE.Path();
        hole.moveTo(-POOL_HOLE_HALF_X, -POOL_HOLE_HALF_Z);
        hole.lineTo( POOL_HOLE_HALF_X, -POOL_HOLE_HALF_Z);
        hole.lineTo( POOL_HOLE_HALF_X,  POOL_HOLE_HALF_Z);
        hole.lineTo(-POOL_HOLE_HALF_X,  POOL_HOLE_HALF_Z);
        hole.closePath();
        outerShape.holes.push(hole);
        const geo = new THREE.ShapeGeometry(outerShape);
        const mat = new THREE.MeshStandardMaterial({
            color: color,
            roughness: roughness,
            metalness: 0.0
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.rotation.x = -Math.PI / 2;
        mesh.receiveShadow = true;
        return { mesh, mat };
    }

    const grassPair = makeRectWithPoolHole(76, 116, 0x3a6a3a, 0.95);
    const grass = grassPair.mesh;
    const grassMat = grassPair.mat;
    grass.position.y = -0.22;
    out.push(grass);

    const sidewalkPair = makeRectWithPoolHole(60, 108, 0x9a988e, 0.85);
    const sidewalk = sidewalkPair.mesh;
    sidewalk.position.y = -0.18;
    out.push(sidewalk);

    // ---- Pool (lake) with deep walls and inscribed floor ----
    // The pool depth matches the height of the temple columns (~12 units),
    // creating a dramatic vertical chamber. AMENTI.AI is inscribed in
    // gold on the pool floor. Gold trim lines along all 12 edges of the
    // pool box (4 vertical corners + 4 top edges + 4 bottom edges) make
    // the geometry's perspective lines unmistakable.
    const LAKE_W = 52;
    const LAKE_L = 100;
    const SURFACE_Y = -0.12;
    const FLOOR_Y   = -12.12;       // depth = 12, matching column height
    const WALL_H    = SURFACE_Y - FLOOR_Y;     // = 12

    // Wall gradient texture: bright at the top → very deep dark at the
    // bottom. Stretched vertically over the 12-unit-tall walls.
    const wallCanvas = document.createElement('canvas');
    wallCanvas.width = 32;
    wallCanvas.height = 512;
    const wctx = wallCanvas.getContext('2d');
    const wallGrad = wctx.createLinearGradient(0, 0, 0, 512);
    wallGrad.addColorStop(0.00, '#5894b8');
    wallGrad.addColorStop(0.20, '#3a6a8c');
    wallGrad.addColorStop(0.50, '#1d3a55');
    wallGrad.addColorStop(0.80, '#0a1828');
    wallGrad.addColorStop(1.00, '#03060e');     // near-black at the deepest point
    wctx.fillStyle = wallGrad;
    wctx.fillRect(0, 0, 32, 512);
    // Horizontal "tile lines" — depth cue. Spaced more densely so the
    // taller wall reads with strong perspective convergence.
    wctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
    wctx.lineWidth = 1;
    for (let yy = 0; yy < 512; yy += 32) {
        wctx.beginPath();
        wctx.moveTo(0, yy);
        wctx.lineTo(32, yy);
        wctx.stroke();
    }
    const wallTex = new THREE.CanvasTexture(wallCanvas);
    wallTex.minFilter = THREE.LinearFilter;
    wallTex.magFilter = THREE.LinearFilter;

    const wallMat = new THREE.MeshStandardMaterial({
        map: wallTex,
        roughness: 0.7,
        metalness: 0.05,
        side: THREE.DoubleSide
    });

    function makeWall(width, x, z, rotY) {
        const wallGeo = new THREE.PlaneGeometry(width, WALL_H);
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(x, (SURFACE_Y + FLOOR_Y) / 2, z);
        wall.rotation.y = rotY;
        wall.receiveShadow = true;
        return wall;
    }
    out.push(makeWall(LAKE_W, 0,  LAKE_L / 2, Math.PI));
    out.push(makeWall(LAKE_W, 0, -LAKE_L / 2, 0));
    out.push(makeWall(LAKE_L,  LAKE_W / 2, 0, -Math.PI / 2));
    out.push(makeWall(LAKE_L, -LAKE_W / 2, 0,  Math.PI / 2));

    // Pool floor canvas — PORTRAIT (1024 wide × 2048 tall) so the
    // background gradient and decorative border stretch along the pool's
    // LONG axis (Z) instead of perpendicular to it. The inscription is
    // drawn rotated 90° on the canvas so it still reads correctly.
    const floorCanvas = document.createElement('canvas');
    floorCanvas.width = 1024;
    floorCanvas.height = 2048;
    const fctx2 = floorCanvas.getContext('2d');
    // Deep navy background — radial darkening centered on the canvas
    const fgrad = fctx2.createRadialGradient(512, 1024, 0, 512, 1024, 1100);
    fgrad.addColorStop(0, '#10243c');
    fgrad.addColorStop(0.7, '#0a1828');
    fgrad.addColorStop(1.0, '#040a14');
    fctx2.fillStyle = fgrad;
    fctx2.fillRect(0, 0, 1024, 2048);
    // Inscription — drawn rotated 90° around the canvas center so it
    // reads along the canvas's tall axis (which will map to the pool's
    // long Z axis).
    fctx2.save();
    fctx2.translate(512, 1024);
    fctx2.rotate(-Math.PI / 2);
    fctx2.textAlign = 'center';
    fctx2.textBaseline = 'middle';
    fctx2.font = 'bold 324px serif';      // 10% smaller than the original 360px
    // Shadow for carved depth
    fctx2.fillStyle = 'rgba(0, 0, 0, 0.6)';
    fctx2.fillText('AMENTI.AI', 6, 8);
    // Gold fill — two-tone
    const txt1 = 'AMENTI';
    const txt2 = '.AI';
    const w1 = fctx2.measureText(txt1).width;
    const w2 = fctx2.measureText(txt2).width;
    const totalW = w1 + w2;
    const startX = -totalW / 2;
    fctx2.fillStyle = '#c79a3b';
    fctx2.fillText(txt1, startX + w1 / 2, 0);
    fctx2.fillStyle = '#f5d76e';
    fctx2.fillText(txt2, startX + w1 + w2 / 2, 0);
    fctx2.restore();
    // Decorative border rect — drawn on the portrait canvas so it spans
    // the LONG axis.
    fctx2.strokeStyle = 'rgba(212, 175, 80, 0.4)';
    fctx2.lineWidth = 6;
    fctx2.strokeRect(40, 40, 1024 - 80, 2048 - 80);
    const floorTex = new THREE.CanvasTexture(floorCanvas);
    floorTex.minFilter = THREE.LinearMipMapLinearFilter;
    floorTex.magFilter = THREE.LinearFilter;

    const poolFloorGeo = new THREE.PlaneGeometry(LAKE_W, LAKE_L);
    const poolFloorMat = new THREE.MeshStandardMaterial({
        map: floorTex,
        // Use the SAME canvas as the emissive map so the gold inscription
        // glows softly while the dark blue background stays dark. The
        // emissive intensity is controlled by emissiveIntensity below.
        emissive: 0xffd070,
        emissiveMap: floorTex,
        emissiveIntensity: 0.8,
        roughness: 0.55,
        metalness: 0.15
    });
    const poolFloor = new THREE.Mesh(poolFloorGeo, poolFloorMat);
    poolFloor.rotation.x = -Math.PI / 2;
    // No Z rotation — the canvas is already portrait so its tall axis
    // maps naturally to the pool's long Z axis.
    poolFloor.position.y = FLOOR_Y;
    poolFloor.receiveShadow = true;
    out.push(poolFloor);

    // ---- Gold edge trim — 12 edges of the pool "box" ----
    // 4 vertical corner posts + 4 top edges + 4 bottom edges. The gold
    // trim makes the corners and perimeter unmistakable, drawing strong
    // perspective lines down from the pool rim to the floor.
    const poolGoldMat = new THREE.MeshStandardMaterial({
        color: 0xd4af50,
        roughness: 0.1,
        metalness: 0.95
    });
    const POOL_TRIM = 0.18;        // thickness of the gold edge strips
    function pushEdge(geo, x, y, z, ry = 0) {
        const e = new THREE.Mesh(geo, poolGoldMat);
        e.position.set(x, y, z);
        if (ry) e.rotation.y = ry;
        out.push(e);
    }
    // 4 vertical CORNER POSTS — gold beams running from surface to floor
    // at each corner of the pool
    const cornerGeo = new THREE.BoxGeometry(POOL_TRIM, WALL_H, POOL_TRIM);
    const midY = (SURFACE_Y + FLOOR_Y) / 2;
    pushEdge(cornerGeo,  LAKE_W / 2, midY,  LAKE_L / 2);    // NE
    pushEdge(cornerGeo, -LAKE_W / 2, midY,  LAKE_L / 2);    // NW
    pushEdge(cornerGeo,  LAKE_W / 2, midY, -LAKE_L / 2);    // SE
    pushEdge(cornerGeo, -LAKE_W / 2, midY, -LAKE_L / 2);    // SW

    // 4 TOP EDGES — gold strips along the rim of the pool at surface level
    const topEdgeNS = new THREE.BoxGeometry(LAKE_W, POOL_TRIM, POOL_TRIM);
    const topEdgeEW = new THREE.BoxGeometry(POOL_TRIM, POOL_TRIM, LAKE_L);
    pushEdge(topEdgeNS, 0, SURFACE_Y,  LAKE_L / 2);    // north top edge
    pushEdge(topEdgeNS, 0, SURFACE_Y, -LAKE_L / 2);    // south top edge
    pushEdge(topEdgeEW,  LAKE_W / 2, SURFACE_Y, 0);    // east top edge
    pushEdge(topEdgeEW, -LAKE_W / 2, SURFACE_Y, 0);    // west top edge

    // 4 BOTTOM EDGES — gold strips along the rim of the pool floor
    pushEdge(topEdgeNS, 0, FLOOR_Y,  LAKE_L / 2);
    pushEdge(topEdgeNS, 0, FLOOR_Y, -LAKE_L / 2);
    pushEdge(topEdgeEW,  LAKE_W / 2, FLOOR_Y, 0);
    pushEdge(topEdgeEW, -LAKE_W / 2, FLOOR_Y, 0);

    // ---- Water surface — glossy reflective surface with animated ripples ----
    // Generate a wave-pattern normal map for the ripples. The pattern is
    // a sum of two sinusoids creating an interference pattern that reads
    // as gentle waves. We paint it ONCE to a canvas, then animate the
    // material's UV offset each frame to make the pattern drift across
    // the surface (cheaper than recomputing the texture).
    const rippleCanvas = document.createElement('canvas');
    rippleCanvas.width = 256;
    rippleCanvas.height = 256;
    const rippleCtx = rippleCanvas.getContext('2d');
    const rippleImg = rippleCtx.createImageData(256, 256);
    for (let py = 0; py < 256; py++) {
        for (let px = 0; px < 256; px++) {
            // Compute two-direction wave gradient
            const u = px / 256;
            const v = py / 256;
            // Wave heights — sum of two sinusoids at different
            // frequencies and angles
            const h =
                Math.sin(u * Math.PI * 8) * 0.5 +
                Math.sin(v * Math.PI * 6) * 0.4 +
                Math.sin((u + v) * Math.PI * 14) * 0.25;
            // Normal map encoding: derivative in X, Y, then Z = 1
            const dx = Math.cos(u * Math.PI * 8) * 0.5 * Math.PI * 8 / 256 +
                       Math.cos((u + v) * Math.PI * 14) * 0.25 * Math.PI * 14 / 256;
            const dy = Math.cos(v * Math.PI * 6) * 0.4 * Math.PI * 6 / 256 +
                       Math.cos((u + v) * Math.PI * 14) * 0.25 * Math.PI * 14 / 256;
            // Scale the normal perturbation gently
            const nx = -dx * 8;
            const ny = -dy * 8;
            const nz = Math.sqrt(Math.max(0.01, 1 - nx * nx - ny * ny));
            const idx = (py * 256 + px) * 4;
            rippleImg.data[idx]     = (nx * 0.5 + 0.5) * 255;
            rippleImg.data[idx + 1] = (ny * 0.5 + 0.5) * 255;
            rippleImg.data[idx + 2] = nz * 255;
            rippleImg.data[idx + 3] = 255;
        }
    }
    rippleCtx.putImageData(rippleImg, 0, 0);
    const rippleTex = new THREE.CanvasTexture(rippleCanvas);
    rippleTex.wrapS = THREE.RepeatWrapping;
    rippleTex.wrapT = THREE.RepeatWrapping;
    rippleTex.repeat.set(4, 8);    // tile across the pool (X=4, Z=8 since pool is twice as long)

    const lakeGeo = new THREE.PlaneGeometry(LAKE_W, LAKE_L, 32, 64);
    const lakeMat = new THREE.MeshStandardMaterial({
        color: 0x2c5874,
        roughness: 0.05,           // very smooth — strong specular reflections
        metalness: 0.6,            // catches sun/moon as a sharp glow
        transparent: true,
        opacity: 0.45,
        depthWrite: false,
        normalMap: rippleTex,
        normalScale: new THREE.Vector2(0.6, 0.6)
    });
    const lake = new THREE.Mesh(lakeGeo, lakeMat);
    lake.rotation.x = -Math.PI / 2;
    lake.position.y = SURFACE_Y;
    lake.receiveShadow = true;
    lake.userData.isLakeRipple = true;   // tag for per-frame UV animation
    lake.userData.rippleTex = rippleTex;
    out.push(lake);

    // ---- Volumetric water — fills the pool from surface to floor ----
    // A semi-transparent blue box matching the pool footprint. Tints
    // everything inside the pool with a watery blue cast so the pool
    // reads as FILLED with water rather than an empty stone box. Kept
    // low-opacity so the gold edges, wall gradient, and AMENTI.AI
    // inscription all remain clearly visible through the water.
    const waterVolGeo = new THREE.BoxGeometry(LAKE_W - 0.4, WALL_H - 0.2, LAKE_L - 0.4);
    const waterVolMat = new THREE.MeshStandardMaterial({
        color: 0x2a6080,
        roughness: 0.4,
        metalness: 0.0,
        transparent: true,
        opacity: 0.12,             // more transparent — inscription glows through
        depthWrite: false,
        side: THREE.DoubleSide
    });
    const waterVol = new THREE.Mesh(waterVolGeo, waterVolMat);
    waterVol.position.set(0, (SURFACE_Y + FLOOR_Y) / 2, 0);
    waterVol.renderOrder = 1;       // draw after opaque pool geometry
    out.push(waterVol);

    // Stash a few more references for the applier (lake roughness shifts
    // with lighting — calmer / more mirror-like at night).
    _cathedralState.grassMat = grassMat;
    _cathedralState.lakeMat = lakeMat;

    // Atmospheric fog — distant forest sprites and terrain are tinted
    // toward the sky-horizon color, producing classic atmospheric
    // perspective. Distance ranges chosen to create three distinct depth
    // planes:
    //   • FOREGROUND (0 - 35 units): orchard, lake — no fog, full saturation
    //   • MIDDLE ground (35 - 130 units): chess grid, beginning to haze
    //   • BACKGROUND (130 - 220 units): slope-zone sprites, fully washed
    //                                    into the horizon haze
    scene.fog = new THREE.Fog(0xd49060, 35, 220);
    _cathedralState.fog = scene.fog;

    return out;
}

// applyCathedralDayNight: swap sky/light/cloud/material colors for V5
function applyCathedralDayNight(mode) {
    cathedralDayNight = mode;
    if (!_cathedralState) return;
    const s = _cathedralState;
    const skyCtx = s.skyCanvas.getContext('2d');
    const sunCtx = s.sunDiscCanvas.getContext('2d');

    // Helper: paint sky gradient stops onto the canvas, then mark dirty
    function paintSky(stops) {
        const g = skyCtx.createLinearGradient(0, 0, 0, 256);
        for (const [pos, color] of stops) g.addColorStop(pos, color);
        skyCtx.fillStyle = g;
        skyCtx.fillRect(0, 0, 4, 256);
        s.skyTex.needsUpdate = true;
    }
    function paintDisc(color, glow) {
        sunCtx.clearRect(0, 0, 256, 256);
        // Outer glow
        const halo = sunCtx.createRadialGradient(128, 128, 0, 128, 128, 128);
        halo.addColorStop(0, glow);
        halo.addColorStop(0.5, glow.replace(/[\d.]+\)$/, '0.2)'));
        halo.addColorStop(1, glow.replace(/[\d.]+\)$/, '0)'));
        sunCtx.fillStyle = halo;
        sunCtx.fillRect(0, 0, 256, 256);
        // Disc itself
        sunCtx.beginPath();
        sunCtx.arc(128, 128, 50, 0, Math.PI * 2);
        sunCtx.fillStyle = color;
        sunCtx.fill();
        s.sunDiscTex.needsUpdate = true;
    }

    if (mode === 'day') {
        // Bright clear sky: pale at horizon, deep sky-blue overhead.
        paintSky([
            [0.00, '#4a82c8'],   // zenith deep sky-blue
            [0.40, '#7ab1de'],
            [0.75, '#bcdcef'],
            [1.00, '#e8f0f5']    // pale horizon haze
        ]);
        paintDisc('#fff8d0', 'rgba(255, 240, 180, 1.0)');
        s.sunDisc.position.set(180, 180, -200);
        s.sunLight.color.setHex(0xfff5e0);
        s.sunLight.intensity = 1.0;
        s.sunLight.position.set(140, 220, 60);
        s.ambient.color.setHex(0xffffff);
        s.ambient.intensity = 0.45;
        // Terrain reads brighter in day
        // Terrain reads brighter in day. Material color now MULTIPLIES
        // the per-vertex colors, so use a bright neutral white for day.
        s.terrainMat.color.setHex(0xffffff);
        s.grassMat.color.setHex(0x4a8050);
        s.lakeMat.color.setHex(0x4a8aa8);
        s.lakeMat.roughness = 0.25;
        // Bright white clouds with sunlit tops and shadowed bottoms
        for (const m of s.cloudMats) {
            const tex = makeCloudTexHelper({ r: 248, g: 248, b: 252 }, false);
            m.map.dispose();
            m.map = tex;
            m.opacity = 0.85;
            m.needsUpdate = true;
        }
        // Fog tint — light purple-blue (lavender-blue) atmospheric haze
        // matching the horizon-tree color so background trees feel like
        // they belong to the sky.
        if (s.fog) s.fog.color.setHex(0xcec0e0);
    } else {
        // Twilight/night: deep indigo zenith fading through dusk colors
        // to a warm horizon glow.
        paintSky([
            [0.00, '#0d1230'],
            [0.30, '#1a1f4a'],
            [0.55, '#3a3060'],
            [0.78, '#8a5c5c'],
            [0.92, '#d49060'],
            [1.00, '#f4b878']
        ]);
        // Moon pale and small
        paintDisc('#f0e8d0', 'rgba(220, 220, 240, 0.7)');
        s.sunDisc.position.set(-120, 160, -200);
        s.sunLight.color.setHex(0x8a9ad8);
        s.sunLight.intensity = 0.35;
        s.sunLight.position.set(-80, 150, -60);
        s.ambient.color.setHex(0x4a4868);
        s.ambient.intensity = 0.25;
        // Terrain darker
        // At night, multiply vertex colors by a cool dim tint
        s.terrainMat.color.setHex(0x6878a0);
        s.grassMat.color.setHex(0x274a30);
        s.lakeMat.color.setHex(0x1a3850);
        s.lakeMat.roughness = 0.12;
        // Dusty pink/lavender clouds — top edges catch the warm twilight
        // horizon glow; bottoms sit in cooler shadow. isNight=true tells
        // the cloud generator to darken the bottoms more aggressively.
        for (const m of s.cloudMats) {
            const tex = makeCloudTexHelper({ r: 180, g: 140, b: 165 }, true);
            m.map.dispose();
            m.map = tex;
            m.opacity = 0.65;
            m.needsUpdate = true;
        }
        // Fog tint — cool lavender twilight haze (mauve-blue) so the
        // background trees fade into a moody purple horizon.
        if (s.fog) s.fog.color.setHex(0xa090b0);
    }
}

// Helper to make a cloud texture (used by applyCathedralDayNight)
function makeCloudTexHelper(baseColor, isNight) {
    const cv = document.createElement('canvas');
    cv.width = 768;
    cv.height = 192;
    const cctx = cv.getContext('2d');
    cctx.clearRect(0, 0, 768, 192);
    const puffs = [];
    for (let i = 0; i < 9; i++) {
        puffs.push({
            x: 80 + i * 78 + (Math.sin(i * 1.3) * 20),
            y: 70 + (Math.sin(i * 2.1) * 10),
            r: 65 + Math.cos(i * 1.7) * 18,
            isTop: true
        });
    }
    for (let i = 0; i < 7; i++) {
        puffs.push({
            x: 130 + i * 90 + (Math.cos(i * 1.5) * 15),
            y: 110 + Math.sin(i * 1.8) * 8,
            r: 70 + Math.sin(i * 2.3) * 15,
            isMid: true
        });
    }
    for (let i = 0; i < 6; i++) {
        puffs.push({
            x: 150 + i * 100 + (Math.sin(i * 1.9) * 18),
            y: 145 + Math.cos(i * 1.4) * 6,
            r: 55 + Math.cos(i * 2.1) * 12,
            isBottom: true
        });
    }
    puffs.sort((a, b) => (b.isBottom ? -1 : 0) - (a.isBottom ? -1 : 0));
    for (const p of puffs) {
        const r0 = baseColor.r, g0 = baseColor.g, b0 = baseColor.b;
        let coreR, coreG, coreB, edgeAlpha;
        if (p.isTop) {
            coreR = Math.min(255, r0 + (255 - r0) * 0.25);
            coreG = Math.min(255, g0 + (255 - g0) * 0.25);
            coreB = Math.min(255, b0 + (255 - b0) * 0.25);
            edgeAlpha = 0.55;
        } else if (p.isBottom) {
            const darkF = isNight ? 0.45 : 0.65;
            coreR = r0 * darkF;
            coreG = g0 * darkF;
            coreB = b0 * darkF;
            edgeAlpha = 0.55;
        } else {
            coreR = r0; coreG = g0; coreB = b0;
            edgeAlpha = 0.55;
        }
        const g = cctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
        g.addColorStop(0,    `rgba(${coreR | 0}, ${coreG | 0}, ${coreB | 0}, 0.88)`);
        g.addColorStop(0.55, `rgba(${coreR | 0}, ${coreG | 0}, ${coreB | 0}, ${edgeAlpha})`);
        g.addColorStop(1,    `rgba(${coreR | 0}, ${coreG | 0}, ${coreB | 0}, 0)`);
        cctx.fillStyle = g;
        cctx.fillRect(0, 0, 768, 192);
    }
    const t = new THREE.CanvasTexture(cv);
    t.minFilter = THREE.LinearFilter;
    t.magFilter = THREE.LinearFilter;
    return t;
}

function buildAppleBlossomTrees() {
    const out = [];
    // "Natural" tree design: visible branch skeleton, foliage clumped at
    // branch tips (NOT a solid ball), trunk visible through the canopy,
    // sparse blossom accents.
    // FOREGROUND tonal range — darker and higher contrast than the
    // middle-ground/background sprites. These reads as the closest plane
    // of the composition.
    const leafMats = [
        new THREE.MeshStandardMaterial({ color: 0x254a26, roughness: 0.95, metalness: 0.0, flatShading: true }),  // very deep green
        new THREE.MeshStandardMaterial({ color: 0x355a35, roughness: 0.95, metalness: 0.0, flatShading: true }),  // mid-deep
        new THREE.MeshStandardMaterial({ color: 0x1a3a1c, roughness: 0.95, metalness: 0.0, flatShading: true })   // shadow green
    ];
    const blossomMats = [
        new THREE.MeshStandardMaterial({ color: 0xfdf6f3, roughness: 0.95, metalness: 0.0, flatShading: true }),
        new THREE.MeshStandardMaterial({ color: 0xf5c8d2, roughness: 0.95, metalness: 0.0, flatShading: true })
    ];
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x3a2415, roughness: 0.9, metalness: 0.0 });          // darker bark
    const branchMat = new THREE.MeshStandardMaterial({ color: 0x2a1810, roughness: 0.9, metalness: 0.0 });         // very dark branches

    // Helper: an irregular blob (low-poly icosahedron with displaced vertices).
    function makeBlob(radius, mat) {
        const geo = new THREE.IcosahedronGeometry(radius, 1);
        const pos = geo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
            const n = Math.sin(x * 12.9 + y * 78.2 + z * 37.5) * 43758.5;
            const offset = ((n - Math.floor(n)) - 0.5) * radius * 0.4;
            const len = Math.sqrt(x*x + y*y + z*z);
            const scale = (len + offset) / len;
            pos.setXYZ(i, x * scale, y * scale, z * scale);
        }
        geo.computeVertexNormals();
        return new THREE.Mesh(geo, mat);
    }

    // Helper: build a cylinder pointing from (x0,y0,z0) to (x1,y1,z1)
    function makeBranchSegment(x0, y0, z0, x1, y1, z1, rBase, rTop, mat) {
        const dx = x1 - x0, dy = y1 - y0, dz = z1 - z0;
        const len = Math.sqrt(dx*dx + dy*dy + dz*dz);
        const geo = new THREE.CylinderGeometry(rTop, rBase, len, 8);
        const m = new THREE.Mesh(geo, mat);
        // Center the cylinder between the two endpoints
        m.position.set((x0 + x1) / 2, (y0 + y1) / 2, (z0 + z1) / 2);
        // Cylinder default axis = +Y. Rotate to align with (dx, dy, dz).
        const dir = new THREE.Vector3(dx, dy, dz).normalize();
        const up = new THREE.Vector3(0, 1, 0);
        const axis = new THREE.Vector3().crossVectors(up, dir);
        if (axis.length() > 1e-6) {
            axis.normalize();
            const angle = Math.acos(up.dot(dir));
            m.quaternion.setFromAxisAngle(axis, angle);
        }
        m.castShadow = true;
        return m;
    }

    // Distinct foliage clump (oval, made of 3 overlapping blobs of varied
    // greens) — placed at a branch tip. Includes 2-3 BARE TWIGS poking
    // out beyond the foliage for added branch detail.
    function addFoliageClump(parent, cx, cy, cz, scale) {
        const r0 = 0.55 * scale;
        const r1 = 0.40 * scale;
        const r2 = 0.32 * scale;
        const b0 = makeBlob(r0, leafMats[Math.floor(Math.random() * leafMats.length)]);
        b0.position.set(cx, cy, cz);
        parent.add(b0);
        const b1 = makeBlob(r1, leafMats[Math.floor(Math.random() * leafMats.length)]);
        b1.position.set(cx - 0.25 * scale, cy + 0.20 * scale, cz + 0.15 * scale);
        parent.add(b1);
        const b2 = makeBlob(r2, leafMats[Math.floor(Math.random() * leafMats.length)]);
        b2.position.set(cx + 0.25 * scale, cy - 0.15 * scale, cz - 0.15 * scale);
        parent.add(b2);
        // Sparse blossom: ~65% chance per clump to get a small blossom accent
        if (Math.random() < 0.65) {
            const blMat = blossomMats[Math.floor(Math.random() * blossomMats.length)];
            const bl = makeBlob(0.15 * scale, blMat);
            bl.position.set(
                cx + (Math.random() - 0.5) * 0.5 * scale,
                cy + 0.30 * scale + Math.random() * 0.2,
                cz + (Math.random() - 0.5) * 0.5 * scale
            );
            parent.add(bl);
        }
        // BARE TWIGS — 2-3 thin twigs poking OUT of the foliage clump in
        // varied directions, giving the tree a more branched/skeletal feel.
        // No leaves at their tips — they're meant to read as bare branches.
        const twigCount = 2 + Math.floor(Math.random() * 2);
        for (let t = 0; t < twigCount; t++) {
            const ang = Math.random() * Math.PI * 2;
            // Twigs lean mostly outward/upward but can angle in any direction
            const pitch = (Math.random() - 0.3) * 1.2;     // tilt from horizontal (positive = up)
            const tipDist = (0.55 + Math.random() * 0.45) * scale;
            const tipX = cx + Math.cos(ang) * tipDist * Math.cos(pitch);
            const tipY = cy + tipDist * Math.sin(pitch);
            const tipZ = cz + Math.sin(ang) * tipDist * Math.cos(pitch);
            // Start from inside the clump (closer to center)
            const startX = cx + Math.cos(ang) * 0.15 * scale;
            const startY = cy + 0.05 * scale;
            const startZ = cz + Math.sin(ang) * 0.15 * scale;
            parent.add(makeBranchSegment(
                startX, startY, startZ,
                tipX, tipY, tipZ,
                0.025 * scale, 0.012 * scale, branchMat
            ));
        }
    }

    function makeAppleTree() {
        const g = new THREE.Group();
        // THINNER trunk — was 0.32 base, now 0.18
        const TRUNK_BASE_R = 0.18;
        const TRUNK_TOP_R = 0.13;
        const TRUNK_H = 2.4;
        const trunk = new THREE.Mesh(
            new THREE.CylinderGeometry(TRUNK_TOP_R, TRUNK_BASE_R, TRUNK_H, 10),
            trunkMat
        );
        trunk.position.y = TRUNK_H / 2;
        trunk.castShadow = true;
        g.add(trunk);

        // 5 primary branches springing from the top of the trunk, each
        // ending at a foliage clump. Visible branch silhouette.
        const branchSpec = [
            // [angle, length, tilt-out (rad from vertical), endY-offset]
            { ang: 0,          len: 1.6, tilt: 0.85 },
            { ang: Math.PI*0.4,len: 1.5, tilt: 0.75 },
            { ang: Math.PI*0.8,len: 1.7, tilt: 0.90 },
            { ang: Math.PI*1.3,len: 1.4, tilt: 0.70 },
            { ang: Math.PI*1.7,len: 1.6, tilt: 0.85 }
        ];
        const trunkTopY = TRUNK_H;
        for (const spec of branchSpec) {
            const dirX = Math.cos(spec.ang) * Math.sin(spec.tilt);
            const dirZ = Math.sin(spec.ang) * Math.sin(spec.tilt);
            const dirY = Math.cos(spec.tilt);
            const tipX = dirX * spec.len;
            const tipY = trunkTopY + dirY * spec.len;
            const tipZ = dirZ * spec.len;
            // Main branch segment
            g.add(makeBranchSegment(
                0, trunkTopY * 0.85, 0,
                tipX, tipY, tipZ,
                0.08, 0.04, branchMat
            ));
            // Add 1-2 thinner secondary twigs branching off near the tip
            const twigCount = 1 + Math.floor(Math.random() * 2);
            for (let t = 0; t < twigCount; t++) {
                const tAng = spec.ang + (Math.random() - 0.5) * 0.8;
                const tLen = 0.45 + Math.random() * 0.25;
                const tdX = Math.cos(tAng) * Math.sin(spec.tilt - 0.3);
                const tdY = Math.cos(spec.tilt - 0.3);
                const tdZ = Math.sin(tAng) * Math.sin(spec.tilt - 0.3);
                const t0x = tipX * 0.65;
                const t0y = trunkTopY + dirY * spec.len * 0.65;
                const t0z = tipZ * 0.65;
                g.add(makeBranchSegment(
                    t0x, t0y, t0z,
                    t0x + tdX * tLen, t0y + tdY * tLen, t0z + tdZ * tLen,
                    0.04, 0.02, branchMat
                ));
                // small foliage clump at the twig tip
                addFoliageClump(g,
                    t0x + tdX * tLen, t0y + tdY * tLen, t0z + tdZ * tLen,
                    0.7);
            }
            // Foliage clump at the main branch tip
            addFoliageClump(g, tipX, tipY, tipZ, 1.0);
        }
        return g;
    }

    // Two rows per side. INNER row at x=±35 (just outside the grass edge),
    // OUTER row at x=±42 (further back), staggered in Z by half-step so the
    // outer row trees sit BETWEEN the inner row trees from a forward view.
    const TREE_INNER_X = 35;
    const TREE_OUTER_X = 42;
    const TREE_COUNT = 9;
    const TREE_Z_START = -54;
    const TREE_Z_END   =  54;
    const TREE_Z_STEP  = (TREE_Z_END - TREE_Z_START) / (TREE_COUNT - 1);
    function placeTree(x, z, scaleOverride) {
        const t = makeAppleTree();
        t.position.set(x, -0.22, z);
        t.rotation.y = Math.random() * Math.PI * 2;
        const s = (scaleOverride !== undefined ? scaleOverride : 1.0)
                  * (0.9 + Math.random() * 0.25);
        t.scale.set(s, s * (0.95 + Math.random() * 0.1), s);
        out.push(t);
    }
    for (let i = 0; i < TREE_COUNT; i++) {
        const zInner = TREE_Z_START + i * TREE_Z_STEP;
        // INNER row
        placeTree(-TREE_INNER_X, zInner);
        placeTree( TREE_INNER_X, zInner);
        // OUTER row — staggered by half a step in Z so each outer tree
        // sits behind the gap between two inner trees.
        if (i < TREE_COUNT - 1) {
            const zOuter = zInner + TREE_Z_STEP / 2;
            placeTree(-TREE_OUTER_X, zOuter);
            placeTree( TREE_OUTER_X, zOuter);
        }
    }

    // ---- CHESSBOARD-DISTRIBUTED BACKGROUND ----
    // The outer plateau is tiled with an 8×8 chessboard grid. Each square
    // gets a content type based on chessboard parity (with some natural
    // randomness mixed in): DARK squares are mostly tree clumps, LIGHT
    // squares are mostly rock formations. This extends the chess metaphor
    // into the landscape itself.
    //
    // Camera is locked behind white (+Z, looking -Z), so the visible
    // portion of this grid is the south half — that's what fills the
    // player's view behind the obsidian temple.
    const GRID_HALF = 4;                          // 8×8 → ±4 squares from center
    const SQUARE_SIZE = 30;                       // 30 units per square → 240 total
    const TEMPLE_BUFFER = 14;
    const ROCK_GRAY_MAT = new THREE.MeshStandardMaterial({
        color: 0x8a8580,
        roughness: 0.95,
        metalness: 0.0,
        flatShading: true
    });
    const ROCK_DARK_MAT = new THREE.MeshStandardMaterial({
        color: 0x5a5550,
        roughness: 0.95,
        metalness: 0.0,
        flatShading: true
    });

    // Helper: a low rock outcrop — a few squashed displaced spheres
    // half-buried in the ground.
    function makeRockOutcrop(cx, cz, scale) {
        const g = new THREE.Group();
        const numRocks = 2 + Math.floor(Math.random() * 3);
        for (let i = 0; i < numRocks; i++) {
            const r = (0.7 + Math.random() * 1.0) * scale;
            const geo = new THREE.IcosahedronGeometry(r, 1);
            // Displace vertices for irregular rock shape
            const pos = geo.attributes.position;
            for (let v = 0; v < pos.count; v++) {
                const px = pos.getX(v), py = pos.getY(v), pz = pos.getZ(v);
                const n = Math.sin(px * 17.1 + py * 41.3 + pz * 23.7) * 43758.5;
                const offset = ((n - Math.floor(n)) - 0.5) * r * 0.5;
                const len = Math.sqrt(px*px + py*py + pz*pz);
                const s = (len + offset) / len;
                pos.setXYZ(v, px * s, py * s, pz * s);
            }
            geo.computeVertexNormals();
            const mat = Math.random() < 0.7 ? ROCK_GRAY_MAT : ROCK_DARK_MAT;
            const rock = new THREE.Mesh(geo, mat);
            // Squash vertically so the rock looks half-buried + low
            rock.scale.y = 0.4 + Math.random() * 0.3;
            rock.position.set(
                cx + (Math.random() - 0.5) * scale * 1.5,
                -0.22 + r * 0.3,            // partly embedded in ground
                cz + (Math.random() - 0.5) * scale * 1.5
            );
            rock.rotation.set(
                Math.random() * Math.PI * 2,
                Math.random() * Math.PI * 2,
                Math.random() * Math.PI * 2
            );
            g.add(rock);
        }
        return g;
    }

    function inExclusionZone(x, z) {
        // Inside the manicured/orchard zone (lake + grass + tree rows + small buffer)
        if (Math.abs(x) < 50 && Math.abs(z) < 60) return true;
        // Too close to either temple
        if (Math.hypot(x, z - 72) < TEMPLE_BUFFER) return true;
        if (Math.hypot(x, z + 72) < TEMPLE_BUFFER) return true;
        // CORRIDOR DIRECTLY BEHIND THE BLACK TEMPLE — exclude anything on
        // the centerline that would visually align with the black temple
        // from the camera's view (camera is behind white at +Z looking
        // toward -Z, so the black temple is in front and any sprite
        // beyond it on the centerline appears stacked behind it).
        if (Math.abs(x) < 14 && z < -78) return true;
        return false;
    }

    // Sprite TEXTURE and MATERIAL pools must be created BEFORE the chess
    // grid loop (and the slope-population pass), because those loops
    // call placeForestSprite / placeBushSprite / placeStoneSprite which
    // close over these consts. The placement functions themselves are
    // declared lower in the file via function-declaration hoisting.
    const TREE_TEX_VARIATIONS = 5;
    const treeTextures = [];
    for (let v = 0; v < TREE_TEX_VARIATIONS; v++) {
        treeTextures.push(makeTreeSpriteTexture(v * 1000 + 17));
    }
    const bushTextures = [];
    for (let v = 0; v < 4; v++) {
        bushTextures.push(makeBushSpriteTexture(v * 700 + 31));
    }
    const stoneTextures = [];
    for (let v = 0; v < 4; v++) {
        stoneTextures.push(makeStoneArtifactTexture(v * 1300 + 7));
    }
    const treeSpriteMats = treeTextures.map(tex => new THREE.SpriteMaterial({
        map: tex,
        transparent: true,
        depthWrite: false,
        alphaTest: 0.1
    }));
    const bushSpriteMats = bushTextures.map(tex => new THREE.SpriteMaterial({
        map: tex,
        transparent: true,
        depthWrite: false,
        alphaTest: 0.1
    }));
    const stoneSpriteMats = stoneTextures.map(tex => new THREE.SpriteMaterial({
        map: tex,
        transparent: true,
        depthWrite: false,
        alphaTest: 0.1
    }));

    // Walk the 8×8 grid
    for (let i = -GRID_HALF; i < GRID_HALF; i++) {
        for (let j = -GRID_HALF; j < GRID_HALF; j++) {
            const cx = (i + 0.5) * SQUARE_SIZE;
            const cz = (j + 0.5) * SQUARE_SIZE;
            if (inExclusionZone(cx, cz)) continue;
            // Camera-aware: skip squares deep behind the camera (high +Z)
            if (cz > 130) continue;
            // Chessboard parity — defines middle-ground content. Each
            // square is either a LARGE SHRUB cluster or a SMALL TREE
            // grove. 25% natural swap so the pattern isn't mechanical.
            const isDark = ((i + j) % 2 + 2) % 2 === 0;
            const swap = Math.random() < 0.25;
            const fillType = (isDark !== swap) ? 'smallTrees' : 'largeShrubs';
            // Distance from origin used for size scaling
            const dist = Math.hypot(cx, cz);
            const distRatio = Math.min(1, (dist - 60) / 180);
            if (fillType === 'smallTrees') {
                // Small tree grove — 3-5 modestly-sized trees per square
                const numTrees = 3 + Math.floor(Math.random() * 3);
                for (let t = 0; t < numTrees; t++) {
                    const jitter = SQUARE_SIZE * 0.4;
                    const tx = cx + (Math.random() - 0.5) * jitter;
                    const tz = cz + (Math.random() - 0.5) * jitter;
                    if (inExclusionZone(tx, tz)) continue;
                    // SMALL: scale 1.4 → 2.6 (smaller than the orchard
                    // trees which sit closer to camera)
                    const scale = 1.4 + distRatio * 1.2;
                    placeForestSprite(tx, tz, scale);
                }
            } else {
                // Large shrub cluster — 4-7 bush sprites packed together
                const numBushes = 4 + Math.floor(Math.random() * 4);
                for (let b = 0; b < numBushes; b++) {
                    const jitter = SQUARE_SIZE * 0.45;
                    const bx = cx + (Math.random() - 0.5) * jitter;
                    const bz = cz + (Math.random() - 0.5) * jitter;
                    if (inExclusionZone(bx, bz)) continue;
                    // Large shrubs — taller than the slope bushes
                    const scale = 1.8 + distRatio * 1.0 + Math.random() * 0.4;
                    placeBushSprite(bx, bz, scale);
                }
            }
        }
    }

    // ---- BACKGROUND HORIZON LINE — dispersed LARGE TREES ----
    // The slope ring beyond the plateau plays the BACKGROUND role: large,
    // dispersed trees that form the horizon line behind the chess-grid
    // middle ground. They're heavily washed with light purple-blue haze
    // via a tinted sprite material so they read as the most distant /
    // most atmospheric plane.
    const HORIZON_HAZE = new THREE.Color(0xbcb0d8);   // light purple-blue
    // A tinted version of each shared sprite material — the tint
    // multiplies the painted texture so the trees come out lighter and
    // shifted toward lavender-blue. Fog adds on top of this.
