// ===================== TEMPLE RITUAL (PHASE B) =====================
// Drag-and-drop captured back-row pieces (R N B Q) from the burial
// chamber into the matching temple. Captured WHITE pieces (in black's
// capture pile) go to the BLACK obsidian temple at z=-32. Captured
// BLACK pieces (in white's pile) go to the WHITE marble temple at z=+32.
//
// Mechanic:
//   pointerdown on an eligible coffin ghost  → start drag
//   pointermove                              → ghost follows cursor
//   pointerup over correct temple interior   → snap to audience slot
//   pointerup anywhere else                  → animate ghost back home
//
// Audience slots: 8 positions arranged in a ring around each temple's
// altar, between the altar and the inner column ring. Filled in order
// as coffins are placed.
//
// The temple ritual is purely visual — the central chess match continues
// unaffected. Mirror altar boards keep showing the live game state.

// --- Temple positions / audience-slot geometry ---
// These mirror the values used in buildCathedralProps. We hardcode them
// here so the drag system can compute audience slot world positions
// without needing a reference to the temple groups (which only exist
// when View 5 is active).
const TEMPLE_AUDIENCE = {
    white: { tx: 0, tz: 72, occupied: [/* one slot per filled position, 0..7 */] },
    black: { tx: 0, tz: -72, occupied: [] }
};
const TEMPLE_STYLOBATE_TOP_Y = 3 * 0.35;       // 3 step heights × 0.35
const TEMPLE_AUDIENCE_RADIUS = 4.0;             // distance from altar center
const TEMPLE_AUDIENCE_COUNT = 8;

// Coffins ghost-meshes that are currently sitting INSIDE a temple (not
// in the chamber). Tracked here for redraw / state lookups; the meshes
// themselves are reparented to `world` once placed.
function audienceSlotWorldPos(player, slotIndex) {
    const t = TEMPLE_AUDIENCE[player];
    const angle = (slotIndex / TEMPLE_AUDIENCE_COUNT) * Math.PI * 2;
    return new THREE.Vector3(
        t.tx + Math.cos(angle) * TEMPLE_AUDIENCE_RADIUS,
        TEMPLE_STYLOBATE_TOP_Y,
        t.tz + Math.sin(angle) * TEMPLE_AUDIENCE_RADIUS
    );
}

// Returns true if a captured ghost is eligible to be moved to the temple.
// Pawns and kings are not eligible; rooks, knights, bishops, and queens are.
function isCoffinEligibleForTemple(ghost) {
    const cap = ghost.userData && ghost.userData.capturedPiece;
    if (!cap) return false;
    if (cap.placedInTemple) return false;        // already in a temple, not eligible again
    return ['r', 'n', 'b', 'q'].includes(cap.type);
}

// Which temple does this captured piece belong to?
//   captured WHITE piece → BLACK's temple (south, z=-32)
//   captured BLACK piece → WHITE's temple (north, z=+32)
function temploKeyForCapture(cap) {
    return cap.color === 'w' ? 'black' : 'white';
}

// --- Drag state ---
let templeDragState = null;  // { ghost, plane, origLocalPos, origParent, lifted, targetPlayer }
const DRAG_LIFT_HEIGHT = 1.2;   // how far above ground plane the ghost floats while held

const templeRaycaster = new THREE.Raycaster();
const templeMouse = new THREE.Vector2();
// A horizontal plane at y=0 used to project the cursor while dragging.
const dragGroundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const dragIntersectPt = new THREE.Vector3();

function screenToWorldOnGround(clientX, clientY, out) {
    templeMouse.x = (clientX / window.innerWidth) * 2 - 1;
    templeMouse.y = -(clientY / window.innerHeight) * 2 + 1;
    templeRaycaster.setFromCamera(templeMouse, camera);
    templeRaycaster.ray.intersectPlane(dragGroundPlane, out);
    return out;
}

// pointerdown on the canvas — check if we hit a draggable coffin ghost.
// Capture phase so we get the event before the board click handler.
window.addEventListener('pointerdown', (event) => {
    // Only left-button starts
    if (event.button !== 0) return;
    templeMouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    templeMouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    templeRaycaster.setFromCamera(templeMouse, camera);
    // Test against the captured ghosts only.
    const hits = templeRaycaster.intersectObjects(capturedGroup.children, false);
    if (hits.length === 0) return;
    const ghost = hits[0].object;
    if (!isCoffinEligibleForTemple(ghost)) return;

    // Start drag: stash original parent + local position, reparent to
    // `world` (so we can move it freely in world space without inheriting
    // capturedGroup's transform — actually capturedGroup IS in world, so
    // we can stay parented but we'll move via world coords directly).
    const origLocalPos = ghost.position.clone();
    const cap = ghost.userData.capturedPiece;
    templeDragState = {
        ghost,
        origLocalPos,
        origParent: ghost.parent,
        targetPlayer: temploKeyForCapture(cap),
        startScreenX: event.clientX,
        startScreenY: event.clientY,
        moved: false
    };
    // Lift the ghost so it visibly "picks up" out of the coffin.
    ghost.position.y = Math.max(ghost.position.y, DRAG_LIFT_HEIGHT);
    // Soft glow on the eligible temple (visual cue).
    highlightTempleForDrag(templeDragState.targetPlayer, true);
    // Suppress the board's click handler from running on this gesture.
    event.stopPropagation();
}, true);

window.addEventListener('pointermove', (event) => {
    if (!templeDragState) return;
    const target = screenToWorldOnGround(event.clientX, event.clientY, dragIntersectPt);
    if (!target) return;
    // Place ghost following cursor; clamp Y to LIFT_HEIGHT so it floats.
    const ghost = templeDragState.ghost;
    // Convert world coords → ghost.parent local coords.
    const localTarget = ghost.parent.worldToLocal(target.clone());
    ghost.position.x = localTarget.x;
    ghost.position.z = localTarget.z;
    ghost.position.y = DRAG_LIFT_HEIGHT;
    // Track if any actual movement happened (so a quick click without
    // motion can be distinguished from a drag).
    if (Math.abs(event.clientX - templeDragState.startScreenX) +
        Math.abs(event.clientY - templeDragState.startScreenY) > 3) {
        templeDragState.moved = true;
    }
});

window.addEventListener('pointerup', (event) => {
    if (!templeDragState) return;
    const { ghost, origLocalPos, targetPlayer } = templeDragState;
    highlightTempleForDrag(targetPlayer, false);

    // Where did the drop land in world XZ?
    const drop = screenToWorldOnGround(event.clientX, event.clientY, new THREE.Vector3());

    // Is the drop inside the eligible temple's footprint?
    // Use a generous rectangle: temple extends ~21.6 along X and ~12 along Z
    // from its center. We accept any point inside that bounding box plus
    // a small margin so users don't have to be pixel-perfect.
    const t = TEMPLE_AUDIENCE[targetPlayer];
    const dx = drop.x - t.tx;
    const dz = drop.z - t.tz;
    const TEMPLE_HALF_X = 13;
    const TEMPLE_HALF_Z = 9;
    const dropInsideTemple = Math.abs(dx) < TEMPLE_HALF_X && Math.abs(dz) < TEMPLE_HALF_Z;

    if (dropInsideTemple) {
        // Snap to the next available audience slot.
        const slotIndex = t.occupied.length;
        if (slotIndex < TEMPLE_AUDIENCE_COUNT) {
            const cap = ghost.userData.capturedPiece;
            cap.placedInTemple = targetPlayer;
            cap.templeSlotIndex = slotIndex;
            t.occupied.push(ghost);
            // Phase C: tell the HUD a coffin was placed so the move-match
            // button can appear once the threshold is reached.
            refreshMoveToTempleButton();
            // Move ghost into scene space (same parent as the temples).
            // Reparenting away from capturedGroup means it no longer rides
            // along with the chessboard cluster's auto-rotation.
            const slotWorld = audienceSlotWorldPos(targetPlayer, slotIndex);
            ghost.parent.remove(ghost);
            scene.add(ghost);
            // Animate to the slot
            ghost.position.copy(slotWorld);
            // Slight elevation bump so the piece sits on the stylobate, not in it.
            ghost.position.y = TEMPLE_STYLOBATE_TOP_Y + ghost.geometry.parameters.height / 2 + 0.01;
            // Orient the piece to face the altar
            const altarWorld = new THREE.Vector3(t.tx, ghost.position.y, t.tz);
            ghost.lookAt(altarWorld);
        } else {
            // Temple is full — return to chamber.
            ghost.position.copy(origLocalPos);
        }
    } else {
        // Missed drop — return to original chamber position.
        ghost.position.copy(origLocalPos);
    }

    templeDragState = null;
    event.stopPropagation();
}, true);

// Visual hint: when dragging, soft-glow the eligible temple's stylobate.
// We walk activeViewProps to find the temple groups (only present when
// View 5 is active) and toggle an emissive boost on their darker stone
// material. Returns gracefully if View 5 isn't active.
let _templeHighlightOriginalEmissive = null;
function highlightTempleForDrag(player, on) {
    if (typeof activeViewProps === 'undefined') return;
    const targetZ = TEMPLE_AUDIENCE[player].tz;
    for (const p of activeViewProps) {
        if (!p.isGroup || !p.children || p.children.length === 0) continue;
        // Temples are positioned at (0, 0, ±32) in world space.
        if (Math.abs(p.position.z - targetZ) > 1) continue;
        // Walk the group, find Mesh children with MeshStandardMaterial,
        // adjust their emissive while highlight is on.
        p.traverse(child => {
            if (!child.isMesh || !child.material || !child.material.isMeshStandardMaterial) return;
            if (on) {
                if (!child.material.userData._origEmissive) {
                    child.material.userData._origEmissive = child.material.emissive.clone();
                }
                child.material.emissive.setHex(0x40331c);
            } else {
                if (child.material.userData._origEmissive) {
                    child.material.emissive.copy(child.material.userData._origEmissive);
                }
            }
        });
    }
}

// ===================== TEMPLE RITUAL PHASE C =====================
// Once 2+ coffins are placed in a temple, the player can move the active
// match onto that temple's altar. Both boards remain visible and play
// in sync, but the camera flies to the altar, lamps flare, and the altar
// becomes the primary play surface (clicks on the altar move pieces too).

let activeTempleAltar = null;            // null | 'white' | 'black' | 'mountain'
const TEMPLE_MATCH_MOVE_THRESHOLD = 2;   // V5: coffins needed to unlock the move
const MOUNTAIN_MATCH_MOVE_THRESHOLD = 3; // V3: total captured pieces needed

// Called whenever the temple audience state changes (or a capture
// happens). Decides whether to show the "Move match to ..." button.
function refreshMoveToTempleButton() {
    if (activeTempleAltar) {
        moveToTempleBtn.style.display = 'none';
        moveToTempleSeparator.style.display = 'none';
        return;
    }
    // V11 path: show "Move match to king's flagship" when either player
    // has ≥3 back-row pieces captured. Choose the player whose back row
    // has been hit hardest.
    if (currentViewId === 11) {
        const wBack = countBackRowCapturesForColor('w');
        const bBack = countBackRowCapturesForColor('b');
        const wReady = wBack >= SHIP_MATCH_MOVE_THRESHOLD;
        const bReady = bBack >= SHIP_MATCH_MOVE_THRESHOLD;
        if (!wReady && !bReady) {
            moveToTempleBtn.style.display = 'none';
            moveToTempleSeparator.style.display = 'none';
            return;
        }
        moveToTempleBtn.style.display = '';
        moveToTempleSeparator.style.display = '';
        if (wReady && bReady) {
            moveToTempleBtn.textContent = '⚓ Move match to flagship';
        } else if (wReady) {
            moveToTempleBtn.textContent = '⚓ Move match to white\'s flagship';
        } else {
            moveToTempleBtn.textContent = '⚓ Move match to black\'s flagship';
        }
        return;
    }
    // V3 path: show "Continue at the mountains" once total captured pieces ≥ 3
    if (currentViewId === 3) {
        const totalCaptured = (typeof capturedGroup !== 'undefined')
            ? capturedGroup.children.length
            : 0;
        if (totalCaptured >= MOUNTAIN_MATCH_MOVE_THRESHOLD) {
            moveToTempleBtn.style.display = '';
            moveToTempleSeparator.style.display = '';
            moveToTempleBtn.textContent = '⛰ Continue at the mountains';
        } else {
            moveToTempleBtn.style.display = 'none';
            moveToTempleSeparator.style.display = 'none';
        }
        return;
    }
    // V5 path (default): button gated by temple-audience occupancy
    const whiteReady = TEMPLE_AUDIENCE.white.occupied.length >= TEMPLE_MATCH_MOVE_THRESHOLD;
    const blackReady = TEMPLE_AUDIENCE.black.occupied.length >= TEMPLE_MATCH_MOVE_THRESHOLD;
    if (!whiteReady && !blackReady) {
        moveToTempleBtn.style.display = 'none';
        moveToTempleSeparator.style.display = 'none';
        return;
    }
    moveToTempleBtn.style.display = '';
    moveToTempleSeparator.style.display = '';
    if (whiteReady && blackReady) {
        moveToTempleBtn.textContent = '⌃ Move match to temple';
    } else if (whiteReady) {
        moveToTempleBtn.textContent = '⌃ Move match to white temple';
    } else {
        moveToTempleBtn.textContent = '⌃ Move match to black temple';
    }
}

moveToTempleBtn.addEventListener('click', () => {
    // V3: continue at the mountain altar
    if (currentViewId === 3) {
        moveMatchToMountains();
        return;
    }
    // V11: move match to the king's flagship — pick the side whose back
    // row has taken the most damage (≥3 back-row pieces lost).
    if (currentViewId === 11) {
        const wBack = countBackRowCapturesForColor('w');
        const bBack = countBackRowCapturesForColor('b');
        let player;
        if (wBack >= SHIP_MATCH_MOVE_THRESHOLD && wBack >= bBack) player = 'w';
        else if (bBack >= SHIP_MATCH_MOVE_THRESHOLD) player = 'b';
        else return;
        moveMatchToShip(player);
        return;
    }
    // V5: pick the most-occupied temple
    const wCount = TEMPLE_AUDIENCE.white.occupied.length;
    const bCount = TEMPLE_AUDIENCE.black.occupied.length;
    let destination;
    if (wCount >= TEMPLE_MATCH_MOVE_THRESHOLD && wCount >= bCount) destination = 'white';
    else if (bCount >= TEMPLE_MATCH_MOVE_THRESHOLD) destination = 'black';
    else return;
    moveMatchToTemple(destination);
});

// V3 mountain-altar activation. The mountain altar mesh is built hidden
// inside buildPyramidProps(). When the user clicks the button, we set
// its visibility on, fly the camera over to it, and trigger an altar
// piece re-render so the current game state populates the mini board.
function moveMatchToMountains() {
    if (activeTempleAltar) return;
    activeTempleAltar = 'mountain';
    refreshMoveToTempleButton();
    if (currentViewId !== 3) setView(3);
    // Find the mountain altar so we can fly the camera to it
    let altarPos = null;
    for (const p of activeViewProps) {
        if (p.userData && p.userData.isMountainAltar) {
            altarPos = p.position.clone();
            break;
        }
    }
    // Re-render altar pieces so the mini board fills with current state
    if (typeof renderAltarPieces === 'function') renderAltarPieces();
    if (typeof tagAltarPiecesForClick === 'function') tagAltarPiecesForClick();
    // Fly camera over to look at the mountain altar
    if (altarPos) startMountainCameraFly(altarPos);
    // Subtle dim of the central board tiles so the altar reads as primary
    for (const tile of Object.values(tileMap)) {
        if (!tile.userData._origColor) {
            tile.userData._origColor = tile.material.color.getHex();
        }
        const c = new THREE.Color(tile.userData._origColor);
        c.multiplyScalar(0.75);
        tile.material.color.copy(c);
    }
}

// Simple camera fly: ease the camera to a position offset from the altar
// over ~2.4 seconds. Reuses the same easing system the temple fly uses.
let mountainCamAnim = null;
function startMountainCameraFly(altarPos) {
    const targetPos = new THREE.Vector3(altarPos.x, 4.5, altarPos.z + 7.0);
    const lookAt = new THREE.Vector3(altarPos.x, 1.5, altarPos.z);
    mountainCamAnim = {
        startTime: performance.now(),
        duration: 2400,
        startCamPos: camera.position.clone(),
        endCamPos: targetPos,
        startLookAt: controls.target.clone(),
        endLookAt: lookAt
    };
}
function updateMountainCameraFly(now) {
    if (!mountainCamAnim) return;
    const t = Math.min(1, (now - mountainCamAnim.startTime) / mountainCamAnim.duration);
    const e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;     // easeInOutCubic
    camera.position.lerpVectors(mountainCamAnim.startCamPos, mountainCamAnim.endCamPos, e);
    const target = new THREE.Vector3().lerpVectors(mountainCamAnim.startLookAt, mountainCamAnim.endLookAt, e);
    controls.target.copy(target);
    if (t >= 1) mountainCamAnim = null;
}

// ----- V11 SHIP CAMERA APPROACH -----
// When a V11 ship is clicked, the camera flies to a viewing position
// near that ship and OrbitControls' target is pinned to the ship. The
// user can then orbit/circle the ship with the mouse like normal.
// Clicking again on empty space or pressing Escape returns the camera
// to its pre-approach default view.
let v11ShipCamAnim = null;
let v11ActiveShipPos = null;        // world position of the ship we're orbiting
let v11SavedView = null;            // stash of camera+target before approach

function startV11ShipCameraFly(shipPos) {
    // If we don't already have a saved view, save the current one so we
    // can fly back when the user clicks away.
    if (!v11SavedView) {
        v11SavedView = {
            camPos: camera.position.clone(),
            target: controls.target.clone()
        };
    }
    // Compute approach: the ships have their bows pointed TOWARD the
    // chess board (origin). To see the bow head-on, we place the camera
    // BETWEEN the origin and the ship — closer to origin than the ship.
    // The approach offset is along the BOARD-TO-SHIP direction, then we
    // step BACK from the ship by APPROACH_DIST.
    const fromOriginToShip = new THREE.Vector3(shipPos.x, 0, shipPos.z).normalize();
    if (fromOriginToShip.lengthSq() < 0.001) fromOriginToShip.set(0, 0, 1);
    const APPROACH_DIST = 18;
    const APPROACH_HEIGHT = 10;
    const targetPos = new THREE.Vector3(
        shipPos.x - fromOriginToShip.x * APPROACH_DIST,
        APPROACH_HEIGHT,
        shipPos.z - fromOriginToShip.z * APPROACH_DIST
    );
    // Look at the ship's deck level — well above the waterline.
    const lookAt = new THREE.Vector3(shipPos.x, 5.5, shipPos.z);
    v11ShipCamAnim = {
        startTime: performance.now(),
        duration: 1800,
        startCamPos: camera.position.clone(),
        endCamPos: targetPos,
        startLookAt: controls.target.clone(),
        endLookAt: lookAt
    };
    v11ActiveShipPos = shipPos.clone();
}

function startV11ShipCameraReturn() {
    if (!v11SavedView) return;
    v11ShipCamAnim = {
        startTime: performance.now(),
        duration: 1800,
        startCamPos: camera.position.clone(),
        endCamPos: v11SavedView.camPos.clone(),
        startLookAt: controls.target.clone(),
        endLookAt: v11SavedView.target.clone()
    };
    v11SavedView = null;
    v11ActiveShipPos = null;
}

function updateV11ShipCameraFly(now) {
    if (!v11ShipCamAnim) return;
    const t = Math.min(1, (now - v11ShipCamAnim.startTime) / v11ShipCamAnim.duration);
    const e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    camera.position.lerpVectors(v11ShipCamAnim.startCamPos, v11ShipCamAnim.endCamPos, e);
    const tgt = new THREE.Vector3().lerpVectors(v11ShipCamAnim.startLookAt, v11ShipCamAnim.endLookAt, e);
    controls.target.copy(tgt);
    if (t >= 1) v11ShipCamAnim = null;
}

// Escape key returns the camera from a V11 ship approach
window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && currentViewId === 11 && v11SavedView) {
        startV11ShipCameraReturn();
    }
});

// ----- V11 SHIP SWAY + SAIL RIPPLE -----
// Each V11 ship bobs on its puddle (pitch/roll/heave) at its own rhythm
// and its sail+constellation planes ripple with a sine-wave vertex
// displacement. The king's ship FREEZES its sway when the deck altar
// is active so the chess pieces on the deck stay readable.
// Find a fleet ship matching a given piece-letter and color among the
// currently-active V11 props. Returns the ship Group or null.
function findFleetShip(pieceLetter, color) {
    if (typeof activeViewProps === 'undefined') return null;
    for (const prop of activeViewProps) {
        if (prop.userData
            && prop.userData.isV11Ship
            && prop.userData.pieceLetter === pieceLetter
            && prop.userData.shipColor === color) {
            return prop;
        }
    }
    return null;
}

// Per-ship pitch-ping state. Layered on top of the normal sway as an
// extra roll/pitch amplitude that decays over ~1.4s. Use a Map keyed by
// the ship Group so we don't have to mutate the ship object.
const _shipPitchPings = new Map();
function triggerFleetShipPitchPing(ship) {
    if (!ship) return;
    _shipPitchPings.set(ship, {
        startTime: performance.now(),
        duration: 1400
    });
}

// Per-ship cannon fire animations. Each animation creates a brief muzzle
// flash sphere + a small smoke puff that drifts forward (along the bow
// direction) and fades out.
const _shipCannonAnims = [];
function triggerFleetShipCannon(ship, targetWorldPos) {
    if (!ship) return;
    // Cannon fires from the ship's broadside (the side facing the target)
    // and arcs across the scene to the captured-square position.
    // We add the cannon meshes as siblings of the ship under the same
    // parent (the `world` group), so all positions are expressed in
    // world-LOCAL coordinates (not absolute world coords). `ship.position`
    // is already in world-local space; the captured square's position
    // passed in is also constructed in world-local. World rotation
    // (auto-rotate) is applied at render time as a transform on `world`.
    const shipLocalPos = ship.position.clone();

    // Direction from ship to target (horizontal only — y handled by arc)
    const horizDir = new THREE.Vector3(
        targetWorldPos.x - shipLocalPos.x,
        0,
        targetWorldPos.z - shipLocalPos.z
    );
    const totalDist = horizDir.length();
    if (totalDist < 0.001) return;
    horizDir.normalize();

    // Muzzle start: a little out from the ship in the target direction,
    // at deck height.
    const bb = new THREE.Box3().setFromObject(ship);
    const size = new THREE.Vector3();
    bb.getSize(size);
    const shipReach = Math.max(size.x, size.z) * 0.5;
    const startPos = new THREE.Vector3()
        .copy(shipLocalPos)
        .addScaledVector(horizDir, shipReach)
        .add(new THREE.Vector3(0, 3.2, 0));

    // End position: roughly the captured square's center, at piece-level
    // height (~y=0.5)
    const endPos = new THREE.Vector3(targetWorldPos.x, 0.5, targetWorldPos.z);

    const parent = ship.parent || scene;

    // ---- MUZZLE FLASH at the ship ----
    const flashMat = new THREE.MeshBasicMaterial({
        color: 0xffd070,
        transparent: true,
        opacity: 1.0,
        fog: false,
        depthWrite: false
    });
    const flashMesh = new THREE.Mesh(
        new THREE.SphereGeometry(1.1, 12, 10),
        flashMat
    );
    flashMesh.position.copy(startPos);
    parent.add(flashMesh);

    // ---- INITIAL MUZZLE SMOKE PUFF at the ship ----
    const muzzleSmokeMat = new THREE.MeshBasicMaterial({
        color: 0xaab0b8,
        transparent: true,
        opacity: 0.75,
        fog: false,
        depthWrite: false
    });
    const muzzleSmoke = new THREE.Mesh(
        new THREE.SphereGeometry(1.6, 12, 10),
        muzzleSmokeMat
    );
    muzzleSmoke.position.copy(startPos);
    parent.add(muzzleSmoke);

    // ---- CANNONBALL ----
    const ballMat = new THREE.MeshStandardMaterial({
        color: 0x1a1a1a,
        roughness: 0.55,
        metalness: 0.6,
        fog: false
    });
    const ballMesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.35, 12, 10),
        ballMat
    );
    ballMesh.position.copy(startPos);
    parent.add(ballMesh);

    // Pre-create the impact flash + impact smoke; we'll spawn them when the
    // ball arrives by toggling visibility/opacity in the update step.
    const impactFlashMat = new THREE.MeshBasicMaterial({
        color: 0xffd070,
        transparent: true,
        opacity: 0.0,
        fog: false,
        depthWrite: false
    });
    const impactFlash = new THREE.Mesh(
        new THREE.SphereGeometry(1.4, 12, 10),
        impactFlashMat
    );
    impactFlash.position.copy(endPos);
    impactFlash.visible = false;
    parent.add(impactFlash);
    const impactSmokeMat = new THREE.MeshBasicMaterial({
        color: 0x9aa0a8,
        transparent: true,
        opacity: 0.0,
        fog: false,
        depthWrite: false
    });
    const impactSmoke = new THREE.Mesh(
        new THREE.SphereGeometry(1.8, 12, 10),
        impactSmokeMat
    );
    impactSmoke.position.copy(endPos);
    impactSmoke.visible = false;
    parent.add(impactSmoke);

    // Travel time scales with distance — 150 units in ~1.4s (~107 u/s),
    // clamped to a sensible range. Smoke trail follows the same arc.
    const travelDuration = Math.min(2400, Math.max(800, totalDist * 9));
    // Arc height: roughly half the horizontal distance, capped.
    const arcHeight = Math.min(25, totalDist * 0.18);

    _shipCannonAnims.push({
        startTime: performance.now(),
        flashDuration: 220,
        travelDuration,
        impactDuration: 1400,
        endTime: performance.now() + 220 + travelDuration + 1400,
        flashMesh,
        muzzleSmoke,
        ballMesh,
        impactFlash,
        impactSmoke,
        impactStartTime: null,        // set when ball arrives
        startPos: startPos.clone(),
        endPos: endPos.clone(),
        arcHeight,
        parent
    });
}

function updateShipCannonAnims(now) {
    for (let i = _shipCannonAnims.length - 1; i >= 0; i--) {
        const a = _shipCannonAnims[i];
        const t = now - a.startTime;

        // --- PHASE 1: MUZZLE FLASH (0 → flashDuration) ---
        if (t < a.flashDuration) {
            const k = t / a.flashDuration;
            a.flashMesh.material.opacity = (1 - k) * 1.0;
            a.flashMesh.scale.setScalar(1 + k * 0.6);
        } else if (a.flashMesh && a.flashMesh.parent) {
            a.parent.remove(a.flashMesh);
            a.flashMesh.material.dispose();
            a.flashMesh.geometry.dispose();
            a.flashMesh = null;
        }

        // --- MUZZLE SMOKE: drifts up & fades over the same period as travel ---
        const muzzleSmokeDuration = a.flashDuration + a.travelDuration * 0.7;
        if (t < muzzleSmokeDuration && a.muzzleSmoke) {
            const k = t / muzzleSmokeDuration;
            const e = 1 - Math.pow(1 - k, 2);
            a.muzzleSmoke.position.y = a.startPos.y + e * 1.5;
            a.muzzleSmoke.material.opacity = 0.75 * (1 - e);
            a.muzzleSmoke.scale.setScalar(1 + e * 1.4);
        } else if (a.muzzleSmoke && a.muzzleSmoke.parent) {
            a.parent.remove(a.muzzleSmoke);
            a.muzzleSmoke.material.dispose();
            a.muzzleSmoke.geometry.dispose();
            a.muzzleSmoke = null;
        }

        // --- PHASE 2: CANNONBALL TRAVEL (flashDuration → flashDuration + travelDuration) ---
        const travelStart = a.flashDuration;
        const travelEnd   = travelStart + a.travelDuration;
        if (t >= travelStart && t < travelEnd && a.ballMesh) {
            const k = (t - travelStart) / a.travelDuration;
            // Lerp horizontal X/Z linearly, add a parabolic Y arc on top.
            a.ballMesh.position.x = a.startPos.x + (a.endPos.x - a.startPos.x) * k;
            a.ballMesh.position.z = a.startPos.z + (a.endPos.z - a.startPos.z) * k;
            const linearY = a.startPos.y + (a.endPos.y - a.startPos.y) * k;
            const arc = 4 * a.arcHeight * k * (1 - k);     // parabola peak at k=0.5
            a.ballMesh.position.y = linearY + arc;
        } else if (t >= travelEnd && a.ballMesh) {
            // Ball has arrived: remove it, kick off impact phase.
            if (a.ballMesh.parent) {
                a.parent.remove(a.ballMesh);
                a.ballMesh.material.dispose();
                a.ballMesh.geometry.dispose();
            }
            a.ballMesh = null;
            if (a.impactStartTime === null) {
                a.impactStartTime = now;
                if (a.impactFlash) a.impactFlash.visible = true;
                if (a.impactSmoke) a.impactSmoke.visible = true;
            }
        }

        // --- PHASE 3: IMPACT FLASH + SMOKE at the target ---
        if (a.impactStartTime !== null) {
            const it = now - a.impactStartTime;
            // Impact flash: bright pop ~200ms
            if (it < 200 && a.impactFlash) {
                const k = it / 200;
                a.impactFlash.material.opacity = (1 - k) * 1.0;
                a.impactFlash.scale.setScalar(1 + k * 0.8);
            } else if (a.impactFlash && a.impactFlash.parent) {
                a.parent.remove(a.impactFlash);
                a.impactFlash.material.dispose();
                a.impactFlash.geometry.dispose();
                a.impactFlash = null;
            }
            // Impact smoke: lingers ~1.4s, expands & fades, drifts up
            if (it < a.impactDuration && a.impactSmoke) {
                const k = it / a.impactDuration;
                const e = 1 - Math.pow(1 - k, 2);
                a.impactSmoke.position.y = a.endPos.y + e * 1.8;
                a.impactSmoke.material.opacity = 0.85 * (1 - e);
                a.impactSmoke.scale.setScalar(1 + e * 2.2);
            } else if (a.impactSmoke && a.impactSmoke.parent) {
                a.parent.remove(a.impactSmoke);
                a.impactSmoke.material.dispose();
                a.impactSmoke.geometry.dispose();
                a.impactSmoke = null;
            }
        }

        // --- CLEANUP: drop this anim when everything is gone ---
        if (!a.flashMesh && !a.muzzleSmoke && !a.ballMesh && !a.impactFlash && !a.impactSmoke) {
            _shipCannonAnims.splice(i, 1);
        }
    }
}

function updateV11Ships(now) {
    if (typeof currentViewId === 'undefined' || currentViewId !== 11) return;
    if (typeof activeViewProps === 'undefined') return;
    // Determine which ship (if any) is hosting an active altar — that
    // one freezes its sway. The deck altar is tagged via activeTempleAltar
    // = 'ship_w' | 'ship_b'.
    const altarShipColor = (activeTempleAltar === 'ship_w') ? 'w'
                         : (activeTempleAltar === 'ship_b') ? 'b'
                         : null;
    for (const prop of activeViewProps) {
        if (!prop.userData || !prop.userData.isV11Ship) continue;

        // King-ship-with-active-altar: lock to rest pose, skip motion.
        const isAltarHost = (altarShipColor && prop.userData.pieceLetter === 'k'
                             && prop.userData.shipColor === altarShipColor);
        if (isAltarHost) {
            prop.position.y = prop.userData.swayRestY;
            prop.rotation.x = prop.userData.swayRestPitch;
            prop.rotation.z = prop.userData.swayRestRoll;
            // Also restore the sail mesh rest positions so the cloth
            // sits flat when chess pieces are on the deck.
            if (prop.userData.sailMeshes) {
                for (const sm of prop.userData.sailMeshes) {
                    const arr = sm.mesh.geometry.attributes.position.array;
                    for (let i = 0; i < arr.length; i++) arr[i] = sm.restPos[i];
                    sm.mesh.geometry.attributes.position.needsUpdate = true;
                }
            }
            continue;
        }

        const phases  = prop.userData.swayPhases;
        const periods = prop.userData.swayPeriods;
        if (!phases || !periods) continue;

        // Ship-body sway. Small amplitudes — the fleet should feel
        // gently alive, not seasick. Amplitudes scale with shipScale so
        // smaller ships don't bob as widely as the king's flagship.
        const sf = prop.userData.shipScaleFactor || 1;
        const PITCH_AMP = 0.025 * sf;       // radians (~1.4°)
        const ROLL_AMP  = 0.035 * sf;       // radians (~2°)
        const HEAVE_AMP = 0.18  * sf;       // world units

        const tP = now / periods.pitch * Math.PI * 2 + phases.pitch;
        const tR = now / periods.roll  * Math.PI * 2 + phases.roll;
        const tH = now / periods.heave * Math.PI * 2 + phases.heave;

        // Pitch-ping (move-signal): an extra rapid roll oscillation added
        // when a corresponding chess move happens, decaying over ~1.4s.
        let pitchPingExtra = 0;
        if (_shipPitchPings.has(prop)) {
            const ping = _shipPitchPings.get(prop);
            const pt = (now - ping.startTime) / ping.duration;
            if (pt >= 1) {
                _shipPitchPings.delete(prop);
            } else {
                // 3 cycles over the duration, amplitude decays linearly
                const amp = (1 - pt) * 0.18 * sf;     // ~10° at peak
                pitchPingExtra = amp * Math.sin(pt * Math.PI * 2 * 3);
            }
        }

        prop.position.y = prop.userData.swayRestY + Math.sin(tH) * HEAVE_AMP;
        prop.rotation.x = prop.userData.swayRestPitch + Math.sin(tP) * PITCH_AMP;
        prop.rotation.z = prop.userData.swayRestRoll  + Math.sin(tR) * ROLL_AMP + pitchPingExtra;

        // Sail ripple. Each subdivided sail vertex is offset along its
        // local +Z (the plane's normal direction in plane-local space —
        // the cloth is rotated 90° around Y so its local +Z, after
        // rotation, points along world ±X; ripples push the cloth gently
        // forward/back like wind catching it). Amplitude scales with
        // distance from the yard (top edge) so the bottom of the sail
        // swings more than the top. A subtle horizontal wave varies the
        // displacement across the cloth so the ripple flows rather than
        // pulsing uniformly.
        if (prop.userData.sailMeshes) {
            const sailPhase = phases.sail;
            const sailPeriodT = now / periods.sail * Math.PI * 2 + sailPhase;
            const SAIL_AMP_BASE = 0.10 * sf;
            for (const sm of prop.userData.sailMeshes) {
                const arr  = sm.mesh.geometry.attributes.position.array;
                const rest = sm.restPos;
                const geo = sm.mesh.geometry;
                const planeW = geo.parameters.width;
                const planeH = geo.parameters.height;
                const halfH = planeH / 2;
                for (let i = 0; i < arr.length; i += 3) {
                    const rx = rest[i];           // local X position on plane
                    const ry = rest[i + 1];       // local Y
                    // Distance from top edge: 0 at top, planeH at bottom
                    const distFromTop = (halfH - ry);
                    // Amp envelope: 0 at top edge → max at bottom
                    const env = Math.min(1, distFromTop / planeH);
                    // Per-vertex phase varies horizontally so the wave
                    // travels across the sail.
                    const horizWave = (rx / planeW) * Math.PI * 1.4;
                    const disp = Math.sin(sailPeriodT + horizWave) * SAIL_AMP_BASE * env;
                    // Offset along plane local +Z (the cloth's normal in
                    // its OWN frame; world rotation handles the rest).
                    arr[i]     = rx;
                    arr[i + 1] = ry;
                    arr[i + 2] = rest[i + 2] + disp;
                }
                geo.attributes.position.needsUpdate = true;
            }
        }
    }
}

// ----- V11 SHIP MATCH-MOVE -----
// When a player has lost ≥3 of their back-row pieces, the user can
// "move the match to the king's flagship" — switch to V11 and fly the
// camera in to the king ship's stateroom area. Game continues on the
// central board; this is a cinematic relocation, not a board transfer.
const SHIP_MATCH_MOVE_THRESHOLD = 3;

function countBackRowCapturesForColor(color) {
    if (typeof capturedGroup === 'undefined' || !capturedGroup.children) return 0;
    let n = 0;
    for (const ghost of capturedGroup.children) {
        const cp = ghost.userData && ghost.userData.capturedPiece;
        if (!cp) continue;
        if (cp.color !== color) continue;
        if (cp.type === 'p') continue;        // pawns aren't back-row pieces
        // homeSquare is e.g. 'a8' for black home rank or 'h1' for white home rank
        const rankChar = cp.homeSquare ? cp.homeSquare[1] : null;
        const isBackRow = (color === 'w' && rankChar === '1') ||
                          (color === 'b' && rankChar === '8');
        if (isBackRow) n++;
    }
    return n;
}

// Find the king's ship for a given player color in the active V11 props.
function findKingShipForPlayer(color) {
    if (typeof activeViewProps === 'undefined') return null;
    for (const prop of activeViewProps) {
        if (prop.userData &&
            prop.userData.isV11Ship &&
            prop.userData.pieceLetter === 'k' &&
            prop.userData.shipColor === color) {
            return prop;
        }
    }
    return null;
}

// Move the match to a player's king ship: switch to V11, then fly the
// camera to the king ship using the existing approach animation. Also
// activate the deck altar board so the match is playable from the deck.
function moveMatchToShip(player) {
    if (activeTempleAltar) return;
    // Switch to V11 (this will build/cache the fleet if not already)
    if (currentViewId !== 11) setView(11);
    // Defer the ship lookup + altar activation by a frame so the new
    // view's props are fully attached and have valid world matrices.
    requestAnimationFrame(() => {
        const ship = findKingShipForPlayer(player);
        if (!ship) return;
        const shipPos = new THREE.Vector3();
        ship.updateMatrixWorld(true);
        ship.getWorldPosition(shipPos);
        startV11ShipCameraFly(shipPos);

        // Activate the deck altar: tag the active altar, show the
        // hidden deck board, hide the standing king figure so it's
        // not in the way, and trigger the altar-piece render so the
        // current chess state populates the deck.
        activeTempleAltar = (player === 'w') ? 'ship_w' : 'ship_b';
        if (ship.userData.shipDeckBoard) {
            ship.userData.shipDeckBoard.visible = true;
        }
        // Hide the standing piece on the deck so it doesn't block the
        // board.
        ship.traverse(obj => {
            if (obj.userData && obj.userData.isShipDeckStandingPiece) {
                obj.visible = false;
            }
        });
        // Re-render altar pieces so the deck board fills with current
        // state, and re-tag for click routing.
        if (typeof renderAltarPieces === 'function') renderAltarPieces();
        if (typeof tagAltarPiecesForClick === 'function') tagAltarPiecesForClick();
        // Subtly dim the central board tiles so the deck altar reads
        // as primary (same effect moveMatchToTemple uses).
        for (const tile of Object.values(tileMap)) {
            if (!tile.userData._origColor) {
                tile.userData._origColor = tile.material.color.getHex();
            }
            const c = new THREE.Color(tile.userData._origColor);
            c.multiplyScalar(0.75);
            tile.material.color.copy(c);
        }
        // Hide the move-to-flagship button (since the match has moved).
        if (typeof refreshMoveToTempleButton === 'function') refreshMoveToTempleButton();
    });
}

// ----- Camera fly to altar -----
let templeCamAnim = null;

function startTempleCameraFly(player) {
    const t = TEMPLE_AUDIENCE[player];
    const altarTopY = TEMPLE_STYLOBATE_TOP_Y + 1.2;
    const camPos = new THREE.Vector3(t.tx, altarTopY + 4.5, t.tz + 5.5);
    const camTgt = new THREE.Vector3(t.tx, altarTopY, t.tz);
    templeCamAnim = {
        fromPos: camera.position.clone(),
        fromTgt: controls.target.clone(),
        toPos: camPos,
        toTgt: camTgt,
        start: performance.now(),
        duration: 2400
    };
    controls.enableRotate = false;
    controls.enablePan = false;
    controls.enableZoom = false;
}

function updateTempleCameraFly(now) {
    if (!templeCamAnim) return;
    const t = (now - templeCamAnim.start) / templeCamAnim.duration;
    if (t >= 1) {
        camera.position.copy(templeCamAnim.toPos);
        controls.target.copy(templeCamAnim.toTgt);
        controls.enableRotate = true;
        controls.enablePan = true;
        controls.enableZoom = true;
        templeCamAnim = null;
        return;
    }
    const e = easeInOutCubic(t);
    camera.position.lerpVectors(templeCamAnim.fromPos, templeCamAnim.toPos, e);
    controls.target.lerpVectors(templeCamAnim.fromTgt, templeCamAnim.toTgt, e);
}

// ----- Lamp + altar ceremony -----
let templeCeremony = null;

function startTempleCeremony(player) {
    if (typeof activeViewProps === 'undefined') return;
    const targetZ = TEMPLE_AUDIENCE[player].tz;
    const lamps = [];
    let altarMesh = null;
    for (const p of activeViewProps) {
        if (!p.isGroup || Math.abs(p.position.z - targetZ) > 1) continue;
        p.traverse(child => {
            if (child.isLight && child.isPointLight) {
                lamps.push(child);
                if (!child.userData._origIntensity) {
                    child.userData._origIntensity = child.intensity;
                }
            }
            if (child.isMesh && child.material && child.material.emissive
                && child.material.emissiveIntensity > 1.0) {
                lamps.push(child);
                if (!child.userData._origEmissiveIntensity) {
                    child.userData._origEmissiveIntensity = child.material.emissiveIntensity;
                }
            }
            if (child.isMesh && child.geometry && child.geometry.parameters
                && child.geometry.parameters.width === 4.0
                && child.geometry.parameters.height === 1.2
                && child.geometry.parameters.depth === 4.0) {
                altarMesh = child;
            }
        });
    }
    templeCeremony = {
        player,
        start: performance.now(),
        duration: 2500,
        lamps,
        altarMesh
    };
}

function updateTempleCeremony(now) {
    if (!templeCeremony) return;
    const t = (now - templeCeremony.start) / templeCeremony.duration;
    if (t >= 1) {
        for (const l of templeCeremony.lamps) {
            if (l.isLight) {
                l.intensity = (l.userData._origIntensity || 1.8) * 1.4;
            } else if (l.material) {
                l.material.emissiveIntensity = (l.userData._origEmissiveIntensity || 1.4) * 1.3;
            }
        }
        if (templeCeremony.altarMesh) {
            templeCeremony.altarMesh.material.emissive = new THREE.Color(0x402a16);
            templeCeremony.altarMesh.material.emissiveIntensity = 0.25;
        }
        templeCeremony = null;
        return;
    }
    const pulse = t < 0.2
        ? (t / 0.2) * 3.0
        : 3.0 - (t - 0.2) / 0.8 * (3.0 - 1.4);
    for (const l of templeCeremony.lamps) {
        if (l.isLight) {
            l.intensity = (l.userData._origIntensity || 1.8) * pulse;
        } else if (l.material) {
            l.material.emissiveIntensity = (l.userData._origEmissiveIntensity || 1.4) * pulse;
        }
    }
    if (templeCeremony.altarMesh) {
        templeCeremony.altarMesh.material.emissive = new THREE.Color(0x402a16);
        templeCeremony.altarMesh.material.emissiveIntensity = pulse * 0.3;
    }
}

function moveMatchToTemple(player) {
    if (activeTempleAltar) return;
    activeTempleAltar = player;
    refreshMoveToTempleButton();
    if (currentViewId !== 5) setView(5);
    startTempleCameraFly(player);
    startTempleCeremony(player);
    // Subtly dim the central board tiles so the altar reads as primary.
    for (const tile of Object.values(tileMap)) {
        if (!tile.userData._origColor) {
            tile.userData._origColor = tile.material.color.getHex();
        }
        const c = new THREE.Color(tile.userData._origColor);
        c.multiplyScalar(0.75);
        tile.material.color.copy(c);
    }
}

// ----- Altar interactivity -----
// Tag altar pieces and tiles with their square coordinates so the main
// click handler can route taps on the altar to the chess engine.
function tagAltarPiecesForClick() {
    if (typeof activeViewProps === 'undefined') return;
    for (const prop of activeViewProps) {
        prop.traverse(obj => {
            if (!obj.userData || !obj.userData.isAltarBoard) return;
            const tileSize = obj.userData.tileSize;
            for (const child of obj.children) {
                if (!child.geometry || !child.geometry.parameters) continue;
                const h = child.geometry.parameters.height;
                if (h === undefined) continue;
                const col = Math.round(child.position.x / tileSize + 3.5);
                const row = Math.round(child.position.z / tileSize + 3.5);
                if (col < 0 || col >= 8 || row < 0 || row >= 8) continue;
                const sq = files[col] + ranks[row];
                if (h > 0.05) {
                    child.userData.isAltarPiece = true;
                    child.userData.altarSquare = sq;
                } else {
                    child.userData.isAltarTile = true;
                    child.userData.altarSquare = sq;
                }
            }
        });
    }
}

// Wrap renderPieces so the tag pass runs after every render.
const _origRenderPieces = renderPieces;
renderPieces = function() {
    _origRenderPieces();
    tagAltarPiecesForClick();
};
tagAltarPiecesForClick();

// --- 8. AUTO-ROTATION + IDLE DETECTION ---
const IDLE_TIME_MS = 120000;     // 2 minutes of no activity before auto-rotate kicks in
const EASE_IN_MS = 1500;         // ease-in duration when rotation begins
const EASE_OUT_MS = 400;         // ease-out duration when activity resumes
let lastActivityTime = performance.now();
let currentSpinFactor = 0;       // 0..1, multiplier applied to target rotation speed
let lastFrameTime = performance.now();

function markActivity() {
    lastActivityTime = performance.now();
}

// Camera-drag and zoom count as activity. Wire OrbitControls events:
controls.addEventListener('start', markActivity);
controls.addEventListener('change', markActivity);

// Raycast (clicks) below counts as activity too — markActivity is called in handler.

// World rotates only when:
//   - no piece is selected (active gameplay)
//   - idle for IDLE_TIME_MS
// Ease in/out via currentSpinFactor. Spin speed is always > 0 since the
// selector only offers 1x/2x/3x.
function updateRotation(now, dt) {
    const targetSpeed = ROTATION_SPEEDS[rotationLevel];

    // Determine whether rotation SHOULD be active
    const idle = (now - lastActivityTime) > IDLE_TIME_MS;
    const allowed = idle && selectedPiece === null;

    // Ease the spin factor toward 0 or 1
    if (allowed) {
        currentSpinFactor = Math.min(1, currentSpinFactor + dt / EASE_IN_MS);
    } else {
        currentSpinFactor = Math.max(0, currentSpinFactor - dt / EASE_OUT_MS);
    }

    world.rotation.y += targetSpeed * currentSpinFactor;
}

// --- 9. CLICK HANDLER ---
window.addEventListener('click', (event) => {
    if (event.target !== renderer.domElement) return;
    markActivity();

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    // ============ V11 SHIP CLICK HANDLING ============
    // When V11 is the active view, clicks on a ship fly the camera to
    // that ship; clicks anywhere else (with an active approach) fly back.
    // Runs BEFORE the chess-piece routing so ship clicks don't fall
    // through to "click on the board" logic.
    //
    // EXCEPTION: when the deck altar is active (the match has moved onto
    // the king's flagship), skip the camera-approach intercept so that
    // clicks on altar pieces / altar tiles route through the chess
    // engine via the normal flow below.
    const v11AltarActive = (activeTempleAltar === 'ship_w' || activeTempleAltar === 'ship_b');
    if (!v11AltarActive
        && typeof currentViewId !== 'undefined' && currentViewId === 11
        && typeof activeViewProps !== 'undefined') {
        const shipTargets = [];
        for (const prop of activeViewProps) {
            if (prop.userData && prop.userData.isV11Ship) {
                prop.traverse(obj => {
                    if (obj.isMesh) shipTargets.push(obj);
                });
            }
        }
        if (shipTargets.length > 0) {
            const shipHits = raycaster.intersectObjects(shipTargets, false);
            if (shipHits.length > 0) {
                // Walk up to find the ship Group with isV11Ship flag
                let n = shipHits[0].object;
                while (n && !(n.userData && n.userData.isV11Ship)) {
                    n = n.parent;
                }
                if (n) {
                    // Resolve ship's world position (accounting for parent
                    // transforms — the ship is inside `world` which may
                    // rotate via idle auto-rotation).
                    const shipWorldPos = new THREE.Vector3();
                    n.getWorldPosition(shipWorldPos);
                    startV11ShipCameraFly(shipWorldPos);
                    return;
                }
            }
            // Click missed all ships — if we currently have an active
            // approach, fly back to the saved default view.
            if (v11SavedView) {
                startV11ShipCameraReturn();
                return;
            }
        }
    }

    // Build the test list. The central board's pieces and tiles are
    // always testable. If the match has been moved to a temple altar,
    // ALSO include the altar's piece/tile meshes so they're clickable.
    const objectsToTest = [...pieceGroup.children, ...boardGroup.children];
    if (activeTempleAltar) {
        for (const prop of activeViewProps) {
            prop.traverse(obj => {
                if (obj.userData && obj.userData.isAltarBoard) {
                    for (const child of obj.children) {
                        if (child.userData && (child.userData.isAltarPiece || child.userData.isAltarTile)) {
                            objectsToTest.push(child);
                        }
                    }
                }
            });
        }
    }
    // Include wireframe click-targets (invisible tile + piece hitboxes
    // inside _wireframeLayer) when the wireframe view is showing. This
    // lets the user play the match directly from the zoomed-out
    // wireframe board — taps route through the same chess engine.
    if (typeof _wireframeLayer !== 'undefined' && _wireframeLayer && _wireframeLayer.visible) {
        _wireframeLayer.traverse(obj => {
            if (obj.userData && (obj.userData.isWireframePiece || obj.userData.isWireframeTile)) {
                objectsToTest.push(obj);
            }
        });
    }
    const intersects = raycaster.intersectObjects(objectsToTest);

    if (intersects.length === 0) {
        clearSelection();
        return;
    }

    const clickedObject = intersects[0].object;
    const u = clickedObject.userData;

    // --- ALTAR CLICKS ---
    // If the click landed on an altar piece or altar tile, derive the
    // square from the userData and run it through the same source/target
    // logic as the central board.
    if (u.isAltarPiece || u.isAltarTile) {
        const sq = u.altarSquare;
        const boardState = getBoardState();
        // Convert sq → (col, row)
        const col = files.indexOf(sq[0]);
        const row = ranks.indexOf(sq[1]);
        const sqPiece = (col >= 0 && row >= 0) ? boardState[row][col] : null;
        const turn = getCurrentTurn();

        // If a piece is selected and the altar click targets a different
        // square (either an empty tile or an opponent piece), try to move.
        if (selectedPiece) {
            const source = selectedPiece.userData.id;
            const target = sq;
            if (attemptMoveWithCaptures(source, target)) {
                clearSelection();
                renderPieces();
                refreshHUD();
                maybeTriggerAIMove();
                return;
            }
        }
        // Otherwise, if the altar square holds the current player's
        // piece, select the CORRESPONDING central-board piece (so the
        // existing selection / highlight system works unchanged — pieces
        // are selected on the central board, just visualized on the altar).
        if (sqPiece && sqPiece.color === turn) {
            // Find the central piece mesh by its userData.id
            const centralPiece = pieceGroup.children.find(m => m.userData.id === sq);
            if (centralPiece) selectPiece(centralPiece);
        }
        return;
    }

    // --- WIREFRAME CLICKS ---
    // Same routing as altar clicks: derive the square from the wireframe
    // target's userData and feed it through the chess engine. Selection
    // is still tracked via the central-board piece mesh (so highlights,
    // halos, and animations all work unchanged); the wireframe board
    // just acts as a zoomed-out input surface.
    if (u.isWireframePiece || u.isWireframeTile) {
        const sq = u.wireframeSquare;
        const boardState = getBoardState();
        const col = files.indexOf(sq[0]);
        const row = ranks.indexOf(sq[1]);
        const sqPiece = (col >= 0 && row >= 0) ? boardState[row][col] : null;
        const turn = getCurrentTurn();

        if (selectedPiece) {
            const source = selectedPiece.userData.id;
            const target = sq;
            if (attemptMoveWithCaptures(source, target)) {
                clearSelection();
                renderPieces();
                refreshHUD();
                maybeTriggerAIMove();
                return;
            }
        }
        if (sqPiece && sqPiece.color === turn) {
            const centralPiece = pieceGroup.children.find(m => m.userData.id === sq);
            if (centralPiece) selectPiece(centralPiece);
        }
        return;
    }

    const clickedId = u.id;
    const isTile = u.isTile;

    if (!isTile) {
        const pieceColor = clickedObject.userData.color;
        const turn = getCurrentTurn();

        if (selectedPiece && pieceColor !== turn) {
            const source = selectedPiece.userData.id;
            const target = clickedId;
            if (attemptMoveWithCaptures(source, target)) {
                clearSelection();
                renderPieces();
                refreshHUD();
                maybeTriggerAIMove();
                return;
            }
        }

        if (pieceColor === turn) {
            selectPiece(clickedObject);
        }
        return;
    }

    if (selectedPiece) {
        const source = selectedPiece.userData.id;
        const target = clickedId;
        if (attemptMoveWithCaptures(source, target)) {
            clearSelection();
            renderPieces();
            refreshHUD();
            maybeTriggerAIMove();
        }
    }
});

// --- 3D piece hover (figure card) ---
// When the mouse hovers over a piece in 3D, after 1 second show the hover card
// for the historical figure that piece represents. We look up the piece's
// STARTING square in pieceHomeMap to find which roster slot it belongs to,
// since the back-row figure for that file is consistent regardless of where
// the piece has moved.
//
// Only back-row pieces have figures assigned. Pawns don't have a card.

let lastHoveredPieceId = null;
window.addEventListener('mousemove', (event) => {
    // Skip if a roster name is currently being hovered (DOM hover wins)
    if (event.target && event.target.dataset && event.target.dataset.figureName) return;
    // Skip if the pointer is over the hover card itself
    if (hoverCard.contains(event.target)) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(pieceGroup.children, false);

    if (intersects.length > 0) {
        const piece = intersects[0].object;
        const currentSquare = piece.userData.id;
        const startSquare = pieceHomeMap[currentSquare];
        const figure = startSquare ? PIECE_FIGURE_MAP[startSquare] : null;

        if (!figure) {
            // Piece is a pawn or otherwise unmapped — no card
            if (lastHoveredPieceId) {
                cancelHoverCard();
                lastHoveredPieceId = null;
            }
            return;
        }

        if (lastHoveredPieceId !== currentSquare) {
            // New piece under cursor — restart timer
            lastHoveredPieceId = currentSquare;
            cancelHoverCard();
            // Build a virtual anchor rect at the mouse position
            const rect = {
                left: event.clientX,
                right: event.clientX + 4,
                top: event.clientY,
                bottom: event.clientY + 4,
                width: 4,
                height: 4
            };
            scheduleHoverCard(figure, null, rect);
        }
    } else {
        if (lastHoveredPieceId) {
            cancelHoverCard();
            lastHoveredPieceId = null;
        }
    }
});

// --- 10. INIT ---
renderPieces();
refreshHUD();

// ===================== INTRO SCENES =====================
// Five different cinematic opening "scenes" the user can replay via a
// button deck in the bottom-right corner. Scene 1 also plays automatically
// on first page load.
//
// Each scene returns:
//   - durationMs   how long the scene takes to complete
//   - camPath      array of THREE.Vector3 waypoints for the camera position
//   - tgtPath      array of THREE.Vector3 waypoints for the look-at target
//   - easing       optional easing function on the global t (default: easeInOutSine)
//
// Scenes interpolate using Catmull-Rom across their waypoints. A single
// waypoint = static pose; two = straight line; 3+ = smooth curve.
//
// Skippable: any pointer/key/wheel input cuts to the end.

// --- Shared landing pose ---
// All scenes end at the same final pose so the user lands in a consistent
// place no matter which opening they preview: behind the white pieces,
// looking down the board toward the black pieces.
const INTRO_FINAL_CAM = new THREE.Vector3(0, 4,  10);
const INTRO_FINAL_TGT = new THREE.Vector3(0, 0.5, -3);

// --- Easing functions ---
// (easeInOutCubic already defined earlier alongside the elevation toggle.)
function easeOutCubic(t)  { return 1 - Math.pow(1 - t, 3); }
function easeInOutSine(t) { return -(Math.cos(Math.PI * t) - 1) / 2; }
function easeInCubic(t)   { return t * t * t; }

// --- Catmull-Rom path sampler ---
// Smoothly interpolates across an array of Vector3. t ∈ [0, 1] spans the
// entire path. Phantom endpoints clamped at the ends.
function catmullRomPath(points, t, out) {
    const n = points.length;
    if (n === 0) { out.set(0, 0, 0); return out; }
    if (n === 1) { out.copy(points[0]); return out; }
    if (n === 2) { out.lerpVectors(points[0], points[1], t); return out; }
    const segCount = n - 1;
    const segT = t * segCount;
    const seg = Math.min(Math.floor(segT), segCount - 1);
    const localT = segT - seg;
    const p0 = points[Math.max(seg - 1, 0)];
    const p1 = points[seg];
    const p2 = points[seg + 1];
    const p3 = points[Math.min(seg + 2, n - 1)];
    const t2 = localT * localT;
    const t3 = t2 * localT;
    out.x = 0.5 * ((2*p1.x) + (-p0.x + p2.x)*localT + (2*p0.x - 5*p1.x + 4*p2.x - p3.x)*t2 + (-p0.x + 3*p1.x - 3*p2.x + p3.x)*t3);
    out.y = 0.5 * ((2*p1.y) + (-p0.y + p2.y)*localT + (2*p0.y - 5*p1.y + 4*p2.y - p3.y)*t2 + (-p0.y + 3*p1.y - 3*p2.y + p3.y)*t3);
    out.z = 0.5 * ((2*p1.z) + (-p0.z + p2.z)*localT + (2*p0.z - 5*p1.z + 4*p2.z - p3.z)*t2 + (-p0.z + 3*p1.z - 3*p2.z + p3.z)*t3);
    return out;
}

// ===== Scene 1: Three-act reveal =====
// Planet flyby → pyramid pass → settle behind white. Long, ~15s.
// Big sweeping motion that shows the scale of the scene.
function makeScene1() {
    return {
        durationMs: 15000,
        easing: easeInOutSine,
        camPath: [
            // Far out near the planet field
            new THREE.Vector3( 70, 35,  80),
            // Drift through the planets
            new THREE.Vector3( 30, 22,  70),
            // Past the planets, approaching the pyramid (white side, +Z)
            new THREE.Vector3( 10, 18,  60),
            // Skim past the white pyramid
            new THREE.Vector3( 25, 14,  45),
            // Swing around the front of the scene
            new THREE.Vector3( 18,  8,  20),
            // Final landing
            INTRO_FINAL_CAM.clone()
        ],
        tgtPath: [
            new THREE.Vector3( 35,  10, 25),  // looking at the planets initially
            new THREE.Vector3( 15,   8, 20),
            new THREE.Vector3(  0,  10, 50),  // toward the white pyramid
            new THREE.Vector3(  0,  10, 50),
            new THREE.Vector3(  0,   2,  0),
            INTRO_FINAL_TGT.clone()
        ]
    };
}

// ===== Scene 2 billboards =====
// Three lightweight "AMENTI.AI" billboards that float in deep space and
// the camera passes during Scene 2's approach. Built lazily on first
// Scene 2 trigger, kept around afterward (cheap) but hidden when no
// Scene 2 is playing.
//
// Each billboard is a Sprite (always faces camera) with a canvas texture.
// Spacing is chosen to spread them across the camera's inbound path:
//   billboard 1 ≈ 220 units out  (closest to far start)
//   billboard 2 ≈ 130 units out
//   billboard 3 ≈ 55 units out   (closest to final landing)
// X offsets alternate left/right so the camera "weaves" slightly past
// each as it approaches.
let _amentiBillboards = null;   // array of 3 Sprites once built
function buildAmentiBillboardTexture() {
    const W = 1024;
    const H = 256;
    const c = document.createElement('canvas');
    c.width = W;
    c.height = H;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, W, H);
    // Centered "AMENTI.AI" — "AMENTI" big and white, ".AI" smaller and
    // emerald-green to match the existing marquee's colour palette.
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    const AMENTI_FONT = 130;
    const AI_FONT = 70;
    ctx.font = `bold ${AMENTI_FONT}px system-ui, sans-serif`;
    // Soft glow behind the letters so it reads against any backdrop.
    ctx.shadowColor = 'rgba(0,0,0,0.85)';
    ctx.shadowBlur = 18;
    // Measure to center the AMENTI.AI composite block
    const amentiText = 'AMENTI';
    const aiText = '.AI';
    const amentiWidth = ctx.measureText(amentiText).width;
    ctx.font = `bold ${AI_FONT}px system-ui, sans-serif`;
    const aiWidth = ctx.measureText(aiText).width;
    const totalWidth = amentiWidth + 8 + aiWidth;
    const startX = (W - totalWidth) / 2;
    // Draw AMENTI
    ctx.font = `bold ${AMENTI_FONT}px system-ui, sans-serif`;
    ctx.fillStyle = '#ffffff';
    ctx.fillText(amentiText, startX, H / 2);
    // Draw .AI (smaller, baseline aligned with AMENTI's bottom)
    ctx.font = `bold ${AI_FONT}px system-ui, sans-serif`;
    ctx.fillStyle = '#50c878';
    const aiY = H / 2 + (AMENTI_FONT - AI_FONT) / 2 - 6;
    ctx.fillText(aiText, startX + amentiWidth + 8, aiY);
    const tex = new THREE.CanvasTexture(c);
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    return tex;
}

function ensureAmentiBillboards() {
    if (_amentiBillboards) return _amentiBillboards;
    const tex = buildAmentiBillboardTexture();
    _amentiBillboards = [];
    // Positions (Z, X offset, Y offset). Z values fit between the camera's
    // start (z ≈ 290) and final landing (z = 10).
    const positions = [
        { x: -28, y: 6,  z: 220 },
        { x:  22, y: 10, z: 135 },
        { x: -16, y: 5,  z:  55 }
    ];
    for (const p of positions) {
        const mat = new THREE.SpriteMaterial({
            map: tex,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
            opacity: 0
        });
        const sprite = new THREE.Sprite(mat);
        // Sprite scale = world dimensions. Wide aspect so the text is readable.
        // Larger size makes them feel like roadside billboards.
        sprite.scale.set(34, 8.5, 1);
        sprite.position.set(p.x, p.y, p.z);
        sprite.visible = false;     // hidden until Scene 2 fades them in
        sprite.userData.amentiBillboard = true;
        scene.add(sprite);
        _amentiBillboards.push(sprite);
    }
    return _amentiBillboards;
}

function showAmentiBillboards() {
    const bb = ensureAmentiBillboards();
    for (const b of bb) {
        b.visible = true;
        b.material.opacity = 1;
    }
}

function hideAmentiBillboards() {
    if (!_amentiBillboards) return;
    for (const b of _amentiBillboards) {
        b.visible = false;
    }
}

// ===== Scene 2: Mysterious slow push past AMENTI.AI billboards =====
// Camera starts far back along the same line as the final landing pose
// (so the approach is level, not a dive). Path weaves slightly left/
// right to pass three floating "AMENTI.AI" billboards en route. ~12s.
function makeScene2() {
    // Far-back start. We deliberately set Y by hand (10) rather than
    // extrapolating along the target→camera direction; the previous
    // formula produced y ≈ 85 (camera way overhead), which made the
    // first leg a steep nosedive. A level start at y=10 matches the
    // billboard altitudes (5..10) so the camera glides through them
    // instead of diving past.
    const FAR_Z = 280;
    const veryFar = new THREE.Vector3(0, 10, FAR_Z);
    // Waypoints that weave slightly left/right to pass each billboard.
    // Billboard X positions: -28, +22, -16 (see ensureAmentiBillboards).
    // The camera offsets toward the OPPOSITE side of each billboard
    // so it visibly passes the sign rather than colliding with it.
    return {
        durationMs: 12000,
        easing: easeInCubic,    // slow start, fast end — building approach
        camPath: [
            veryFar,
            // Near billboard 1 (at x=-28, z=220): camera slightly to its right
            new THREE.Vector3(  6, 9, 230),
            // Near billboard 2 (at x=+22, z=135): camera slightly to its left
            new THREE.Vector3( -8, 8, 145),
            // Near billboard 3 (at x=-16, z=55): camera slightly to its right
            new THREE.Vector3(  4, 6,  65),
            INTRO_FINAL_CAM.clone()
        ],
        tgtPath: [
            // Always looking toward the board
            INTRO_FINAL_TGT.clone(),
            INTRO_FINAL_TGT.clone(),
            INTRO_FINAL_TGT.clone(),
            INTRO_FINAL_TGT.clone(),
            INTRO_FINAL_TGT.clone()
        ],
        // Scene-specific lifecycle hooks: show billboards while Scene 2 is
        // running, hide them when it ends or is skipped.
        onStart: showAmentiBillboards,
        onEnd:   hideAmentiBillboards
    };
}

// ===== Scene 3: Establishing wide =====
// Slow full orbit around the whole scene showing all elements, then settle. ~12s.
function makeScene3() {
    // 360° orbit around the board center, then settle behind white.
    // Camera height ~12, radius ~30, target = board center throughout
    // (which keeps the board centered in frame the whole time).
    const radius = 32;
    const height = 14;
    const points = [];
    // Trace the orbit in 8 steps starting BEHIND the camera's eventual
    // landing direction (+Z), going clockwise (around to -X, -Z, +X, back to +Z).
    for (let i = 0; i <= 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        points.push(new THREE.Vector3(
            Math.sin(angle) * radius,
            height,
            Math.cos(angle) * radius
        ));
    }
    // Final landing inserted as the last waypoint, blending out of the orbit.
    points.push(INTRO_FINAL_CAM.clone());
    // Look-at: hold on board center for the whole orbit, then drop to
    // the final target as we settle.
    const tgts = [];
    for (let i = 0; i <= 8; i++) tgts.push(new THREE.Vector3(0, 1, 0));
    tgts.push(INTRO_FINAL_TGT.clone());
    return {
        durationMs: 12000,
        easing: easeInOutSine,
        camPath: points,
        tgtPath: tgts
    };
}

// ===== Scene 4: Heroic descent =====
// Start above the pyramid apex, descend along its face, sweep across to the board. ~10s.
// Uses the WHITE pyramid (at +Z = 50) since the landing pose is on white's side.
function makeScene4() {
    return {
        durationMs: 10000,
        easing: easeInOutCubic,
        camPath: [
            // Hovering directly above the white pyramid apex (apex at y=20)
            new THREE.Vector3(  0, 45, 50),
            // Descending in front of the pyramid face
            new THREE.Vector3(  0, 25, 38),
            // Continuing down and pulling toward the board
            new THREE.Vector3(  0, 14, 25),
            // Landing approach
            new THREE.Vector3(  0,  8, 16),
            INTRO_FINAL_CAM.clone()
        ],
        tgtPath: [
            new THREE.Vector3(  0, 20, 50),  // looking at the pyramid apex
            new THREE.Vector3(  0, 10, 50),  // mid-pyramid
            new THREE.Vector3(  0,  2,  5),  // looking ahead to the board
            new THREE.Vector3(  0,  1, -1),
            INTRO_FINAL_TGT.clone()
        ]
    };
}

// ===== Scene 5: Dolly past a planet =====
// Begin with a planet filling the foreground, camera moves past it to
// reveal the board behind. ~9s.
// We pick a position close to one of the planet orbits (Saturn at radius
// 55) and dolly past it toward the board center.
function makeScene5() {
    // Saturn sits at orbit-radius 55 in the YZ plane (due to the orbit
    // tilt). It's animated so its precise spot moves; we just position
    // the camera near a "plausible planet spot" close to the orbit
    // sphere and dolly inward toward the board.
    return {
        durationMs: 9000,
        easing: easeOutCubic,
        camPath: [
            // Right next to a planet, planet should fill the frame's edge.
            new THREE.Vector3( 18,  8,  55),
            // Dolly inward, past the planet
            new THREE.Vector3( 14,  6,  35),
            // Continue toward the board
            new THREE.Vector3(  8,  5,  20),
            INTRO_FINAL_CAM.clone()
        ],
        tgtPath: [
            // Initially looking past the planet at the board
            new THREE.Vector3(  0,  2,   0),
            new THREE.Vector3(  0,  2,   0),
            new THREE.Vector3(  0,  1,  -2),
            INTRO_FINAL_TGT.clone()
        ]
    };
}

const INTRO_SCENES = {
    1: makeScene1,
    2: makeScene2,
    3: makeScene3,
    4: makeScene4,
    5: makeScene5
};

// --- Intro state ---
let introActive = false;
let introStartMs = 0;
let introSkipped = false;
let activeScene = null;

// Jump the camera to a "neutral" start pose immediately so the user
// doesn't see the old (0, 10, 12) default before the intro fires. We
// pick the start of scene 2 since that's the auto-play scene.
const _autoplayScene = makeScene2();
camera.position.copy(_autoplayScene.camPath[0]);
controls.target.copy(_autoplayScene.tgtPath[0]);

function startIntroScene(sceneNumber) {
    const factory = INTRO_SCENES[sceneNumber];
    if (!factory) return;
    // End any currently-running scene cleanly (firing its onEnd hook)
    // before starting the new one. This avoids leaking visual state
    // when the user clicks deck buttons mid-scene.
    if (introActive) endIntro();
    activeScene = factory();
    introActive = true;
    introStartMs = 0;
    introSkipped = false;
    controls.enableRotate = false;
    controls.enablePan = false;
    controls.enableZoom = false;
    // Snap to scene's starting pose
    camera.position.copy(activeScene.camPath[0]);
    controls.target.copy(activeScene.tgtPath[0]);
    // Scene-specific setup (e.g. show billboards).
    if (activeScene.onStart) activeScene.onStart();
}

function endIntro() {
    if (!introActive) return;
    // Scene-specific teardown (e.g. hide billboards).
    if (activeScene && activeScene.onEnd) activeScene.onEnd();
    introActive = false;
    // Land at the ABOVE elevation preset — the game loads with the green
    // ▲ button selected, and the camera should sit at exactly that pose
    // so the user sees the scene from the default Above angle.
    const above = (typeof ELEVATION_PRESETS !== 'undefined') ? ELEVATION_PRESETS.above : null;
    if (above) {
        camera.position.copy(above.position);
        controls.target.copy(above.target);
        controls.minPolarAngle = above.minPolar;
        controls.maxPolarAngle = above.maxPolar;
    } else {
        camera.position.copy(INTRO_FINAL_CAM);
        controls.target.copy(INTRO_FINAL_TGT);
    }
    controls.enableRotate = true;
    controls.enablePan = true;
    controls.enableZoom = true;
    if (typeof ELEVATION_PRESETS !== 'undefined') {
        // Keep the legacy 'current' preset valid in case anything references it.
        ELEVATION_PRESETS.current.position.copy(camera.position);
        ELEVATION_PRESETS.current.target.copy(controls.target);
    }
    markActivity();
}

function updateIntro(now) {
    if (!introActive || !activeScene) return false;
    if (introStartMs === 0) introStartMs = now;
    const rawT = (now - introStartMs) / activeScene.durationMs;
    if (rawT >= 1 || introSkipped) {
        endIntro();
        return false;
    }
    const easeFn = activeScene.easing || easeInOutSine;
    const eased = easeFn(rawT);
    catmullRomPath(activeScene.camPath, eased, camera.position);
    catmullRomPath(activeScene.tgtPath, eased, controls.target);
    return true;
}

function skipIntroOnce() {
    if (!introActive) return;
    introSkipped = true;
}
// Skip on first user interaction. We re-add these listeners every time a
// new scene starts so replays from the deck remain skippable.
function attachIntroSkipListeners() {
    window.addEventListener('pointerdown', skipIntroOnce, { once: true, capture: true });
    window.addEventListener('keydown',     skipIntroOnce, { once: true, capture: true });
    window.addEventListener('wheel',       skipIntroOnce, { once: true, capture: true, passive: true });
}
attachIntroSkipListeners();

// --- Intro deck UI ---
// 3 buttons inside the bottom-left Menu panel. Click to replay the
// corresponding opening scene. Scene 1 also plays automatically on page
// load.
const introDeck = document.createElement('div');
introDeck.style.cssText = 'display: flex; gap: 4px; align-items: center; margin-top: 6px;';
const introLabel = document.createElement('span');
introLabel.textContent = 'Intro:';
introLabel.style.cssText = 'font-size: 12px; margin-right: 4px;';
introDeck.appendChild(introLabel);
for (let i = 1; i <= 3; i++) {

// --- Day/Night toggle (V2, V5, V10) ---
// A small two-segment toggle that appears in the bottom-left VIEW panel
// (not the Menu panel) when one of the day/night-capable views is
// active. Other views: the row is hidden.
const dayNightRow = document.createElement('div');
dayNightRow.style.cssText = 'display: none; align-items: center; gap: 4px; margin-top: 6px;';
const dayNightLabel = document.createElement('span');
dayNightLabel.textContent = 'Sky:';
dayNightLabel.style.cssText = 'font-size: 12px; margin-right: 4px;';
dayNightRow.appendChild(dayNightLabel);
const dayNightToggle = document.createElement('div');
dayNightToggle.className = 'hud-toggle';

dayBtn.textContent = 'Day';
dayBtn.className = 'hud-btn';

nightBtn.textContent = 'Night';
nightBtn.className = 'hud-btn';
dayNightToggle.appendChild(dayBtn);
dayNightToggle.appendChild(nightBtn);
dayNightRow.appendChild(dayNightToggle);
viewMenuBody.appendChild(dayNightRow);

function updateDayNightToggle() {
    // Show whichever mode is active for the current view. V5 and V10
    // share a single state (cathedralDayNight === colosseumDayNight in
    // sync); V2 maintains its own independent v2DayNight state; V11

    let mode;

}
function _setDayNight(mode) {

    // synced behavior.

// Show/hide the Day/Night row — visible in V2, V5, V10, and V11
function refreshDayNightRowVisibility() {

    dayNightRow.style.display = (v === 2 || v === 5 || v === 10 || v === 11) ? 'flex' : 'none';
}
// Wrap setView so the row visibility updates on every view change.
const _origSetView_dayNight = setView;
setView = function(id) {

    _origSetView_dayNight(id);

    // Anchor toggle is V11-only; refresh visibility and turn it off when
