    // Black temple: half scale + shifted to the left (-X), aligning
    // with the black roster panel on the left side of the screen.
    const blackMountainTemple = buildMountainTemple(-110, TEMPLE_Y, -TEMPLE_DIST, false, -1, 0.5);

    return [
        skyDome,
        ground,
        stage,
        ...mountainMeshes,
        whitePyramid,
        blackPyramid,
        whiteAFace,
        blackAFace,
        ...whiteVeins,
        ...blackVeins,
        ...concertProps,
        ...v3ConstellationMeshes,
        mountainAltar,
        whiteMountainTemple,
        blackMountainTemple
    ];
}

// Sample a quadratic Bezier curve at parameter t in [0, 1].
// Used by the flying-name flight paths (and could be reused for other
// smooth curves in the scene). Writes into the provided out Vector3 to
// avoid allocations every frame.
function quadraticBezier(p0, p1, p2, t, out) {
    const u = 1 - t;
    out.x = u * u * p0.x + 2 * u * t * p1.x + t * t * p2.x;
    out.y = u * u * p0.y + 2 * u * t * p1.y + t * t * p2.y;
    out.z = u * u * p0.z + 2 * u * t * p1.z + t * t * p2.z;
    return out;
}

// Build the "concert" stage atmosphere: sweeping light beams from each
// capstone, volumetric haze, drifting sparkles, and stage color washes.
// Returns an array of Object3Ds to add to the scene.
function buildConcertAtmosphere() {
    const out = [];
    const PYR_DISTANCE = 150;      // matches buildPyramidProps PYR_DISTANCE
    const PYR_HEIGHT = 20;

    // --- 1. Light beams emanating from each capstone ---
    // Six beams per pyramid, fanning out at different angles. Each beam is a
    // long thin cone (cylinder) with a soft additive glow material — the
    // result is a "godrays from the apex" look.
    function makeBeams(originX, originZ, baseColor) {
        const beams = [];
        const BEAM_COUNT = 6;
        const BEAM_LENGTH = 60;
        const BEAM_TOP_R = 0.05;
        const BEAM_BOT_R = 2.5;
        // Two-tone material for variety: alternate between warm and cool
        const matWarm = new THREE.MeshBasicMaterial({
            color: 0xffd070,
            transparent: true,
            opacity: 0.18,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
            side: THREE.DoubleSide
        });
        const matCool = new THREE.MeshBasicMaterial({
            color: 0x88c0ff,
            transparent: true,
            opacity: 0.14,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
            side: THREE.DoubleSide
        });
        for (let i = 0; i < BEAM_COUNT; i++) {
            // Cone has its apex at top by default (height/2 +Y), base at -height/2 +Y.
            // We want apex AT the capstone position and base UP-AND-OUT.
            // Use a cylinder so we can control top vs bottom radii independently.
            const geo = new THREE.CylinderGeometry(BEAM_TOP_R, BEAM_BOT_R, BEAM_LENGTH, 12, 1, true);
            const mat = i % 2 === 0 ? matWarm : matCool;
            const beam = new THREE.Mesh(geo, mat);
            // Move geometry so the narrow top sits at the LOCAL origin.
            beam.geometry.translate(0, BEAM_LENGTH / 2, 0);
            // Position apex at the pyramid capstone
            beam.position.set(originX, PYR_HEIGHT, originZ);
            // Initial random orientation; will be animated each frame
            beam.userData.lightBeam = true;
            beam.userData.beamIndex = i;
            beam.userData.beamPhase = Math.random() * Math.PI * 2;
            beam.userData.originY = PYR_HEIGHT;
            beam.userData.totalBeams = BEAM_COUNT;
            beams.push(beam);
        }
        return beams;
    }
    const whiteBeams = makeBeams(0, PYR_DISTANCE, 0xffd070);
    const blackBeams = makeBeams(0, -PYR_DISTANCE, 0xffd070);
    // Beams stay with their pyramids — locked to `world` so they follow
    // auto-rotation.
    for (const b of whiteBeams) b.userData.attachToWorld = true;
    for (const b of blackBeams) b.userData.attachToWorld = true;
    out.push(...whiteBeams);
    out.push(...blackBeams);

    // --- 2. Volumetric haze ---
    // A large field of tiny particles in the air between the camera and the
    // pyramids. With additive blending and a soft color, they catch light and
    // give the scene that "smoky club" depth. Particles drift slowly to add
    // motion. 2000 is enough to read as a fog without tanking framerate.
    const HAZE_COUNT = 2000;
    const HAZE_BOX = 80;        // half-extent in X and Z (scene-wide spread)
    const HAZE_HEIGHT = 40;     // vertical extent
    const hazePositions = new Float32Array(HAZE_COUNT * 3);
    const hazeVelocities = new Float32Array(HAZE_COUNT * 3);
    for (let i = 0; i < HAZE_COUNT; i++) {
        hazePositions[i * 3]     = (Math.random() - 0.5) * HAZE_BOX * 2;
        hazePositions[i * 3 + 1] = Math.random() * HAZE_HEIGHT - 2;
        hazePositions[i * 3 + 2] = (Math.random() - 0.5) * HAZE_BOX * 2;
        // Gentle wandering velocities
        hazeVelocities[i * 3]     = (Math.random() - 0.5) * 0.003;
        hazeVelocities[i * 3 + 1] = (Math.random() - 0.5) * 0.002;
        hazeVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.003;
    }
    const hazeGeo = new THREE.BufferGeometry();
    hazeGeo.setAttribute('position', new THREE.BufferAttribute(hazePositions, 3));
    const hazeMat = new THREE.PointsMaterial({
        color: 0xc0a880,
        size: 0.35,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.20,
        depthWrite: false,
        blending: THREE.AdditiveBlending
    });
    const haze = new THREE.Points(hazeGeo, hazeMat);
    haze.userData.hazeParticles = true;
    haze.userData.velocities = hazeVelocities;
    haze.userData.boundsBox = HAZE_BOX;
    haze.userData.boundsY = HAZE_HEIGHT;
    out.push(haze);

    // --- 3. Flying names ---
    // 10 historical names flying through the scene along smooth curved
    // paths. Each name lives for 30 seconds — a slow, calm traversal
    // (originally 10s; user found it too fast and distracting). The fleet
    // is split into two flight-direction groups so the motion has variety:
    //
    //   7 sprites   leftToRight  — drift gently from off-screen left to
    //                              off-screen right. The dominant motion.
    //   3 sprites   rightToLeft  — drift COUNTER to the rest, right to
    //                              left. A minority counter-current.
    //
    // Each sprite KEEPS its direction for the life of the page; recycling
    // pulls a new path of the same type so the ratio stays exact.
    //
    // The paths are constrained to a "comfort zone" that keeps every name
    // a comfortable distance from the camera — never closer than
    // NAME_SAFE_Z (well behind the board, away from the default camera
    // position at z=12).
    //
    // Birth offsets are randomized so all 10 don't enter/exit in sync.
    // Opacity fades in over the first ~1.5s and out over the last ~1.5s
    // so names enter and exit smoothly instead of popping.
    const NAME_COUNT = 0;              // Disabled — names no longer fly across V3 sky
    const NAME_COUNTER_COUNT = 0;
    const NAME_LIFE_MS = 30000;        // 30 seconds per name (slower than before)
    const NAME_FADE_IN_MS = 1500;
    const NAME_FADE_OUT_MS = 1500;
    // Comfort zone: names live in Z values FROM NAME_SAFE_Z (closest allowed
    // to the camera) GOING NEGATIVE. So all path points have z ≤ NAME_SAFE_Z.
    // Camera default sits at z=12 looking at origin, so NAME_SAFE_Z = -2 keeps
    // names at least 14 units away from the camera at their closest approach.
    const NAME_SAFE_Z = -2;
    const NAME_FAR_Z  = -45;
    const NAME_X_RANGE = 40;
    const NAME_Y_RANGE = [2, 24];

    // Build texture for one name. Returns a SpriteMaterial.
    function makeNameSpriteMaterial(text) {
        const c = document.createElement('canvas');
        c.width = 1024;
        c.height = 128;
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.font = 'bold 72px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // Subtle shadow so the name reads against bright haze backgrounds.
        ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
        ctx.shadowBlur = 6;
        ctx.fillStyle = '#fff0c0';
        ctx.fillText(text, c.width / 2, c.height / 2);
        const tex = new THREE.CanvasTexture(c);
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        const mat = new THREE.SpriteMaterial({
            map: tex,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
            opacity: 0
        });
        // Attach the canvas so we can repaint with a fresh name when
        // this sprite recycles into its next life.
        mat.userData.canvas = c;
        mat.userData.ctx = ctx;
        return mat;
    }

    // Repaint an existing sprite's texture with a new name. Avoids the
    // cost of creating fresh canvases / textures on every recycle.
    function paintNameOntoSprite(sprite, text) {
        const ctx = sprite.material.userData.ctx;
        const canvas = sprite.material.userData.canvas;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.font = 'bold 72px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
        ctx.shadowBlur = 6;
        ctx.fillStyle = '#fff0c0';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        sprite.material.map.needsUpdate = true;
    }

    // Pull names from the CSV pool. If empty (CSV failed to load), use the
    // placeholder fallback which AppNames always has on hand.
    const namePool = window.AppNames.getAllFigures();
    function pickRandomName() {
        if (namePool.length === 0) return 'Anonymous';
        return namePool[Math.floor(Math.random() * namePool.length)].fullName;
    }

    // Build a left-to-right flight path. Entry off-screen left, exit
    // off-screen right, with a gentle Y-arc and slight depth variation.
    function makeLeftToRightPath() {
        const halfX = NAME_X_RANGE / 2;
        const [yLo, yHi] = NAME_Y_RANGE;
        const p0x = -halfX - 4;                       // start a bit further left so fade-in is offscreen
        const p2x =  halfX + 4;                       // exit slightly further right too
        const p0y = yLo + Math.random() * (yHi - yLo);
        const p2y = yLo + Math.random() * (yHi - yLo);
        // Mid point gives the path a soft arc — Y offset of up to ±3 from
        // the midpoint between p0 and p2 means the curve gently dips or
        // rises in the middle, not a perfect straight line.
        const midX = 0 + (Math.random() - 0.5) * 6;
        const midY = (p0y + p2y) / 2 + (Math.random() - 0.5) * 6;
        const midZ = NAME_FAR_Z + Math.random() * (NAME_SAFE_Z - NAME_FAR_Z) * 0.5;
        return {
            p0: new THREE.Vector3(p0x, p0y, NAME_SAFE_Z),
            p1: new THREE.Vector3(midX, midY, midZ),
            p2: new THREE.Vector3(p2x, p2y, NAME_SAFE_Z)
        };
    }

    // Build a right-to-left flight path. Mirror of leftToRight — entry
    // off-screen right, exit off-screen left. Used by the small minority
    // of sprites that move COUNTER to the dominant left-to-right flow.
    function makeRightToLeftPath() {
        const halfX = NAME_X_RANGE / 2;
        const [yLo, yHi] = NAME_Y_RANGE;
        const p0x =  halfX + 4;
        const p2x = -halfX - 4;
        const p0y = yLo + Math.random() * (yHi - yLo);
        const p2y = yLo + Math.random() * (yHi - yLo);
        const midX = 0 + (Math.random() - 0.5) * 6;
        const midY = (p0y + p2y) / 2 + (Math.random() - 0.5) * 6;
        const midZ = NAME_FAR_Z + Math.random() * (NAME_SAFE_Z - NAME_FAR_Z) * 0.5;
        return {
            p0: new THREE.Vector3(p0x, p0y, NAME_SAFE_Z),
            p1: new THREE.Vector3(midX, midY, midZ),
            p2: new THREE.Vector3(p2x, p2y, NAME_SAFE_Z)
        };
    }

    // Sprite "world width" = how wide the rendered name is in scene units.
    // Three.js sprites scale on-screen automatically with distance from the
    // camera (perspective projection), so closer ones appear larger and
    // farther ones smaller — and since our paths stay in the comfort zone,
    // the size variance is gentle rather than face-filling.
    const NAME_BASE_WIDTH = 6;
    const NAME_BASE_HEIGHT = 0.75;

    // Determine which indices get the counter-current type. Simple split: first
    // N indices are rightToLeft, remaining are leftToRight.
    for (let i = 0; i < NAME_COUNT; i++) {
        const pathType = i < NAME_COUNTER_COUNT ? 'rightToLeft' : 'leftToRight';
        const pathFactory = pathType === 'rightToLeft' ? makeRightToLeftPath : makeLeftToRightPath;

        const mat = makeNameSpriteMaterial(pickRandomName());
        const sprite = new THREE.Sprite(mat);
        sprite.scale.set(NAME_BASE_WIDTH, NAME_BASE_HEIGHT, 1);

        // Random birth offset so all 10 names don't enter / exit in sync.
        const birthOffset = Math.random() * NAME_LIFE_MS;
        sprite.userData.fallingName = true;
        sprite.userData.pathType = pathType;
        sprite.userData.path = pathFactory();
        sprite.userData.birthMs = performance.now() - birthOffset;

        // Set initial position at the right point along its path.
        const tmp = new THREE.Vector3();
        quadraticBezier(sprite.userData.path.p0, sprite.userData.path.p1, sprite.userData.path.p2,
            birthOffset / NAME_LIFE_MS, tmp);
        sprite.position.copy(tmp);

        // Closures stored on the sprite so the updater can call recycle
        // functions even though they're defined in this builder's scope.
        sprite.userData.recyclePath = pathFactory;
        sprite.userData.recycleName = pickRandomName;
        sprite.userData.repaint = paintNameOntoSprite;
        out.push(sprite);
    }

    // --- 4. Stage color washes ---
    // Three colored point lights positioned around the scene at moderate
    // distance, each pulsing on its own rhythm. These provide subtle
    // chromatic accents that wash across the pyramids and board as they
    // pulse — the "RGB wash" you see at live shows.
    //
    // Light 1: warm magenta on the east side
    // Light 2: cool cyan on the west side
    // Light 3: amber from above behind the board
    const washes = [
        { color: 0xff3088, x:  30, y:  8, z: 0,   pulsePeriod: 2400, pulsePhase: 0 },
        { color: 0x30c0ff, x: -30, y:  8, z: 0,   pulsePeriod: 2800, pulsePhase: Math.PI },
        { color: 0xffa040, x:   0, y: 25, z: 30,  pulsePeriod: 3600, pulsePhase: Math.PI * 0.5 }
    ];
    for (const w of washes) {
        const light = new THREE.PointLight(w.color, 0, 80, 1.5);
        light.position.set(w.x, w.y, w.z);
        light.userData.stageWash = true;
        light.userData.pulsePeriod = w.pulsePeriod;
        light.userData.pulsePhase = w.pulsePhase;
        light.userData.baseIntensity = 1.2;
        out.push(light);
    }

    return out;
}

function buildStarfieldProps() {
    // V4: original starfield + the FLAT sprite-disc planet (Sprite-based,
    // doesn't read as 3D mass). Kept around for A/B comparison with the
    // new sphere-based variants in V6-V9.
    const out = [makeStarfieldGroup()];

    // Original flat sprite planet
    const PLANET_TEX_SIZE = 1024;
    const pc = document.createElement('canvas');
    pc.width = PLANET_TEX_SIZE;
    pc.height = PLANET_TEX_SIZE;
    const pctx = pc.getContext('2d');
    const cx = PLANET_TEX_SIZE / 2;
    const cy = PLANET_TEX_SIZE / 2;
    const DISK_RADIUS = PLANET_TEX_SIZE * 0.46;
    pctx.fillStyle = 'rgba(8, 8, 16, 1.0)';
    pctx.beginPath();
    pctx.arc(cx, cy, DISK_RADIUS, 0, Math.PI * 2);
    pctx.fill();
    const RIM_INNER = DISK_RADIUS * 0.93;
    const RIM_OUTER = DISK_RADIUS * 1.07;
    const rimGrad = pctx.createRadialGradient(cx, cy, RIM_INNER, cx, cy, RIM_OUTER);
    rimGrad.addColorStop(0.0, 'rgba(8, 8, 16, 0)');
    rimGrad.addColorStop(0.45, 'rgba(120, 140, 200, 0.55)');
    rimGrad.addColorStop(1.0, 'rgba(20, 30, 60, 0)');
    pctx.fillStyle = rimGrad;
    pctx.fillRect(0, 0, PLANET_TEX_SIZE, PLANET_TEX_SIZE);
    const planetTex = new THREE.CanvasTexture(pc);
    planetTex.minFilter = THREE.LinearFilter;
    planetTex.magFilter = THREE.LinearFilter;
    const planetMat = new THREE.SpriteMaterial({
        map: planetTex,
        transparent: true,
        depthWrite: false
    });
    const planet = new THREE.Sprite(planetMat);
    planet.scale.set(90, 90, 1);
    planet.position.set(0, 8, -90);
    planet.renderOrder = -1;
    out.push(planet);
    return out;
}

// ===== PLANET VIEW VARIANTS (V6 — V9) =====
// Four different believable-planet treatments, each presented as a
// distinct view so you can A/B them. All share the same starfield
// backdrop (built via buildStarfieldProps) so the planet is the only
// variable. Common parameters:
//   - Planet radius:       28 world units (big enough to dominate the sky)
//   - Planet center:       (0, 4, -90)  (off behind the scene)
//   - Camera-facing logic: real spheres rotate slowly so any surface
//                          texture or terminator drifts naturally
//
// The lighting story across all four: imagine a star OFF TO ONE SIDE
// of the camera (let's say upper-left), so the planet's left limb is
// faintly lit and the rest is in shadow. This is achieved with a single
// DirectionalLight in the planet group; the sphere uses MeshStandard
// so it shades correctly.

const PLANET_RADIUS = 28;
const PLANET_CENTER = new THREE.Vector3(0, 4, -90);

// Build the starfield as a separate helper since all four variants need it.
function makeStarfieldGroup() {
    const STAR_COUNT = 1200;
    const STAR_RADIUS = 120;
    const positions = new Float32Array(STAR_COUNT * 3);
    for (let i = 0; i < STAR_COUNT; i++) {
        const phi = Math.acos(2 * Math.random() - 1);
        const theta = Math.random() * Math.PI * 2;
        positions[i * 3]     = STAR_RADIUS * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = STAR_RADIUS * Math.cos(phi);
        positions[i * 3 + 2] = STAR_RADIUS * Math.sin(phi) * Math.sin(theta);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.5,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.85
    });
    return new THREE.Points(geo, mat);
}

// Build the directional light that simulates the sun lighting the planet
// from off-camera. Same direction across all variants for consistency.
function makePlanetSun() {
    const sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
    // Light coming from upper-left of the camera's view of the planet.
    // Position relative to PLANET_CENTER.
    sun.position.copy(PLANET_CENTER).add(new THREE.Vector3(-80, 40, 60));
    sun.target.position.copy(PLANET_CENTER);
    return sun;
}

// ---- V6: Dark silhouette sphere with a thin lit limb (Option 1) ----
// A real 3D dark sphere lit by a single directional light. The "lit limb"
// is automatically the dark side away from the sun (the part nearest the
// terminator). Reads as a real planetary body silhouetted by being on
// its night side, with just a sliver of light catching the rim.
function buildPlanetV6Props() {
    const out = [];
    out.push(makeStarfieldGroup());
    const sun = makePlanetSun();
    out.push(sun);
    out.push(sun.target);

    // Helper: build a Saturn-like ring system around a planet center.
    // Returns a Mesh of a flat ring (RingGeometry) angled slightly off
    // axis so it reads as a 3D ring rather than a flat line edge-on.
    //
    // ringMaterialOpts is passed to MeshStandardMaterial — caller chooses
    // color/roughness/metalness/etc. We tilt the ring by ~22° around X
    // (an Earth-ish axial tilt) so it presents an elliptical profile
    // from typical viewing angles.
    function makePlanetRing(centerVec3, innerR, outerR, ringMaterialOpts, tiltRad) {
        const segs = 96;
        const ringGeo = new THREE.RingGeometry(innerR, outerR, segs, 1);
        const ringMat = new THREE.MeshStandardMaterial({
            side: THREE.DoubleSide,
            transparent: true,
            ...ringMaterialOpts
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.copy(centerVec3);
        // RingGeometry lies in the XY plane (normal is +Z). Rotate so the
        // ring's normal points roughly toward world +Y (i.e. the ring is
        // horizontal), then add the tilt.
        ring.rotation.x = -Math.PI / 2 + tiltRad;
        return ring;
    }

    // ---------- Dark planet (behind the scene at -Z) ----------
    // Pushed further back (z = -200) so the two planets in V6 read as
    // genuinely distant from each other. PLANET_CENTER is shared across
    // V7-V9 (which use a single planet), so we override it locally here.
    const DARK_CENTER = new THREE.Vector3(0, 4, -200);
    const darkGeo = new THREE.SphereGeometry(PLANET_RADIUS, 64, 48);
    const darkMat = new THREE.MeshStandardMaterial({
        color: 0x1a1a26,
        roughness: 1.0,
        metalness: 0.0
    });
    const darkPlanet = new THREE.Mesh(darkGeo, darkMat);
    darkPlanet.position.copy(DARK_CENTER);
    darkPlanet.userData.slowSpin = true;
    out.push(darkPlanet);

    // Light rings around the dark planet (high contrast against the dim body).
    // Pale dust/ice color. Matte so they read as particulate, not metal.
    // Thin bands (50% of previous width) and steeper tilt (30% more) so
    // the rings present a more pronounced elliptical profile.
    out.push(makePlanetRing(
        DARK_CENTER,
        PLANET_RADIUS * 1.30,    // inner edge of inner ring
        PLANET_RADIUS * 1.425,   // outer edge — band width halved
        { color: 0xe8e4d0, roughness: 0.85, metalness: 0.0, opacity: 0.85 },
        0.494                      // ~28° tilt (was 22°)
    ));
    out.push(makePlanetRing(
        DARK_CENTER,
        PLANET_RADIUS * 1.70,
        PLANET_RADIUS * 1.90,    // band width halved
        { color: 0xf5f0dc, roughness: 0.9, metalness: 0.0, opacity: 0.75 },
        0.494
    ));

    // ---------- White rising planet (opposite side, +Z, low) ----------
    // Mirror of the dark planet, pushed equally far in the opposite
    // direction. The two planets now bracket the scene at z = ±200 ish,
    // so they read as distinctly distant from one another.
    const RISING_CENTER = new THREE.Vector3(0, -8, 200);
    const whiteGeo = new THREE.SphereGeometry(PLANET_RADIUS, 64, 48);
    const whiteMat = new THREE.MeshStandardMaterial({
        color: 0xeaeaef,
        roughness: 0.95,
        metalness: 0.0
    });
    const whitePlanet = new THREE.Mesh(whiteGeo, whiteMat);
    whitePlanet.position.copy(RISING_CENTER);
    whitePlanet.userData.slowSpin = true;
    out.push(whitePlanet);

    // Dark reflective rings around the white planet.
    // Low roughness + high metalness gives a polished obsidian look —
    // the rings reflect the environment subtly and catch the sun glint.
    // Thinned 50% and tilted 30% more for a more dramatic ellipse.
    out.push(makePlanetRing(
        RISING_CENTER,
        PLANET_RADIUS * 1.30,
        PLANET_RADIUS * 1.425,
        { color: 0x0a0a12, roughness: 0.15, metalness: 0.95, opacity: 0.95 },
        -0.416                     // ~24° tilt (was 18°), mirrored
    ));
    out.push(makePlanetRing(
        RISING_CENTER,
        PLANET_RADIUS * 1.70,
        PLANET_RADIUS * 1.90,
        { color: 0x14141c, roughness: 0.18, metalness: 0.90, opacity: 0.85 },
        -0.416
    ));

    return out;
}

// ---- V7: Sphere with subtle surface texture (Option 2) ----
// Canvas-painted swirling bands so the planet looks like a "place"
// rather than a featureless disc. Same lighting setup as V6 — the bands
// only catch light on the lit limb, the rest stays in shadow.
function buildPlanetV7Props() {
    const out = [];
    out.push(makeStarfieldGroup());
    const sun = makePlanetSun();
    out.push(sun);
    out.push(sun.target);

    // Generate a banded gas-giant-ish surface map.
    const TEX_W = 1024;
    const TEX_H = 512;
    const c = document.createElement('canvas');
    c.width = TEX_W;
    c.height = TEX_H;
    const ctx = c.getContext('2d');
    // Base color
    ctx.fillStyle = '#3a2a20';
    ctx.fillRect(0, 0, TEX_W, TEX_H);
    // Horizontal bands of varying width and hue
    const BANDS = 18;
    for (let b = 0; b < BANDS; b++) {
        const y0 = Math.floor((b / BANDS) * TEX_H);
        const y1 = Math.floor(((b + 1) / BANDS) * TEX_H);
        const hueShift = Math.sin(b * 0.7) * 12;
        const lightShift = (Math.sin(b * 1.3) + 1) * 0.5;
        const r = Math.round(60 + lightShift * 60 + hueShift);
        const g = Math.round(45 + lightShift * 40);
        const b2 = Math.round(35 + lightShift * 25);
        ctx.fillStyle = `rgb(${r}, ${g}, ${b2})`;
        ctx.fillRect(0, y0, TEX_W, y1 - y0);
    }
    // Subtle horizontal streaks for a gassy/turbulent feel
    for (let i = 0; i < 200; i++) {
        const y = Math.random() * TEX_H;
        const w = 200 + Math.random() * 500;
        const x = Math.random() * (TEX_W - w);
        const alpha = 0.06 + Math.random() * 0.08;
        ctx.fillStyle = `rgba(20, 12, 8, ${alpha})`;
        ctx.fillRect(x, y, w, 2 + Math.random() * 5);
    }
    const tex = new THREE.CanvasTexture(c);
    tex.minFilter = THREE.LinearMipMapLinearFilter;
    tex.magFilter = THREE.LinearFilter;

    const geo = new THREE.SphereGeometry(PLANET_RADIUS, 64, 48);
    const mat = new THREE.MeshStandardMaterial({
        map: tex,
        roughness: 0.95,
        metalness: 0.0
    });
    const planet = new THREE.Mesh(geo, mat);
    planet.position.copy(PLANET_CENTER);
    planet.userData.slowSpin = true;
    out.push(planet);

    return out;
}

// ---- V8: Sphere with atmospheric halo (Option 3 + 4 combined) ----
// A dark sphere plus a slightly larger transparent back-side shell that
// renders only on the OUTER limb facing away from the camera, producing
// a soft atmospheric ring of light. This is the classic "Earth from
// space" thin blue line.
function buildPlanetV8Props() {
    const out = [];
    out.push(makeStarfieldGroup());
    const sun = makePlanetSun();
    out.push(sun);
    out.push(sun.target);

    // Inner solid sphere — slightly tinted so the lit limb has color.
    const innerGeo = new THREE.SphereGeometry(PLANET_RADIUS, 64, 48);
    const innerMat = new THREE.MeshStandardMaterial({
        color: 0x18202c,
        roughness: 0.95,
        metalness: 0.0
    });
    const inner = new THREE.Mesh(innerGeo, innerMat);
    inner.position.copy(PLANET_CENTER);
    inner.userData.slowSpin = true;
    out.push(inner);

    // Atmosphere shell — a slightly larger sphere rendered with BackSide
    // and additive blending. Because we render only the BACK faces, the
    // rim of the sphere (where back faces face the camera at a grazing
    // angle) lights up while the center stays mostly transparent — a
    // cheap and convincing fresnel/atmosphere effect.
    const HALO_SCALE = 1.08;
    const haloGeo = new THREE.SphereGeometry(PLANET_RADIUS * HALO_SCALE, 64, 48);
    const haloMat = new THREE.MeshBasicMaterial({
        color: 0x5c8cdc,        // pale cool atmosphere blue
        side: THREE.BackSide,
        transparent: true,
        opacity: 0.35,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });
    const halo = new THREE.Mesh(haloGeo, haloMat);
    halo.position.copy(PLANET_CENTER);
    out.push(halo);

    return out;
}

// ---- V9: Full layered cinematic (Option 5) ----
// Surface texture + cloud layer + atmospheric halo + faint lit limb.
// Built from three concentric spheres at slightly different radii so
// each layer reads as a distinct optical element.
function buildPlanetV9Props() {
    const out = [];
    out.push(makeStarfieldGroup());
    const sun = makePlanetSun();
    out.push(sun);
    out.push(sun.target);

    // --- 1. Surface ---
    // Reuse the band-painter from V7 but with cooler hues for variety.
    const TEX_W = 1024;
    const TEX_H = 512;
    const c = document.createElement('canvas');
    c.width = TEX_W;
    c.height = TEX_H;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#0a1828';
    ctx.fillRect(0, 0, TEX_W, TEX_H);
    // Continent-like blobs
    for (let i = 0; i < 8; i++) {
        const cx = Math.random() * TEX_W;
        const cy = Math.random() * TEX_H;
        const r = 60 + Math.random() * 140;
        const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        const hue = 30 + Math.random() * 40;       // warm continents
        grd.addColorStop(0, `hsla(${hue}, 35%, 28%, 0.9)`);
        grd.addColorStop(1, 'hsla(0, 0%, 0%, 0)');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
    }
    // Tight cool horizontal bands (sea/cloud streaks)
    for (let b = 0; b < 30; b++) {
        const y = Math.random() * TEX_H;
        const w = 250 + Math.random() * 700;
        const x = Math.random() * (TEX_W - w);
        ctx.fillStyle = `rgba(60, 80, 140, ${0.05 + Math.random() * 0.06})`;
        ctx.fillRect(x, y, w, 3 + Math.random() * 6);
    }
    const surfaceTex = new THREE.CanvasTexture(c);
    surfaceTex.minFilter = THREE.LinearMipMapLinearFilter;
    surfaceTex.magFilter = THREE.LinearFilter;

    const surfaceGeo = new THREE.SphereGeometry(PLANET_RADIUS, 64, 48);
    const surfaceMat = new THREE.MeshStandardMaterial({
        map: surfaceTex,
        roughness: 0.92,
        metalness: 0.0
    });
    const surface = new THREE.Mesh(surfaceGeo, surfaceMat);
    surface.position.copy(PLANET_CENTER);
    surface.userData.slowSpin = true;
    out.push(surface);

    // --- 2. Cloud layer ---
    // Wispy white streaks on a transparent canvas, drawn slightly above
    // the surface and rotating at a different speed.
    const cc = document.createElement('canvas');
    cc.width = TEX_W;
    cc.height = TEX_H;
    const cctx = cc.getContext('2d');
    cctx.clearRect(0, 0, TEX_W, TEX_H);
    for (let i = 0; i < 80; i++) {
        const y = Math.random() * TEX_H;
        const w = 80 + Math.random() * 220;
        const x = Math.random() * TEX_W;
        const h = 4 + Math.random() * 8;
        cctx.fillStyle = `rgba(255, 255, 255, ${0.08 + Math.random() * 0.18})`;
        cctx.fillRect(x, y, w, h);
    }
    const cloudTex = new THREE.CanvasTexture(cc);
    cloudTex.minFilter = THREE.LinearMipMapLinearFilter;
    cloudTex.magFilter = THREE.LinearFilter;
    const cloudGeo = new THREE.SphereGeometry(PLANET_RADIUS * 1.01, 64, 48);
    const cloudMat = new THREE.MeshStandardMaterial({
        map: cloudTex,
        transparent: true,
        opacity: 0.85,
        roughness: 1.0,
        metalness: 0.0,
        depthWrite: false
    });
    const clouds = new THREE.Mesh(cloudGeo, cloudMat);
    clouds.position.copy(PLANET_CENTER);
    clouds.userData.slowSpin = true;
    clouds.userData.slowSpinRate = 0.00007;  // clouds drift faster than surface
    out.push(clouds);

    // --- 3. Atmospheric halo (same trick as V8) ---
    const HALO_SCALE = 1.07;
    const haloGeo = new THREE.SphereGeometry(PLANET_RADIUS * HALO_SCALE, 64, 48);
    const haloMat = new THREE.MeshBasicMaterial({
        color: 0x6ba8e0,
        side: THREE.BackSide,
        transparent: true,
        opacity: 0.4,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });
    const halo = new THREE.Mesh(haloGeo, haloMat);
    halo.position.copy(PLANET_CENTER);
    out.push(halo);

    return out;
}

// Per-frame: rotate any object tagged with userData.slowSpin slowly
// around the Y axis. Used by the planet variants V6-V9 so the surface
// drifts naturally.
function updatePlanetSpin(dt) {
    if (typeof activeViewProps === 'undefined') return;
    for (const p of activeViewProps) {
        if (!p.userData || !p.userData.slowSpin) continue;
        const rate = p.userData.slowSpinRate || 0.00003;
        p.rotation.y += rate * dt;
    }
}

// ===================== V10: ROMAN COLOSSEUM =====================
// A simplified one-tier Roman Colosseum surrounding the chess board.
//
// Layout:
//   - Oval ring of ~32 BAYS at ground level. Each bay = two engaged
//     half-columns + a semicircular arch lintel above them.
//   - Solid ring foundation underneath (the stylobate).
//   - Solid outer wall behind the columns, attic ring above the arches.
//   - Central altar (stone plinth) at origin, holding the chess board.
//   - Torch sconces between every other arch; the torches are point
//     lights that turn on at night.
//
// Day / Night:
//   - Day:  bright blue sky dome, warm sun directional, ambient ~0.6,
//           torches OFF.
//   - Night: deep indigo sky with stars, cool moon directional, ambient
//           ~0.15, torches ON.
//
// User toggles via a button in the Menu panel (added later).

// Module-level state — current mode and refs to objects that animate
// between day and night. Built when V10 activates, cleared when leaving.
let _colosseumState = null;
let colosseumDayNight = 'day';   // 'day' | 'night'
// V5 (Cathedral) day/night infrastructure mirrors V10's pattern. The
// shared `dayNight` state is whichever was last picked by the user; per-
// view applicators read it and update their scenes.
let _cathedralState = null;
let cathedralDayNight = 'night';  // default V5 to twilight/night since the sky was already painted that way
// V2 (Light) day/night. Built when V2 first activates, refs persist via
// the cached view-props array so the toggle can repaint without rebuilding.
let _v2State = null;
let v2DayNight = 'day';          // V2 default is day (it's the Light view)
let _v11State = null;
let v11DayNight = 'day';         // V11 default is day (Light v2)

function buildColosseumProps() {
    const out = [];

    // ---- Scale convention for this view ----
    // Chess board is fixed at y=0 (8 units wide ≈ 2m). Ground at y=-3,
    // so the board reads as elevated on an altar at chest height.
    const GROUND_Y = -3;

    // ---- Materials ----
    // Two column palettes — alternating around the ring. Doric stone
    // gets flat-shaded so the 20-sided lathe geometry's facets read as
    // implied flutes.
    const whiteMarble = new THREE.MeshStandardMaterial({
        color: 0xeeeae0,
        roughness: 0.55,
        metalness: 0.05,
        flatShading: true
    });
    const blackObsidian = new THREE.MeshStandardMaterial({
        color: 0x1a1418,
        roughness: 0.22,
        metalness: 0.45,
        flatShading: true
    });
    const travertine = new THREE.MeshStandardMaterial({
        color: 0xc6b58a,
        roughness: 0.92,
        metalness: 0.0
    });
    const darkerStone = new THREE.MeshStandardMaterial({
        color: 0xc8c8cc,            // cool gray-white marble (was warm tan)
        roughness: 0.4,
        metalness: 0.1
    });
    const altarStone = new THREE.MeshStandardMaterial({
        color: 0xebebef,            // pale neutral marble for the altar (was warm cream)
        roughness: 0.3,
        metalness: 0.1
    });
    const figureMat = new THREE.MeshStandardMaterial({
        color: 0x05060a,
        roughness: 0.95,
        metalness: 0.0
    });
    const torchMetal = new THREE.MeshStandardMaterial({
        color: 0x3a2418,
        roughness: 0.55,
        metalness: 0.4
    });
    const flameMat = new THREE.MeshStandardMaterial({
        color: 0xffb060,
        emissive: 0xff8030,
        emissiveIntensity: 1.6,
        roughness: 0.5,
        metalness: 0.0
    });
    // Zodiac tablet — pale carved stone face
    const zodiacTabletMat = new THREE.MeshStandardMaterial({
        color: 0xe6dcc0,
        roughness: 0.6,
        metalness: 0.0
    });

    // ---- Arena dimensions ----
    const BAYS = 24;                 // 24 columns = a multiple of 12 (zodiac alignment)
    const ARENA_RX = 34;             // widened from 30 to give the rook-bases room
    const ARENA_RZ = 30;             // widened from 26
    const COLUMN_H = 12.0;

    // ---- Tiled arena floor ----
    // A radial-wedge pattern (alternating warm-light and warm-dark tiles)
    // painted on a single canvas, applied as a texture to a wide disc.
    // 24 wedges so each one lines up with a column.
    const FLOOR_TEX_SIZE = 1024;
    const floorCanvas = document.createElement('canvas');
    floorCanvas.width = FLOOR_TEX_SIZE;
    floorCanvas.height = FLOOR_TEX_SIZE;
    const fctx = floorCanvas.getContext('2d');
    const center = FLOOR_TEX_SIZE / 2;
    // Background — pure neutral white marble
    fctx.fillStyle = '#f0f0f2';
    fctx.fillRect(0, 0, FLOOR_TEX_SIZE, FLOOR_TEX_SIZE);
    // Radial wedges — alternating bright neutral white and cool gray-white
    const WEDGES = 24;
    for (let i = 0; i < WEDGES; i++) {
        const a0 = (i / WEDGES) * Math.PI * 2 - Math.PI / 2;
        const a1 = ((i + 1) / WEDGES) * Math.PI * 2 - Math.PI / 2;
        fctx.fillStyle = i % 2 === 0 ? '#f8f8fa' : '#c8c8cc';
        fctx.beginPath();
        fctx.moveTo(center, center);
        fctx.arc(center, center, FLOOR_TEX_SIZE * 0.5, a0, a1);
        fctx.closePath();
        fctx.fill();
    }
    // Marble VEINING — wandering thin gray lines crisscrossing the
    // floor. Reinforces "this is a polished marble surface."
    fctx.lineCap = 'round';
    for (let v = 0; v < 60; v++) {
        // Random start point
        let x = Math.random() * FLOOR_TEX_SIZE;
        let y = Math.random() * FLOOR_TEX_SIZE;
        // Random heading
        let heading = Math.random() * Math.PI * 2;
        const len = 80 + Math.random() * 280;
        const steps = 30;
        const stepLen = len / steps;
        fctx.strokeStyle = `rgba(110, 115, 120, ${0.08 + Math.random() * 0.12})`;
        fctx.lineWidth = 0.5 + Math.random() * 1.8;
        fctx.beginPath();
        fctx.moveTo(x, y);
        for (let s = 0; s < steps; s++) {
            heading += (Math.random() - 0.5) * 0.4;     // gentle meander
            x += Math.cos(heading) * stepLen;
            y += Math.sin(heading) * stepLen;
            fctx.lineTo(x, y);
        }
        fctx.stroke();
    }
    // (Concentric ring lines and wedge dividers are now drawn as real
    // gold mesh overlays after the floor is built — see below — so they
    // can have a polished reflective material.)
    // Central medallion — pure white
    fctx.fillStyle = '#fcfcfd';
    fctx.beginPath();
    fctx.arc(center, center, FLOOR_TEX_SIZE * 0.12, 0, Math.PI * 2);
    fctx.fill();
    fctx.strokeStyle = 'rgba(80, 80, 90, 0.6)';
    fctx.lineWidth = 3;
    fctx.beginPath();
    fctx.arc(center, center, FLOOR_TEX_SIZE * 0.12, 0, Math.PI * 2);
    fctx.stroke();
    // Cross inside the medallion
    fctx.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
        const angle = i * Math.PI / 4;
        fctx.beginPath();
        fctx.moveTo(
            center + Math.cos(angle) * FLOOR_TEX_SIZE * 0.02,
            center + Math.sin(angle) * FLOOR_TEX_SIZE * 0.02
        );
        fctx.lineTo(
            center + Math.cos(angle) * FLOOR_TEX_SIZE * 0.115,
            center + Math.sin(angle) * FLOOR_TEX_SIZE * 0.115
        );
        fctx.stroke();
    }

    // ----- COMPASS ROSE -----
    // An 8-point compass star painted across the floor, radiating from
    // the medallion. High-contrast bright/dark so it reads even at the
    // floor's large scale.
    const RAY_LONG  = FLOOR_TEX_SIZE * 0.38;
    const RAY_SHORT = FLOOR_TEX_SIZE * 0.26;
    const RAY_THICK_LONG  = FLOOR_TEX_SIZE * 0.06;       // beefier than before
    const RAY_THICK_SHORT = FLOOR_TEX_SIZE * 0.038;
    const MEDALLION_R = FLOOR_TEX_SIZE * 0.12;

    function drawCompassRay(angle, length, thick, fillStyle, strokeStyle) {
        const tipX = center + Math.cos(angle) * (MEDALLION_R + length);
        const tipY = center + Math.sin(angle) * (MEDALLION_R + length);
        const baseX = center + Math.cos(angle) * MEDALLION_R;
        const baseY = center + Math.sin(angle) * MEDALLION_R;
        const midX = (tipX + baseX) / 2;
        const midY = (tipY + baseY) / 2;
        const px = -Math.sin(angle) * thick;
        const py =  Math.cos(angle) * thick;
        fctx.fillStyle = fillStyle;
        fctx.beginPath();
        fctx.moveTo(baseX, baseY);
        fctx.lineTo(midX + px, midY + py);
        fctx.lineTo(tipX, tipY);
        fctx.lineTo(midX - px, midY - py);
        fctx.closePath();
        fctx.fill();
        if (strokeStyle) {
            fctx.strokeStyle = strokeStyle;
            fctx.lineWidth = 3;
            fctx.stroke();
        }
    }

    // Four cardinal rays — solid bright stone color, clear outline
    for (let i = 0; i < 4; i++) {
        const angle = -Math.PI / 2 + i * Math.PI / 2;
        // Light "right" half — neutral cool white to match the marble
        drawCompassRay(angle, RAY_LONG, RAY_THICK_LONG,
                       'rgba(252, 250, 245, 0.95)', 'rgba(80, 70, 60, 0.7)');
        // Darker contrast half (a gray-blue cool shadow, NOT warm)
        const tipX = center + Math.cos(angle) * (MEDALLION_R + RAY_LONG);
        const tipY = center + Math.sin(angle) * (MEDALLION_R + RAY_LONG);
        const baseX = center + Math.cos(angle) * MEDALLION_R;
        const baseY = center + Math.sin(angle) * MEDALLION_R;
        const midX = (tipX + baseX) / 2;
        const midY = (tipY + baseY) / 2;
        const px = -Math.sin(angle) * RAY_THICK_LONG;
        const py =  Math.cos(angle) * RAY_THICK_LONG;
        fctx.fillStyle = 'rgba(120, 120, 125, 0.55)';
        fctx.beginPath();
        fctx.moveTo(baseX, baseY);
        fctx.lineTo(midX + px, midY + py);
        fctx.lineTo(tipX, tipY);
        fctx.closePath();
        fctx.fill();
    }
    // Intercardinal rays — cool light
    for (let i = 0; i < 4; i++) {
        const angle = -Math.PI / 4 + i * Math.PI / 2;
        drawCompassRay(angle, RAY_SHORT, RAY_THICK_SHORT,
                       'rgba(240, 238, 234, 0.85)', 'rgba(80, 70, 60, 0.6)');
    }

    // Cardinal direction LABELS
    fctx.fillStyle = 'rgba(40, 40, 50, 0.9)';
    fctx.font = 'bold 60px serif';
    fctx.textAlign = 'center';
    fctx.textBaseline = 'middle';
    const labelR = MEDALLION_R + RAY_LONG + FLOOR_TEX_SIZE * 0.05;
    const labels = [{ a: -Math.PI / 2, t: 'N' }, { a: 0, t: 'E' },
                    { a:  Math.PI / 2, t: 'S' }, { a: Math.PI, t: 'W' }];
    for (const L of labels) {
        const x = center + Math.cos(L.a) * labelR;
        const y = center + Math.sin(L.a) * labelR;
        fctx.fillText(L.t, x, y);
    }

    // Outer compass ring
    fctx.strokeStyle = 'rgba(80, 80, 90, 0.7)';
    fctx.lineWidth = 3;
    fctx.beginPath();
    fctx.arc(center, center, MEDALLION_R + RAY_LONG + FLOOR_TEX_SIZE * 0.09, 0, Math.PI * 2);
    fctx.stroke();
    const floorTex = new THREE.CanvasTexture(floorCanvas);
    floorTex.minFilter = THREE.LinearMipMapLinearFilter;
    floorTex.magFilter = THREE.LinearFilter;
    floorTex.anisotropy = 8;

    const arenaFloorGeo = new THREE.CircleGeometry(ARENA_RX + 4, 96);
    const arenaFloorMat = new THREE.MeshStandardMaterial({
        map: floorTex,
        roughness: 0.3,        // polished marble — catches reflections
        metalness: 0.15
    });
    const arenaFloor = new THREE.Mesh(arenaFloorGeo, arenaFloorMat);
    arenaFloor.rotation.x = -Math.PI / 2;
    arenaFloor.scale.y = ARENA_RZ / ARENA_RX;          // oval-ize
    arenaFloor.position.y = GROUND_Y - 0.05;
    arenaFloor.receiveShadow = true;
    out.push(arenaFloor);

    // ---- Polished gold section-line overlays ----
    // The "section lines" between the marble wedges and at the concentric
    // ring radii are drawn as THIN gold meshes sitting just above the
    // floor surface. Real geometry with a metallic gold material so they
    // actually CATCH LIGHT and read as polished bronze inlay rather than
    // painted lines.
    const sectionLineMat = new THREE.MeshStandardMaterial({
        color: 0xd4af50,        // rich antique gold
        roughness: 0.18,        // polished
        metalness: 0.95         // fully metallic
    });
    const LINE_Y = GROUND_Y - 0.03;     // just above the floor (which is at GROUND_Y - 0.05)
    const FLOOR_LIMIT = ARENA_RX + 4;   // floor radius — section lines extend to its edge

    // Thin radial dividers between the 24 wedges. Each is a long thin box
    // rotated to mark a wedge boundary, scaled along Z to follow the
    // floor's oval squash.
    const RADIAL_THICKNESS = 0.08;       // very thin
    const sectionGroup = new THREE.Group();
    sectionGroup.position.y = LINE_Y;
    sectionGroup.scale.z = ARENA_RZ / ARENA_RX;     // squash to match the oval floor
    for (let i = 0; i < 24; i++) {
        const angle = (i / 24) * Math.PI * 2;
        const slab = new THREE.Mesh(
            new THREE.BoxGeometry(FLOOR_LIMIT * 2, 0.002, RADIAL_THICKNESS),
            sectionLineMat
        );
        slab.rotation.y = angle;
        sectionGroup.add(slab);
    }
    // Three concentric gold rings at the same radii the painted ones used to be.
    // Build each ring as a flat TorusGeometry (skinny tube radius).
    [0.20, 0.30, 0.40].forEach(f => {
        const r = FLOOR_LIMIT * f * (FLOOR_TEX_SIZE / FLOOR_TEX_SIZE);
        // Actually compute from world radius directly: floor texture
        // covers ±FLOOR_LIMIT in world units → fraction f corresponds to
        // world radius FLOOR_LIMIT * (1 - 2 * 0.5 * (1 - 2 * f))…  no, simpler:
        // the painted rings were at fraction f of the FLOOR_TEX_SIZE/2, but
        // the floor itself spans 0..FLOOR_LIMIT in world. The texture is
        // centered, so fraction f of texture radius maps to world radius
        // f * 2 * FLOOR_LIMIT (since the texture covers diameter 2*FLOOR_LIMIT).
        // The simpler version: f represents "how far out as a fraction of
        // FLOOR_TEX_SIZE/2 from center", which maps to world radius
        // f * FLOOR_LIMIT * 2.
        const worldR = f * FLOOR_LIMIT * 2;
        // Flat annulus (a thin band on the floor plane), NOT a 3D torus.
        // RingGeometry is a 2D ring shape with no thickness — it sits
        // perfectly flat against the floor like inlaid metalwork.
        const RING_WIDTH = 0.18;
        const ring = new THREE.Mesh(
            new THREE.RingGeometry(worldR - RING_WIDTH / 2, worldR + RING_WIDTH / 2, 96),
            sectionLineMat
        );
        ring.rotation.x = -Math.PI / 2;       // lay flat
        sectionGroup.add(ring);
    });
    out.push(sectionGroup);

    // ---- Foundation ring under the columns ----
    // The foundation is a RING (annulus) not a solid disc — its center
    // is left open so the chess board's underground coffin chamber is
    // visible from the Below camera angle. The ring sits just under the
    // column line.
    const FOUNDATION_H = 0.6;
    const FOUNDATION_OUTER = ARENA_RX + 2.0;      // outside the column ring
    const FOUNDATION_INNER = ARENA_RX - 6;        // well inside the column ring,
                                                   // leaving the central play area
                                                   // open above the floor
    // Build the ring as an ExtrudeGeometry from a Shape with an inner hole
    const ringShape = new THREE.Shape();
    ringShape.absarc(0, 0, FOUNDATION_OUTER, 0, Math.PI * 2, false);
    const ringHole = new THREE.Path();
    ringHole.absarc(0, 0, FOUNDATION_INNER, 0, Math.PI * 2, true);
    ringShape.holes.push(ringHole);
    const foundationGeo = new THREE.ExtrudeGeometry(ringShape, {
        depth: FOUNDATION_H,
        bevelEnabled: false,
        curveSegments: 64
    });
    const foundation = new THREE.Mesh(foundationGeo, darkerStone);
    foundation.rotation.x = -Math.PI / 2;
    // Bottom of the ring sits at GROUND_Y. Depth FOUNDATION_H extends UP
    // from there (after rotation, the extrude direction is +Y).
    foundation.position.y = GROUND_Y;
    foundation.receiveShadow = true;
    // Wrap in a group to apply the oval squash without affecting the
    // foundation's extrude depth (post-rotation, local Y is the depth
    // axis — scaling the GROUP lets us squash world Z independently).
    const foundationGroup = new THREE.Group();
    foundationGroup.add(foundation);
    foundationGroup.scale.z = ARENA_RZ / ARENA_RX;
    out.push(foundationGroup);

    // ---- Doric column builder ----
    // Built as a LatheGeometry with an entasis profile (subtle convex
    // bulge at ~30% height instead of a straight taper). 20 radial
    // segments + flat shading gives the column visible facets that read
    // as the 20 implied flutes of true Doric.
    //
    // Plus a proper capital: echinus (rounded cushion) under abacus
    // (square plate).
    function buildDoricColumn(material) {
        const g = new THREE.Group();
        // Lathe profile points: (radius, y). Bottom = 0, top = COLUMN_H.
        // Subtle entasis: r grows slightly between y=0..0.25, then taper.
        const R_BASE = 0.62;
        const R_BULGE = 0.66;
        const R_TOP = 0.46;
        const profile = [
            [0.00, 0.0],                              // axis point at base
            [R_BASE, 0.0],                            // base edge
            [R_BASE, 0.05],                           // bottom band
            [R_BULGE, 0.25 * COLUMN_H],               // entasis bulge
            [R_TOP, COLUMN_H - 0.4],                  // shaft top edge
            [R_TOP, COLUMN_H - 0.3],                  // narrow neck under echinus
            // Echinus (rounded cushion)
            [R_TOP * 1.55, COLUMN_H - 0.05],
            [R_TOP * 1.55, COLUMN_H + 0.05],
            // Top axis closure
            [0.00, COLUMN_H + 0.05]
        ];
        const pts = profile.map(([r, y]) => new THREE.Vector2(r, y));
        const shaftGeo = new THREE.LatheGeometry(pts, 20);
        const shaft = new THREE.Mesh(shaftGeo, material);
        shaft.castShadow = true;
        shaft.receiveShadow = true;
        g.add(shaft);
        // Abacus — square plate above the echinus, slightly larger than
        // the echinus's max radius so it reads as the column's "head."
        const ABACUS_W = R_TOP * 1.55 * 2 + 0.2;
        const abacus = new THREE.Mesh(
            new THREE.BoxGeometry(ABACUS_W, 0.28, ABACUS_W),
            material
        );
        abacus.position.y = COLUMN_H + 0.05 + 0.14;
        g.add(abacus);
        return g;
    }

    // ---- Ring of columns (alternating white marble / black obsidian) ----
    const colBaseY = GROUND_Y + FOUNDATION_H;
    const torches = [];
    function ovalPoint(angle) {
        return new THREE.Vector3(
            Math.cos(angle) * ARENA_RX,
            0,
            Math.sin(angle) * ARENA_RZ
        );
    }
    for (let i = 0; i < BAYS; i++) {
        const a = (i / BAYS) * Math.PI * 2;
        const p = ovalPoint(a);
        const mat = (i % 2 === 0) ? whiteMarble : blackObsidian;

        // Rook-shaped column base. The rook is a tapered cylinder
        // (topR 0.35, botR 0.40, h 0.6) — perfect proportions for a
        // Doric plinth. Scale it up so its base radius is ~1.0 (wider
        // than the column's 0.62 base) and its height is ~0.9 (chunky
        // pedestal). Match the column's material (white or black).
        const rookBase = new THREE.Mesh(chessGeometries.r, mat);
        rookBase.scale.set(2.5, 1.5, 2.5);
        // Center the base so its bottom sits on the foundation top
        const ROOK_SCALED_H = 0.6 * 1.5;            // = 0.9
        rookBase.position.set(p.x, colBaseY + ROOK_SCALED_H / 2, p.z);
        rookBase.castShadow = true;
        rookBase.receiveShadow = true;
        out.push(rookBase);

        // Column sits ON TOP of the rook base
        const col = buildDoricColumn(mat);
        col.position.set(p.x, colBaseY + ROOK_SCALED_H, p.z);
        out.push(col);

        // Torch sconce every 4th column (6 torches with 24 bays).
        if (i % 4 === 0) {
            const torchGroup = new THREE.Group();
            const bracket = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.18, 0.18), torchMetal);
            bracket.position.set(0, 0, 0.5);
            torchGroup.add(bracket);
            const cup = new THREE.Mesh(
                new THREE.CylinderGeometry(0.26, 0.14, 0.32, 12),
                torchMetal
            );
            cup.position.set(0, 0.15, 0.65);
            torchGroup.add(cup);
            const flame = new THREE.Mesh(
                new THREE.ConeGeometry(0.20, 0.50, 10),
                flameMat
            );
            flame.position.set(0, 0.45, 0.65);
            flame.userData.isTorchFlame = true;
            torchGroup.add(flame);
            const light = new THREE.PointLight(0xffb060, 0, 14, 1.7);
            light.position.set(0, 0.7, 0.65);
            light.userData.isTorchLight = true;
            torchGroup.add(light);
            torches.push({ flame, light });
            torchGroup.position.set(p.x, colBaseY + 0.9 + COLUMN_H * 0.65, p.z);
            torchGroup.rotation.y = Math.atan2(-p.z, -p.x) + Math.PI / 2;
            out.push(torchGroup);
        }
    }

    // ---- Golden pyramids atop the 4 cardinal columns ----
    // Solid 4-sided pyramid (ConeGeometry with 4 radial segments + a slight
    // Y rotation to align faces with cardinal directions). High-polish
    // chrome-gold so the pyramids catch sharp specular highlights.
    const pyramidMat = new THREE.MeshStandardMaterial({
        color: 0xd4af50,
        roughness: 0.05,
        metalness: 1.0,
        flatShading: true     // crisp, faceted look on the 4 triangular faces
    });
    function makeGoldenPyramid() {
        const g = new THREE.Group();
        const BASE_R = 0.60;        // half the diagonal of the base square
        const HEIGHT = 1.00;
        // ConeGeometry with 4 radial segments = a 4-sided pyramid
        const pyrGeo = new THREE.ConeGeometry(BASE_R, HEIGHT, 4);
        const pyr = new THREE.Mesh(pyrGeo, pyramidMat);
        pyr.position.y = HEIGHT / 2;
        pyr.castShadow = true;
        // Rotate 45° around Y so the BASE EDGES (not corners) face the
        // cardinal directions — looks more pyramid-like from any side
        pyr.rotation.y = Math.PI / 4;
        g.add(pyr);
        return g;
    }
    // Cardinal columns in the 24-bay ring (angles 0, π/2, π, 3π/2):
    //   index 0 = East (+X), 6 = North (+Z), 12 = West (-X), 18 = South (-Z)
    const pyramidColumnIndices = [0, 6, 12, 18];
    // Column-top world Y (where abacus top sits):
    //   colBaseY + ROOK_SCALED_H + COLUMN_H + 0.05 (echinus) + 0.14 (gap) + 0.14 (abacus half)
    const ABACUS_TOP_Y = colBaseY + 0.9 + COLUMN_H + 0.05 + 0.14 + 0.14;
    for (const idx of pyramidColumnIndices) {
        const a = (idx / BAYS) * Math.PI * 2;
        const p = ovalPoint(a);
        const pyramid = makeGoldenPyramid();
        pyramid.position.set(p.x, ABACUS_TOP_Y, p.z);
        out.push(pyramid);
    }

    // ---- 12 Zodiac tablets around the outer perimeter ----
    // Each tablet is a flat stone panel positioned just outside the
    // column ring, rotated to face inward. The zodiac glyph is painted
    // onto a canvas texture (Unicode glyphs U+2648..U+2653) and applied
    // as the panel's surface.
    //
    // Standard zodiac order starting at +X (East = Aries) and going
    // counter-clockwise:
    //   Aries(♈) Taurus(♉) Gemini(♊) Cancer(♋) Leo(♌) Virgo(♍)
    //   Libra(♎) Scorpio(♏) Sagittarius(♐) Capricorn(♑) Aquarius(♒) Pisces(♓)
    const ZODIAC_GLYPHS = ['♈', '♉', '♊', '♋', '♌', '♍', '♎', '♏', '♐', '♑', '♒', '♓'];
    const ZODIAC_NAMES = ['Aries', 'Taurus', 'Gemini', 'Cancer', 'Leo', 'Virgo',
                          'Libra', 'Scorpio', 'Sagittarius', 'Capricorn', 'Aquarius', 'Pisces'];
    const ZODIAC_OUTER_RX = ARENA_RX - 6;
    const ZODIAC_OUTER_RZ = ARENA_RZ - 6;
    const TILE_RADIUS = 2.0;
    const TILE_H = 0.25;
    const PLINTH_H = 0.7;        // small stone plinth that raises the tile off the floor

    function makeZodiacTabletTexture(glyph, label) {
        const c = document.createElement('canvas');
        c.width = 512;
        c.height = 512;
        const ctx = c.getContext('2d');
        // White marble disc (matches the arena floor's palette)
        const grad = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
        grad.addColorStop(0, '#fcfcfd');
        grad.addColorStop(0.85, '#dcdce0');
        grad.addColorStop(1.0, '#aaaaaf');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(256, 256, 240, 0, Math.PI * 2);
        ctx.fill();
        // Gold-tone outer ring (signature gold detail)
        ctx.strokeStyle = '#d4b06a';
        ctx.lineWidth = 14;
        ctx.beginPath();
        ctx.arc(256, 256, 225, 0, Math.PI * 2);
        ctx.stroke();
        // Glyph in deep antique gold for legibility against the white marble
        ctx.fillStyle = '#b88a30';
        ctx.font = 'bold 300px "Apple Symbols", "Segoe UI Symbol", "Symbola", "Noto Sans Symbols 2", serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(glyph, 256, 220);
        // Label beneath in matching gold
        ctx.font = 'bold 56px serif';
        ctx.fillStyle = '#b88a30';
        ctx.fillText(label, 256, 420);
        const tex = new THREE.CanvasTexture(c);
        tex.minFilter = THREE.LinearMipMapLinearFilter;
        tex.magFilter = THREE.LinearFilter;
        tex.needsUpdate = true;
        return tex;
    }

    for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        const x = Math.cos(angle) * ZODIAC_OUTER_RX;
        const z = Math.sin(angle) * ZODIAC_OUTER_RZ;
        const tex = makeZodiacTabletTexture(ZODIAC_GLYPHS[i], ZODIAC_NAMES[i]);

        // Small stone plinth UNDER the tile so it's raised above the
        // floor and unmistakable from any view angle.
        const plinth = new THREE.Mesh(
            new THREE.CylinderGeometry(TILE_RADIUS * 0.95, TILE_RADIUS * 1.05, PLINTH_H, 32),
            darkerStone
        );
        plinth.position.set(x, GROUND_Y + PLINTH_H / 2, z);
        plinth.receiveShadow = true;
        plinth.castShadow = true;
        out.push(plinth);

        const faceMat = new THREE.MeshStandardMaterial({
            map: tex,
            roughness: 0.05,
            metalness: 1.0
        });
        const sideMat = new THREE.MeshStandardMaterial({
            color: 0xb8b8bc,         // cool gray to match the white-marble palette
            roughness: 0.4,
            metalness: 0.1
        });
        const tile = new THREE.Mesh(
            new THREE.CylinderGeometry(TILE_RADIUS, TILE_RADIUS, TILE_H, 48),
            [sideMat, faceMat, faceMat]
        );
        tile.position.set(x, GROUND_Y + PLINTH_H + TILE_H / 2 + 0.01, z);
        // Orient the tile so the LABEL (drawn at the bottom of the canvas)
        // points TOWARD the arena center, with the radial line from
        // center-through-tile bisecting the label horizontally (running
        // through the middle of the word, not above or below it).
        tile.rotation.y = -angle;
        tile.castShadow = true;
        out.push(tile);
    }

    // ---- Altar (the tall pedestal the chess board rests on) ----
    const ALTAR_TOP_Y = -0.05;
    const ALTAR_BOT_Y = GROUND_Y;
    const baseStep = new THREE.Mesh(
        new THREE.BoxGeometry(10.5, 0.35, 10.5),
        darkerStone
    );
    baseStep.position.y = ALTAR_BOT_Y + 0.35 / 2;
    baseStep.receiveShadow = true;
    baseStep.userData.isV10Altar = true;
    out.push(baseStep);
    const midStep = new THREE.Mesh(
        new THREE.BoxGeometry(9.5, 0.35, 9.5),
        darkerStone
    );
    midStep.position.y = ALTAR_BOT_Y + 0.35 + 0.35 / 2;
    midStep.receiveShadow = true;
    midStep.userData.isV10Altar = true;
    out.push(midStep);
    const ALTAR_BODY_Y_TOP = ALTAR_TOP_Y - 0.18;
    const ALTAR_BODY_Y_BOT = ALTAR_BOT_Y + 0.7;
    const ALTAR_BODY_H = ALTAR_BODY_Y_TOP - ALTAR_BODY_Y_BOT;

    // Build the engraving texture for the altar's faces. Two inscriptions
    // are needed: AMENTI.AI on the player-facing sides (+Z and -Z), and
    // AMENTI.live on the perpendicular sides (+X and -X). Both rendered
    // as reflective gold lettering on a marble background.
    // Returns { color, roughness, metalness } textures for an altar
    // inscription. The roughness and metalness maps let the gold letters
    // render as mirror-polished metal AGAINST a matte marble background,
    // even though both are painted on the same surface.
    function makeAltarInscriptionTexture(prefix, suffix, prefixColor, suffixColor) {
        // ---- Color (diffuse) canvas — what the surface looks like ----
        const c = document.createElement('canvas');
        c.width = 1024;
        c.height = 256;
        const ctx = c.getContext('2d');
        // Marble background
        ctx.fillStyle = '#ebebef';
        ctx.fillRect(0, 0, 1024, 256);
        // Subtle gray veining
        for (let i = 0; i < 20; i++) {
            ctx.strokeStyle = `rgba(110, 115, 120, ${0.04 + Math.random() * 0.06})`;
            ctx.lineWidth = 1 + Math.random() * 2;
            ctx.beginPath();
            const y0 = Math.random() * 256;
            const y1 = y0 + (Math.random() - 0.5) * 40;
            ctx.moveTo(0, y0);
            ctx.lineTo(1024, y1);
            ctx.stroke();
        }
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = 'bold 130px serif';
        const prefixW = ctx.measureText(prefix).width;
        const suffixW = ctx.measureText(suffix).width;
        const totalW = prefixW + suffixW;
        const startX = (1024 - totalW) / 2;
        // Shadow / depth for the "carved" look
        ctx.fillStyle = 'rgba(80, 55, 20, 0.55)';
        ctx.fillText(prefix, startX + prefixW / 2 + 3, 131);
        ctx.fillText(suffix, startX + prefixW + suffixW / 2 + 3, 131);
        // Gold fill
        ctx.fillStyle = prefixColor;
        ctx.fillText(prefix, startX + prefixW / 2, 128);
        ctx.fillStyle = suffixColor;
        ctx.fillText(suffix, startX + prefixW + suffixW / 2, 128);
        const colorTex = new THREE.CanvasTexture(c);
        colorTex.minFilter = THREE.LinearMipMapLinearFilter;
        colorTex.magFilter = THREE.LinearFilter;

        // ---- Roughness mask ----
        // MeshStandardMaterial samples the GREEN channel; low value = mirror,
        // high value = matte. We want the GOLD AREAS to be near-black
        // (polished) and the MARBLE AREAS to be near-white (semi-matte).
        const rc = document.createElement('canvas');
        rc.width = 1024;
        rc.height = 256;
        const rctx = rc.getContext('2d');
        // Marble background: gray ~0.7 roughness (semi-matte)
        rctx.fillStyle = 'rgb(180, 180, 180)';
        rctx.fillRect(0, 0, 1024, 256);
        // Letters: near black (polished)
        rctx.textAlign = 'center';
        rctx.textBaseline = 'middle';
        rctx.font = 'bold 130px serif';
        rctx.fillStyle = 'rgb(10, 10, 10)';
        rctx.fillText(prefix, startX + prefixW / 2, 128);
        rctx.fillText(suffix, startX + prefixW + suffixW / 2, 128);
        const roughnessTex = new THREE.CanvasTexture(rc);
        roughnessTex.minFilter = THREE.LinearMipMapLinearFilter;
        roughnessTex.magFilter = THREE.LinearFilter;

        // ---- Metalness mask ----
        // MeshStandardMaterial samples the BLUE channel; high value =
        // metallic, low = dielectric. We want gold areas to be metallic
        // (white) and marble areas to be non-metal (black).
        const mc = document.createElement('canvas');
        mc.width = 1024;
        mc.height = 256;
        const mctx = mc.getContext('2d');
        // Marble background: black (non-metallic)
        mctx.fillStyle = 'rgb(0, 0, 0)';
        mctx.fillRect(0, 0, 1024, 256);
        // Letters: white (metallic)
        mctx.textAlign = 'center';
        mctx.textBaseline = 'middle';
        mctx.font = 'bold 130px serif';
        mctx.fillStyle = 'rgb(255, 255, 255)';
        mctx.fillText(prefix, startX + prefixW / 2, 128);
        mctx.fillText(suffix, startX + prefixW + suffixW / 2, 128);
        const metalnessTex = new THREE.CanvasTexture(mc);
        metalnessTex.minFilter = THREE.LinearMipMapLinearFilter;
        metalnessTex.magFilter = THREE.LinearFilter;

        return { colorTex, roughnessTex, metalnessTex };
    }
    // AMENTI.AI — for the player-facing sides
    const aiMaps = makeAltarInscriptionTexture('AMENTI', '.AI', '#c79a3b', '#f5d76e');
    // AMENTI.live — for the perpendicular sides
    const liveMaps = makeAltarInscriptionTexture('AMENTI', '.live', '#c79a3b', '#f5d76e');
    // The material uses maps for color/roughness/metalness so the GOLD
    // letters render mirror-polished while the marble background stays
    // semi-matte — letters POP against their setting.
    const amentiAiMat = new THREE.MeshStandardMaterial({
        map:          aiMaps.colorTex,
        roughnessMap: aiMaps.roughnessTex,
        metalnessMap: aiMaps.metalnessTex,
        roughness: 1.0,        // multiplied by the roughness map
        metalness: 1.0         // multiplied by the metalness map
    });
    const amentiLiveMat = new THREE.MeshStandardMaterial({
        map:          liveMaps.colorTex,
        roughnessMap: liveMaps.roughnessTex,
        metalnessMap: liveMaps.metalnessTex,
        roughness: 1.0,
        metalness: 1.0
    });
    // BoxGeometry material order: [+X, -X, +Y, -Y, +Z, -Z]
    // AMENTI.live on the perpendicular sides (+X, -X), AMENTI.AI on the
    // player-facing sides (+Z, -Z). Top and bottom remain plain stone.
    const altarMats = [
        amentiLiveMat,     // +X — AMENTI.live
        amentiLiveMat,     // -X — AMENTI.live (opposite face)
        altarStone,        // +Y top (hidden under cornice + board)
        altarStone,        // -Y bottom (hidden under steps)
        amentiAiMat,       // +Z — AMENTI.AI (faces white player)
        amentiAiMat        // -Z — AMENTI.AI (faces black player)
    ];
    const altarBody = new THREE.Mesh(
        new THREE.BoxGeometry(8.5, ALTAR_BODY_H, 8.5),
        altarMats
    );
    altarBody.position.y = (ALTAR_BODY_Y_TOP + ALTAR_BODY_Y_BOT) / 2;
    altarBody.castShadow = true;
    altarBody.receiveShadow = true;
    altarBody.userData.isV10Altar = true;
    out.push(altarBody);
    const cornice = new THREE.Mesh(
        new THREE.BoxGeometry(8.9, 0.18, 8.9),
        darkerStone
    );
    cornice.position.y = ALTAR_TOP_Y - 0.09;
    cornice.userData.isV10Altar = true;
    out.push(cornice);

    // ---- Polished gold edge trim on the cornice ----
    // A thin gold band running along the top perimeter of the cornice
    // (just below the chess board). Built as a single rectangular ring,
    // with corner-flush construction: the front/back segments span the
    // FULL width and the left/right segments fit BETWEEN them, so the
    // four pieces meet cleanly at every corner without overlap or gap.
    const altarGoldMat = new THREE.MeshStandardMaterial({
        color: 0xd4af50,
        roughness: 0.05,
        metalness: 1.0
    });
    function addGoldTopRim(width, depth, topY, rimH, rimT) {
        // Front/back segments — full width along X.
        const longGeo = new THREE.BoxGeometry(width, rimH, rimT);
        const front = new THREE.Mesh(longGeo, altarGoldMat);
        front.position.set(0, topY, depth / 2 - rimT / 2);
        front.userData.isV10Altar = true;
        out.push(front);
        const back = new THREE.Mesh(longGeo, altarGoldMat);
        back.position.set(0, topY, -depth / 2 + rimT / 2);
        back.userData.isV10Altar = true;
        out.push(back);
        // Left/right segments — length = depth MINUS 2× rim thickness so
        // they sit BETWEEN the front/back segments, flush at the corners.
        const shortGeo = new THREE.BoxGeometry(rimT, rimH, depth - rimT * 2);
        const left = new THREE.Mesh(shortGeo, altarGoldMat);
        left.position.set(-width / 2 + rimT / 2, topY, 0);
        left.userData.isV10Altar = true;
        out.push(left);
        const right = new THREE.Mesh(shortGeo, altarGoldMat);
        right.position.set(width / 2 - rimT / 2, topY, 0);
        right.userData.isV10Altar = true;
        out.push(right);
    }
    // Cornice top only (8.9 × 8.9, top at y = ALTAR_TOP_Y). The trim
    // sits FLUSH on top of the cornice, just below the chess board.
    addGoldTopRim(8.9, 8.9, ALTAR_TOP_Y, 0.06, 0.10);

    // ---- Human silhouette figure ----
    const figure = new THREE.Group();
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.30, 16, 12), figureMat);
    head.position.y = 3.15;
    figure.add(head);
    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.10, 0.13, 0.18, 10), figureMat);
    neck.position.y = 2.90;
    figure.add(neck);
    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.45, 1.05, 14), figureMat);
    torso.position.y = 2.30;
    figure.add(torso);
    const shoulderL = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 10), figureMat);
    shoulderL.position.set(-0.45, 2.75, 0);
    figure.add(shoulderL);
    const shoulderR = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 10), figureMat);
    shoulderR.position.set( 0.45, 2.75, 0);
    figure.add(shoulderR);
    function makeArm(side) {
        const arm = new THREE.Group();
        const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.10, 0.09, 0.7, 10), figureMat);
        upper.position.y = -0.35;
        arm.add(upper);
        const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.085, 0.075, 0.7, 10), figureMat);
        lower.position.y = -1.05;
        arm.add(lower);
        const hand = new THREE.Mesh(new THREE.SphereGeometry(0.09, 10, 8), figureMat);
        hand.position.y = -1.45;
        arm.add(hand);
        arm.position.set(side * 0.5, 2.65, 0);
        return arm;
    }
    figure.add(makeArm(-1));
    figure.add(makeArm( 1));
    const hips = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.38, 0.30, 14), figureMat);
    hips.position.y = 1.65;
    figure.add(hips);
    function makeLeg(side) {
        const leg = new THREE.Group();
        const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.13, 0.85, 10), figureMat);
        thigh.position.y = -0.45;
        leg.add(thigh);
        const calf = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.09, 0.75, 10), figureMat);
        calf.position.y = -1.30;
        leg.add(calf);
        const foot = new THREE.Mesh(new THREE.BoxGeometry(0.20, 0.10, 0.35), figureMat);
        foot.position.set(0, -1.72, 0.08);
        leg.add(foot);
        leg.position.set(side * 0.18, 1.50, 0);
        return leg;
    }
    figure.add(makeLeg(-1));
    figure.add(makeLeg( 1));
    figure.position.set(0, GROUND_Y, 7);
    figure.rotation.y = Math.PI;
    out.push(figure);

    // ---- Sky dome ----
    // Vertical-gradient sky painted into a 64×512 canvas, mapped to the
    // inside of a large sphere. The gradient gives the sky atmospheric
    // depth (deep blue at zenith, lighter at horizon for day; deep navy
    // → slightly lifted dust band at horizon for night). Repainted by
    // applyColosseumDayNight when the mode changes.
    function paintColosseumSkyCanvas(ctx, stops) {
        const W = 64, H = 512;
        ctx.clearRect(0, 0, W, H);
        const g = ctx.createLinearGradient(0, 0, 0, H);
        for (const [pos, col] of stops) g.addColorStop(pos, col);
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
    }
    // Day gradient: deep cerulean zenith → cooler mid-blue → pale haze
    // at the horizon (atmospheric scattering through more air mass).
    const COLOSSEUM_DAY_STOPS = [
        [0.00, 'rgb(45, 95, 165)'],     // deep zenith blue
        [0.25, 'rgb(85, 135, 200)'],    // upper-mid
        [0.55, 'rgb(140, 180, 220)'],   // mid sky
        [0.78, 'rgb(195, 215, 230)'],   // near horizon — paler, atmospheric haze
        [1.00, 'rgb(225, 220, 200)']    // horizon band — warm pale (sun heating the dust)
    ];
    // Night gradient: near-black zenith → deep midnight → very faint
    // warm-purple dust band at the horizon (afterglow / city light at
    // far distance).
    const COLOSSEUM_NIGHT_STOPS = [
        [0.00, 'rgb(6, 8, 22)'],        // near-black zenith
        [0.30, 'rgb(12, 16, 38)'],      // deep midnight
        [0.60, 'rgb(22, 28, 58)'],      // dust layer above horizon
        [0.85, 'rgb(40, 32, 55)'],      // faint warm-purple afterglow
        [1.00, 'rgb(55, 38, 50)']       // horizon dust band
    ];
    const skyCanvas = document.createElement('canvas');
    skyCanvas.width = 64;
    skyCanvas.height = 512;
    const skyCtx = skyCanvas.getContext('2d');
    paintColosseumSkyCanvas(
        skyCtx,
        colosseumDayNight === 'day' ? COLOSSEUM_DAY_STOPS : COLOSSEUM_NIGHT_STOPS
    );
    const skyTex = new THREE.CanvasTexture(skyCanvas);
    skyTex.minFilter = THREE.LinearFilter;
    skyTex.magFilter = THREE.LinearFilter;
    skyTex.wrapS = THREE.ClampToEdgeWrapping;
    skyTex.wrapT = THREE.ClampToEdgeWrapping;

    const SKY_R = 200;
    const skyGeo = new THREE.SphereGeometry(SKY_R, 64, 48);
    const skyMat = new THREE.MeshBasicMaterial({
        map: skyTex,
        side: THREE.BackSide,
        depthWrite: false,
        fog: false
    });
    const sky = new THREE.Mesh(skyGeo, skyMat);
    sky.renderOrder = -1;
    out.push(sky);

    // ---- Stars (only at night) ----
    const STAR_COUNT = 600;
    const STAR_R = 180;
    const positions = new Float32Array(STAR_COUNT * 3);
    for (let i = 0; i < STAR_COUNT; i++) {
        const phi = Math.acos(2 * Math.random() - 1);
        const theta = Math.random() * Math.PI * 2;
        positions[i * 3]     = STAR_R * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = STAR_R * Math.cos(phi);
        positions[i * 3 + 2] = STAR_R * Math.sin(phi) * Math.sin(theta);
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const starMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.6,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0,
        depthWrite: false
    });
    const stars = new THREE.Points(starGeo, starMat);
    out.push(stars);

    // ---- Sun / moon sprite ----
    const sunCanvas = document.createElement('canvas');
    sunCanvas.width = 256;
    sunCanvas.height = 256;
    const sctx = sunCanvas.getContext('2d');
    const sunGrad = sctx.createRadialGradient(128, 128, 0, 128, 128, 110);
    sunGrad.addColorStop(0, 'rgba(255, 250, 220, 1.0)');
    sunGrad.addColorStop(0.4, 'rgba(255, 220, 160, 0.8)');
    sunGrad.addColorStop(1.0, 'rgba(255, 200, 100, 0)');
    sctx.fillStyle = sunGrad;
    sctx.fillRect(0, 0, 256, 256);
    const sunTex = new THREE.CanvasTexture(sunCanvas);
    const sunMat = new THREE.SpriteMaterial({
        map: sunTex,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending
    });
    const sun = new THREE.Sprite(sunMat);
    sun.scale.set(28, 28, 1);
    out.push(sun);

    const sunLight = new THREE.DirectionalLight(0xfff5dc, 1.0);
    sunLight.position.set(40, 90, 30);
    out.push(sunLight);
    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    out.push(ambient);

    _colosseumState = {
        sky: sky.material,
        skyCanvas,
        skyCtx,
        skyTex,
        skyDayStops: COLOSSEUM_DAY_STOPS,
        skyNightStops: COLOSSEUM_NIGHT_STOPS,
        paintSky: paintColosseumSkyCanvas,
        stars: stars.material,
        sunSprite: sun,
        sunTex: sunMat,
        sunLight,
        ambient,
        torches
    };
    applyColosseumDayNight(colosseumDayNight);

    // Honor the current elevation's altar-visibility rule (below mode
    // hides the altar so the coffins below the board are visible).
    if (typeof cameraElevation !== 'undefined' && cameraElevation === 'below') {
        for (const p of out) {
            if (p.userData && p.userData.isV10Altar) p.visible = false;
        }
    }

    return out;
}

// Switch the Colosseum scene between day and night. Tweens are skipped
// in favor of an instant swap — the toggle button click feels snappy and
// it matches the user's mental model of flipping a switch.
function applyColosseumDayNight(mode) {
    colosseumDayNight = mode;
    if (!_colosseumState) return;
    const s = _colosseumState;
    if (mode === 'day') {
        // Sky: vertical-gradient day palette (deep zenith → pale horizon).
        // Repaint the canvas and mark the texture dirty.
        if (s.skyCtx && s.paintSky && s.skyDayStops) {
            s.paintSky(s.skyCtx, s.skyDayStops);
            if (s.skyTex) s.skyTex.needsUpdate = true;
        }
        // Reset the material tint to white so the map shows true colors
        // (any prior setHex from the old flat-color era would tint it).
        if (s.sky.color) s.sky.color.setHex(0xffffff);
        s.stars.opacity = 0;
        // Sun position high in the sky
        s.sunSprite.position.set(60, 80, -20);
        s.sunTex.opacity = 1.0;
        // Lighting: warm bright sun + lifted ambient
        // Sunlight: neutral white (not warm cream) so the white marble
        // floor renders as white, not sand-colored. A slight bias toward
        // bluish-white sells "noon sky" without warming the surfaces.
        s.sunLight.color.setHex(0xfafbff);
        s.sunLight.intensity = 1.2;
        s.sunLight.position.set(40, 90, 30);
        s.ambient.color.setHex(0xffffff);
        s.ambient.intensity = 0.55;
        // Torches off
        for (const t of s.torches) {
            t.light.intensity = 0;
            t.flame.visible = false;
        }
        // Stone gets a slight warm wash via the ambient — no material change needed.
    } else {
        // Night: deep gradient — near-black zenith → faint dust at horizon.
        if (s.skyCtx && s.paintSky && s.skyNightStops) {
            s.paintSky(s.skyCtx, s.skyNightStops);
            if (s.skyTex) s.skyTex.needsUpdate = true;
        }
        if (s.sky.color) s.sky.color.setHex(0xffffff);
        s.stars.opacity = 0.9;
        // "Sun" sprite becomes the moon — cool pale, smaller-feeling
        s.sunSprite.position.set(-30, 70, -40);
        s.sunTex.opacity = 0.7;
        // Lighting: cool dim moon + low ambient
        s.sunLight.color.setHex(0xa0b8e0);
        s.sunLight.intensity = 0.35;
        s.sunLight.position.set(-30, 70, -40);
        s.ambient.color.setHex(0x6878a0);
        s.ambient.intensity = 0.18;
        // Torches on
        for (const t of s.torches) {
            t.light.intensity = 2.2;
            t.flame.visible = true;
        }
    }
}

function buildCathedralProps() {
    // Two Parthenon-style temples (peristyle colonnades on a stepped
    // stylobate, topped with a continuous entablature) PLUS animated rain.
    // The temples replace the previous gothic spires and arched colonnade.
    // Modeled loosely on the Temple of Athena Parthenos in Athens:
    //   - Doric order columns (fluted look, no base, square abacus capital)
    //   - 3-tier stepped stylobate base
    //   - Post-and-lintel construction — no arches
    //   - Peristyle (columns around the full rectangular perimeter)
    //
    // One temple sits north of the board (z=+32), one south (z=-32),
