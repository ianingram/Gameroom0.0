//   - V2 (Light view): polished gold orb + bright horizontal ring (Saturn-style).
//     The additive glow tends to wash out against the bright background, so V2
//     gets a different look that reads cleanly on white.
//
// Both versions are built for every royal piece; visibility toggles based on view.

// V2 alternate materials: polished gold orb + thin bright ring
const starOrbV2Material = new THREE.MeshStandardMaterial({
    color: 0xffd700,
    metalness: 1.0,
    roughness: 0.15,
    envMapIntensity: 2.5
});
const starRingV2Material = new THREE.MeshBasicMaterial({
    color: 0xfff4cc,           // bright pale-yellow ring (catches the eye against white)
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.9
});
// Ring geometries: inner radius slightly larger than orb radius, outer wider
const kingStarRingV2Geo  = new THREE.RingGeometry(0.10, 0.16, 48);
const queenStarRingV2Geo = new THREE.RingGeometry(0.07, 0.12, 48);
const kingStarOrbV2Geo   = new THREE.SphereGeometry(0.07, 24, 16);
const queenStarOrbV2Geo  = new THREE.SphereGeometry(0.05, 24, 16);

function buildStars() {
    clearStars();
    if (getGameMode() !== 'chess') return;

    pieceGroup.children.forEach(pieceMesh => {
        const t = pieceMesh.userData.type;
        if (t !== 'k' && t !== 'q') return;

        const coreGeom = t === 'k' ? kingStarCoreGeometry : queenStarCoreGeometry;
        const glowGeom = t === 'k' ? kingStarGlowGeometry : queenStarGlowGeometry;
        const orbV2Geom = t === 'k' ? kingStarOrbV2Geo   : queenStarOrbV2Geo;
        const ringV2Geom = t === 'k' ? kingStarRingV2Geo : queenStarRingV2Geo;

        const offset = t === 'k' ? 0.45 : 0.38;
        const topY = pieceMesh.position.y + pieceMesh.geometry.parameters.height / 2 + offset;
        const x = pieceMesh.position.x;
        const z = pieceMesh.position.z;

        // --- DEFAULT look (most views) ---
        // Outer glow layer (additive-blend, semi-transparent)
        const glow = new THREE.Mesh(glowGeom, starGlowMaterial);
        glow.position.set(x, topY, z);
        glow.userData.starLook = 'default';
        starGroup.add(glow);

        // Bright core layer (solid, opaque)
        const core = new THREE.Mesh(coreGeom, starCoreMaterial);
        core.position.set(x, topY, z);
        core.userData.starLook = 'default';
        starGroup.add(core);

        // --- V2 ALTERNATE look (Light view) ---
        // Polished gold orb
        const orbV2 = new THREE.Mesh(orbV2Geom, starOrbV2Material);
        orbV2.position.set(x, topY, z);
        orbV2.userData.starLook = 'v2';
        starGroup.add(orbV2);
        // Horizontal ring around the orb (slightly tilted so it reads as 3D, not a flat disc edge-on)
        const ringV2 = new THREE.Mesh(ringV2Geom, starRingV2Material);
        ringV2.rotation.x = Math.PI / 2 - 0.18; // tilt ~10° off horizontal
        ringV2.position.set(x, topY, z);
        ringV2.userData.starLook = 'v2';
        starGroup.add(ringV2);
    });

    // Apply current view's visibility on first build
    applyStarLookForView(currentViewId);
}

// Show only the correct set of star-pearl meshes for the active view.
function applyStarLookForView(viewId) {
    // V11 is the saved sibling of V2 and shares its star-pearl treatment
    // (gold orb + thin ring instead of the default additive glow).
    const wantV2 = (viewId === 2 || viewId === 11);
    starGroup.children.forEach(mesh => {
        if (mesh.userData.starLook === 'v2') mesh.visible = wantV2;
        else if (mesh.userData.starLook === 'default') mesh.visible = !wantV2;
    });
}

// ===== WIREFRAME OUTER LAYER =====
// A large cosmic chess board drawn in wireframe (LineSegments). When the
// toggle is ON, this layer is visible: the inner game board (8 units
// wide) sits as a "tiny bubble" in the center of the wireframe board
// (80 units wide). Same game state — when pieces move on the inner
// board, their wireframe counterparts update too.
//
// Pieces are drawn as thin wireframe outlines (LineSegments) so the
// whole layer reads as drawn lines, not solid forms.
//
// Lazy-built: created on first toggle-on. Stored at module scope so the
// toggle handler can show/hide it.
let _wireframeLayer = null;
let _wireframePieceGroup = null;

const WIREFRAME_BOARD_WIDTH = 80;
const WIREFRAME_BOARD_Y = 0.01;             // a hair above ground
const WIREFRAME_TILE_SIZE = WIREFRAME_BOARD_WIDTH / 8;     // 10 units per tile

function buildWireframeLayer() {
    if (_wireframeLayer) return;
    _wireframeLayer = new THREE.Group();
    _wireframeLayer.userData.isWireframeLayer = true;

    // Material for the board grid lines — soft cyan-white that glows
    // against either light or dark backgrounds
    const lineMat = new THREE.LineBasicMaterial({
        color: 0x88ccee,
        transparent: true,
        opacity: 0.55,
        depthWrite: false,
        fog: false
    });

    // ---- BOARD GRID ----
    // 9 lines along X + 9 lines along Z form the 8×8 grid
    const halfW = WIREFRAME_BOARD_WIDTH / 2;
    const gridPositions = [];
    for (let i = 0; i <= 8; i++) {
        const v = -halfW + i * WIREFRAME_TILE_SIZE;
        // Line along Z (varying z, constant x)
        gridPositions.push(v, WIREFRAME_BOARD_Y, -halfW,
                           v, WIREFRAME_BOARD_Y,  halfW);
        // Line along X (varying x, constant z)
        gridPositions.push(-halfW, WIREFRAME_BOARD_Y, v,
                            halfW, WIREFRAME_BOARD_Y, v);
    }
    const gridGeo = new THREE.BufferGeometry();
    gridGeo.setAttribute('position',
        new THREE.Float32BufferAttribute(gridPositions, 3));
    const gridLines = new THREE.LineSegments(gridGeo, lineMat);
    gridLines.userData.isWireframeGrid = true;
    _wireframeLayer.add(gridLines);

    // ---- OUTER BORDER (thicker glow) ----
    // A second pass at the perimeter so the board's edge is more visible
    const borderGeo = new THREE.BufferGeometry();
    borderGeo.setAttribute('position', new THREE.Float32BufferAttribute([
        -halfW, WIREFRAME_BOARD_Y, -halfW,   halfW, WIREFRAME_BOARD_Y, -halfW,
         halfW, WIREFRAME_BOARD_Y, -halfW,   halfW, WIREFRAME_BOARD_Y,  halfW,
         halfW, WIREFRAME_BOARD_Y,  halfW,  -halfW, WIREFRAME_BOARD_Y,  halfW,
        -halfW, WIREFRAME_BOARD_Y,  halfW,  -halfW, WIREFRAME_BOARD_Y, -halfW
    ], 3));
    const borderMat = new THREE.LineBasicMaterial({
        color: 0xaae0ff,
        transparent: true,
        opacity: 0.85,
        depthWrite: false,
        fog: false
    });
    const borderLines = new THREE.LineSegments(borderGeo, borderMat);
    _wireframeLayer.add(borderLines);

    // ---- INVISIBLE TILE TARGETS (64 squares, raycast-pickable) ----
    // Lines aren't reliably raycastable; an empty square has no LineSegments
    // to hit at all. So we lay a thin invisible mesh box over every tile
    // of the wireframe board. These meshes carry the square name in
    // userData so the main click handler can route a tap on the wireframe
    // board to the chess engine, the same way altar tiles do.
    const tileTargetMat = new THREE.MeshBasicMaterial({
        transparent: true,
        opacity: 0,            // fully invisible
        depthWrite: false      // doesn't occlude anything
    });
    for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
            const tileGeo = new THREE.BoxGeometry(
                WIREFRAME_TILE_SIZE * 0.98,
                0.05,
                WIREFRAME_TILE_SIZE * 0.98
            );
            const tile = new THREE.Mesh(tileGeo, tileTargetMat);
            tile.position.set(
                (col - 3.5) * WIREFRAME_TILE_SIZE,
                WIREFRAME_BOARD_Y,
                (row - 3.5) * WIREFRAME_TILE_SIZE
            );
            tile.userData.isWireframeTile = true;
            tile.userData.wireframeSquare = files[col] + ranks[row];
            _wireframeLayer.add(tile);
        }
    }

    // ---- PIECE GROUP (filled on each renderPieces) ----
    _wireframePieceGroup = new THREE.Group();
    _wireframeLayer.add(_wireframePieceGroup);

    // Attach to world (rotates with auto-rotation)
    _wireframeLayer.userData.attachToWorld = true;
    if (typeof world !== 'undefined') {
        world.add(_wireframeLayer);
    } else if (typeof scene !== 'undefined') {
        scene.add(_wireframeLayer);
    }

    // Populate with the current game state
    updateWireframePieces();
}

// Build a wireframe outline for a chess piece — uses EdgesGeometry on
// the actual piece geometry so the piece silhouette is drawn as lines.
// Cached per piece type for efficiency.
const _wireframeEdgeCache = {};
function getWireframeEdgeGeometry(square) {
    const key = square.type + '_' + square.color;
    if (_wireframeEdgeCache[key]) return _wireframeEdgeCache[key];
    const baseGeo = getPieceGeometry(square);
    const edgeGeo = new THREE.EdgesGeometry(baseGeo, 15);   // 15° edge threshold
    _wireframeEdgeCache[key] = edgeGeo;
    return edgeGeo;
}
const _wireframeLineMatWhite = new THREE.LineBasicMaterial({
    color: 0xeaf4ff,
    transparent: true,
    opacity: 1.0,
    depthWrite: false,
    fog: false
});
const _wireframeLineMatBlack = new THREE.LineBasicMaterial({
    color: 0x6080a0,
    transparent: true,
    opacity: 1.0,
    depthWrite: false,
    fog: false
});

// Color presets the wireframe materials swap between based on the
// active view's background brightness. Light backgrounds (V2-day,
// V11-day) need DARKER lines so the white player's pieces don't
// disappear against the bg; dark backgrounds (V1, V11-night, etc.)
// keep the original pale-blue/steel scheme.
const _WIREFRAME_COLORS_DARK_BG = {
    white: 0xeaf4ff,    // near-white pale blue — pops against dark bg
    black: 0x6080a0     // steel blue — visible against dark bg
};
const _WIREFRAME_COLORS_LIGHT_BG = {
    white: 0x103060,    // deep navy — high contrast against light gray bg
    black: 0x202020     // near-black — high contrast against light bg
};

// Decide which preset suits a given view + day/night state.
function _isLightBgViewForWireframe(viewId) {
    if (viewId === 2) return v2DayNight === 'day';
    if (viewId === 11) return v11DayNight === 'day';
    // Cathedral (5) and Colosseum (10) sky shifts but the pieces sit
    // inside lit architecture — the dark-bg scheme reads fine there.
    return false;
}
function refreshWireframeLineColors() {
    const viewId = (typeof currentViewId !== 'undefined') ? currentViewId : -1;
    const preset = _isLightBgViewForWireframe(viewId)
        ? _WIREFRAME_COLORS_LIGHT_BG
        : _WIREFRAME_COLORS_DARK_BG;
    _wireframeLineMatWhite.color.setHex(preset.white);
    _wireframeLineMatBlack.color.setHex(preset.black);
    // Ship line materials are CLONED per ship (so burn animations don't
    // bleed), so a rebuild is needed for their colors to pick up the new
    // preset. Only matters when the wireframe layer is currently visible.
    if (typeof _wireframeLayer !== 'undefined'
        && _wireframeLayer && _wireframeLayer.visible
        && typeof updateWireframePieces === 'function') {
        updateWireframePieces();
    }
}

// ============================================================
// WIREFRAME SHIPS (back-rank pieces in wireframe view)
// ============================================================
// In wireframe view, the 16 back-rank pieces become galleon-style ships.
// Each ship is a LineSegments wireframe outline (hull silhouette + mast +
// yard arm + sail frame) plus a small constellation plane on the sail
// that identifies the piece type. Pawns and middle-board pieces stay as
// regular wireframe piece outlines.
//
// Burn-and-sink capture animation: instead of dropping into a coffin
// like central-board pieces do, captured wireframe ships flicker orange,
// tilt, and sink below the wireframe board plane while fading out.

// Build a single buffered LineSegments geometry for the ship outline.
// Returns { lineGeo, dims } where dims tells the caller key dimensions
// for positioning the sail plane and the capture-animation hitbox.
function buildWireframeShipGeometry() {
    // Ship dimensions in "wireframe-ship units" (1 unit = 1 wireframe
    // tile). The ship fits inside ~0.9 of a tile.
    const HULL_L = 1.0;       // bow-stern length
    const HULL_W = 0.42;      // port-stbd beam
    const HULL_H = 0.18;      // hull depth
    const MAST_H = 1.0;       // mast height above deck
    const SAIL_W = 0.72;      // sail width (port-stbd direction)
    const SAIL_H = 0.65;      // sail height
    const YARD_LEN = SAIL_W * 1.2;

    const pts = [];
    function line(a, b) {
        pts.push(a[0], a[1], a[2], b[0], b[1], b[2]);
    }

    // ---- HULL OUTLINE (side profile + plan + cross-sections) ----
    // Bottom edge of the hull (V-shaped: tapers at the bow)
    const bowX = -HULL_L / 2;
    const sternX = +HULL_L / 2;
    // Port side bottom
    line([bowX,         -HULL_H * 0.5, 0],         [bowX + 0.15, -HULL_H * 0.5, -HULL_W * 0.35]);
    line([bowX + 0.15,  -HULL_H * 0.5, -HULL_W * 0.35], [sternX - 0.1, -HULL_H * 0.5, -HULL_W * 0.45]);
    line([sternX - 0.1, -HULL_H * 0.5, -HULL_W * 0.45], [sternX, -HULL_H * 0.5, -HULL_W * 0.30]);
    // Starboard side bottom
    line([bowX,         -HULL_H * 0.5, 0],         [bowX + 0.15, -HULL_H * 0.5, +HULL_W * 0.35]);
    line([bowX + 0.15,  -HULL_H * 0.5, +HULL_W * 0.35], [sternX - 0.1, -HULL_H * 0.5, +HULL_W * 0.45]);
    line([sternX - 0.1, -HULL_H * 0.5, +HULL_W * 0.45], [sternX, -HULL_H * 0.5, +HULL_W * 0.30]);
    // Stern transom (port to starboard at the back)
    line([sternX, -HULL_H * 0.5, -HULL_W * 0.30], [sternX, -HULL_H * 0.5, +HULL_W * 0.30]);

    // Deck (top of hull) outline — same plan as bottom but at y=+HULL_H/2,
    // and slightly WIDER (flare outward as is typical of galleons)
    const deckFlare = 1.05;
    const dBowX = bowX;
    const dStnX = sternX;
    const dPortMid = -HULL_W * 0.35 * deckFlare;
    const dStbdMid = +HULL_W * 0.35 * deckFlare;
    const dPortWide = -HULL_W * 0.45 * deckFlare;
    const dStbdWide = +HULL_W * 0.45 * deckFlare;
    const dPortStern = -HULL_W * 0.30 * deckFlare;
    const dStbdStern = +HULL_W * 0.30 * deckFlare;
    line([dBowX, HULL_H * 0.5, 0],                     [dBowX + 0.15, HULL_H * 0.5, dPortMid]);
    line([dBowX + 0.15, HULL_H * 0.5, dPortMid],       [dStnX - 0.1, HULL_H * 0.5, dPortWide]);
    line([dStnX - 0.1, HULL_H * 0.5, dPortWide],       [dStnX, HULL_H * 0.5, dPortStern]);
    line([dBowX, HULL_H * 0.5, 0],                     [dBowX + 0.15, HULL_H * 0.5, dStbdMid]);
    line([dBowX + 0.15, HULL_H * 0.5, dStbdMid],       [dStnX - 0.1, HULL_H * 0.5, dStbdWide]);
    line([dStnX - 0.1, HULL_H * 0.5, dStbdWide],       [dStnX, HULL_H * 0.5, dStbdStern]);
    line([dStnX, HULL_H * 0.5, dPortStern],            [dStnX, HULL_H * 0.5, dStbdStern]);

    // Vertical ribs connecting bottom to deck at four stations along the hull
    const ribXs = [bowX + 0.15, 0, sternX - 0.1, sternX];
    for (const rx of ribXs) {
        // Compute port-side y range at this station (linear blend between
        // segments — close enough for a wireframe sketch)
        let zPort_bot, zStbd_bot, zPort_top, zStbd_top;
        if (rx <= bowX + 0.15) { zPort_bot = -HULL_W * 0.35; zStbd_bot = +HULL_W * 0.35; zPort_top = dPortMid;  zStbd_top = dStbdMid;  }
        else if (rx <= sternX - 0.1) { zPort_bot = -HULL_W * 0.45; zStbd_bot = +HULL_W * 0.45; zPort_top = dPortWide; zStbd_top = dStbdWide; }
        else { zPort_bot = -HULL_W * 0.30; zStbd_bot = +HULL_W * 0.30; zPort_top = dPortStern; zStbd_top = dStbdStern; }
        line([rx, -HULL_H * 0.5, zPort_bot], [rx, HULL_H * 0.5, zPort_top]);
        line([rx, -HULL_H * 0.5, zStbd_bot], [rx, HULL_H * 0.5, zStbd_top]);
    }

    // Sterncastle box (raised aft platform) — its signature galleon shape
    const stcastY1 = HULL_H * 0.5;
    const stcastY2 = HULL_H * 0.5 + 0.25;
    const stcastX1 = sternX - 0.3;
    const stcastX2 = sternX;
    const stcastZ1 = -HULL_W * 0.28;
    const stcastZ2 = +HULL_W * 0.28;
    // 12 edges of a box
    const sc000 = [stcastX1, stcastY1, stcastZ1];
    const sc001 = [stcastX1, stcastY1, stcastZ2];
    const sc010 = [stcastX1, stcastY2, stcastZ1];
    const sc011 = [stcastX1, stcastY2, stcastZ2];
    const sc100 = [stcastX2, stcastY1, stcastZ1];
    const sc101 = [stcastX2, stcastY1, stcastZ2];
    const sc110 = [stcastX2, stcastY2, stcastZ1];
    const sc111 = [stcastX2, stcastY2, stcastZ2];
    line(sc000, sc001); line(sc010, sc011); line(sc100, sc101); line(sc110, sc111); // beam edges
    line(sc000, sc010); line(sc001, sc011); line(sc100, sc110); line(sc101, sc111); // vertical edges
    line(sc010, sc110); line(sc011, sc111);                                          // top edges
    // (Bottom edges of sterncastle coincide with deck — already drawn)

    // ---- MAST ----
    const mastBaseY = HULL_H * 0.5;
    const mastTopY = mastBaseY + MAST_H;
    // Mast slightly aft of midship (matches V11 galleon convention)
    const mastX = -0.05;
    line([mastX, mastBaseY, 0], [mastX, mastTopY, 0]);

    // ---- YARD ARM (across the beam, just below mast top) ----
    const yardY = mastTopY - 0.08;
    line([mastX, yardY, -YARD_LEN / 2], [mastX, yardY, +YARD_LEN / 2]);

    // ---- SAIL FRAME (square outline below the yard) ----
    const sailTopY = yardY;
    const sailBotY = sailTopY - SAIL_H;
    const sailLeftZ = -SAIL_W / 2;
    const sailRightZ = +SAIL_W / 2;
    line([mastX, sailTopY, sailLeftZ],  [mastX, sailTopY, sailRightZ]);
    line([mastX, sailBotY, sailLeftZ],  [mastX, sailBotY, sailRightZ]);
    line([mastX, sailTopY, sailLeftZ],  [mastX, sailBotY, sailLeftZ]);
    line([mastX, sailTopY, sailRightZ], [mastX, sailBotY, sailRightZ]);
    // Vertical mid-stay through the sail (a single dropped line so the
    // sail reads as cloth, not just an empty rectangle)
    line([mastX, sailTopY, 0], [mastX, sailBotY, 0]);

    // ---- BOWSPRIT (angled forward from the bow) ----
    const bowspritEnd = [bowX - 0.3, HULL_H * 0.5 + 0.1, 0];
    line([bowX, HULL_H * 0.5, 0], bowspritEnd);

    // ---- RIGGING (forestay + backstay) ----
    line([mastX, mastTopY, 0], bowspritEnd);                       // forestay
    line([mastX, mastTopY, 0], [stcastX1 + 0.05, stcastY2, 0]);    // backstay

    // ---- CRIMSON PENNANT (tiny triangle at the masthead) ----
    line([mastX, mastTopY, 0],       [mastX + 0.18, mastTopY + 0.04, 0]);
    line([mastX, mastTopY - 0.05, 0],[mastX + 0.18, mastTopY + 0.04, 0]);

    const lineGeo = new THREE.BufferGeometry();
    lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
    lineGeo.computeBoundingBox();

    return {
        lineGeo,
        dims: {
            HULL_L, HULL_W, HULL_H, MAST_H, SAIL_W, SAIL_H,
            sailCenterX: mastX,
            sailCenterY: (sailTopY + sailBotY) / 2,
            sailCenterZ: 0,
            mastTopY
        }
    };
}

// Build a complete ship Group for a given piece type + color. Returns
// the group plus refs needed for the burn-and-sink capture animation.
let _wireframeShipGeoCache = null;
function getWireframeShipBlueprint() {
    if (_wireframeShipGeoCache) return _wireframeShipGeoCache;
    _wireframeShipGeoCache = buildWireframeShipGeometry();
    return _wireframeShipGeoCache;
}
// Cache constellation textures per piece type for wireframe ships.
// Without this, every render would mint a fresh CanvasTexture per ship,
// piling up GPU resources over time.
const _wireframeShipConstellationTexCache = {};
function getWireframeShipConstellationTex(pieceType) {
    if (_wireframeShipConstellationTexCache[pieceType]) {
        return _wireframeShipConstellationTexCache[pieceType];
    }
    const makeTex = (typeof window !== 'undefined') ? window._makePieceConstellationTexture : null;
    if (!makeTex) return null;
    const constType = ({ r: 'rook', n: 'knight', b: 'bishop', q: 'queen', k: 'king' })[pieceType];
    if (!constType) return null;
    const tex = makeTex(constType);
    _wireframeShipConstellationTexCache[pieceType] = tex;
    return tex;
}

function buildWireframeShip(pieceType, color) {
    const bp = getWireframeShipBlueprint();
    const lineMat = (color === 'w') ? _wireframeLineMatWhite : _wireframeLineMatBlack;
    // Clone the material so per-ship animations (burn flicker, fade out)
    // don't bleed into other ships' colors.
    const myMat = lineMat.clone();
    const lines = new THREE.LineSegments(bp.lineGeo, myMat);

    const group = new THREE.Group();
    group.add(lines);

    // Constellation plane mounted to the sail — uses the same per-type
    // texture as the sky constellations and V11 ship sails (cached so
    // re-renders don't keep allocating GPU textures).
    let constMesh = null;
    const tex = getWireframeShipConstellationTex(pieceType);
    if (tex) {
        const constMat = new THREE.MeshBasicMaterial({
            map: tex,
            transparent: true,
            depthWrite: false,
            fog: false,
            side: THREE.DoubleSide
        });
        const constH = bp.dims.SAIL_H * 0.95;
        const constW = constH * (256 / 384);
        const constGeo = new THREE.PlaneGeometry(constW, constH);
        constMesh = new THREE.Mesh(constGeo, constMat);
        constMesh.rotation.y = Math.PI / 2;
        constMesh.position.set(
            bp.dims.sailCenterX + 0.005,
            bp.dims.sailCenterY,
            bp.dims.sailCenterZ
        );
        group.add(constMesh);
    }

    // Tag for the capture-animation system to find
    group.userData.isWireframeShip = true;
    group.userData.shipLineMesh = lines;
    group.userData.shipConstMesh = constMesh;
    group.userData.dims = bp.dims;

    return group;
}

// Per-ship sink animations currently in progress
const _wireframeShipSinkAnims = [];

function startWireframeShipSink(shipGroup) {
    // The ship's regular line material was cloned per-ship in buildWireframeShip,
    // so animating opacity/color won't affect other ships.
    _wireframeShipSinkAnims.push({
        group: shipGroup,
        startTime: performance.now(),
        startY: shipGroup.position.y,
        burnDuration: 800,             // ms: flicker orange before sinking
        sinkDuration: 1800,            // ms: sink + fade
        baseColor: shipGroup.userData.shipLineMesh.material.color.clone()
    });
}

function updateWireframeShipSinks(now) {
    for (let i = _wireframeShipSinkAnims.length - 1; i >= 0; i--) {
        const a = _wireframeShipSinkAnims[i];
        const t = now - a.startTime;
        const lineMat = a.group.userData.shipLineMesh.material;
        const constMesh = a.group.userData.shipConstMesh;

        if (t < a.burnDuration) {
            // BURN PHASE: tint lines toward orange-red with a flicker
            const k = t / a.burnDuration;
            const flicker = 0.65 + 0.35 * Math.abs(Math.sin(t * 0.04));
            // Lerp baseColor → orange-red
            const target = new THREE.Color(0xff5418);
            lineMat.color.copy(a.baseColor).lerp(target, k * flicker);
            // Slight tilt as fires take hold
            a.group.rotation.z = -k * 0.15;
        } else if (t < a.burnDuration + a.sinkDuration) {
            // SINK PHASE: lower below the wireframe board plane while
            // fading out. Also continue tilting.
            const k = (t - a.burnDuration) / a.sinkDuration;
            const e = k * k;                              // ease-in (slow start)
            a.group.position.y = a.startY - e * 2.4;
            a.group.rotation.z = -0.15 - e * 0.4;
            lineMat.opacity = 0.9 * (1 - k);
            if (constMesh) {
                constMesh.material.opacity = (constMesh.material.opacity || 1) * 0.98;
                if (k > 0.4) constMesh.material.opacity = Math.max(0, 1 - (k - 0.4) / 0.6);
            }
        } else {
            // DONE: remove from scene-graph + drop the anim
            if (a.group.parent) a.group.parent.remove(a.group);
            // Dispose the cloned material so we don't leak GPU resources
            lineMat.dispose();
            if (constMesh && constMesh.material && constMesh.material.dispose) {
                constMesh.material.dispose();
            }
            _wireframeShipSinkAnims.splice(i, 1);
        }
    }
}


// Active wireframe ships in the scene, keyed by their CURRENT square.
// The capture hook looks up the ship by source square and kicks off the
// burn-and-sink animation on the right ship. Cleared and rebuilt by
// updateWireframePieces on each move.
const _wireframeShipsBySquare = {};

// Re-populate the wireframe piece group from the current chess state.
// Called from renderPieces after every move.
function updateWireframePieces() {
    if (!_wireframePieceGroup) return;
    // IMPORTANT: pieces that are currently sinking are NOT in
    // _wireframePieceGroup anymore — they were detached and reparented
    // to _wireframeLayer so their animation continues across rerenders.
    // Children of _wireframePieceGroup at this point are static pieces
    // from the previous render that we're about to replace.
    while (_wireframePieceGroup.children.length > 0) {
        _wireframePieceGroup.remove(_wireframePieceGroup.children[0]);
    }
    // Clear the ship registry; we'll rebuild it.
    for (const sq in _wireframeShipsBySquare) delete _wireframeShipsBySquare[sq];

    const boardState = getBoardState();
    // Scale up pieces so they're visible at the wireframe board's larger scale
    const PIECE_SCALE = WIREFRAME_TILE_SIZE * 0.85;
    // Invisible material used for the click-target hitboxes that wrap each
    // wireframe piece. The pieces themselves are LineSegments (essentially
    // 1D edges) and are unreliable raycast targets; an invisible solid box
    // around each one gives the main click handler a robust hit surface.
    const pieceTargetMat = new THREE.MeshBasicMaterial({
        transparent: true,
        opacity: 0,
        depthWrite: false
    });
    for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
            const square = boardState[row][col];
            if (!square) continue;

            const sqName = files[col] + ranks[row];
            // Was this piece originally a back-rank piece? Check via the
            // pieceHomeMap (which tracks current square → starting square).
            // If we can't find it, fall back to checking the current row
            // (covers initial render before pieceHomeMap is populated for
            // late-add scenarios).
            const home = (typeof pieceHomeMap !== 'undefined') ? pieceHomeMap[sqName] : null;
            const homeRow = home ? ranks.indexOf(home[1]) : row;
            const isBackRankShip = (homeRow === 0 || homeRow === 7) && square.type !== 'p';

            if (isBackRankShip) {
                // Build a wireframe ship for this piece.
                const ship = buildWireframeShip(square.type, square.color);
                const SHIP_SCALE = WIREFRAME_TILE_SIZE * 0.65;   // a touch smaller than piece scale
                ship.scale.set(SHIP_SCALE, SHIP_SCALE, SHIP_SCALE);
                ship.position.set(
                    (col - 3.5) * WIREFRAME_TILE_SIZE,
                    WIREFRAME_BOARD_Y + SHIP_SCALE * 0.3,    // hull half-height above the board
                    (row - 3.5) * WIREFRAME_TILE_SIZE
                );
                // Yaw so the bow faces the OPPONENT's side. White ships
                // (row 7) face -Z; black ships (row 0) face +Z. The ship's
                // built bow is at local -X, so we yaw -90° for white and
                // +90° for black.
                ship.rotation.y = (square.color === 'w') ? -Math.PI / 2 : Math.PI / 2;
                _wireframePieceGroup.add(ship);
                _wireframeShipsBySquare[sqName] = ship;

                // Hitbox for clicks — sized to the ship's bounding box
                const dims = ship.userData.dims;
                const hitW = (dims.HULL_L + 0.3) * SHIP_SCALE;
                const hitH = (dims.HULL_H + dims.MAST_H + 0.2) * SHIP_SCALE;
                const hitD = (dims.HULL_W * 1.2) * SHIP_SCALE;
                // After yaw, length and beam swap relative to world axes
                const hitGeo = new THREE.BoxGeometry(hitD, hitH, hitW);
                const hitMesh = new THREE.Mesh(hitGeo, pieceTargetMat);
                hitMesh.position.set(
                    ship.position.x,
                    ship.position.y + (dims.MAST_H * 0.5) * SHIP_SCALE,
                    ship.position.z
                );
                hitMesh.userData.isWireframePiece = true;
                hitMesh.userData.wireframeSquare = sqName;
                _wireframePieceGroup.add(hitMesh);
                continue;
            }

            // ---- Standard wireframe piece (non-ship) ----
            const edgeGeo = getWireframeEdgeGeometry(square);
            const mat = square.color === 'w'
                ? _wireframeLineMatWhite
                : _wireframeLineMatBlack;
            const lines = new THREE.LineSegments(edgeGeo, mat);
            lines.scale.set(PIECE_SCALE, PIECE_SCALE, PIECE_SCALE);
            // Place at wireframe-board coordinates (10× scale of inner board)
            const baseHeight = lines.geometry.boundingBox
                ? (lines.geometry.boundingBox.max.y - lines.geometry.boundingBox.min.y) * PIECE_SCALE / 2
                : PIECE_SCALE * 0.5;
            lines.position.set(
                (col - 3.5) * WIREFRAME_TILE_SIZE,
                WIREFRAME_BOARD_Y + baseHeight + 0.02,
                (row - 3.5) * WIREFRAME_TILE_SIZE
            );
            _wireframePieceGroup.add(lines);

            // Invisible click-target hitbox around the piece. Sized to the
            // piece's bounding box (in world units, accounting for PIECE_SCALE)
            // so taps anywhere on or near the wireframe silhouette register
            // as a click on this square's piece.
            let hitW = WIREFRAME_TILE_SIZE * 0.85;
            let hitH = PIECE_SCALE * 1.0;
            let hitD = WIREFRAME_TILE_SIZE * 0.85;
            if (lines.geometry.boundingBox) {
                const bb = lines.geometry.boundingBox;
                hitW = (bb.max.x - bb.min.x) * PIECE_SCALE;
                hitH = (bb.max.y - bb.min.y) * PIECE_SCALE;
                hitD = (bb.max.z - bb.min.z) * PIECE_SCALE;
            }
            const hitGeo = new THREE.BoxGeometry(hitW, hitH, hitD);
            const hitMesh = new THREE.Mesh(hitGeo, pieceTargetMat);
            hitMesh.position.copy(lines.position);
            hitMesh.userData.isWireframePiece = true;
            hitMesh.userData.wireframeSquare = sqName;
            _wireframePieceGroup.add(hitMesh);
        }
    }
}

// ============================================================
// CHECKERS KING BOAT
// ============================================================
// When a checkers pawn reaches the opposite back row and is promoted
// to a king, we render its piece as a small "king's flagship" boat in
// the square — a visual nod to the V11 fleet's king ship. Sized to
// fit within a single chess square (1.0 world unit wide).
//
// The boat is a simplified Group (not the full V11 galleon — that
// would have a 16-unit-long hull). Built from primitives so it stays
// cheap to spawn 12+ of them in mid-game.
function buildCheckersKingBoat(color, squareName) {
    const group = new THREE.Group();
    // Fit within a 1×1 square: hull ≈ 0.85 long, 0.42 beam.
    const HULL_L = 0.85;
    const HULL_W = 0.42;
    const HULL_H = 0.18;
    const isWhite = color === 'w';

    // Materials. White player = pale-wood + cream sail; black = dark
    // walnut + deep navy sail. Both share the same gold trim.
    const hullColor   = isWhite ? 0xd5b890 : 0x3a2a1e;
    const hullDarkCol = isWhite ? 0xb89a72 : 0x1a1208;
    const deckCol     = isWhite ? 0xc4a578 : 0x5a4030;
    const sailColor   = isWhite ? 0xf2e9d2 : 0x14213a;

    const hullMatLocal = new THREE.MeshStandardMaterial({ color: hullColor,   roughness: 0.78, metalness: 0.06, fog: false });
    const hullDarkLocal= new THREE.MeshStandardMaterial({ color: hullDarkCol, roughness: 0.85, metalness: 0.05, fog: false });
    const deckMatLocal = new THREE.MeshStandardMaterial({ color: deckCol,     roughness: 0.75, metalness: 0.05, fog: false });
    const mastMatLocal = new THREE.MeshStandardMaterial({ color: 0x4a3220,    roughness: 0.7,  metalness: 0.05, fog: false });
    const goldMatLocal = new THREE.MeshStandardMaterial({ color: 0xb8932c,    roughness: 0.45, metalness: 0.7,  fog: false });
    const sailMatLocal = new THREE.MeshStandardMaterial({
        color: sailColor,
        roughness: 0.95,
        metalness: 0.02,
        side: THREE.DoubleSide,
        fog: false
    });

    // ---- TAPERED HULL (small custom prism: narrower at the keel) ----
    function makeMiniHull(L, beamTop, beamBot, H, Lbot) {
        const halfL  = L / 2, halfLb = Lbot / 2;
        const halfBt = beamTop / 2, halfBb = beamBot / 2;
        const verts = new Float32Array([
            -halfL,  H, -halfBt,    halfL,  H, -halfBt,    halfL,  H,  halfBt,   -halfL,  H,  halfBt,
            -halfLb, 0, -halfBb,    halfLb, 0, -halfBb,    halfLb, 0,  halfBb,   -halfLb, 0,  halfBb
        ]);
        const indices = new Uint16Array([
            0, 2, 1,   0, 3, 2,
            4, 5, 6,   4, 6, 7,
            0, 1, 5,   0, 5, 4,
            3, 7, 6,   3, 6, 2,
            0, 4, 7,   0, 7, 3,
            1, 2, 6,   1, 6, 5
        ]);
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
        geo.setIndex(new THREE.BufferAttribute(indices, 1));
        geo.computeVertexNormals();
        return geo;
    }

    const hull = new THREE.Mesh(
        makeMiniHull(HULL_L, HULL_W, HULL_W * 0.5, HULL_H, HULL_L * 0.85),
        hullMatLocal
    );
    group.add(hull);

    // Bow taper
    const bowL = HULL_L * 0.22;
    const bow = new THREE.Mesh(
        makeMiniHull(bowL, HULL_W * 0.5, HULL_W * 0.2, HULL_H * 0.85, bowL * 0.7),
        hullMatLocal
    );
    bow.position.set(-(HULL_L / 2 + bowL / 2 - 0.02), 0, 0);
    group.add(bow);

    // Bow tip
    const tipL = bowL * 0.4;
    const bowTip = new THREE.Mesh(
        makeMiniHull(tipL, HULL_W * 0.18, HULL_W * 0.05, HULL_H * 0.55, tipL * 0.55),
        hullDarkLocal
    );
    bowTip.position.set(bow.position.x - bowL * 0.55, 0, 0);
    group.add(bowTip);

    // Stern (wider transom tapered at the keel)
    const sternL = HULL_L * 0.22;
    const stern = new THREE.Mesh(
        makeMiniHull(sternL, HULL_W * 0.92, HULL_W * 0.55, HULL_H * 1.0, sternL * 0.85),
        hullMatLocal
    );
    stern.position.set(HULL_L / 2 + sternL / 2 - 0.02, 0, 0);
    group.add(stern);

    // ---- DECK ----
    const deck = new THREE.Mesh(
        new THREE.BoxGeometry(HULL_L * 0.92, HULL_H * 0.10, HULL_W * 0.88),
        deckMatLocal
    );
    deck.position.y = HULL_H + HULL_H * 0.05;
    group.add(deck);

    // ---- LOW STATEROOM (at the stern) ----
    const stRoomD = HULL_L * 0.26;
    const stRoomH = HULL_H * 0.65;
    const stRoomW = HULL_W * 0.7;
    const stRoom = new THREE.Mesh(
        new THREE.BoxGeometry(stRoomD, stRoomH, stRoomW),
        deckMatLocal
    );
    const stRoomX = HULL_L / 2 - stRoomD / 2;
    const stRoomY = HULL_H + HULL_H * 0.10 + stRoomH / 2;
    stRoom.position.set(stRoomX, stRoomY, 0);
    group.add(stRoom);
    // Gold trim band
    const trim = new THREE.Mesh(
        new THREE.BoxGeometry(stRoomD * 1.03, stRoomH * 0.10, stRoomW * 1.05),
        goldMatLocal
    );
    trim.position.set(stRoomX, stRoomY + stRoomH * 0.4, 0);
    group.add(trim);

    // ---- MAST ----
    const mastH = 0.55;
    const mastR = 0.014;
    const mastX = HULL_L * 0.04;
    const mast = new THREE.Mesh(
        new THREE.CylinderGeometry(mastR * 0.85, mastR, mastH, 10),
        mastMatLocal
    );
    const deckTop = HULL_H + HULL_H * 0.10;
    mast.position.set(mastX, deckTop + mastH / 2, 0);
    group.add(mast);
    // Masthead cap
    const cap = new THREE.Mesh(
        new THREE.SphereGeometry(mastR * 1.4, 8, 6),
        mastMatLocal
    );
    cap.position.set(mastX, deckTop + mastH, 0);
    group.add(cap);

    // ---- YARD ARM + SAIL ----
    const yardLen = 0.42;
    const yard = new THREE.Mesh(
        new THREE.CylinderGeometry(mastR * 0.85, mastR * 0.85, yardLen, 8),
        mastMatLocal
    );
    yard.rotation.x = Math.PI / 2;
    const yardY = deckTop + mastH * 0.9;
    const sailX = mastX - 0.02;
    yard.position.set(sailX, yardY, 0);
    group.add(yard);
    // Sail cloth
    const sailW = 0.38;
    const sailH = 0.38;
    const sail = new THREE.Mesh(
        new THREE.PlaneGeometry(sailW, sailH),
        sailMatLocal
    );
    sail.rotation.y = -Math.PI / 2;
    sail.position.set(sailX, yardY - sailH / 2, 0);
    group.add(sail);

    // ---- TAG every descendant with the square id ----
    // So raycaster hits on any sub-mesh route to this checkers square.
    group.userData = { id: squareName, type: 'k', color: color, isTile: false, isCheckersKingBoat: true };
    group.traverse(obj => {
        if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
            obj.userData.id = squareName;
            obj.userData.type = 'k';
            obj.userData.color = color;
            obj.userData.isTile = false;
        }
    });

    return group;
}

// ============================================================
// CHESS ANCHOR-MODE BOAT
// ============================================================
// Used when V11's anchor toggle is on. Back-rank chess pieces render
// as small boats on the central board, with a constellation device on
// the sail that identifies the piece type. King is full size; queen,
// bishop, knight, rook scale down. Pawns stay as regular cylinders.
function buildChessAnchorBoat(pieceLetter, color, squareName) {
    // Reuse the checkers boat as a base, then add a constellation device
    // on the sail and scale per piece type.
    const group = buildCheckersKingBoat(color, squareName);
    const SCALES = { k: 1.00, q: 0.92, b: 0.84, n: 0.80, r: 0.78 };
    const s = SCALES[pieceLetter] || 0.85;
    group.scale.setScalar(s);
    // Find the sail mesh inside the boat group (it's the only PlaneGeometry
    // child — the cloth sail).
    let sailMesh = null;
    group.traverse(obj => {
        if (sailMesh) return;
        if (obj.isMesh && obj.geometry && obj.geometry.type === 'PlaneGeometry') {
            sailMesh = obj;
        }
    });
    if (sailMesh) {
        const tex = (typeof getWireframeShipConstellationTex === 'function')
            ? getWireframeShipConstellationTex(pieceLetter)
            : null;
        if (tex) {
            const sailGeo = sailMesh.geometry;
            const sailH = sailGeo.parameters.height * 0.85;
            const constMat = new THREE.MeshBasicMaterial({
                map: tex,
                transparent: true,
                depthWrite: false,
                fog: false,
                side: THREE.DoubleSide
            });
            const constMesh = new THREE.Mesh(
                new THREE.PlaneGeometry(sailH * (256 / 384), sailH),
                constMat
            );
            constMesh.rotation.copy(sailMesh.rotation);
            constMesh.position.copy(sailMesh.position);
            constMesh.position.x -= 0.01;
            constMesh.userData = {
                id: squareName, type: pieceLetter, color: color, isTile: false
            };
            group.add(constMesh);
        }
    }
    group.userData.type = pieceLetter;
    group.traverse(obj => {
        if (obj.isMesh && obj.userData) obj.userData.type = pieceLetter;
    });
    return group;
}

function renderPieces() {
    while (pieceGroup.children.length > 0) {
        pieceGroup.remove(pieceGroup.children[0]);
    }

    const boardState = getBoardState();
    const _mode = getGameMode();
    for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
            const square = boardState[row][col];
            if (!square) continue;
            const squareName = files[col] + ranks[row];

            // ---- CHESS ANCHOR MODE: back-rank pieces → small boats ----
            // Lifetime boat: once a back-rank piece, always a boat (we
            // identify by home square via pieceHomeMap if available,
            // falling back to the current row).
            if (_mode === 'chess'
                && typeof anchorModeOn !== 'undefined' && anchorModeOn
                && square.type !== 'p') {
                let homeRow = row;
                if (typeof pieceHomeMap !== 'undefined') {
                    const home = pieceHomeMap[squareName];
                    if (home) homeRow = ranks.indexOf(home[1]);
                }
                if (homeRow === 0 || homeRow === 7) {
                    const boat = buildChessAnchorBoat(square.type, square.color, squareName);
                    boat.position.set(col - 3.5, 0.1, row - 3.5);
                    boat.rotation.y = (square.color === 'w') ? Math.PI / 2 : -Math.PI / 2;
                    pieceGroup.add(boat);
                    continue;
                }
            }

            // ---- CHECKERS KING: render as a small king's-flagship boat ----
            if (_mode === 'checkers' && square.type === 'k') {
                const boat = buildCheckersKingBoat(square.color, squareName);
                boat.position.set(col - 3.5, 0.1, row - 3.5);
                // Yaw so the bow points toward the opponent's side. White
                // kings advance toward -Z, black toward +Z. Boat's bow is
                // at local -X, so yaw +90° for white (local -X → world -Z)
                // and -90° for black.
                boat.rotation.y = (square.color === 'w') ? Math.PI / 2 : -Math.PI / 2;
                pieceGroup.add(boat);
                continue;
            }

            const geometry = getPieceGeometry(square);
            const material = getPieceMaterial(square);
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;

            mesh.userData = { id: squareName, type: square.type, color: square.color, isTile: false };

            mesh.position.set(
                col - 3.5,
                mesh.geometry.parameters.height / 2 + 0.1,
                row - 3.5
            );
            pieceGroup.add(mesh);
        }
    }
    buildHalos();
    buildGoldHalos();
    buildStars();
    renderAltarPieces();
    if (typeof updateWireframePieces === 'function') updateWireframePieces();
}

// ----- ALTAR BOARD MIRRORING -----
// Each temple has a mini chessboard on its altar. Both altars mirror the
// main match: every move on the central board reflects on the altars
// instantly because renderAltarPieces is called by renderPieces.
//
// Each altar board is identified by the `userData.altarBoardGroup` flag
// set when the temple was built. We walk all active view props, look for
// any group that has a child marked with that flag, and (re)populate it
// with scaled-down piece meshes mirroring the current board state.
//
// The mini pieces reuse the same geometry/material as the full pieces but
// are scaled down to fit the altar's smaller tile size. We DO NOT tag
// them with userData.id (so they don't register as clickable in the
// raycaster's piece selection — the altars are display-only for now).
function renderAltarPieces() {
    if (typeof activeViewProps === 'undefined' || activeViewProps.length === 0) return;
    const boardState = getBoardState();
    // Walk every active view prop. Each temple group has child groups;
    // we look for the altar board group via its userData flag.
    for (const prop of activeViewProps) {
        prop.traverse(obj => {
            if (!obj.userData || !obj.userData.isAltarBoard) return;
            // Clear existing children that aren't tiles (tiles are the
            // 64 board squares; pieces are everything else).
            const toRemove = [];
            for (const child of obj.children) {
                if (!child.userData || !child.userData.isAltarTile) {
                    // Tiles weren't tagged — distinguish by mesh height.
                    // Tile geometry is 0.02 tall, pieces are >= 0.5 tall.
                    if (child.geometry && child.geometry.parameters
                        && child.geometry.parameters.height
                        && child.geometry.parameters.height > 0.05) {
                        toRemove.push(child);
                    }
                }
            }
            for (const c of toRemove) obj.remove(c);

            // Repopulate from board state. Mini tiles are MINI_TILE_SIZE
            // wide (stored in userData.tileSize). The full piece geometry
            // is 1 unit wide; we scale to make pieces fit nicely on the
            // smaller tiles.
            const tileSize = obj.userData.tileSize;
            const pieceScale = tileSize * 0.85;   // a bit smaller than tile
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const sq = boardState[row][col];
                    if (!sq) continue;
                    const geometry = getPieceGeometry(sq);
                    const material = getPieceMaterial(sq);
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.scale.set(pieceScale, pieceScale, pieceScale);
                    mesh.castShadow = true;
                    mesh.position.set(
                        (col - 3.5) * tileSize,
                        (mesh.geometry.parameters.height * pieceScale) / 2 + 0.02,
                        (row - 3.5) * tileSize
                    );
                    obj.add(mesh);
                }
            }
        });
    }
}

// ----- PIECE IDENTITY TRACKING (for coffin assignment) -----
// Each piece has a stable "home" — the square it started on. We track this so that
// when piece-on-d4 captures piece-on-d5, we know whose coffin to send d5's piece to,
// regardless of where d5's piece originated.
//
// Map: currentSquare -> startingSquare. Updated after every move.
let pieceHomeMap = {};

function resetPieceHomes() {
    pieceHomeMap = {};
    const state = getBoardState();
    for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
            if (state[row][col]) {
                const sq = files[col] + ranks[row];
                pieceHomeMap[sq] = sq;
            }
        }
    }
}
resetPieceHomes();

// Snapshot the board state into a {square: {type, color}} map for diffing.
function snapshotBoard() {
    const state = getBoardState();
    const snap = {};
    for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
            if (state[row][col]) {
                snap[files[col] + ranks[row]] = state[row][col];
            }
        }
    }
    return snap;
}

// Given before/after board snapshots, return:
//   - movedFrom, movedTo: the primary move (one piece changed squares)
//   - captures: array of {square, piece} for any captured pieces
// Handles normal moves, captures, en passant, and castling (which moves two pieces).
function diffBoards(before, after) {
    const disappeared = [];    // squares occupied before but not after
    const appeared = [];       // squares occupied after but not before
    for (const sq in before) {
        if (!after[sq]) disappeared.push(sq);
        else if (after[sq].color !== before[sq].color || after[sq].type !== before[sq].type) {
            // Piece on this square changed color OR type (capture replacement, or promotion).
            // Treat it as: original piece on this square disappeared AND a new one appeared.
            disappeared.push(sq);
            appeared.push(sq);
        }
    }
    for (const sq in after) {
        if (!before[sq]) appeared.push(sq);
    }

    // Pair disappeared->appeared squares of the same color as moves.
    // The leftover disappeared (of opposing color, or unmatched) are captures.
    const captures = [];
    const moves = [];
    const usedAppeared = new Set();

    for (const fromSq of disappeared) {
        const movingPiece = before[fromSq];
        // Try to find an appeared square with the same color (the moving piece's destination)
        const candidate = appeared.find(toSq =>
            !usedAppeared.has(toSq) &&
            after[toSq] &&
            after[toSq].color === movingPiece.color
        );
        if (candidate) {
            moves.push({ from: fromSq, to: candidate });
            usedAppeared.add(candidate);
        } else {
            // No same-color destination: this piece was captured (and removed).
            captures.push({ square: fromSq, piece: movingPiece });
        }
    }

    return { moves, captures };
}

// ----- CAPTURE ANIMATION -----
// When a piece is captured, we keep its mesh around and animate it sinking from its
// last-known board position straight down into its dedicated coffin.
const capturedGroup = new THREE.Group();
world.add(capturedGroup);

const animations = []; // [{mesh, startY, endY, startTime, duration, endX, endZ, startX, startZ}, ...]
const CAPTURE_ANIM_MS = 1200;

// Smooth easing: easeInOutCubic
function ease(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function startCaptureAnimation(capturedMesh, targetCoffin) {
    // Coffin position is its world position; we want to animate the captured piece's
    // local position (it's in capturedGroup which is in `world`, same as coffin).
    // So we use the coffin's local position directly.
    const startX = capturedMesh.position.x;
    const startY = capturedMesh.position.y;
    const startZ = capturedMesh.position.z;
    const endX = targetCoffin.position.x;
    const endY = targetCoffin.position.y - COFFIN_DEPTH / 2 + capturedMesh.geometry.parameters.height / 2;
    const endZ = targetCoffin.position.z;

    animations.push({
        mesh: capturedMesh,
        startX, startY, startZ,
        endX, endY, endZ,
        startTime: performance.now(),
        duration: CAPTURE_ANIM_MS
    });

    // Trigger the sky-constellation fall for matching back-rank pieces.
    // (Pawns don't have a constellation; only r/n/b/q/k do.)
    // Color matters: black pieces fall from the SOUTH row (behind black
    // temple), white pieces fall from the NORTH row.
    //
    // The ghost mesh stores its piece info under userData.capturedPiece
    // (set in attemptMoveWithCaptures), so we read from there. Fall back
    // to a flat userData shape just in case.
    let capType  = null;
    let capColor = null;
    if (capturedMesh.userData) {
        if (capturedMesh.userData.capturedPiece) {
            capType  = capturedMesh.userData.capturedPiece.type;
            capColor = capturedMesh.userData.capturedPiece.color;
        } else {
            capType  = capturedMesh.userData.type;
            capColor = capturedMesh.userData.color;
        }
    }
    if (capType && capType !== 'p') {
        const row = (capColor === 'black') ? 'south' : 'north';
        triggerSkyConstellationFall(capType, row);
    }
    // Capture count just changed — refresh the "Continue at mountains"
    // button (V3) or any other capture-gated UI.
    if (typeof refreshMoveToTempleButton === 'function') {
        refreshMoveToTempleButton();
    }
    if (typeof refreshTempleIcons === 'function') {
        refreshTempleIcons();
    }
}

// Pick the next "alive" sky-constellation matching the captured piece's
// type-letter and row, then SHATTER it — the constellation breaks into
// individual stars that scatter outward and fall to earth.
function triggerSkyConstellationFall(typeLetter, row) {
    const list = (typeof window !== 'undefined') ? window._skyConstellations : null;
    if (!list || !list.length) return;
    const candidates = list.filter(m =>
        m.userData.pieceLetter === typeLetter &&
        m.userData.row === row &&
        !m.userData.fallState &&
        m.parent !== null     // only constellations currently attached to the active view
    );
    if (!candidates.length) return;
    candidates.sort((a, b) => a.userData.slot - b.userData.slot);
    const target = candidates[0];
    // Mark as exploded so it doesn't fire again
    target.userData.fallState = 'shattered';
    // SUPERNOVA BURST at the constellation's sky position
    spawnSupernova(
        target.userData.initialX,
        target.userData.initialY,
        target.userData.initialZ
    );
    // SHATTER: spawn individual stars at each constellation point
    shatterConstellation(target);
}

// Break a constellation into individual scattering stars.
// The original plane begins a fast fade (so the connecting lines burn
// away) while new sprite stars are added to the scene at each of the
// constellation's star positions. Each new star gets its own velocity,
// spin, gravity, and 2-minute fall arc.
const _shatterStars = [];               // active scattered-star sprites
function shatterConstellation(plane) {
    const pieceType = plane.userData.pieceType;
    const getter = (typeof window !== 'undefined') ? window._getPieceStarPositions : null;
    const texGetter = (typeof window !== 'undefined') ? window._makeShatterStarTexture : null;
    if (!getter || !texGetter) return;
    const positions = getter(pieceType);
    if (!positions || !positions.length) return;
    const tex = texGetter();
    // Plane is 256 canvas pixels wide → planeW world units; pixel-to-world
    const planeW = plane.userData.planeW || 28;
    const px2world = planeW / 256;
    // Mark the plane as "fading out lines" — its opacity will animate
    // to 0 over ~1.5 seconds, then hide. This burns the connecting lines.
    plane.userData.lineFadeStart = performance.now();
    plane.userData.lineFadeDuration = 1500;
    const cx = plane.userData.initialX;
    const cy = plane.userData.initialY;
    const cz = plane.userData.initialZ;
    const row = plane.userData.row;             // 'south' (z negative) or 'north' (z positive)
    // For the SOUTH row, the plane faces +Z (toward camera looking -Z).
    // Pixel +X on canvas → world +X. Pixel +Y on canvas → world -Y (canvas Y grows downward).
    // For the NORTH row, plane is in +Z (z=+260) and faces -Z. The slots are
    // mirrored in X but the canvas-Y mapping stays inverted the same way.
    for (const star of positions) {
        const wx = cx + star.x * px2world;
        const wy = cy + (-star.y) * px2world;       // flip Y because canvas Y is downward
        const wz = cz;
        const mat = new THREE.SpriteMaterial({
            map: tex,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
            fog: false
        });
        const sprite = new THREE.Sprite(mat);
        // Scale proportional to the original star's draw radius (relative
        // to the canvas), inflated for visibility at sky distance.
        const baseScale = (star.r / 3) * px2world * 18;       // ~empirical multiplier
        sprite.scale.set(baseScale, baseScale, 1);
        sprite.position.set(wx, wy, wz);
        sprite.renderOrder = 4;
        scene.add(sprite);
        // Animation state for this individual star
        // Velocity: outward from constellation center, with some
        // tangential variance — feels like an explosion.
        const dx = star.x * px2world;
        const dy = -star.y * px2world;
        const len = Math.hypot(dx, dy) || 1;
        const outwardX = (dx / len) * (6 + Math.random() * 8);      // 6-14 wu/s outward
        const outwardY = (dy / len) * (6 + Math.random() * 8);
        const tangX = (-dy / len) * (Math.random() - 0.5) * 4;       // perpendicular wiggle
        const tangY = ( dx / len) * (Math.random() - 0.5) * 4;
        const lateralZ = (Math.random() - 0.5) * 10;                  // 3D scatter into Z
        _shatterStars.push({
            sprite,
            startTime: performance.now(),
            duration: 120 * 1000,
            // Initial position
            initialX: wx, initialY: wy, initialZ: wz,
            // Velocities (world units per second)
            vx: outwardX + tangX,
            vy: outwardY + tangY,
            vz: lateralZ,
            // Gravity (world units per second^2 — gentle since the fall
            // is meant to take 2 minutes for the full arc)
            gravity: 0.015,
            // Spin (sprites don't actually rotate, but we wiggle scale instead)
            twinkleRate: 1 + Math.random() * 3,
            baseScale: baseScale,
            row: row,
            // When did this star pass the horizon (y=5)? Computed lazily on first crossing
            horizonCrossedAt: null
        });
    }
}

// Animate scattered stars
function updateShatterStars(now) {
    for (let i = _shatterStars.length - 1; i >= 0; i--) {
        const s = _shatterStars[i];
        const elapsed = now - s.startTime;
        const t = elapsed / s.duration;
        if (t >= 1) {
            if (s.sprite.parent) s.sprite.parent.remove(s.sprite);
            s.sprite.material.dispose();
            _shatterStars.splice(i, 1);
            continue;
        }
        // Position: initial + velocity*t - (1/2)*gravity*t^2 (where t is in seconds)
        const tSec = elapsed / 1000;
        const x = s.initialX + s.vx * tSec;
        const y = s.initialY + s.vy * tSec - 0.5 * s.gravity * tSec * tSec * tSec;   // accelerating downward fall
        const z = s.initialZ + s.vz * tSec;
        s.sprite.position.set(x, y, z);
        // Twinkle: gentle scale wobble (1.0 ± 0.15)
        const twinkle = 1 + 0.15 * Math.sin(tSec * s.twinkleRate * Math.PI * 2);
        // Opacity & flash logic
        let opacity = 1.0;
        const horizonY = 5;
        if (y > horizonY) {
            // Still in sky — gentle dim over time + twinkle
            // Opacity 1.0 → 0.65 by 88% progress (similar to original)
            opacity = 1.0 - t * 0.4;
        } else {
            // Crossed horizon — flash and burn out
            if (s.horizonCrossedAt === null) s.horizonCrossedAt = elapsed;
            const burnoutT = (elapsed - s.horizonCrossedAt) / 800;       // 800ms burnout
            if (burnoutT < 0.4) {
                // Bright flash
                opacity = 1.6 * (1 - burnoutT / 0.4) + 0.6;
            } else {
                // Extinguish
                opacity = Math.max(0, 1.0 * (1 - (burnoutT - 0.4) / 0.6));
            }
        }
        s.sprite.material.opacity = Math.max(0, Math.min(1.6, opacity));
        s.sprite.scale.set(s.baseScale * twinkle, s.baseScale * twinkle, 1);
    }
}

// One-time supernova canvas textures — generated lazily and shared.
let _supernovaFlashTex = null;
let _supernovaRingTex  = null;
function getSupernovaTextures() {
    if (_supernovaFlashTex) return { flash: _supernovaFlashTex, ring: _supernovaRingTex };
    // FLASH texture: bright white core fading through warm yellow to transparent
    const fc = document.createElement('canvas');
    fc.width = 256; fc.height = 256;
    const fctx = fc.getContext('2d');
    const fg = fctx.createRadialGradient(128, 128, 0, 128, 128, 128);
    fg.addColorStop(0.00, 'rgba(255, 255, 255, 1.0)');
    fg.addColorStop(0.15, 'rgba(255, 250, 220, 0.95)');
    fg.addColorStop(0.35, 'rgba(255, 220, 150, 0.7)');
    fg.addColorStop(0.65, 'rgba(255, 160, 100, 0.35)');
    fg.addColorStop(1.00, 'rgba(255, 100, 60,  0.0)');
    fctx.fillStyle = fg;
    fctx.fillRect(0, 0, 256, 256);
    // Add radial spikes (light rays) — 8 thin bright lines from center
    fctx.save();
    fctx.translate(128, 128);
    for (let i = 0; i < 8; i++) {
        fctx.rotate(Math.PI / 4);
        const g = fctx.createLinearGradient(0, 0, 0, -120);
        g.addColorStop(0.0, 'rgba(255, 255, 255, 0.9)');
        g.addColorStop(0.7, 'rgba(255, 230, 180, 0.3)');
        g.addColorStop(1.0, 'rgba(255, 200, 140, 0.0)');
        fctx.fillStyle = g;
        fctx.fillRect(-2, -120, 4, 120);
    }
    fctx.restore();
    _supernovaFlashTex = new THREE.CanvasTexture(fc);
    _supernovaFlashTex.minFilter = THREE.LinearFilter;
    _supernovaFlashTex.magFilter = THREE.LinearFilter;

    // RING texture: bright thin ring (annulus) for the shockwave
    const rc = document.createElement('canvas');
    rc.width = 256; rc.height = 256;
    const rctx = rc.getContext('2d');
    const rg = rctx.createRadialGradient(128, 128, 100, 128, 128, 128);
    rg.addColorStop(0.0, 'rgba(255, 255, 255, 0.0)');
    rg.addColorStop(0.5, 'rgba(255, 250, 220, 0.85)');
    rg.addColorStop(0.9, 'rgba(255, 200, 140, 0.4)');
    rg.addColorStop(1.0, 'rgba(255, 200, 140, 0.0)');
    rctx.fillStyle = rg;
    rctx.fillRect(0, 0, 256, 256);
    _supernovaRingTex = new THREE.CanvasTexture(rc);
    _supernovaRingTex.minFilter = THREE.LinearFilter;
    _supernovaRingTex.magFilter = THREE.LinearFilter;

    return { flash: _supernovaFlashTex, ring: _supernovaRingTex };
}

// Active supernova burst objects — animated and culled in updateSkyConstellations
const _supernovaBursts = [];

function spawnSupernova(x, y, z) {
    const { flash, ring } = getSupernovaTextures();
    // FLASH sprite — appears briefly, scales up, fades
    const flashMat = new THREE.SpriteMaterial({
        map: flash,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        fog: false
    });
    const flashSprite = new THREE.Sprite(flashMat);
    flashSprite.scale.set(8, 8, 1);
    flashSprite.position.set(x, y, z);
    flashSprite.renderOrder = 5;
    scene.add(flashSprite);

    // SHOCKWAVE RING — expands rapidly outward
    const ringMat = new THREE.SpriteMaterial({
        map: ring,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        fog: false
    });
    const ringSprite = new THREE.Sprite(ringMat);
    ringSprite.scale.set(4, 4, 1);
    ringSprite.position.set(x, y, z);
    ringSprite.renderOrder = 5;
    scene.add(ringSprite);

    _supernovaBursts.push({
        flash: flashSprite,
        ring: ringSprite,
        startTime: performance.now(),
        flashDuration: 1800,        // 1.8 s flash
        ringDuration:  2500,        // 2.5 s ring expansion
        maxFlashScale: 80,          // peak flash size in world units
        maxRingScale:  120          // peak ring size
    });
}

// makePieceConstellationTexture — module-scope version, used by both V5
// and V3 to paint the 8 back-rank constellation textures. Identical to
// the version that lives inside buildCathedralLandscape (which exposes
// it via window for V3's first build). Having it at module scope means
// V3 doesn't need V5 to be built first.
function makePieceConstellationTexture(type) {
    const c = document.createElement('canvas');
    c.width = 256;
    c.height = 384;
    const ctx = c.getContext('2d');
    ctx.strokeStyle = 'rgba(245, 237, 214, 0.55)';
    ctx.lineWidth = 1.8;
    ctx.lineCap = 'round';
    function star(x, y, r) {
        const grad = ctx.createRadialGradient(x, y, 0, x, y, r * 4);
        grad.addColorStop(0,   'rgba(255, 248, 216, 0.9)');
        grad.addColorStop(0.3, 'rgba(255, 248, 216, 0.4)');
        grad.addColorStop(1,   'rgba(255, 248, 216, 0.0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, r * 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255, 248, 216, 1.0)';
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
    }
    function line(x1, y1, x2, y2) {
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
    }
    const cx = 128, cy = 192;
    if (type === 'rook') {
        const top = cy - 90, bottom = cy + 90;
        const bpos = [cx-44, cx-28, cx-12, cx+4, cx+20, cx+36];
        line(bpos[0], top, bpos[0], top+30); line(bpos[0], top, bpos[1], top); line(bpos[1], top, bpos[1], top+30);
        line(bpos[1], top+30, bpos[2], top+30); line(bpos[2], top, bpos[2], top+30); line(bpos[2], top, bpos[3], top);
        line(bpos[3], top, bpos[3], top+30); line(bpos[3], top+30, bpos[4], top+30); line(bpos[4], top, bpos[4], top+30);
        line(bpos[4], top, bpos[5], top); line(bpos[5], top, bpos[5], top+30);
        line(cx-44, top+30, cx+36, top+30);
        line(cx-36, top+30, cx-36, bottom-20);
        line(cx+28, top+30, cx+28, bottom-20);
        line(cx-36, bottom-20, cx+28, bottom-20);
        line(cx-50, bottom-20, cx+42, bottom-20);
        line(cx-50, bottom-20, cx-50, bottom);
        line(cx+42, bottom-20, cx+42, bottom);
        line(cx-50, bottom, cx+42, bottom);
        for (const b of bpos) star(b, top, 3);
        star(cx-44, top+30, 3); star(cx+36, top+30, 3);
        star(cx-36, bottom-20, 3); star(cx+28, bottom-20, 3);
        star(cx-50, bottom, 3); star(cx+42, bottom, 3);
    } else if (type === 'knight' || type === 'knight-mirror') {
        const sign = (type === 'knight-mirror') ? -1 : 1;
        const top = cy - 90, bottom = cy + 90;
        line(cx + sign*(-30), top, cx + sign*(-30), bottom);
        line(cx + sign*(-30), cy - 10, cx + sign*(40), top);
        line(cx + sign*(-30), cy - 10, cx + sign*(40), bottom);
        star(cx + sign*(-30), top, 4);
        star(cx + sign*(-30), bottom, 4);
        star(cx + sign*(-30), cy - 10, 4.5);
        star(cx + sign*(40),  top, 4);
        star(cx + sign*(40),  bottom, 4);
    } else if (type === 'bishop') {
        const apex = cy - 100, base = cy + 90;
        line(cx-44, base, cx, apex);
        line(cx+44, base, cx, apex);
        line(cx-22, cy + 5, cx+22, cy + 5);
        star(cx, apex, 5);
        star(cx-44, base, 4);
        star(cx+44, base, 4);
        star(cx-22, cy + 5, 3);
        star(cx+22, cy + 5, 3);
    } else if (type === 'queen') {
        const circleCY = cy - 50;
        const r = 32;
        const N = 12;
        const pts = [];
        for (let i = 0; i < N; i++) {
            const a = (i/N) * Math.PI * 2 - Math.PI / 2;
            pts.push([cx + Math.cos(a)*r, circleCY + Math.sin(a)*r]);
        }
        for (let i = 0; i < N; i++) {
            const [x1,y1] = pts[i], [x2,y2] = pts[(i+1)%N];
            line(x1, y1, x2, y2);
        }
        for (const [sx,sy] of pts) star(sx, sy, 2.5);
        line(cx, circleCY + r, cx, cy + 65);
        line(cx - 24, cy + 40, cx + 24, cy + 40);
        star(cx, circleCY + r, 3);
        star(cx, cy + 65, 3.5);
        star(cx - 24, cy + 40, 3);
        star(cx + 24, cy + 40, 3);
    } else if (type === 'king') {
        const top = cy - 115, bottom = cy + 90;
        const armY = cy - 30;
        line(cx, top, cx, bottom);
        line(cx-50, armY, cx+50, armY);
        star(cx, top, 6);
        star(cx, bottom, 5);
        star(cx-50, armY, 5);
        star(cx+50, armY, 5);
        star(cx, armY, 4.5);
    }
    const tex = new THREE.CanvasTexture(c);
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    return tex;
}
if (typeof window !== 'undefined') {
    window._makePieceConstellationTexture = makePieceConstellationTexture;
}

// buildConstellationRowsAtZ — shared helper used by V5 (and V3) to add
// two rows of constellation chess back-rank pieces in the sky, one at
// each provided Z position. The texture-maker function is resolved from
// window._makePieceConstellationTexture (exposed by V5's landscape
// builder; if not yet exposed, this helper returns []).
//
// Parameters:
//   zPositions       — array of two Z values [south, north], e.g. [-260, 260]
//   y                — sky altitude (e.g. 70)
//   totalWidth       — horizontal span of the 8-piece row (e.g. 220)
//
// Side-effects:
//   appends meshes to window._skyConstellations (creates if missing)
//
// Returns:
//   the array of meshes (for the caller to push into its view-prop list)
function buildConstellationRowsAtZ(zPositions, y, totalWidth) {
    const out = [];
    const makeTex = (typeof window !== 'undefined') ? window._makePieceConstellationTexture : null;
    if (!makeTex) return out;            // V5 hasn't built yet — caller should ensure ordering
    const pieceW = totalWidth / 8;
    const constellationLayout = [
        { type: 'rook',          pieceLetter: 'r', slot: 0 },
        { type: 'knight',        pieceLetter: 'n', slot: 1 },
        { type: 'bishop',        pieceLetter: 'b', slot: 2 },
        { type: 'queen',         pieceLetter: 'q', slot: 3 },
        { type: 'king',          pieceLetter: 'k', slot: 4 },
        { type: 'bishop',        pieceLetter: 'b', slot: 5 },
        { type: 'knight-mirror', pieceLetter: 'n', slot: 6 },
        { type: 'rook',          pieceLetter: 'r', slot: 7 }
    ];
    if (typeof window !== 'undefined') {
        window._skyConstellations = window._skyConstellations || [];
    }
    for (const constZ of zPositions) {
        const isSouthRow = (constZ < 0);
        for (const item of constellationLayout) {
            const tex = makeTex(item.type);
            const mat = new THREE.MeshBasicMaterial({
                map: tex,
                transparent: true,
                depthWrite: false,
                fog: false,
                side: THREE.DoubleSide
            });
            const planeW = pieceW * 1.05;
            const planeH = planeW * (384 / 256);
            const geo = new THREE.PlaneGeometry(planeW, planeH);
            const mesh = new THREE.Mesh(geo, mat);
            const slot = isSouthRow ? item.slot : (7 - item.slot);
            const slotX = (slot - 3.5) * pieceW;
            mesh.position.set(slotX, y, constZ);
            mesh.renderOrder = -1;
            mesh.userData.isSkyConstellation = true;
            mesh.userData.pieceLetter = item.pieceLetter;
            mesh.userData.pieceType = item.type;
            mesh.userData.planeW = planeW;
            mesh.userData.slot = item.slot;
            mesh.userData.row = isSouthRow ? 'south' : 'north';
            mesh.userData.initialX = slotX;
            mesh.userData.initialY = y;
            mesh.userData.initialZ = constZ;
            mesh.userData.fallState = null;
            if (typeof window !== 'undefined') {
                window._skyConstellations.push(mesh);
            }
            out.push(mesh);
        }
    }
    return out;
}

// Update active supernova bursts — called each frame from updateSkyConstellations
function updateSupernovaBursts(now) {
    for (let i = _supernovaBursts.length - 1; i >= 0; i--) {
        const b = _supernovaBursts[i];
        const tf = (now - b.startTime) / b.flashDuration;     // flash progress
        const tr = (now - b.startTime) / b.ringDuration;      // ring progress
        // FLASH: scale up sharply, hold briefly, then fade
        if (tf < 1) {
            // Scale curve: rapid expand from 8 → maxFlashScale by 30%, then hold, then shrink slightly while fading
            let scale;
            if (tf < 0.3) {
                scale = 8 + (b.maxFlashScale - 8) * (tf / 0.3);
            } else if (tf < 0.7) {
                scale = b.maxFlashScale;
            } else {
                scale = b.maxFlashScale * (1 - (tf - 0.7) * 0.5);
            }
            b.flash.scale.set(scale, scale, 1);
            // Opacity: pop to 1.5 instantly, then ease to 0
            let op;
            if (tf < 0.1) {
                op = 1.5 * (tf / 0.1);            // ramp up over 180ms
            } else if (tf < 0.5) {
                op = 1.5;                          // hold bright
            } else {
                op = 1.5 * (1 - (tf - 0.5) / 0.5);  // fade out over second half
            }
            b.flash.material.opacity = Math.max(0, op);
        } else {
            // Remove flash sprite when its lifetime ends
            if (b.flash.parent) b.flash.parent.remove(b.flash);
            b.flash.material.dispose();
            b.flash = null;
        }
        // RING: expand from small to large, fade simultaneously
        if (tr < 1) {
            const scale = 4 + (b.maxRingScale - 4) * tr;
            b.ring.scale.set(scale, scale, 1);
            // Opacity fades from 1.0 to 0 over the duration
            b.ring.material.opacity = 1.0 - tr;
        } else {
            if (b.ring.parent) b.ring.parent.remove(b.ring);
            b.ring.material.dispose();
            b.ring = null;
        }
        // Remove burst entry when both sprites are gone
        if (!b.flash && !b.ring) {
            _supernovaBursts.splice(i, 1);
        }
    }
}

// AMENTI.LIVE sky-sequence animator.
// Schedule: 5 seconds after V5 first becomes active, the 11 letters
// fade in over ~1s. Then each letter supernova-and-falls in sequence,
// staggered ~250ms apart, for a sweeping wave effect.
// (AMENTI.LIVE sky-cascade was removed.)

// Per-frame update for sky constellations that are currently falling.
function updateSkyConstellations(now) {
    // First, animate any active supernova bursts
    updateSupernovaBursts(now);
    // Animate scattered stars from shattered constellations
    updateShatterStars(now);

    const chessList = (typeof window !== 'undefined') ? window._skyConstellations : null;
    const allFalling = chessList ? [...chessList] : [];
    for (const mesh of allFalling) {
        const f = mesh.userData.fallState;
        if (!f) continue;
        if (f === 'done') continue;
        // SHATTERED constellation — the plane's connecting lines fade
        // out fast while individual stars scatter (handled by
        // updateShatterStars). Once the line-fade completes, hide.
        if (f === 'shattered') {
            const fadeStart = mesh.userData.lineFadeStart || now;
            const fadeDur   = mesh.userData.lineFadeDuration || 1500;
            const fadeT = Math.min(1, (now - fadeStart) / fadeDur);
            mesh.material.opacity = 1 - fadeT;
            if (fadeT >= 1) {
                mesh.visible = false;
                mesh.userData.fallState = 'done';
            }
            continue;
        }
        // OBJECT fallState — original whole-plane fall (still used by
        // AMENTI letters until/unless they get shattered too).
        const elapsed = now - f.startTime;
        const t = elapsed / f.duration;
        if (t >= 1) {
            mesh.visible = false;
            mesh.userData.fallState = 'done';
            continue;
        }
        const skyY = f.initialY;
        const horizonY = 5;
        const underY  = -5;
        let y;
        if (t < 0.92) {
            const localT = t / 0.92;
            y = skyY + (horizonY - skyY) * (localT * localT);
        } else {
            const localT = (t - 0.92) / 0.08;
            y = horizonY + (underY - horizonY) * localT;
        }
        const x = f.initialX + f.driftX * t;
        const z = f.initialZ + f.driftZ * t;
        mesh.position.set(x, y, z);
        mesh.rotation.z = f.spinRate * (elapsed / 1000);
        let opacity, scale;
        const novaDuration = 2000 / f.duration;
        if (t < novaDuration) {
            const novaT = t / novaDuration;
            opacity = 2.5 - novaT * 1.5;
            scale = 1.4 - novaT * 0.4;
        } else if (t < 0.88) {
            opacity = 1.0 - (t - novaDuration) * 0.35 / (0.88 - novaDuration);
            scale = 1.0;
        } else if (t < 0.94) {
            const flashT = (t - 0.88) / 0.06;
            opacity = 0.69 + (1.6 - 0.69) * Math.sin(flashT * Math.PI);
            scale = 1 + 0.5 * Math.sin(flashT * Math.PI);
        } else {
            const dimT = (t - 0.94) / 0.06;
            opacity = Math.max(0, 1.0 - dimT * 1.0);
            scale = 1.0;
        }
        mesh.material.opacity = Math.min(1.0, opacity);
        mesh.scale.set(scale, scale, 1);
    }
}

function updateAnimations(now) {
    for (let i = animations.length - 1; i >= 0; i--) {
        const a = animations[i];
        const t = Math.min(1, (now - a.startTime) / a.duration);
        const e = ease(t);
        a.mesh.position.x = a.startX + (a.endX - a.startX) * e;
        a.mesh.position.y = a.startY + (a.endY - a.startY) * e;
        a.mesh.position.z = a.startZ + (a.endZ - a.startZ) * e;
        if (t >= 1) animations.splice(i, 1);
    }
}

// Wrapper around attemptMove that handles capture detection and animation.
// Returns true if the move was legal (same contract as attemptMove).
function attemptMoveWithCaptures(source, target) {
    const before = snapshotBoard();
    const moved = attemptMove(source, target);
    if (!moved) return false;
    const after = snapshotBoard();

    const { moves, captures } = diffBoards(before, after);

    // ---- V11 FLEET SHIP SYNC ----
    // When anchor mode is on, the central board pieces are mirrored as
    // boats. Their fleet counterparts (behind each player) respond to
    // gameplay events: pitch when their corresponding piece moves, fire
    // a cannon when their corresponding piece captures. Only back-rank
    // pieces have fleet ships.
    if (typeof anchorModeOn !== 'undefined' && anchorModeOn
        && typeof findFleetShip === 'function') {
        // Pitch on move: each moving piece (back-rank only) pings its
        // fleet ship's roll oscillator.
        for (const mv of moves) {
            // The piece's home square tells us what kind of ship it is
            const home = pieceHomeMap[mv.to];     // already updated to new square
            if (!home) continue;
            const homeRow = ranks.indexOf(home[1]);
            if (homeRow !== 0 && homeRow !== 7) continue;       // skip pawns
            const ship = findFleetShip(mv.piece.type, mv.piece.color);
            if (ship) triggerFleetShipPitchPing(ship);
        }
        // Cannon on capture: the CAPTURING piece's fleet ship fires.
        // We identify the capturer by looking at the move whose `to`
        // matches the captured piece's `square`.
        for (const cap of captures) {
            for (const mv of moves) {
                if (mv.to !== cap.square) continue;
                const home = pieceHomeMap[mv.to];
                if (!home) continue;
                const homeRow = ranks.indexOf(home[1]);
                if (homeRow !== 0 && homeRow !== 7) continue;
                const ship = findFleetShip(mv.piece.type, mv.piece.color);
                if (ship) {
                    // Captured square's world position: chess board uses
                    // (col - 3.5, 0, row - 3.5) for tile centers. Look
                    // up cap.square ('e4' etc) and convert.
                    const capCol = files.indexOf(cap.square[0]);
                    const capRow = ranks.indexOf(cap.square[1]);
                    const targetWorldPos = new THREE.Vector3(
                        capCol - 3.5,
                        0.5,
                        capRow - 3.5
                    );
                    triggerFleetShipCannon(ship, targetWorldPos);
                }
                break;
            }
        }
    }

    // For each captured piece, spawn a sinking animation
    for (const cap of captures) {
        // ---- Wireframe ship burn-and-sink ----
        // If the captured piece had a registered wireframe ship on its
        // square, detach the ship from the piece group (so the upcoming
        // updateWireframePieces rebuild doesn't wipe it) and reparent to
        // _wireframeLayer (or its parent) so the sink animation continues
        // independently of regular piece updates.
        if (typeof _wireframeShipsBySquare !== 'undefined' &&
            _wireframeShipsBySquare[cap.square]) {
            const sinkingShip = _wireframeShipsBySquare[cap.square];
