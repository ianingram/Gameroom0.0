    const horizonTreeMats = treeSpriteMats.map(srcMat => {
        const m = new THREE.SpriteMaterial({
            map: srcMat.map,
            transparent: true,
            depthWrite: false,
            alphaTest: 0.1
        });
        m.color.copy(HORIZON_HAZE);
        return m;
    });
    function placeHorizonTreeSprite(x, z, scale) {
        const matIdx = Math.floor(Math.random() * horizonTreeMats.length);
        const sprite = new THREE.Sprite(horizonTreeMats[matIdx]);
        // Large background trees: bigger silhouette to fill the horizon
        const w = 9 * scale;
        const h = 15 * scale;
        sprite.scale.set(w, h, 1);
        sprite.position.set(x, -0.22 + h / 2, z);
        out.push(sprite);
    }

    const SLOPE_INNER_R = 130;       // beyond the chess grid
    const SLOPE_OUTER_R = 280;       // out near the plateau edge
    const HORIZON_DENSITY = 70;      // dispersed, not dense
    let slopeAttempts = 0;
    const MAX_SLOPE_ATTEMPTS = HORIZON_DENSITY * 12;
    let slopePlaced = 0;
    while (slopePlaced < HORIZON_DENSITY && slopeAttempts < MAX_SLOPE_ATTEMPTS) {
        slopeAttempts++;
        const a = Math.random() * Math.PI * 2;
        const r = SLOPE_INNER_R + Math.random() * (SLOPE_OUTER_R - SLOPE_INNER_R);
        const sx = Math.cos(a) * r;
        const sz = Math.sin(a) * r;
        // Skip items deep behind the camera
        if (sz > 130) continue;
        // Skip the temple buffers
        if (Math.hypot(sx, sz - 72) < TEMPLE_BUFFER + 4) continue;
        if (Math.hypot(sx, sz + 72) < TEMPLE_BUFFER + 4) continue;
        // Corridor directly behind the black temple — keep this line of
        // sight clear so no horizon tree visually sits stacked atop the
        // black temple from the player's view.
        if (Math.abs(sx) < 18 && sz < -78) continue;
        slopePlaced++;
        // LARGE distant trees — taller the further out (oldest specimens)
        const distRatio = Math.min(1, (r - SLOPE_INNER_R) / (SLOPE_OUTER_R - SLOPE_INNER_R));
        const treeScale = 2.5 + distRatio * 2.5 + Math.random() * 0.5;
        placeHorizonTreeSprite(sx, sz, treeScale);
    }

    // Paint a few tree-silhouette textures (one-time, at startup) sharing
    // the same green/brown palette as the orchard trees.
    function makeTreeSpriteTexture(seed) {
        const c = document.createElement('canvas');
        c.width = 384;
        c.height = 512;
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, 384, 512);
        // Deterministic per-sprite variation
        let _seed = seed;
        function rnd() {
            _seed = (_seed * 9301 + 49297) % 233280;
            return _seed / 233280;
        }
        const cx0 = 192;     // canvas center X

        // ---- TRUNK ---- chunky tapered trunk with visible side-shading
        // for a sculpted, theatrical look. Painted in three vertical
        // bands (left shadow / mid / right highlight) so it reads 3D
        // even though the sprite itself is flat.
        const trunkBaseY = 512;
        const trunkTopY = 230 + rnd() * 40;       // ~190..275 from canvas top
        const trunkBaseW = 28 + rnd() * 14;       // chunky
        const trunkTopW  = trunkBaseW * 0.55;
        // Draw trunk as a tapered quad
        ctx.beginPath();
        ctx.moveTo(cx0 - trunkBaseW / 2, trunkBaseY);
        ctx.lineTo(cx0 + trunkBaseW / 2, trunkBaseY);
        ctx.lineTo(cx0 + trunkTopW / 2, trunkTopY);
        ctx.lineTo(cx0 - trunkTopW / 2, trunkTopY);
        ctx.closePath();
        // Use a horizontal gradient for left-to-right shading
        const trunkGrad = ctx.createLinearGradient(cx0 - trunkBaseW / 2, 0, cx0 + trunkBaseW / 2, 0);
        trunkGrad.addColorStop(0,    '#2c1f15');  // shadow side
        trunkGrad.addColorStop(0.5,  '#5a4030');  // mid
        trunkGrad.addColorStop(1,    '#7a5a45');  // highlight side
        ctx.fillStyle = trunkGrad;
        ctx.fill();
        // Bark texture lines — vertical knotty striations
        ctx.strokeStyle = 'rgba(20, 12, 8, 0.45)';
        ctx.lineWidth = 1.4;
        const barkLines = 5 + Math.floor(rnd() * 4);
        for (let bl = 0; bl < barkLines; bl++) {
            const xOff = (rnd() - 0.5) * trunkBaseW * 0.8;
            ctx.beginPath();
            ctx.moveTo(cx0 + xOff, trunkBaseY - 8);
            // wavy line up the trunk
            const segs = 6;
            for (let s = 1; s <= segs; s++) {
                const t = s / segs;
                const yy = trunkBaseY - 8 - t * (trunkBaseY - trunkTopY - 8);
                const xx = cx0 + xOff * (1 - t * 0.3) + (rnd() - 0.5) * 4;
                ctx.lineTo(xx, yy);
            }
            ctx.stroke();
        }
        // A few exposed BARE BRANCH segments at the top
        ctx.strokeStyle = '#3a2818';
        ctx.lineCap = 'round';
        const branchCount = 5 + Math.floor(rnd() * 3);
        const branches = [];
        for (let b = 0; b < branchCount; b++) {
            const baseAng = (b / branchCount) * Math.PI - Math.PI / 2 + (rnd() - 0.5) * 0.4;
            const len = 60 + rnd() * 80;
            const startY = trunkTopY + (rnd() - 0.5) * 20;
            const tipX = cx0 + Math.cos(baseAng) * len;
            const tipY = startY + Math.sin(baseAng) * len * 0.7;
            ctx.lineWidth = 3.5 + rnd() * 2;
            ctx.beginPath();
            ctx.moveTo(cx0 + Math.cos(baseAng) * 6, startY);
            // bezier-ish curve through midpoint
            const midX = cx0 + Math.cos(baseAng) * len * 0.5 + (rnd() - 0.5) * 12;
            const midY = startY + Math.sin(baseAng) * len * 0.35 - 8;
            ctx.quadraticCurveTo(midX, midY, tipX, tipY);
            ctx.stroke();
            branches.push({ x: tipX, y: tipY });
            // small offshoot twig
            if (rnd() < 0.7) {
                ctx.lineWidth = 1.5;
                const offAng = baseAng + (rnd() - 0.5) * 1.2;
                ctx.beginPath();
                ctx.moveTo(tipX, tipY);
                ctx.lineTo(tipX + Math.cos(offAng) * 18, tipY + Math.sin(offAng) * 14);
                ctx.stroke();
            }
        }

        // ---- FOLIAGE — layered painted clusters ----
        // Three layers: SHADOW (back), MIDTONE (middle), HIGHLIGHT (front)
        // Each layer is many overlapping irregular blobs. The result reads
        // like a theatrical painted backdrop, not a silhouette.
        function paintBlob(cx, cy, r, color, jitter) {
            ctx.fillStyle = color;
            ctx.beginPath();
            const steps = 14;
            for (let i = 0; i <= steps; i++) {
                const a = (i / steps) * Math.PI * 2;
                const rr = r * (1 - jitter / 2 + rnd() * jitter);
                const x = cx + Math.cos(a) * rr;
                const y = cy + Math.sin(a) * rr * 0.92;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
        }
        const canopyCY = 130 + rnd() * 25;
        const canopyCXJ = (rnd() - 0.5) * 8;
        const canopyR  = 130 + rnd() * 25;
        // SHADOW LAYER — dark green, wide, behind
        const shadowGreens = ['#1c3820', '#23442a', '#2a4830'];
        for (let k = 0; k < 8; k++) {
            const a = rnd() * Math.PI * 2;
            const r = canopyR * (0.65 + rnd() * 0.4);
            paintBlob(
                cx0 + canopyCXJ + Math.cos(a) * r * 0.5,
                canopyCY + Math.sin(a) * r * 0.4,
                40 + rnd() * 25,
                shadowGreens[Math.floor(rnd() * shadowGreens.length)],
                0.4
            );
        }
        // MIDTONE LAYER — main canopy mass
        const midGreens = ['#3a6a3a', '#446e3e', '#305a32', '#4a7a4a'];
        for (let k = 0; k < 12; k++) {
            const a = rnd() * Math.PI * 2;
            const r = canopyR * (0.4 + rnd() * 0.5);
            paintBlob(
                cx0 + canopyCXJ + Math.cos(a) * r * 0.5,
                canopyCY + Math.sin(a) * r * 0.4 - 6,    // slight upward bias
                32 + rnd() * 22,
                midGreens[Math.floor(rnd() * midGreens.length)],
                0.35
            );
        }
        // HIGHLIGHT LAYER — lit leaves on the front-top of the canopy
        const highlightGreens = ['#6a9a5a', '#7eaa6c', '#88bb78'];
        for (let k = 0; k < 7; k++) {
            const a = (k / 7) * Math.PI - Math.PI / 4 + (rnd() - 0.5) * 0.5;
            const r = canopyR * (0.4 + rnd() * 0.35);
            paintBlob(
                cx0 + canopyCXJ + Math.cos(a) * r * 0.55,
                canopyCY + Math.sin(a) * r * 0.4 - 22,   // upper region
                20 + rnd() * 14,
                highlightGreens[Math.floor(rnd() * highlightGreens.length)],
                0.5
            );
        }
        // SPRINKLE: tiny dark dots scattered through canopy for leaf texture
        for (let k = 0; k < 30; k++) {
            const a = rnd() * Math.PI * 2;
            const r = canopyR * (0.3 + rnd() * 0.65);
            ctx.fillStyle = 'rgba(20, 35, 22, 0.4)';
            ctx.beginPath();
            ctx.arc(
                cx0 + canopyCXJ + Math.cos(a) * r * 0.55,
                canopyCY + Math.sin(a) * r * 0.4,
                1.5 + rnd() * 1.5, 0, Math.PI * 2
            );
            ctx.fill();
        }
        // BLOSSOM HIGHLIGHTS — small bright clusters at branch tips
        const blossomColors = ['rgba(248, 200, 215, 0.95)', 'rgba(253, 240, 240, 0.95)', 'rgba(245, 215, 220, 0.95)'];
        const blossomCount = 4 + Math.floor(rnd() * 5);
        for (let k = 0; k < blossomCount; k++) {
            const a = rnd() * Math.PI * 2;
            const r = canopyR * (0.65 + rnd() * 0.35);
            const bcx = cx0 + canopyCXJ + Math.cos(a) * r * 0.55;
            const bcy = canopyCY + Math.sin(a) * r * 0.4 - 5;
            ctx.fillStyle = blossomColors[Math.floor(rnd() * blossomColors.length)];
            // little cluster of 3-4 dots
            for (let p = 0; p < 4; p++) {
                ctx.beginPath();
                ctx.arc(
                    bcx + (rnd() - 0.5) * 14,
                    bcy + (rnd() - 0.5) * 10,
                    2 + rnd() * 2.5, 0, Math.PI * 2
                );
                ctx.fill();
            }
        }
        // Ground shadow / base shrub fluff under the tree (gives it a base)
        ctx.fillStyle = 'rgba(20, 32, 18, 0.55)';
        ctx.beginPath();
        ctx.ellipse(cx0, trunkBaseY - 4, trunkBaseW * 2, 12, 0, 0, Math.PI * 2);
        ctx.fill();

        const tex = new THREE.CanvasTexture(c);
        tex.minFilter = THREE.LinearMipMapLinearFilter;
        tex.magFilter = THREE.LinearFilter;
        return tex;
    }

    // ---- BUSH/SHRUB sprite — smaller painted clump for slope terrain ----
    function makeBushSpriteTexture(seed) {
        const c = document.createElement('canvas');
        c.width = 256;
        c.height = 192;
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, 256, 192);
        let _seed = seed;
        function rnd() {
            _seed = (_seed * 9301 + 49297) % 233280;
            return _seed / 233280;
        }
        const cy = 110;
        // Shadow base
        ctx.fillStyle = '#1c3820';
        ctx.beginPath();
        ctx.ellipse(128, cy + 25, 80, 28, 0, 0, Math.PI * 2);
        ctx.fill();
        // Multiple clumps of varied green
        const greens = ['#3a6a3a', '#2a5230', '#4a7a4a', '#305a32'];
        const clumps = 5 + Math.floor(rnd() * 3);
        for (let i = 0; i < clumps; i++) {
            const a = rnd() * Math.PI * 2;
            const r = 25 + rnd() * 35;
            const ccx = 128 + Math.cos(a) * 35;
            const ccy = cy + Math.sin(a) * 15 - 5;
            ctx.fillStyle = greens[Math.floor(rnd() * greens.length)];
            ctx.beginPath();
            ctx.arc(ccx, ccy, r, 0, Math.PI * 2);
            ctx.fill();
        }
        // Highlight clumps
        for (let i = 0; i < 4; i++) {
            const a = rnd() * Math.PI - Math.PI;
            ctx.fillStyle = '#6a9a5a';
            ctx.beginPath();
            ctx.arc(128 + Math.cos(a) * 25, cy + Math.sin(a) * 12 - 12, 12 + rnd() * 8, 0, Math.PI * 2);
            ctx.fill();
        }
        // A few sticks/twigs poking out
        ctx.strokeStyle = '#3a2818';
        ctx.lineWidth = 1.5;
        for (let i = 0; i < 4; i++) {
            const ang = (i / 4) * Math.PI - Math.PI / 2 + (rnd() - 0.5) * 0.6;
            ctx.beginPath();
            ctx.moveTo(128, cy);
            ctx.lineTo(128 + Math.cos(ang) * (40 + rnd() * 20), cy + Math.sin(ang) * (25 + rnd() * 15));
            ctx.stroke();
        }
        const tex = new THREE.CanvasTexture(c);
        tex.minFilter = THREE.LinearMipMapLinearFilter;
        tex.magFilter = THREE.LinearFilter;
        return tex;
    }

    // ---- STANDING STONE / BOULDER artifact texture ----
    function makeStoneArtifactTexture(seed) {
        const c = document.createElement('canvas');
        c.width = 192;
        c.height = 256;
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, 192, 256);
        let _seed = seed;
        function rnd() {
            _seed = (_seed * 9301 + 49297) % 233280;
            return _seed / 233280;
        }
        // Roughly oval / pillar shape
        const isPillar = rnd() < 0.4;
        ctx.fillStyle = '#8a8580';
        ctx.beginPath();
        if (isPillar) {
            // tall standing stone
            ctx.moveTo(70, 250);
            ctx.lineTo(122, 250);
            ctx.lineTo(118, 90);
            ctx.lineTo(96, 60);
            ctx.lineTo(74, 90);
            ctx.closePath();
        } else {
            // squat boulder
            ctx.ellipse(96, 195, 70, 55, 0, 0, Math.PI * 2);
        }
        ctx.fill();
        // Shading on left side
        ctx.fillStyle = 'rgba(50, 48, 42, 0.4)';
        ctx.beginPath();
        if (isPillar) {
            ctx.moveTo(70, 250);
            ctx.lineTo(96, 250);
            ctx.lineTo(96, 90);
            ctx.lineTo(74, 90);
            ctx.closePath();
        } else {
            ctx.ellipse(76, 195, 40, 50, 0, 0, Math.PI * 2);
        }
        ctx.fill();
        // Highlight on right edge
        ctx.fillStyle = 'rgba(200, 195, 185, 0.4)';
        ctx.beginPath();
        if (isPillar) {
            ctx.moveTo(108, 245);
            ctx.lineTo(122, 245);
            ctx.lineTo(118, 90);
            ctx.lineTo(110, 95);
            ctx.closePath();
        } else {
            ctx.ellipse(126, 185, 12, 40, 0, 0, Math.PI * 2);
        }
        ctx.fill();
        // Crack lines for texture
        ctx.strokeStyle = 'rgba(40, 38, 35, 0.5)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 4; i++) {
            ctx.beginPath();
            const sx = 75 + rnd() * 42;
            const sy = 100 + rnd() * 120;
            ctx.moveTo(sx, sy);
            ctx.lineTo(sx + (rnd() - 0.5) * 18, sy + 8 + rnd() * 18);
            ctx.stroke();
        }
        // Moss patches at base
        ctx.fillStyle = 'rgba(74, 110, 60, 0.7)';
        for (let i = 0; i < 5; i++) {
            ctx.beginPath();
            ctx.arc(80 + rnd() * 32, 220 + rnd() * 22, 3 + rnd() * 4, 0, Math.PI * 2);
            ctx.fill();
        }
        // Ground shadow
        ctx.fillStyle = 'rgba(20, 25, 18, 0.45)';
        ctx.beginPath();
        ctx.ellipse(96, 252, 50, 6, 0, 0, Math.PI * 2);
        ctx.fill();
        const tex = new THREE.CanvasTexture(c);
        tex.minFilter = THREE.LinearMipMapLinearFilter;
        tex.magFilter = THREE.LinearFilter;
        return tex;
    }
    // Generate a small pool of distinct textures — sprites share these
    // so we get visual variety without 150 unique canvases.
    function placeBushSprite(x, z, scale) {
        const matIdx = Math.floor(Math.random() * bushSpriteMats.length);
        const sprite = new THREE.Sprite(bushSpriteMats[matIdx]);
        const w = 4 * scale;
        const h = 3 * scale;
        sprite.scale.set(w, h, 1);
        sprite.position.set(x, -0.22 + h / 2, z);
        out.push(sprite);
    }
    function placeStoneSprite(x, z, scale) {
        const matIdx = Math.floor(Math.random() * stoneSpriteMats.length);
        const sprite = new THREE.Sprite(stoneSpriteMats[matIdx]);
        const w = 3 * scale;
        const h = 4 * scale;
        sprite.scale.set(w, h, 1);
        sprite.position.set(x, -0.22 + h / 2, z);
        out.push(sprite);
    }

    function placeForestSprite(x, z, scale) {
        const matIdx = Math.floor(Math.random() * treeSpriteMats.length);
        const sprite = new THREE.Sprite(treeSpriteMats[matIdx]);
        // Sprite world size: wider AND taller for the forest. The scale
        // parameter (1 → ~5) ramps up dramatically for distant trees
        // since they're meant to read as much taller old-growth.
        const w = 7 * scale;
        const h = 12 * scale;
        sprite.scale.set(w, h, 1);
        sprite.position.set(x, -0.22 + h / 2, z);
        // Tag with userData so the day/night applier and fog don't have
        // to recompute identity.
        sprite.userData.isV5Forest = true;
        out.push(sprite);
    }

    return out;
}

// Per-frame rain animation. Runs only when V5 is active (we filter the active
// props for any with isRain flag). Called from the main animation loop.
function updateRain(dt) {
    for (const obj of activeViewProps) {
        if (!obj.userData || !obj.userData.isRain) continue;
        const positions = obj.geometry.attributes.position.array;
        const velocities = obj.userData.velocities;
        const bottomY = obj.userData.bottomY;
        const topY = obj.userData.topY;
        const fall = dt * 0.06; // overall rain speed multiplier
        for (let i = 0; i < velocities.length; i++) {
            positions[i * 3 + 1] -= velocities[i] * fall;
            if (positions[i * 3 + 1] < bottomY) {
                positions[i * 3 + 1] = topY;
            }
        }
        obj.geometry.attributes.position.needsUpdate = true;
    }
}

// Per-frame lake ripple animation. Drifts the normal-map UV offset on
// the V5 lake surface so the wave pattern slowly flows across the water.
// Two-axis offset at slightly different speeds keeps the pattern from
// reading as a simple translation.
function updateLakeRipple(dt) {
    for (const obj of activeViewProps) {
        if (!obj.userData || !obj.userData.isLakeRipple) continue;
        const tex = obj.userData.rippleTex;
        if (!tex) continue;
        tex.offset.x += dt * 0.000025;
        tex.offset.y += dt * 0.000018;
        tex.needsUpdate = true;
    }
}

// Per-frame pyramid spin. Each tagged pyramid rotates around its own Y axis at
// its configured period (one full turn per spinPeriod ms). Because each pyramid
// sits at x=0 — the chessboard's d-e file midline — its rotation axis coincides
// with that midline plane, so the spin doesn't disturb the alignment. The two
// pyramids spin in opposite directions for visual contrast.
function updatePyramids(dt) {
    for (const obj of activeViewProps) {
        if (!obj.userData || !obj.userData.spinningPyramid) continue;
        const period = obj.userData.spinPeriod;
        const dir = obj.userData.spinDirection;
        // Angular increment for this frame = (full turn / period) * dt * direction
        obj.rotation.y += (2 * Math.PI / period) * dt * dir;
    }
}

// Per-frame UV scrolling for V3's gold lava veins. Each tagged plane
// has its texture offset.x advanced by scrollRate * dt, which makes the
// glowing hot-spots appear to flow outward from the pyramid base.
function updateGoldVeins(dt) {
    const dtSec = dt / 1000;
    for (const obj of activeViewProps) {
        if (!obj.userData || !obj.userData.isGoldVein) continue;
        if (!obj.material || !obj.material.map) continue;
        obj.material.map.offset.x -= obj.userData.scrollRate * dtSec;
        // Keep offset bounded so it doesn't grow unbounded
        if (obj.material.map.offset.x < -1) obj.material.map.offset.x += 1;
    }
}

// Per-frame concert atmosphere. Handles all four element types in one pass.
// Each is gated by a userData flag set in buildConcertAtmosphere() so we can
// just walk activeViewProps once and dispatch.
function updateConcert(now, dt) {
    // Slow global pulse — fed into beam sweep + wash intensities so they share
    // a rhythm without being literally in sync.
    const globalSlow = (Math.sin(now * 0.0008) + 1) / 2;

    for (const obj of activeViewProps) {
        const u = obj.userData;
        if (!u) continue;

        // --- Light beams: sweep and pulse ---
        if (u.lightBeam) {
            // Each beam's axis is set by:
            //   yaw   = base angle for this beam (evenly spaced) + slow sweep
            //   pitch = leans outward from vertical, modulated by beam phase
            const base = (u.beamIndex / u.totalBeams) * Math.PI * 2;
            const sweep = Math.sin(now * 0.00015 + u.beamPhase) * 0.5;  // ±0.5 rad sweep
            const yaw = base + sweep;
            const pitch = -0.3 + Math.sin(now * 0.00012 + u.beamPhase) * 0.3;
            // Reset rotation then build it: yaw around Y, then tilt outward.
            // Cones default to apex-up after our geometry.translate; we want the
            // apex to remain at the pyramid origin while the cone "leans".
            obj.rotation.set(0, yaw, 0);
            obj.rotateOnAxis(new THREE.Vector3(1, 0, 0), pitch);
            // Opacity pulse — beams brighten on globalSlow
            const baseOpacity = u.beamIndex % 2 === 0 ? 0.18 : 0.14;
            obj.material.opacity = baseOpacity * (0.5 + globalSlow * 1.0);
        }

        // --- Haze particles: gentle drift, wrap at bounds ---
        else if (u.hazeParticles) {
            const positions = obj.geometry.attributes.position.array;
            const velocities = u.velocities;
            const box = u.boundsBox;
            const ySpan = u.boundsY;
            const speed = dt;  // drift uses real dt for frame-rate independence
            for (let i = 0; i < positions.length; i += 3) {
                positions[i]     += velocities[i] * speed;
                positions[i + 1] += velocities[i + 1] * speed;
                positions[i + 2] += velocities[i + 2] * speed;
                // Wrap X/Z, clamp Y with bounce
                if (positions[i] >  box) positions[i] = -box;
                if (positions[i] < -box) positions[i] =  box;
                if (positions[i + 2] >  box) positions[i + 2] = -box;
                if (positions[i + 2] < -box) positions[i + 2] =  box;
                if (positions[i + 1] >  ySpan - 2) velocities[i + 1] *= -1;
                if (positions[i + 1] < -2)         velocities[i + 1] *= -1;
            }
            obj.geometry.attributes.position.needsUpdate = true;
        }

        // --- Flying name sprites: traverse Bezier path, fade in/out, recycle ---
        else if (u.fallingName) {
            // Compute age (ms) since this sprite's CURRENT life started.
            const age = now - u.birthMs;
            const LIFE = 30000;     // matches NAME_LIFE_MS from builder
            const FADE_IN = 1500;
            const FADE_OUT = 1500;

            if (age >= LIFE) {
                // Life over — recycle: new path (same TYPE), new name, reset birth time.
                u.path = u.recyclePath();
                u.repaint(obj, u.recycleName());
                u.birthMs = now;
                // Position will be set below by the path sampler at t=0.
                obj.material.opacity = 0;
            }

            // Sample position along the Bezier curve at t = age / LIFE.
            const t = Math.max(0, Math.min(1, age / LIFE));
            quadraticBezier(u.path.p0, u.path.p1, u.path.p2, t, obj.position);

            // Opacity envelope: ease-in at start, full middle, ease-out at end.
            let alpha;
            if (age < FADE_IN) {
                alpha = age / FADE_IN;
            } else if (age > LIFE - FADE_OUT) {
                alpha = (LIFE - age) / FADE_OUT;
            } else {
                alpha = 1;
            }
            // Smoothstep for a softer fade than linear.
            alpha = alpha * alpha * (3 - 2 * alpha);
            obj.material.opacity = alpha;
        }

        // --- Stage washes: pulse intensity ---
        else if (u.stageWash) {
            const phase = (now / u.pulsePeriod) * Math.PI * 2 + u.pulsePhase;
            // Sharp peaks: pow of (sin+1)/2 with a high exponent
            const pulse = Math.pow((Math.sin(phase) + 1) / 2, 2.5);
            obj.intensity = u.baseIntensity * pulse;
        }
    }
}

    { id: 2,  label: '2',  name: 'Light',       bg: 0xc8c8d2, placeholder: false, buildProps: buildV2Props },
    { id: 3,  label: '3',  name: 'Pyramid',     bg: 0x2a2418, placeholder: false, buildProps: buildPyramidProps },
    { id: 4,  label: '4',  name: 'Deep Space',  bg: 0x000005, placeholder: false, buildProps: buildStarfieldProps },
    { id: 5,  label: '5',  name: 'Cathedral',   bg: 0x1c2230, placeholder: false, buildProps: buildCathedralProps },
    { id: 6,  label: '6',  name: 'Planet: limb',     bg: 0x000005, placeholder: false, buildProps: buildPlanetV6Props },
    { id: 7,  label: '7',  name: 'Planet: bands',    bg: 0x000005, placeholder: false, buildProps: buildPlanetV7Props },
    { id: 8,  label: '8',  name: 'Planet: halo',     bg: 0x000005, placeholder: false, buildProps: buildPlanetV8Props },
    { id: 9,  label: '9',  name: 'Planet: full',     bg: 0x000005, placeholder: false, buildProps: buildPlanetV9Props },
    { id: 10, label: '10', name: 'Colosseum',   bg: 0x161a25, placeholder: false, buildProps: buildColosseumProps },
    { id: 11, label: '11', name: 'Light v2',    bg: 0xeeeeee, placeholder: false, buildProps: buildV11Props }
];

// Cache per-view prop arrays. Built lazily on first activation.
const viewPropsCache = {};
// Track currently-active props so we can remove them on view switch.
let activeViewProps = [];

let currentViewId = 1;

// Background transition state
const VIEW_TRANSITION_MS = 300;
let bgTransition = null; // { from: THREE.Color, to: THREE.Color, startTime: number }

function updateBackgroundTransition(now) {
    if (!bgTransition) return;
    const t = Math.min(1, (now - bgTransition.startTime) / VIEW_TRANSITION_MS);
    scene.background.r = bgTransition.from.r + (bgTransition.to.r - bgTransition.from.r) * t;
    scene.background.g = bgTransition.from.g + (bgTransition.to.g - bgTransition.from.g) * t;
    scene.background.b = bgTransition.from.b + (bgTransition.to.b - bgTransition.from.b) * t;
    if (t >= 1) bgTransition = null;
}

function setView(id) {
    const view = VIEWS.find(v => v.id === id);
    if (!view) return;
    if (view.placeholder) return; // ignore clicks on coming-soon tabs
    // If leaving V11 with a ship approach active, drop the approach
    // state — we don't want it lingering when the user comes back.
    if (currentViewId === 11 && id !== 11) {
        v11ShipCamAnim = null;
        v11ActiveShipPos = null;
        v11SavedView = null;
    }
    currentViewId = id;
    // Compute the bg target. Most views use their VIEWS table bg directly,
    // but V11's bg depends on its day/night state — night swaps to a deep
    // navy. Same idea V2 does but V2's bg lives in VIEWS as 0xc8c8d2 and
    // applyV2DayNight handles its swap via the sky dome; V11 has no sky
    // dome so we use the scene.background directly.
    let bgTarget = view.bg;
    if (id === 11 && v11DayNight === 'night') {
        bgTarget = 0x0a1226;          // matches V11_PALETTES.night.bg
    }
    bgTransition = {
        from: scene.background.clone(),
        to: new THREE.Color(bgTarget),
        startTime: performance.now()
    };
    // Toggle the body class so the HUD CSS knows which scheme to use.
    // View 2 = light scene = solid black HUD text. View 11 is V2's
    // saved sibling and shares the same light background — but only in
    // DAY mode. V11 at night gets the dark-scheme HUD like V1.
    const isLightView = (id === 2) || (id === 11 && v11DayNight === 'day');
    document.body.classList.toggle('view-light', isLightView);

    // Swap star pearls between default glow and V2 gold-orb-with-ring look
    applyStarLookForView(id);

    // Remove props from the previous view
    // Remove previously-active props from both parents (some go to
    // `scene`, the V10 altar parts go to `world`).
    for (const p of activeViewProps) {
        if (p.parent) p.parent.remove(p);
    }
    activeViewProps = [];

    // Add this view's props (build once, then cache)
    if (view.buildProps) {
        if (!viewPropsCache[id]) {
            viewPropsCache[id] = view.buildProps();
        }
        for (const p of viewPropsCache[id]) {
            // Most props go to `scene` (static, doesn't auto-rotate). The
            // V10 altar parts are tagged `isV10Altar` and are added to
            // `world` instead so they ROTATE WITH THE CHESSBOARD — this
            // keeps the AMENTI.AI engravings aligned to the player sides
            // when auto-rotation is active. V3 pyramids are also locked
            // to `world` via `attachToWorld` so the white pyramid always
            // stays at the white-end of the board.
            if ((p.userData && p.userData.isV10Altar) ||
                (p.userData && p.userData.attachToWorld)) {
                world.add(p);
            } else {
                scene.add(p);
            }
            activeViewProps.push(p);
        }
    }

    // Reapply the lightLevel slider to any newly-added capstone-glow meshes
    // so the user's prior brightness setting carries over view switches.
    applyLightLevel();

    // ----- View-specific orbit constraints + atmospheric fog -----
    // V5 (Cathedral): unrestricted 360° azimuth, but the VERTICAL pitch
    // is locked so the camera can never tilt UP far enough to see the
    // tops of the trees / above the canopy. This means we don't have to
    // render the upper foliage in full detail (or render anything above
    // the canopy line). Other views reset to defaults.

    // Planets: show as bright LUMINOUS STARS (with prominent symbol
    // labels) in V5 cathedral so they read as visible stars rising over
    // the white temple and setting behind the black temple along the
    // ecliptic. Show as the normal textured planet bodies in space
    // views. Hide in board-only and arena views where they'd transit
    // through the ground.
    if (typeof planetGroup !== 'undefined') {
        const spaceyViews = [4, 6, 7, 8, 9];
        const starView    = (id === 5);
        planetGroup.visible = spaceyViews.includes(id) || starView;
        if (typeof setPlanetMode === 'function') {
            setPlanetMode(starView ? 'starlike' : 'planetlike');
        }
    }
    if (id === 5) {
        // V5 polar limits depend on the current elevation preset:
        //  • ABOVE mode → camera CANNOT pitch below the horizon, so the
        //    user can't dip under the water surface. Allows 40° UP into
        //    the sky band.
        //  • BELOW mode → use the Below preset's own polar range so the
        //    underwater / coffin view works as designed.
        //  • CURRENT (free) → permissive range.
        if (cameraElevation === 'above') {
            controls.minPolarAngle = 50 * Math.PI / 180;          // 40° above horizon
            controls.maxPolarAngle = Math.PI / 2 - 0.05;          // ≈ 87° — at the horizon, no dipping below
        } else if (cameraElevation === 'below') {
            const below = ELEVATION_PRESETS.below;
            controls.minPolarAngle = below.minPolar;
            controls.maxPolarAngle = below.maxPolar;
        } else {
            // Current/free: still constrain max so we don't pop above the
            // canopy line into "looking down at tree tops" territory.
            controls.minPolarAngle = 50 * Math.PI / 180;
            controls.maxPolarAngle = 95 * Math.PI / 180;
        }
        controls.minAzimuthAngle = -Infinity;
        controls.maxAzimuthAngle =  Infinity;
        controls.minDistance = 8;
        controls.maxDistance = 60;
        // V5 fog is set up inside buildCathedralLandscape, but the props
        // are cached — re-attach the cached fog to the scene if it
        // exists, so re-entering V5 restores the atmospheric perspective.
        if (_cathedralState && _cathedralState.fog) {
            scene.fog = _cathedralState.fog;
        }
    } else {
        controls.minPolarAngle = 0.05;
        controls.maxPolarAngle = Math.PI - 0.05;
        controls.minAzimuthAngle = -Infinity;
        controls.maxAzimuthAngle =  Infinity;
        controls.minDistance = 0.1;
        controls.maxDistance = 1000;
        // No fog outside V5
        scene.fog = null;
    }
    controls.update();

    // If the new view has altar boards (temple view), populate them with
    // the current match state right away rather than waiting for the
    // next move.
    if (typeof renderAltarPieces === 'function') renderAltarPieces();

    // Refresh "move to temple / mountains" button visibility for the new view
    if (typeof refreshMoveToTempleButton === 'function') {
        refreshMoveToTempleButton();
    }

    // Update wireframe line colors for the new view's bg brightness.
    if (typeof refreshWireframeLineColors === 'function') {
        refreshWireframeLineColors();
    }

    updateViewTabs();
}

function refreshHUD() {
    const mode = getGameMode();
    const turn = getCurrentTurn();
    const status = getGameStatus();

    turnLine.textContent = `${turn === 'w' ? 'White' : 'Black'} Move`;

    let statusText = '';
    if (aiThinking) {
        statusText = 'AI thinking...';
        statusLine.classList.remove('status-warn');
        statusLine.classList.add('status-info');
    } else {
        statusLine.classList.remove('status-info');
        statusLine.classList.add('status-warn');
        if (mode === 'chess') {
            if (status === 'check') statusText = 'Check!';
            else if (status === 'checkmate') {
                statusText = `Checkmate — ${turn === 'w' ? 'Black' : 'White'} wins`;
            } else if (status === 'stalemate') statusText = 'Stalemate — draw';
        } else {
            if (status === 'win-w') statusText = 'White wins';
            else if (status === 'win-b') statusText = 'Black wins';
        }
    }
    statusLine.textContent = statusText;
}

// ----- AI MOVE TRIGGER -----
// Called after every move. If AI is on, it's black's turn, and the game is still
// active, the AI plays its move after a 1-second "thinking" pause.
function maybeTriggerAIMove() {
    if (!aiEnabled) return;
    if (aiThinking) return;
    if (getGameMode() !== 'chess') return; // checkers AI not implemented yet
    const status = getGameStatus();
    if (status === 'checkmate' || status === 'stalemate') return;
    if (getCurrentTurn() !== 'b') return;

    aiThinking = true;
    refreshHUD();

    // setTimeout + rAF so "thinking" text paints before the synchronous minimax
    // search hogs the main thread. 1-second pause for pacing.
    setTimeout(() => {
        requestAnimationFrame(() => {
            const depth = depthForSliderLevel(aiLevel);
            const move = findBestMove('b', depth);
            aiThinking = false;
            if (!move) {
                refreshHUD();
                return;
            }
            const moved = attemptMoveWithCaptures(move.from, move.to);
            if (moved) renderPieces();
            refreshHUD();
        });
    }, 1000);
}

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let selectedPiece = null;
let originalMaterial = null;
let highlightedTiles = [];

const HIGHLIGHT_COLOR = 0xffe066;
const SELECT_COLOR = 0xff4444;

function highlightMoveTargets(square) {
    const targets = getPossibleMoves(square);
    for (const t of targets) {
        const tile = tileMap[t];
        if (!tile) continue;

    }

    }

function selectPiece(mesh) {

    selectedPiece = mesh;
    originalMaterial = mesh.material;
    selectedPiece.material = mesh.material.clone();
